it&agrave; non passa cos&igrave;: serve l'uniforme delle DERIVATE."}]},{"pool":"serie","src":"manuale","steps":[{"t":"$f_n(x)=x^n$ su $[0,1]$ converge puntualmente a $f$ con $f(x)=0$ per $x<1$ e $f(1)=1$. Cosa deduci sull'uniforme?","opts":[{"x":"La convergenza NON &egrave; uniforme: $f$ &egrave; discontinua mentre le $f_n$ sono continue","c":true},{"x":"&Egrave; uniforme perch&eacute; converge in ogni punto"},{"x":"&Egrave; uniforme su $[0,1]$ ma non su $[0,1)$"},{"x":"Non si pu&ograve; dire nulla senza calcolare $\\sup|f_n-f|$"}],"hint":"Usa il teorema al contrario: limite uniforme di continue sarebbe continuo.","sol":"Contronominale del teorema di continuit&agrave;: se il limite puntuale &egrave; discontinuo e le $f_n$ sono continue, la convergenza <b>non pu&ograve; essere uniforme</b>. Verifica diretta: $\\sup_{[0,1)}|x^n-0|=1\\not\\to 0$. La discontinuit&agrave; in $x=1$ &egrave; la firma della non uniformit&agrave;."}]},{"pool":"serie","src":"20220124 Es.2 / manuale","steps":[{"t":"Per scambiare limite e integrale, $\\lim_n\\int_a^b f_n=\\int_a^b\\lim_n f_n$ su $[a,b]$ compatto, l'ipotesi <b>sufficiente</b> pi&ugrave; usata all'esame &egrave;:","opts":[{"x":"$f_n\\to f$ uniformemente su $[a,b]$","c":true},{"x":"$f_n\\to f$ puntualmente su $[a,b]$"},{"x":"Ogni $f_n$ &egrave; integrabile su $[a,b]$"},{"x":"$f_n(a)\\to f(a)$ e $f_n(b)\\to f(b)$"}],"hint":"La puntuale da sola non basta (controesempi con picchi che sfuggono). Serve l'uniforme sul compatto.","sol":"Teorema di passaggio al limite sotto integrale: se $f_n\\to f$ uniformemente su $[a,b]$ compatto (e $f_n$ integrabili) allora $\\int_a^b f_n\\to\\int_a^b f$. In alternativa vale la convergenza dominata (Lebesgue): $|f_n|\\le h$ sommabile. La sola puntuale non basta: massa che scivola via."}]},{"pool":"serie","src":"20230123 Es.5 / manuale","steps":[{"t":"Per derivare una serie termine a termine, $\\big(\\sum_k f_k\\big)'=\\sum_k f_k'$, l'ipotesi corretta &egrave;:","opts":[{"x":"$\\sum_k f_k'$ converge uniformemente e $\\sum_k f_k$ converge in almeno un punto","c":true},{"x":"$\\sum_k f_k$ converge uniformemente"},{"x":"$\\sum_k f_k$ converge puntualmente e ogni $f_k$ &egrave; derivabile"},{"x":"$\\sum_k f_k'$ converge puntualmente"}],"hint":"L'ipotesi forte va sulle DERIVATE $f_k'$, non sulla serie di partenza.","sol":"Teorema di derivazione termine a termine: se $\\sum_k f_k'$ converge uniformemente su $I$ e $\\sum_k f_k$ converge in un punto $x_0$, allora $\\sum_k f_k$ converge uniformemente, la somma &egrave; derivabile e $(\\sum f_k)'=\\sum f_k'$. L'uniforme della serie originale NON basta: il limite uniforme di derivabili pu&ograve; non essere derivabile."}]},{"pool":"serie","src":"manuale","steps":[{"t":"Sia $R$ il raggio di convergenza di $\\sum_k c_k x^k$. Cosa &egrave; garantito?","opts":[{"x":"Per $|x|<R$ converge assolutamente; per $|x|>R$ diverge; in $|x|=R$ dipende dal caso","c":true},{"x":"Converge per ogni $x$ con $|x|\\le R$ e diverge altrove"},{"x":"Converge per $|x|<R$ e converge anche in $x=\\pm R$"},{"x":"Diverge per $|x|<R$ e converge per $|x|>R$"}],"hint":"Il comportamento sui due estremi $x=\\pm R$ va studiato a parte, caso per caso.","sol":"Per una serie di potenze esiste $R\\in[0,\\infty]$ tale che: $|x|<R\\Rightarrow$ convergenza assoluta (e uniforme su ogni $[-r,r]$, $r<R$, per Abel); $|x|>R\\Rightarrow$ diverge. Sul bordo $|x|=R$ non c'&egrave; regola generale: si studiano separatamente $x=R$ e $x=-R$ con Leibniz, confronto, ecc."}]},{"pool":"serie","src":"20220706 Es.1 / manuale","steps":[{"t":"$\\sum_k \\dfrac{y^k}{k}$ ha raggio $R=1$. Sul bordo:","opts":[{"x":"In $y=1$ diverge (serie armonica), in $y=-1$ converge (Leibniz)","c":true},{"x":"Converge in entrambi $y=\\pm 1$"},{"x":"Diverge in entrambi $y=\\pm 1$"},{"x":"In $y=1$ converge, in $y=-1$ diverge"}],"hint":"I due estremi danno serie numeriche diverse: una armonica, una armonica a segni alterni.","sol":"In $y=1$: $\\sum 1/k$ &egrave; l'armonica, <b>diverge</b>. In $y=-1$: $\\sum(-1)^k/k$ soddisfa Leibniz ($1/k\\downarrow 0$), <b>converge</b> (semplicemente, non assolutamente). Insieme di convergenza $y\\in[-1,1)$. &Egrave; l'esempio-modello che il bordo va sempre esaminato estremo per estremo."}]},{"pool":"serie","src":"manuale","steps":[{"t":"Formula di Cauchy-Hadamard per il raggio di $\\sum_k c_k x^k$:","opts":[{"x":"$\\dfrac{1}{R}=\\limsup_{k}\\ |c_k|^{1/k}$","c":true},{"x":"$R=\\lim_k |c_k|^{1/k}$"},{"x":"$R=\\sum_k |c_k|$"},{"x":"$\\dfrac{1}{R}=\\lim_k \\dfrac{c_k}{c_{k+1}}$"}],"hint":"&Egrave; un LIMSUP della radice $k$-esima, e sta al denominatore di $R$.","sol":"Cauchy-Hadamard: $1/R=\\limsup_k|c_k|^{1/k}$ (con $1/0=\\infty$, $1/\\infty=0$). Quando il limite del rapporto $|c_{k+1}/c_k|\\to L$ esiste, allora $R=1/L$ (criterio del rapporto), pi&ugrave; comodo nei conti ma meno generale del limsup della radice."}]},{"pool":"serie","src":"20220907 Es.1 / manuale","steps":[{"t":"Perch&eacute; all'esame la convergenza uniforme di $f_n$ si dimostra quasi sempre su un compatto $[a,b]$ (o $[a,+\\infty)$) e quasi mai su tutto $\\mathbb{R}$?","opts":[{"x":"Perch&eacute; su tutto $\\mathbb{R}$ spesso $\\sup_{\\mathbb{R}}|f_n-f|\\not\\to 0$: c'&egrave; un $x_n$ (crescente con $n$) dove il resto resta grande","c":true},{"x":"Perch&eacute; su $\\mathbb{R}$ le funzioni non sono integrabili"},{"x":"Perch&eacute; il teorema di Weierstrass vale solo sui compatti per definizione"},{"x":"Perch&eacute; su $\\mathbb{R}$ la convergenza puntuale non esiste"}],"hint":"Il problema non &egrave; l'integrabilit&agrave;: &egrave; che il sup su tutto $\\mathbb{R}$ non si abbassa.","sol":"Tipicamente $f_n$ ha un picco che si sposta all'infinito con $n$: si trova $x_n\\to\\infty$ con $|f_n(x_n)-f(x_n)|\\not\\to 0$, quindi $\\sup_{\\mathbb{R}}\\not\\to 0$. Restringendosi a un compatto (o $[a,+\\infty)$) il picco esce dall'intervallo e $\\sup\\to 0$. &Egrave; il pattern di $n^a\\sin(x^2/n)$ (picco in $x=\\sqrt{n}$) e simili."}]},{"pool":"serie","src":"20230504 Es.1 / manuale","steps":[{"t":"Per NEGARE la convergenza uniforme di $f_n\\to f$ su $I$, la strategia corretta &egrave;:","opts":[{"x":"Esibire una successione $x_n\\in I$ tale che $|f_n(x_n)-f(x_n)|\\not\\to 0$","c":true},{"x":"Mostrare che esiste $x$ dove $f_n(x)\\not\\to f(x)$"},{"x":"Mostrare che $f$ non &egrave; continua"},{"x":"Mostrare che $\\sum_n M_n=+\\infty$ con $M_n=\\sup|f_n|$"}],"hint":"Basta una singola successione di punti mobili $x_n$ che tenga alto il resto: quello uccide il sup.","sol":"$\\sup_{x\\in I}|f_n-f|\\ge|f_n(x_n)-f(x_n)|$ per ogni scelta $x_n\\in I$. Se trovi $x_n$ con $|f_n(x_n)-f(x_n)|\\to c>0$ (o $\\to\\infty$), allora $\\sup\\not\\to 0$: niente uniforme. Trovare un punto FISSO dove non c'&egrave; convergenza negherebbe la puntuale, cosa diversa e pi&ugrave; forte."}]},{"pool":"serie","src":"14feb25 Es.4 / manuale","steps":[{"t":"Per una serie <b>alternante</b> $\\sum_k(-1)^k g_k(x)$, con $g_k(x)\\ge 0$, il criterio di Leibniz d&agrave; convergenza puntuale se:","opts":[{"x":"$g_k(x)\\downarrow 0$ (decrescente in $k$ e tendente a $0$) per ogni $x$ fissato","c":true},{"x":"$g_k(x)\\to 0$ per ogni $x$, senza altre richieste"},{"x":"$\\sum_k g_k(x)<\\infty$"},{"x":"$g_k(x)$ &egrave; limitata"}],"hint":"Leibniz richiede DUE cose insieme: monotonia decrescente in $k$ E limite nullo.","sol":"Criterio di Leibniz (a $x$ fissato): se $g_k(x)\\ge 0$, $g_{k+1}(x)\\le g_k(x)$ e $g_k(x)\\to 0$, allora $\\sum_k(-1)^k g_k(x)$ converge. Il solo $g_k\\to 0$ non basta (serve la monotonia). Per l'uniforme si stima poi il resto: $|R_N(x)|\\le g_{N+1}(x)$, e se $\\sup_x g_{N+1}\\to 0$ la convergenza &egrave; anche uniforme."}]},{"pool":"serie","src":"20220124 Es.2","steps":[{"t":"<span class=\"lbl\">ES</span> $f_n(x)=\\dfrac{x}{1+2^{-n}+x^2/n^2}$. Qual &egrave; il limite puntuale $f(x)$ su $\\mathbb{R}$?","opts":[{"x":"$f(x)=x$","c":true},{"x":"$f(x)=0$"},{"x":"$f(x)=x/2$"},{"x":"Il limite non esiste per $x\\ne 0$"}],"hint":"Fissa $x$: cosa fanno $2^{-n}$ e $x^2/n^2$ quando $n\\to\\infty$?","sol":"Fissato $x$: $2^{-n}\\to 0$ e $x^2/n^2\\to 0$, quindi il denominatore $\\to 1$ e $f_n(x)\\to x/1=x$. Convergenza <b>puntuale</b> a $f(x)=x$ su tutto $\\mathbb{R}$."}]},{"pool":"serie","src":"20220124 Es.2","steps":[{"t":"<span class=\"lbl\">ES</span> Con $f_n(x)=\\dfrac{x}{1+2^{-n}+x^2/n^2}\\to f(x)=x$: la convergenza &egrave; uniforme su tutto $\\mathbb{R}$?","opts":[{"x":"No: $\\sup_{\\mathbb{R}}|f_n-f|=+\\infty$, il resto cresce per $x$ grande","c":true},{"x":"S&igrave;: converge in ogni punto quindi &egrave; uniforme"},{"x":"S&igrave;, perch&eacute; $f$ &egrave; continua"},{"x":"Non decidibile senza il valore di $x$"}],"hint":"Guarda il resto $f_n(x)-x$ per $x$ molto grande (dell'ordine di $n$): non si abbassa.","sol":"$f_n(x)-x=x\\cdot\\dfrac{-(2^{-n}+x^2/n^2)}{1+2^{-n}+x^2/n^2}$. Per $x\\sim n$ questo termine &egrave; dell'ordine di $-x\\to-\\infty$: dunque $\\sup_{\\mathbb{R}}|f_n-f|=+\\infty\\not\\to 0$. <b>Non uniforme</b> su $\\mathbb{R}$: il picco del resto scappa all'infinito con $n$."}]},{"pool":"serie","src":"20220124 Es.2","steps":[{"t":"<span class=\"lbl\">ES</span> Stessa $f_n(x)=\\dfrac{x}{1+2^{-n}+x^2/n^2}$: sull'intervallo $[1,2]$ la convergenza a $f(x)=x$ &egrave; uniforme?","opts":[{"x":"S&igrave;: $\\sup_{[1,2]}|f_n-f|\\le 2\\,(2^{-n}+4/n^2)\\to 0$","c":true},{"x":"No, perch&eacute; non &egrave; uniforme su $\\mathbb{R}$"},{"x":"No: il sup resta $\\ge 1$"},{"x":"S&igrave;, ma solo perch&eacute; $[1,2]$ non contiene lo $0$"}],"hint":"Su un compatto $x$ &egrave; limitato: stima $|f_n(x)-x|$ maggiorando numeratore e denominatore.","sol":"Su $[1,2]$: $|f_n(x)-x|=|x|\\dfrac{2^{-n}+x^2/n^2}{1+\\cdots}\\le 2\\,(2^{-n}+4/n^2)$, indipendente da $x$ e $\\to 0$. Quindi $\\sup_{[1,2]}|f_n-f|\\to 0$: convergenza <b>uniforme</b> sul compatto, anche se non su $\\mathbb{R}$. La non uniformit&agrave; globale non impedisce quella locale."}]},{"pool":"serie","src":"20220907 Es.1","steps":[{"t":"<span class=\"lbl\">ES</span> $f_n(x)=n^a\\sin\\!\\big(\\tfrac{x^2}{n}\\big)$, $x\\in\\mathbb{R}$, $a>0$ parametro. Limite puntuale per $x$ fissato:","opts":[{"x":"$\\to 0$ se $a<1$; $\\to x^2$ se $a=1$; $\\to+\\infty$ (per $x\\ne 0$) se $a>1$","c":true},{"x":"$\\to 0$ per ogni $a>0$"},{"x":"$\\to x^2$ per ogni $a>0$"},{"x":"$\\to+\\infty$ per ogni $a>0$"}],"hint":"Per $n$ grande $\\sin(x^2/n)\\sim x^2/n$: resta $n^a\\cdot x^2/n=x^2\\,n^{a-1}$.","sol":"Sviluppo $\\sin(x^2/n)\\sim x^2/n$, quindi $f_n(x)\\sim x^2\\,n^{a-1}$. Il segno di $a-1$ decide: $a<1\\Rightarrow n^{a-1}\\to 0$ (limite $0$); $a=1\\Rightarrow$ limite $x^2$; $a>1\\Rightarrow n^{a-1}\\to\\infty$, diverge per $x\\ne 0$. Criterio: limite notevole $\\sin t\\sim t$ + confronto tra potenze di $n$."}]},{"pool":"serie","src":"20220907 Es.1","steps":[{"t":"<span class=\"lbl\">ES</span> Nel caso $a=1$, $f_n(x)=n\\sin\\!\\big(\\tfrac{x^2}{n}\\big)\\to x^2$ uniformemente su $[0,2]$. Quanto vale $\\displaystyle\\lim_{n\\to\\infty} n\\!\\int_0^2\\!\\sin\\!\\big(\\tfrac{x^2}{n}\\big)dx$?","opts":[{"x":"$8/3$","c":true},{"x":"$0$"},{"x":"$4$"},{"x":"Il limite non esiste"}],"hint":"Uniforme su $[0,2]$ compatto: puoi portare il limite dentro l'integrale.","sol":"$n\\int_0^2\\sin(x^2/n)dx=\\int_0^2 f_n(x)\\,dx$. Poich&eacute; $f_n\\to x^2$ <b>uniformemente su $[0,2]$</b> (compatto), vale lo scambio limite-integrale: $\\to\\int_0^2 x^2\\,dx=\\big[x^3/3\\big]_0^2=8/3$. Criterio: teorema di passaggio al limite sotto integrale su convergenza uniforme."}]},{"pool":"serie","src":"20220706 Es.1","steps":[{"t":"<span class=\"lbl\">ES</span> Serie $\\displaystyle\\sum_{k=1}^\\infty\\frac{(\\log(x-1))^k}{k}$, $x>1$. Ponendo $y=\\log(x-1)$, quanto vale il raggio di convergenza in $y$?","opts":[{"x":"$R=1$","c":true},{"x":"$R=0$"},{"x":"$R=+\\infty$"},{"x":"$R=e$"}],"hint":"&Egrave; $\\sum y^k/k$: applica il criterio del rapporto ai coefficienti $c_k=1/k$.","sol":"Con $y=\\log(x-1)$ la serie diventa $\\sum y^k/k$. Coefficienti $c_k=1/k$: $|c_{k+1}/c_k|=k/(k+1)\\to 1$, quindi (Cauchy-Hadamard / rapporto) $R=1$. Dentro $|y|<1$ converge assolutamente."}]},{"pool":"serie","src":"20220706 Es.1","steps":[{"t":"<span class=\"lbl\">ES</span> Per $\\sum_{k\\ge1}\\frac{y^k}{k}$ con $R=1$ e $y=\\log(x-1)$: qual &egrave; l'insieme di convergenza puntuale in $x$?","opts":[{"x":"$x\\in\\big[1+e^{-1},\\,1+e\\big)$","c":true},{"x":"$x\\in\\big(1+e^{-1},\\,1+e\\big)$"},{"x":"$x\\in\\big[1+e^{-1},\\,1+e\\big]$"},{"x":"$x\\in(1,\\,1+e)$"}],"hint":"In $y$ converge su $[-1,1)$ (bordo: armonica diverge in $+1$, Leibniz converge in $-1$). Torna a $x$ con $x=1+e^{y}$.","sol":"In $y$: converge per $y\\in[-1,1)$ (in $y=-1$ Leibniz converge, in $y=1$ armonica diverge). Da $y=\\log(x-1)$: $x-1=e^{y}\\in[e^{-1},e)$, cio&egrave; $x\\in[1+e^{-1},1+e)$. <b>Trappola</b>: bisogna tornare alla variabile $x$ e riportare gli estremi con l'esponenziale."}]},{"pool":"serie","src":"20220706 Es.1","steps":[{"t":"<span class=\"lbl\">ES</span> Somma esplicita di $\\sum_{k=1}^\\infty\\frac{y^k}{k}$ per $|y|<1$ (poi si sostituisce $y=\\log(x-1)$):","opts":[{"x":"$-\\log(1-y)$","c":true},{"x":"$\\dfrac{1}{1-y}$"},{"x":"$\\log(1+y)$"},{"x":"$\\dfrac{y}{1-y}$"}],"hint":"&Egrave; la serie di Taylor nota di un logaritmo. Deriva rispetto a $y$ e riconosci la geometrica.","sol":"Serie nota: $\\sum_{k\\ge1}y^k/k=-\\log(1-y)$ per $|y|<1$ (si ottiene integrando la geometrica $\\sum_{k\\ge0}y^k=1/(1-y)$). Quindi la somma in $x$ &egrave; $-\\log(1-\\log(x-1))$."}]},{"pool":"serie","src":"20230621 Es.2","steps":[{"t":"<span class=\"lbl\">ES</span> $\\displaystyle\\sum_{k=1}^\\infty\\frac{1+k}{k^2}\\,e^{-kx}$. Ponendo $y=e^{-x}$, dove converge puntualmente (in $x$)?","opts":[{"x":"Per $x>0$ (cio&egrave; $0<y<1$); nel bordo $y=1$, cio&egrave; $x=0$, diverge","c":true},{"x":"Per ogni $x\\in\\mathbb{R}$"},{"x":"Per $x\\ge 0$, bordo incluso"},{"x":"Per $x<0$"}],"hint":"$\\frac{1+k}{k^2}\\sim\\frac1k$: raggio $R=1$ in $y$; poi $y=e^{-x}$ e studia il bordo $y=1$.","sol":"Con $y=e^{-x}>0$: serie di potenze $\\sum\\frac{1+k}{k^2}y^k$. Radice: $\\big(\\frac{1+k}{k^2}\\big)^{1/k}\\to 1$, dunque $R=1$. Per $y=1$ ($x=0$): $\\sum\\frac{1+k}{k^2}\\sim\\sum\\frac1k$ diverge. Quindi converge (assolutamente) per $0<y<1$, cio&egrave; $x>0$; totalmente su $[a,+\\infty)$ per ogni $a>0$ (Weierstrass con $M_k=\\frac{1+k}{k^2}e^{-ka}$)."}]},{"pool":"serie","src":"20240704 Es.4","steps":[{"t":"<span class=\"lbl\">ES</span> $f_n(x)=x^n(1-x^n)$ su $[0,+\\infty)$. Limite puntuale:","opts":[{"x":"$\\to 0$ su $[0,1]$; diverge (a $-\\infty$) per $x>1$","c":true},{"x":"$\\to 0$ su tutto $[0,+\\infty)$"},{"x":"$\\to 1$ su $[0,1)$"},{"x":"$\\to 1/4$ ovunque"}],"hint":"Poni $t=x^n$: per $x<1$, $t\\to0$; per $x=1$, $t=1$; per $x>1$, $t\\to+\\infty$.","sol":"Con $t=x^n$: se $0\\le x<1$, $t\\to 0\\Rightarrow t(1-t)\\to 0$; se $x=1$, $t=1\\Rightarrow 1\\cdot0=0$; se $x>1$, $t\\to+\\infty\\Rightarrow t(1-t)\\to-\\infty$, diverge. Limite puntuale $0$ su $[0,1]$, divergenza per $x>1$."}]},{"pool":"serie","src":"20240704 Es.4","steps":[{"t":"<span class=\"lbl\">ES</span> $f_n(x)=x^n(1-x^n)\\to 0$ su $[0,1]$: la convergenza &egrave; uniforme su $[0,1]$?","opts":[{"x":"No: $\\sup_{[0,1]}|f_n|=1/4$ per ogni $n$ (massimo dove $x^n=1/2$)","c":true},{"x":"S&igrave;: converge a $0$ in ogni punto di $[0,1]$"},{"x":"S&igrave;, perch&eacute; $[0,1]$ &egrave; compatto"},{"x":"No, perch&eacute; $f_n(1)=1$"}],"hint":"Scrivi $g(t)=t(1-t)$ con $t=x^n\\in[0,1]$ e trovane il massimo: dipende da $n$?","sol":"Posto $t=x^n$, $g(t)=t(1-t)$ ha massimo $1/4$ in $t=1/2$, raggiungibile con $x_n=(1/2)^{1/n}\\in[0,1]$. Quindi $\\sup_{[0,1]}|f_n-0|=1/4\\not\\to 0$: <b>non uniforme</b>. La compattezza da sola non garantisce l'uniforme; il picco resta di altezza fissa (scivola verso $x=1$)."}]},{"pool":"serie","src":"20250127 Es.4","steps":[{"t":"<span class=\"lbl\">ES</span> $f_n(x)=\\cos\\!\\big(\\tfrac{x}{n}\\big)\\dfrac{nx+3}{n^2+2x^2}$. Converge puntualmente a $0$ su $\\mathbb{R}$. &Egrave; uniforme su tutto $\\mathbb{R}$?","opts":[{"x":"No: $f_n(n)=\\cos(1)\\dfrac{n^2+3}{3n^2}\\to\\dfrac{\\cos 1}{3}\\ne 0$","c":true},{"x":"S&igrave;: converge a $0$ ovunque e $\\cos$ &egrave; limitato"},{"x":"S&igrave;: $|f_n(x)|\\le 3/n\\to 0$"},{"x":"No, perch&eacute; il limite puntuale non &egrave; $0$"}],"hint":"Prova il punto mobile $x_n=n$: numeratore e denominatore sono entrambi $\\sim n^2$.","sol":"Punto mobile $x_n=n$: $f_n(n)=\\cos(1)\\dfrac{n^2+3}{n^2+2n^2}=\\cos(1)\\dfrac{n^2+3}{3n^2}\\to\\cos(1)/3\\ne 0$. Dunque $\\sup_{\\mathbb{R}}|f_n|\\not\\to 0$: <b>non uniforme</b> su $\\mathbb{R}$. Su $[0,2]$ invece $|f_n(x)|\\le\\frac{2n+3}{n^2}\\to 0$ uniformemente. <b>Trappola</b>: la puntuale a $0$ non implica l'uniforme."}]},{"pool":"serie","src":"20240122 Es.2","steps":[{"t":"<span class=\"lbl\">ES</span> $\\displaystyle\\sum_{k\\ge0}\\frac{(\\log x)^k}{3^{k+1}(k+e^{-k})}$. Con $y=\\frac{\\log x}{3}$ diventa $\\sim\\sum\\frac{y^k}{3(k+e^{-k})}$, raggio $R=1$ in $y$. Insieme di convergenza in $x$:","opts":[{"x":"$x\\in[e^{-3},\\,e^{3})$","c":true},{"x":"$x\\in(e^{-3},\\,e^{3})$"},{"x":"$x\\in[e^{-3},\\,e^{3}]$"},{"x":"$x\\in(0,\\,e^{3})$"}],"hint":"In $y$ converge su $[-1,1)$ (armonica diverge in $+1$, Leibniz in $-1$). Poi $\\log x=3y$.","sol":"In $y$: coefficienti $\\sim\\frac{1}{3k}$, quindi in $y=1$ diverge (armonica), in $y=-1$ converge (Leibniz). Insieme $y\\in[-1,1)$. Da $y=\\frac{\\log x}{3}$: $\\log x\\in[-3,3)\\Rightarrow x\\in[e^{-3},e^{3})$. Criterio: Cauchy-Hadamard per $R$, poi Leibniz/armonica sul bordo."}]},{"pool":"serie","src":"14feb25 Es.4","steps":[{"t":"<span class=\"lbl\">ES</span> $f_n(x)=[\\arctan(x^2)]^n$. Dove converge puntualmente (e a quale limite)?","opts":[{"x":"$\\to 0$ per $|x|<\\sqrt{\\tan 1}$; diverge per $|x|>\\sqrt{\\tan 1}$","c":true},{"x":"$\\to 0$ per ogni $x\\in\\mathbb{R}$"},{"x":"$\\to 1$ per ogni $x$"},{"x":"$\\to 0$ solo in $x=0$"}],"hint":"$\\arctan(x^2)\\in[0,\\pi/2)$: la base &egrave; $<1$, $=1$ o $>1$? Confronta con $1$.","sol":"La base $b=\\arctan(x^2)\\ge 0$. Se $b<1$ (cio&egrave; $x^2<\\tan 1$, $|x|<\\sqrt{\\tan 1}$) allora $b^n\\to 0$. Se $b>1$ ($|x|>\\sqrt{\\tan 1}$) allora $b^n\\to+\\infty$, diverge. Il valore $b=1$ si ha in $x^2=\\tan 1$, dove $f_n\\equiv 1$. Limite $0$ sull'aperto $|x|<\\sqrt{\\tan 1}$."}]},{"pool":"serie","src":"manuale","steps":[{"t":"<span class=\"lbl\">ES</span> Studia con Weierstrass la convergenza di $\\displaystyle\\sum_{k=1}^\\infty\\frac{\\sin(kx)}{k^2}$ su $\\mathbb{R}$.","opts":[{"x":"Converge totalmente su $\\mathbb{R}$: $|\\sin(kx)/k^2|\\le 1/k^2$ e $\\sum 1/k^2<\\infty$","c":true},{"x":"Converge solo puntualmente, non uniformemente"},{"x":"Diverge perch&eacute; $\\sin(kx)$ non tende a $0$"},{"x":"Converge solo su intervalli limitati"}],"hint":"Cerca un maggiorante numerico $M_k$ indipendente da $x$ con $\\sum M_k<\\infty$.","sol":"$|\\sin(kx)/k^2|\\le 1/k^2=M_k$ per ogni $x\\in\\mathbb{R}$, e $\\sum_k 1/k^2=\\pi^2/6<\\infty$. Per il criterio di Weierstrass la serie converge <b>totalmente</b> su tutto $\\mathbb{R}$, dunque uniformemente e assolutamente; la somma &egrave; continua su $\\mathbb{R}$ (limite uniforme di continue)."}]}],"conserv":[{"pool":"conserv","src":"tipo E · manuale (cap. Campi vettoriali)","steps":[{"t":"Cosa significa, per definizione, che un campo $F$ è <b>conservativo</b> su un aperto $\\Omega$?","opts":[{"x":"Esiste un campo scalare $U$ tale che $F=\\nabla U$","c":true},{"x":"Vale $\\nabla\\times F=0$ in ogni punto di $\\Omega$"},{"x":"Vale $\\nabla\\cdot F=0$ in ogni punto di $\\Omega$"},{"x":"Il flusso di $F$ attraverso ogni superficie chiusa è nullo"}],"hint":"Irrotazionale ($\\nabla\\times F=0$) e conservativo NON sono la definizione l'uno dell'altro: uno è conseguenza, non definizione.","sol":"<b>Conservativo = ammette potenziale.</b> Per definizione $F=\\nabla U$ per un opportuno scalare $U$ (il potenziale). Irrotazionalità e indipendenza dal cammino sono <i>caratterizzazioni</i> che ne seguono sotto ipotesi sul dominio, non la definizione. $\\nabla\\cdot F=0$ è la definizione di <i>solenoidale</i>, un'altra cosa."}]},{"pool":"conserv","src":"tipo E · manuale (Teorema: conservativo $\\Rightarrow$ irrotazionale)","steps":[{"t":"Perché ogni campo conservativo $F\\in C^1$ è necessariamente irrotazionale?","opts":[{"x":"Perché $F=\\nabla U$ e vale l'identità $\\nabla\\times(\\nabla U)=0$","c":true},{"x":"Perché il dominio è sempre semplicemente connesso"},{"x":"Perché $\\nabla\\cdot(\\nabla U)=0$"},{"x":"Non è vero: esistono campi conservativi con $\\nabla\\times F\\neq 0$"}],"hint":"L'implicazione conservativo$\\Rightarrow$irrotazionale vale SEMPRE (per $F\\in C^1$), senza ipotesi sul dominio. È l'inversa che le richiede.","sol":"$F$ conservativo significa $F=\\nabla U$. Il rotore di un gradiente è identicamente nullo: $\\nabla\\times(\\nabla U)=0$ per il teorema di Schwarz sull'uguaglianza delle derivate miste ($U\\in C^2$). Quindi $\\nabla\\times F=0$. <b>Questa direzione non usa alcuna ipotesi sul dominio.</b> $\\nabla\\cdot(\\nabla U)=\\Delta U$ non è in generale nullo: quella è un'altra identità, sbagliata qui."}]},{"pool":"conserv","src":"tipo E · manuale (trappola tipica) + 20230907 Es.2","steps":[{"t":"Il campo $F(x,y)=\\dfrac{(-y,\\,x)}{x^2+y^2}$ su $\\mathbb{R}^2\\setminus\\{(0,0)\\}$ soddisfa $\\nabla\\times F=0$ ovunque. È conservativo?","opts":[{"x":"No: il dominio $\\mathbb{R}^2\\setminus\\{0\\}$ non è semplicemente connesso, quindi $\\nabla\\times F=0$ non basta","c":true},{"x":"Sì: $\\nabla\\times F=0$ è condizione necessaria e sufficiente per la conservatività"},{"x":"Sì, ma solo perché $F$ è di classe $C^1$"},{"x":"No, perché $\\nabla\\cdot F\\neq 0$"}],"hint":"Irrotazionale $\\Rightarrow$ conservativo SOLO se il dominio è semplicemente connesso. Qui c'è un buco nell'origine.","sol":"<b>No.</b> È il controesempio-principe. $\\nabla\\times F=0$ in ogni punto del dominio, ma $\\mathbb{R}^2\\setminus\\{0\\}$ ha un buco: NON è semplicemente connesso. Il teorema inverso (irrotazionale $\\Rightarrow$ conservativo) richiede il dominio semplicemente connesso, quindi qui non si applica. Infatti la circolazione su un giro attorno all'origine vale $2\\pi\\neq 0$: incompatibile con l'esistenza di un potenziale."}]},{"pool":"conserv","src":"tipo E · manuale + 20230907 Es.2","steps":[{"t":"Qual è la prova <i>concreta</i> che $F(x,y)=\\dfrac{(-y,\\,x)}{x^2+y^2}$ non è conservativo, nonostante sia irrotazionale?","opts":[{"x":"La sua circolazione lungo il cerchio unitario percorso in senso antiorario vale $2\\pi\\neq 0$","c":true},{"x":"La sua divergenza è diversa da zero"},{"x":"Non è definito nell'origine, quindi non è $C^1$"},{"x":"Il suo rotore cambia segno lungo il cerchio"}],"hint":"Se $F$ fosse conservativo, ogni integrale su una curva chiusa sarebbe zero. Basta esibirne uno diverso da zero.","sol":"Se $F=\\nabla U$, allora $\\oint_\\gamma F\\cdot d\\mathbf{r}=0$ su ogni curva chiusa (il potenziale torna al valore di partenza). Sul cerchio unitario $\\gamma(t)=(\\cos t,\\sin t)$, $t\\in[0,2\\pi]$: $F(\\gamma)=(-\\sin t,\\cos t)$, $\\gamma'=(-\\sin t,\\cos t)$, quindi $F\\cdot\\gamma'=\\sin^2 t+\\cos^2 t=1$ e $\\oint=\\int_0^{2\\pi}1\\,dt=2\\pi\\neq 0$. <b>Una circolazione non nulla su una curva chiusa dimostra che il potenziale non esiste.</b>"}]},{"pool":"conserv","src":"tipo E · manuale (Teorema inverso su domini s.c.)","steps":[{"t":"Quale insieme, tra i seguenti, NON è semplicemente connesso (e quindi può far fallire l'implicazione irrotazionale $\\Rightarrow$ conservativo)?","opts":[{"x":"$\\mathbb{R}^2\\setminus\\{(0,0)\\}$","c":true},{"x":"$\\mathbb{R}^3\\setminus\\{(0,0,0)\\}$"},{"x":"Una palla aperta di $\\mathbb{R}^3$"},{"x":"Tutto $\\mathbb{R}^2$"}],"hint":"In $\\mathbb{R}^2$ togliere un punto crea un buco che i cammini non possono aggirare restando nel dominio. In $\\mathbb{R}^3$ togliere un punto no: si può scavalcare.","sol":"<b>$\\mathbb{R}^2\\setminus\\{0\\}$</b> non è semplicemente connesso: un laccio attorno all'origine non si contrae a un punto restando nel dominio. Invece $\\mathbb{R}^3\\setminus\\{0\\}$ SÌ lo è (un laccio si sfila scavalcando il punto nella terza dimensione); una palla e tutto $\\mathbb{R}^2$ sono convessi, quindi stellati, quindi semplicemente connessi. Su questi ultimi, irrotazionale $\\Rightarrow$ conservativo."}]},{"pool":"conserv","src":"tipo E · manuale (Teorema inverso)","steps":[{"t":"Su un aperto $\\Omega$ <b>semplicemente connesso</b>, quale condizione su $F\\in C^1$ garantisce che $F$ è conservativo?","opts":[{"x":"$\\nabla\\times F=0$ su tutto $\\Omega$ (in $\\mathbb{R}^2$: $\\partial_y F_1=\\partial_x F_2$)","c":true},{"x":"$\\nabla\\cdot F=0$ su tutto $\\Omega$"},{"x":"$F$ limitato su $\\Omega$"},{"x":"$F$ continuo su $\\Omega$"}],"hint":"Su un dominio senza buchi, l'irrotazionalità diventa anche sufficiente, non solo necessaria.","sol":"Teorema inverso: se $\\Omega$ è semplicemente connesso e $\\nabla\\times F=0$, allora $F$ è conservativo su $\\Omega$. È la metà difficile della caratterizzazione: l'irrotazionalità è sempre necessaria, ma diventa <i>sufficiente</i> solo grazie all'ipotesi topologica sul dominio. La divergenza non c'entra: riguarda i campi solenoidali."}]},{"pool":"conserv","src":"tipo E · manuale (indipendenza dal cammino)","steps":[{"t":"Per un campo continuo $F$ su un aperto connesso, quale affermazione è <b>equivalente</b> all'essere conservativo?","opts":[{"x":"$\\int_\\gamma F\\cdot d\\mathbf{r}$ dipende solo dagli estremi di $\\gamma$, non dal cammino","c":true},{"x":"$\\int_\\gamma F\\cdot d\\mathbf{r}=0$ per ogni curva $\\gamma$, chiusa o aperta"},{"x":"$\\int_\\gamma \\|F\\|\\,ds=0$ per ogni $\\gamma$"},{"x":"$F$ ha modulo costante lungo ogni curva"}],"hint":"L'indipendenza dal cammino non dice che ogni integrale è zero: dice che due cammini con gli stessi estremi danno lo stesso valore.","sol":"<b>Conservativo $\\iff$ integrale indipendente dal cammino.</b> Se $F=\\nabla U$, allora $\\int_\\gamma F\\cdot d\\mathbf{r}=U(B)-U(A)$, che dipende solo dagli estremi. Viceversa, se l'integrale dipende solo dagli estremi si costruisce $U(P)=\\int_{P_0}^{P}F\\cdot d\\mathbf{r}$. L'opzione sempre-zero è falsa per cammini aperti: vale zero solo sui cammini <i>chiusi</i>."}]},{"pool":"conserv","src":"tipo E · manuale","steps":[{"t":"$F$ è conservativo su un aperto connesso. Quanto vale $\\oint_\\gamma F\\cdot d\\mathbf{r}$ lungo una qualunque curva chiusa $\\gamma$ contenuta nel dominio?","opts":[{"x":"$0$, perché gli estremi coincidono e $\\oint=U(B)-U(A)$ con $B=A$","c":true},{"x":"$2\\pi$, come per ogni campo irrotazionale"},{"x":"Dipende dalla lunghezza di $\\gamma$"},{"x":"$U(A)$, valore del potenziale nel punto di partenza"}],"hint":"Su una curva chiusa punto iniziale e finale coincidono: la differenza di potenziale è automaticamente nulla.","sol":"$\\oint_\\gamma F\\cdot d\\mathbf{r}=U(B)-U(A)$ e su una curva chiusa $B=A$, quindi il valore è $0$. È la firma dei campi conservativi. Il $2\\pi$ dell'esempio col buco NON contraddice questo: lì il campo <i>non</i> è conservativo, proprio perché il dominio non è semplicemente connesso e la circolazione non si annulla."}]},{"pool":"conserv","src":"tipo E · manuale (forme differenziali)","steps":[{"t":"Per una 1-forma $\\omega=P\\,dx+Q\\,dy$ (con $P,Q\\in C^1$), qual è la differenza tra <b>chiusa</b> ed <b>esatta</b>?","opts":[{"x":"Chiusa: $\\partial_y P=\\partial_x Q$. Esatta: esiste $U$ con $dU=\\omega$. Esatta $\\Rightarrow$ chiusa, non viceversa in generale","c":true},{"x":"Sono sinonimi: ogni forma chiusa è esatta"},{"x":"Chiusa: esiste $U$ con $dU=\\omega$. Esatta: $\\partial_y P=\\partial_x Q$"},{"x":"Esatta $\\Rightarrow$ chiusa è falso; vale solo il viceversa"}],"hint":"Esatta = ha una primitiva (analogo di conservativo). Chiusa = passa il test delle derivate incrociate (analogo di irrotazionale).","sol":"<b>Esatta</b> $\\iff$ esiste il potenziale $U$ con $dU=\\omega$ (cioè $\\nabla U=(P,Q)$): è l'analogo di <i>conservativo</i>. <b>Chiusa</b> $\\iff$ $\\partial_y P=\\partial_x Q$: è l'analogo di <i>irrotazionale</i>. Esatta $\\Rightarrow$ chiusa sempre (derivate miste di $U$). Il viceversa vale solo su domini semplicemente connessi: $\\dfrac{-y\\,dx+x\\,dy}{x^2+y^2}$ è chiusa ma non esatta su $\\mathbb{R}^2\\setminus\\{0\\}$."}]},{"pool":"conserv","src":"tipo E · manuale (Lemma di Poincaré)","steps":[{"t":"Cosa afferma il <b>Lemma di Poincaré</b> per una 1-forma differenziale $\\omega$?","opts":[{"x":"Su un aperto stellato, ogni forma chiusa è esatta","c":true},{"x":"Ogni forma chiusa è esatta, su qualunque aperto"},{"x":"Ogni forma esatta è chiusa, su qualunque aperto"},{"x":"Su un aperto stellato, ogni forma esatta è chiusa"}],"hint":"Esatta $\\Rightarrow$ chiusa è banale e non richiede ipotesi. Poincaré dà il verso difficile, con un'ipotesi geometrica.","sol":"<b>Poincaré:</b> su un aperto <i>stellato</i> (o più in generale semplicemente connesso) chiusa $\\Rightarrow$ esatta. È il verso non banale: fornisce la primitiva. Il verso opposto (esatta $\\Rightarrow$ chiusa) vale ovunque e non richiede alcuna ipotesi. L'ipotesi stellato è esattamente ciò che manca a $\\mathbb{R}^2\\setminus\\{0\\}$."}]},{"pool":"conserv","src":"tipo E · manuale (caso 2D)","steps":[{"t":"In $\\mathbb{R}^2$, per $F=(P,Q)$ su dominio semplicemente connesso, la conservatività equivale a una sola condizione scalare. Quale?","opts":[{"x":"$\\partial_y P=\\partial_x Q$","c":true},{"x":"$\\partial_x P=\\partial_y Q$"},{"x":"$\\partial_x P+\\partial_y Q=0$"},{"x":"$\\partial_y P=-\\partial_x Q$"}],"hint":"In 2D il rotore ha una sola componente non banale, la terza: $(\\nabla\\times F)_3=\\partial_x Q-\\partial_y P$.","sol":"In 2D $\\nabla\\times F$ si riduce alla terza componente $\\partial_x Q-\\partial_y P$; annullarla dà <b>$\\partial_y P=\\partial_x Q$</b>. La scelta $\\partial_x P+\\partial_y Q=0$ è la condizione di <i>solenoidale</i> ($\\nabla\\cdot F=0$), da non confondere. Su dominio semplicemente connesso questa singola uguaglianza è necessaria e sufficiente."}]},{"pool":"conserv","src":"tipo E · manuale (formula del potenziale)","steps":[{"t":"$F$ è conservativo con potenziale $U$. Quanto vale il lavoro $\\int_\\gamma F\\cdot d\\mathbf{r}$ lungo una curva che va da $A$ a $B$?","opts":[{"x":"$U(B)-U(A)$","c":true},{"x":"$U(A)-U(B)$"},{"x":"$\\tfrac12[U(B)+U(A)]$"},{"x":"$\\int_\\gamma \\|\\nabla U\\|\\,ds$"}],"hint":"È il teorema fondamentale del calcolo lungo le curve: il campo è il gradiente, l'integrale recupera la funzione agli estremi.","sol":"<b>$\\int_\\gamma F\\cdot d\\mathbf{r}=U(B)-U(A)$</b> (estremo finale meno iniziale): teorema fondamentale del calcolo per gli integrali di linea di un gradiente. Il segno conta: invertirlo è l'errore più comune. La formula col modulo $\\|\\nabla U\\|$ è l'integrale di <i>prima</i> specie, un oggetto diverso che non usa l'orientazione."}]},{"pool":"conserv","src":"tipo E · manuale (trappola: conservativo vs solenoidale)","steps":[{"t":"Un campo ha $\\nabla\\cdot F=0$ ovunque. Se ne può concludere che $F$ è conservativo?","opts":[{"x":"No: $\\nabla\\cdot F=0$ è la condizione di campo solenoidale, che nulla dice sulla conservatività","c":true},{"x":"Sì: divergenza nulla implica esistenza del potenziale"},{"x":"Sì, ma solo se il dominio è semplicemente connesso"},{"x":"No, perché serve anche $\\nabla\\cdot F>0$"}],"hint":"Conservativo è controllato dal ROTORE ($\\nabla\\times F$), non dalla divergenza. Sono due proprietà indipendenti.","sol":"<b>No.</b> $\\nabla\\cdot F=0$ definisce i campi <i>solenoidali</i> (privi di sorgenti, flusso conservato). La conservatività dipende invece dal <i>rotore</i>: serve $\\nabla\\times F=0$ (più il dominio semplicemente connesso). Le due condizioni sono logicamente indipendenti: $F=(-y,x)$ ha $\\nabla\\cdot F=0$ ma non è conservativo, perché $\\nabla\\times F=(0,0,2)\\neq 0$."}]},{"pool":"conserv","src":"tipo E · manuale","steps":[{"t":"Se $U$ è un potenziale di $F$, quali altre funzioni sono ancora potenziali dello stesso $F$ (su un dominio connesso)?","opts":[{"x":"Tutte e sole le $U+c$ con $c$ costante","c":true},{"x":"Solo $U$ stessa: il potenziale è unico"},{"x":"Tutte le $\\lambda U$ con $\\lambda$ costante"},{"x":"Tutte le $U+g(x,y)$ con $g$ qualunque"}],"hint":"Due potenziali dello stesso campo hanno gradiente uguale, quindi la loro differenza ha gradiente nullo. Su un connesso ciò forza una costante.","sol":"<b>$U$ è definito a meno di una costante additiva.</b> Se $\\nabla U_1=\\nabla U_2=F$, allora $\\nabla(U_1-U_2)=0$; su un dominio connesso una funzione a gradiente nullo è costante, quindi $U_1=U_2+c$. Per questo il potenziale si scrive sempre $+k$: la costante è irrilevante per il lavoro, che è una differenza."}]},{"pool":"conserv","src":"tipo E · manuale (domini stellati)","steps":[{"t":"Perché su un dominio <b>convesso</b> (es. una palla, un rettangolo) l'irrotazionalità basta per la conservatività?","opts":[{"x":"Perché convesso $\\Rightarrow$ stellato $\\Rightarrow$ semplicemente connesso, quindi vale il Lemma di Poincaré","c":true},{"x":"Perché su un convesso ogni campo è automaticamente conservativo"},{"x":"Perché su un convesso $\\nabla\\times F=0$ implica $\\nabla\\cdot F=0$"},{"x":"Non basta: serve comunque calcolare la circolazione"}],"hint":"La catena di implicazioni topologiche: convesso $\\Rightarrow$ stellato rispetto a ogni suo punto $\\Rightarrow$ semplicemente connesso.","sol":"Un convesso è stellato rispetto a ogni suo punto, e ogni stellato è semplicemente connesso. Su un semplicemente connesso il teorema inverso (Poincaré) garantisce chiusa $\\Rightarrow$ esatta, cioè irrotazionale $\\Rightarrow$ conservativo. È il motivo per cui su tutto $\\mathbb{R}^n$ o su una palla non serve mai preoccuparsi del buco: non c'è."}]},{"pool":"conserv","src":"tipo E · manuale (esempio svolto cap.3)","steps":[{"t":"Esercizio. Stabilisci se $F=(yz+2x,\\; xz+2y,\\; xy+2z)$ è conservativo su $\\mathbb{R}^3$.","opts":[{"x":"Sì: $\\nabla\\times F=0$ e $\\mathbb{R}^3$ è semplicemente connesso","c":true},{"x":"No: $\\nabla\\cdot F=6\\neq 0$"},{"x":"Sì, ma solo perché $\\nabla\\cdot F=6>0$"},{"x":"Non decidibile senza calcolare la circolazione"}],"hint":"La conservatività si controlla col rotore, non con la divergenza. E su $\\mathbb{R}^3$ intero il dominio non ha buchi.","sol":"Calcolo il rotore. $(\\nabla\\times F)_1=\\partial_y(xy+2z)-\\partial_z(xz+2y)=x-x=0$; $(\\nabla\\times F)_2=\\partial_z(yz+2x)-\\partial_x(xy+2z)=y-y=0$; $(\\nabla\\times F)_3=\\partial_x(xz+2y)-\\partial_y(yz+2x)=z-z=0$. Dunque $\\nabla\\times F=0$. Poiché $\\mathbb{R}^3$ è semplicemente connesso, per il <b>teorema inverso</b> (irrotazionale + dominio s.c.) $F$ è conservativo. La divergenza $\\nabla\\cdot F=6$ è irrilevante per questa domanda."}]},{"pool":"conserv","src":"tipo E · manuale (esempio svolto cap.3)","steps":[{"t":"Esercizio (trabocchetto). Trova il potenziale $U$ di $F=(yz+2x,\\; xz+2y,\\; xy+2z)$.","opts":[{"x":"$U=xyz+x^2+y^2+z^2+k$","c":true},{"x":"$U=xyz+x^2+y^2+k$"},{"x":"$U=xyz+2x+2y+2z+k$"},{"x":"$U=xyz+x^2+y^2+z^2+xyz+k$"}],"hint":"Dopo aver integrato $F_1$ in $x$, non dimenticare che le condizioni su $U_y$ e $U_z$ fanno emergere i termini $y^2$ E $z^2$: mancarne uno è l'errore tipico.","sol":"Integro $U_x=yz+2x$ in $x$: $U=xyz+x^2+g(y,z)$. Impongo $U_y=xz+g_y=xz+2y\\Rightarrow g_y=2y\\Rightarrow g=y^2+h(z)$. Impongo $U_z=xy+h'(z)=xy+2z\\Rightarrow h'=2z\\Rightarrow h=z^2+k$. Quindi <b>$U=xyz+x^2+y^2+z^2+k$</b>. Ricetta del potenziale: integra $F_1$, poi imponi $F_2$ e $F_3$ per ricostruire gli addendi mancanti. Fermarsi a $y^2$ dimentica il $z^2$."}]},{"pool":"conserv","src":"22gen24 Es.3","steps":[{"t":"Esercizio. Per quale valore di $a$ il campo $F=\\big(2x\\cos(x^2+y)+a\\,xy,\\; \\cos(x^2+y)+x^2+1\\big)$ è conservativo su $\\mathbb{R}^2$?","opts":[{"x":"$a=2$","c":true},{"x":"$a=0$"},{"x":"$a=-2$"},{"x":"$a=1$"}],"hint":"Imponi la condizione 2D $\\partial_y F_1=\\partial_x F_2$ e confronta i termini. Il termine $-2x\\sin(x^2+y)$ compare da entrambi i lati e si cancella.","sol":"Su $\\mathbb{R}^2$ (semplicemente connesso) basta $\\partial_y F_1=\\partial_x F_2$. $\\partial_y F_1=-2x\\sin(x^2+y)+ax$; $\\partial_x F_2=-2x\\sin(x^2+y)+2x$. Uguagliando, i termini in $\\sin$ si elidono e resta $ax=2x$ per ogni $x$, cioè <b>$a=2$</b>. Criterio: irrotazionalità in 2D su dominio semplicemente connesso."}]},{"pool":"conserv","src":"22gen24 Es.3","steps":[{"t":"Esercizio. Con $a=2$, il campo $F=\\big(2x\\cos(x^2+y)+2xy,\\; \\cos(x^2+y)+x^2+1\\big)$ ammette potenziale. Qual è?","opts":[{"x":"$U=\\sin(x^2+y)+x^2y+y+k$","c":true},{"x":"$U=\\sin(x^2+y)+x^2y+k$"},{"x":"$U=\\cos(x^2+y)+x^2y+y+k$"},{"x":"$U=\\sin(x^2+y)+xy^2+y+k$"}],"hint":"Integra $F_1$ in $x$ (nota $\\int 2x\\cos(x^2+y)\\,dx=\\sin(x^2+y)$), poi imponi $U_y=F_2$: il termine $+1$ di $F_2$ genera l'addendo $+y$.","sol":"$U_x=2x\\cos(x^2+y)+2xy\\Rightarrow U=\\sin(x^2+y)+x^2y+g(y)$. Impongo $U_y=\\cos(x^2+y)+x^2+g'(y)=\\cos(x^2+y)+x^2+1\\Rightarrow g'(y)=1\\Rightarrow g=y+k$. Quindi <b>$U=\\sin(x^2+y)+x^2y+y+k$</b>. L'addendo $+y$ nasce dal $+1$ in $F_2$: dimenticarlo è l'errore del primo distrattore."}]},{"pool":"conserv","src":"19giu24 Es.3 iv","steps":[{"t":"Esercizio. È conservativo il campo $F=(-x^2y+z,\\; y+z,\\; x^3+y+e^z)$ su $\\mathbb{R}^3$?","opts":[{"x":"No: $\\nabla\\times F=(0,\\;1-3x^2,\\;x^2)\\neq 0$","c":true},{"x":"Sì: $\\nabla\\times F=0$ e il dominio è $\\mathbb{R}^3$"},{"x":"No: $\\nabla\\cdot F\\neq 0$"},{"x":"Sì, perché $\\mathbb{R}^3$ è semplicemente connesso"}],"hint":"Su $\\mathbb{R}^3$ il dominio è a posto: l'unico ostacolo possibile è che il rotore non sia nullo. Calcolalo componente per componente.","sol":"$(\\nabla\\times F)_1=\\partial_y(x^3+y+e^z)-\\partial_z(y+z)=1-1=0$; $(\\nabla\\times F)_2=\\partial_z(-x^2y+z)-\\partial_x(x^3+y+e^z)=1-3x^2$; $(\\nabla\\times F)_3=\\partial_x(y+z)-\\partial_y(-x^2y+z)=0-(-x^2)=x^2$. Il rotore $(0,\\,1-3x^2,\\,x^2)$ non è identicamente nullo, quindi <b>$F$ non è conservativo</b>: fallisce già la condizione necessaria (conservativo $\\Rightarrow$ irrotazionale). Il dominio, pur ottimo, non salva un rotore non nullo."}]},{"pool":"conserv","src":"20220706 Es.4 iii","steps":[{"t":"Esercizio. Per quale $a$ il campo $F=(y^2+y+z^2,\\; 2xy+x,\\; 2axz)$ è conservativo su $\\mathbb{R}^3$?","opts":[{"x":"$a=1$","c":true},{"x":"$a=0$"},{"x":"$a=2$"},{"x":"Per ogni $a$, perché il dominio è semplicemente connesso"}],"hint":"Calcola il rotore: le componenti 1 e 3 si annullano da sole; è la seconda, $\\partial_z F_1-\\partial_x F_3$, a fissare $a$.","sol":"$(\\nabla\\times F)_1=\\partial_y(2axz)-\\partial_z(2xy+x)=0$; $(\\nabla\\times F)_3=\\partial_x(2xy+x)-\\partial_y(y^2+y+z^2)=(2y+1)-(2y+1)=0$; $(\\nabla\\times F)_2=\\partial_z(y^2+y+z^2)-\\partial_x(2axz)=2z-2az=2z(1-a)$. Nullo per ogni $z$ solo se <b>$a=1$</b>. L'ultima opzione è la trappola: il dominio semplicemente connesso rende l'irrotazionalità <i>sufficiente</i>, ma non la regala: va comunque imposta."}]},{"pool":"conserv","src":"20220706 Es.4 iii","steps":[{"t":"Esercizio. Con $a=1$, trova il potenziale di $F=(y^2+y+z^2,\\; 2xy+x,\\; 2xz)$.","opts":[{"x":"$U=xy^2+xy+xz^2+k$","c":true},{"x":"$U=xy^2+xy+k$"},{"x":"$U=y^2+y+z^2+xz^2+k$"},{"x":"$U=xy^2+xy+2xz^2+k$"}],"hint":"Integra $F_1$ in $x$: ogni termine di $F_1$ (che non dipende da $x$) si moltiplica per $x$. Poi verifica che $U_y$ e $U_z$ tornino.","sol":"$U_x=y^2+y+z^2\\Rightarrow U=x(y^2+y+z^2)+g(y,z)=xy^2+xy+xz^2+g(y,z)$. $U_y=2xy+x+g_y=2xy+x\\Rightarrow g_y=0$; $U_z=2xz+g_z=2xz\\Rightarrow g_z=0$. Quindi <b>$U=xy^2+xy+xz^2+k$</b>. Attenzione al coefficiente: $\\int z^2\\,dx=xz^2$, non $2xz^2$ (ultimo distrattore)."}]},{"pool":"conserv","src":"20230504 Es.4 i","steps":[{"t":"Esercizio. Per quale funzione $f$ il campo $F=(x+f(y)+z^2,\\; x\\,f(y),\\; 2xz)$ è conservativo su $\\mathbb{R}^3$?","opts":[{"x":"$f(y)=e^y$ (a meno di costante moltiplicativa), da $f'=f$","c":true},{"x":"$f(y)=y$, da $f'=1$"},{"x":"$f(y)=\\cos y$, da $f'=-f$"},{"x":"Qualunque $f\\in C^1$, perché $\\mathbb{R}^3$ è s.c."}],"hint":"Solo la terza componente del rotore è non banale: $\\partial_x F_2-\\partial_y F_1=f(y)-f'(y)$. Annullarla è un'equazione differenziale su $f$.","sol":"$(\\nabla\\times F)_1=0$ e $(\\nabla\\times F)_2=\\partial_z F_1-\\partial_x F_3=2z-2z=0$. $(\\nabla\\times F)_3=\\partial_x(x f(y))-\\partial_y(x+f(y)+z^2)=f(y)-f'(y)$. Annullando: $f'=f\\Rightarrow f(y)=Ce^y$. Con $f(y)=e^y$: <b>conservativo</b>. Criterio: irrotazionalità; qui produce una EDO sul parametro-funzione."}]},{"pool":"conserv","src":"20230705 Es.3 ii","steps":[{"t":"Esercizio. Il campo piano $F=\\Big(\\dfrac{2xy}{(1+x^2)^2},\\; \\dfrac{a}{1+x^2}\\Big)$ è conservativo su $\\mathbb{R}^2$: per quale $a$, e con quale potenziale?","opts":[{"x":"$a=-1$, con $U=-\\dfrac{y}{1+x^2}+k$","c":true},{"x":"$a=1$, con $U=\\dfrac{y}{1+x^2}+k$"},{"x":"$a=-1$, con $U=\\dfrac{y}{(1+x^2)^2}+k$"},{"x":"$a=2$, con $U=-\\dfrac{2y}{1+x^2}+k$"}],"hint":"Imponi $\\partial_y F_1=\\partial_x F_2$. Calcola $\\partial_x\\big(a(1+x^2)^{-1}\\big)=-2ax(1+x^2)^{-2}$ e confronta.","sol":"$\\partial_y F_1=\\dfrac{2x}{(1+x^2)^2}$; $\\partial_x F_2=a\\cdot(-1)(1+x^2)^{-2}\\cdot 2x=\\dfrac{-2ax}{(1+x^2)^2}$. Uguali $\\Rightarrow 2x=-2ax\\Rightarrow a=-1$. Potenziale: $U_x=\\dfrac{2xy}{(1+x^2)^2}\\Rightarrow U=y\\int\\dfrac{2x}{(1+x^2)^2}dx=-\\dfrac{y}{1+x^2}+g(y)$; $U_y=-\\dfrac{1}{1+x^2}+g'(y)=F_2=-\\dfrac{1}{1+x^2}\\Rightarrow g'=0$. Quindi <b>$a=-1$, $U=-\\dfrac{y}{1+x^2}+k$</b>."}]},{"pool":"conserv","src":"21lug25 Es.5 i","steps":[{"t":"Esercizio. La 1-forma $\\omega=(z-2y)\\,dx+(z-2x)\\,dy+\\big(x+y+\\Psi(y)\\big)dz$ è esatta su $\\mathbb{R}^3$. Che condizione deve soddisfare $\\Psi$?","opts":[{"x":"$\\Psi'(y)=0$, cioè $\\Psi$ costante","c":true},{"x":"$\\Psi'(y)=1$"},{"x":"$\\Psi(y)=y$"},{"x":"Nessuna: è sempre esatta perché $\\mathbb{R}^3$ è s.c."}],"hint":"Esatta su $\\mathbb{R}^3$ $\\iff$ chiusa: imponi tutte e tre le uguaglianze di derivate incrociate. Solo l'ultima coinvolge $\\Psi'$.","sol":"Con $P=z-2y$, $Q=z-2x$, $R=x+y+\\Psi(y)$: $\\partial_y P=\\partial_x Q$ dà $-2=-2$ (ok); $\\partial_z P=\\partial_x R$ dà $1=1$ (ok); $\\partial_z Q=\\partial_y R$ dà $1=1+\\Psi'(y)$, quindi <b>$\\Psi'(y)=0$</b>: $\\Psi$ costante. Su $\\mathbb{R}^3$ chiusa $\\iff$ esatta, ma la chiusura va comunque imposta: non è gratis (ultimo distrattore)."}]},{"pool":"conserv","src":"21lug25 Es.5","steps":[{"t":"Esercizio. Con $\\Psi\\equiv 0$, trova il potenziale $U$ ($dU=\\omega$) della forma $\\omega=(z-2y)dx+(z-2x)dy+(x+y)dz$.","opts":[{"x":"$U=xz-2xy+yz+k$","c":true},{"x":"$U=xz-2xy+k$"},{"x":"$U=xz-2xy+yz+xy+k$"},{"x":"$U=xz+2xy+yz+k$"}],"hint":"Integra $U_x=z-2y$ in $x$, poi imponi $U_y$ ricostruendo l'addendo $yz$, infine controlla $U_z$.","sol":"$U_x=z-2y\\Rightarrow U=xz-2xy+g(y,z)$. $U_y=-2x+g_y=z-2x\\Rightarrow g_y=z\\Rightarrow g=yz+h(z)$. $U_z=x+y+h'(z)=x+y\\Rightarrow h'=0$. Quindi <b>$U=xz-2xy+yz+k$</b>. Verifica: $\\nabla U=(z-2y,\\,-2x+z,\\,x+y)=(P,Q,R)$. Il termine $yz$ emerge dalla condizione su $U_y$: ometterlo è l'errore del secondo distrattore."}]},{"pool":"conserv","src":"20230907 Es.2","steps":[{"t":"Esercizio (trabocchetto). Il campo $F=\\Big(\\dfrac{-\\alpha x+y}{x^2+y^2},\\; \\dfrac{\\alpha y-x}{x^2+y^2}\\Big)$ su $\\mathbb{R}^2\\setminus\\{0\\}$: per $\\alpha=0$ risulta irrotazionale. È conservativo?","opts":[{"x":"No: il dominio $\\mathbb{R}^2\\setminus\\{0\\}$ non è semplicemente connesso, e la circolazione attorno all'origine è non nulla","c":true},{"x":"Sì: per $\\alpha=0$ è irrotazionale, quindi conservativo"},{"x":"Sì, ma solo lungo curve che non girano attorno all'origine"},{"x":"No, perché non è irrotazionale nemmeno per $\\alpha=0$"}],"hint":"Irrotazionale + dominio con un buco = non basta. Cerca la circolazione su un giro attorno all'origine: se è diversa da zero, il potenziale globale non esiste.","sol":"Per $\\alpha=0$: $F=\\big(\\tfrac{y}{x^2+y^2},\\,\\tfrac{-x}{x^2+y^2}\\big)$, irrotazionale. Ma $\\mathbb{R}^2\\setminus\\{0\\}$ non è semplicemente connesso, quindi il teorema inverso non si applica. Sul cerchio unitario antiorario $\\gamma(t)=(\\cos t,\\sin t)$: $F\\cdot\\gamma'=-1$, e $\\oint=-2\\pi\\neq 0$. <b>Non conservativo.</b> È la trappola del buco: irrotazionale creduto sempre conservativo."}]},{"pool":"conserv","src":"20230907 Es.2","steps":[{"t":"Esercizio. Con $\\alpha=0$, $F=\\Big(\\dfrac{y}{x^2+y^2},\\; \\dfrac{-x}{x^2+y^2}\\Big)$. Quanto vale la circolazione lungo il cerchio unitario percorso in senso antiorario?","opts":[{"x":"$-2\\pi$","c":true},{"x":"$0$"},{"x":"$2\\pi$"},{"x":"$-\\pi$"}],"hint":"Parametrizza $\\gamma(t)=(\\cos t,\\sin t)$, $t\\in[0,2\\pi]$. Sul cerchio $x^2+y^2=1$, quindi $F(\\gamma)=(\\sin t,-\\cos t)$; poi fai $F\\cdot\\gamma'$.","sol":"$\\gamma(t)=(\\cos t,\\sin t)$, $\\gamma'=(-\\sin t,\\cos t)$; sul cerchio $x^2+y^2=1$ quindi $F(\\gamma)=(\\sin t,-\\cos t)$. $F\\cdot\\gamma'=-\\sin^2 t-\\cos^2 t=-1$, e $\\oint=\\int_0^{2\\pi}(-1)\\,dt=-2\\pi$. Il valore non nullo <b>certifica la non conservatività</b> e misura il flusso di rotore intrappolato nel buco (periodo della forma chiusa non esatta)."}]},{"pool":"conserv","src":"tipo E · manuale (formula $L=U(B)-U(A)$)","steps":[{"t":"Esercizio. $F=(yz+2x,\\,xz+2y,\\,xy+2z)$ ha potenziale $U=xyz+x^2+y^2+z^2$. Quanto vale il lavoro lungo una qualunque curva da $A=(0,0,0)$ a $B=(1,1,1)$?","opts":[{"x":"$4$","c":true},{"x":"$0$"},{"x":"$-4$"},{"x":"Dipende dalla curva scelta"}],"hint":"Il campo è conservativo: usa $L=U(B)-U(A)$, senza parametrizzare nulla. Attento al segno e all'ordine (finale meno iniziale).","sol":"$F$ è conservativo, quindi $L=U(B)-U(A)$ indipendentemente dal cammino. $U(1,1,1)=1+1+1+1=4$, $U(0,0,0)=0$, dunque <b>$L=4$</b>. Dipende-dalla-curva è la trappola: proprio la conservatività elimina questa dipendenza. Invertire l'ordine darebbe $-4$ (secondo errore tipico)."}]},{"pool":"conserv","src":"tipo E · manuale (forma esatta 2D con parametro)","steps":[{"t":"Esercizio. Per quale $a$ la forma $\\omega=(a\\,xy+y)\\,dx+(x^2+x)\\,dy$ è esatta su $\\mathbb{R}^2$, e qual è la primitiva?","opts":[{"x":"$a=2$, con $U=x^2y+xy+k$","c":true},{"x":"$a=1$, con $U=\\tfrac12 x^2y+xy+k$"},{"x":"$a=2$, con $U=x^2y+k$"},{"x":"Per ogni $a$: ogni forma su $\\mathbb{R}^2$ è esatta"}],"hint":"Esatta su $\\mathbb{R}^2$ $\\iff$ chiusa: $\\partial_y M=\\partial_x N$. Poi costruisci $U$ integrando $M$ in $x$ e imponendo $U_y=N$.","sol":"$M=axy+y$, $N=x^2+x$. Chiusura: $\\partial_y M=ax+1$, $\\partial_x N=2x+1$; uguali $\\Rightarrow a=2$. Con $a=2$: $U_x=2xy+y\\Rightarrow U=x^2y+xy+g(y)$; $U_y=x^2+x+g'(y)=x^2+x\\Rightarrow g'=0$. Quindi <b>$a=2$, $U=x^2y+xy+k$</b>. L'ultima opzione è falsa: nemmeno su $\\mathbb{R}^2$ ogni forma è esatta, serve la chiusura."}]}],"diff":[{"pool":"diff","src":"tipo C · manuale · gerarchia","steps":[{"t":"Nell'origine una funzione può essere continua e avere entrambe le derivate parziali, ma NON essere differenziabile?","opts":[{"x":"Sì: l'esistenza delle parziali (derivabilità) non implica la differenziabilità","c":true},{"x":"No: se le parziali esistono, $f$ è differenziabile"},{"x":"No: se $f$ è continua e derivabile è automaticamente differenziabile"},{"x":"Sì, ma solo se $f$ non è continua"}],"hint":"La catena corretta è $C^1\\Rightarrow$ differenziabile $\\Rightarrow$ (continua $\\wedge$ derivabile). Le frecce non si invertono.","sol":"Derivabile $\\not\\Rightarrow$ differenziabile. La differenziabilità chiede che il resto $\\dfrac{f(x,y)-f(0,0)-\\nabla f(0,0)\\cdot(x,y)}{\\|(x,y)\\|}\\to 0$: è più forte della sola esistenza delle due parziali. Controesempi tipici: 20230123, 20220622 con $\\alpha\\le 1$."}]},{"pool":"diff","src":"tipo C · manuale · diff ⇒ continua","steps":[{"t":"$f$ è differenziabile in $(0,0)$. Cosa si può concludere sulla continuità?","opts":[{"x":"$f$ è continua in $(0,0)$: la differenziabilità implica la continuità","c":true},{"x":"Nulla: differenziabilità e continuità sono indipendenti"},{"x":"$f$ è continua solo se in più le parziali sono continue"},{"x":"$f$ potrebbe essere discontinua se $\\nabla f(0,0)=0$"}],"hint":"Scrivi $f(h)-f(0,0)=\\nabla f(0,0)\\cdot h+o(\\|h\\|)$ e fai $h\\to 0$.","sol":"Per definizione $f(h)=f(0,0)+\\nabla f(0,0)\\cdot h+o(\\|h\\|)$. Per $h\\to 0$ il termine lineare e il resto tendono a $0$, quindi $f(h)\\to f(0,0)$: continua. Differenziabile $\\Rightarrow$ continua. Il viceversa è falso."}]},{"pool":"diff","src":"tipo C · manuale · diff ⇒ direzionali","steps":[{"t":"Se $f$ è differenziabile in $(0,0)$, cosa vale per le derivate direzionali $\\partial_v f(0,0)$?","opts":[{"x":"Esistono per OGNI versore $v$ e valgono $\\partial_v f(0,0)=\\nabla f(0,0)\\cdot v$ (lineari in $v$)","c":true},{"x":"Esistono solo lungo gli assi coordinati"},{"x":"Esistono ma in generale non sono legate a $\\nabla f$"},{"x":"Possono non esistere anche se $f$ è differenziabile"}],"hint":"La differenziabilità dà l'approssimazione lineare $f(tv)-f(0)=t\\,\\nabla f\\cdot v+o(t)$; dividi per $t$.","sol":"$f(tv)=f(0,0)+t\\,\\nabla f(0,0)\\cdot v+o(t)$, quindi $\\dfrac{f(tv)-f(0,0)}{t}\\to\\nabla f(0,0)\\cdot v$. Tutte le direzionali esistono e sono la funzione LINEARE $v\\mapsto\\nabla f\\cdot v$. È la forma forte del teorema: diff. $\\Rightarrow$ direzionali $=\\nabla f\\cdot v$."}]},{"pool":"diff","src":"20230907 Es.1 · direzionali ⇏ diff","steps":[{"t":"In $(0,0)$ le derivate direzionali $\\partial_v f$ esistono per ogni versore $v$. Segue che $f$ è differenziabile?","opts":[{"x":"No: l'esistenza di tutte le direzionali non implica la differenziabilità (né la continuità)","c":true},{"x":"Sì: è la definizione di differenziabilità"},{"x":"Sì, se $\\partial_v f=\\nabla f\\cdot v$ per almeno due versori"},{"x":"Sì, purché $f$ sia continua in $(0,0)$"}],"hint":"L'implicazione buona va nell'altro verso. Esistono funzioni con TUTTE le direzionali eppure non differenziabili, e persino non continue.","sol":"Diff. $\\Rightarrow\\partial_v f=\\nabla f\\cdot v$ per ogni $v$; il viceversa è falso. Le direzionali possono esistere una per una senza essere lineari in $v$ e senza dare la vera approssimazione lineare. Es. 20230907: $f$ derivabile, con direzionali, ma non differenziabile."}]},{"pool":"diff","src":"tipo C · manuale · differenziale totale","steps":[{"t":"Se le derivate parziali $f_x,f_y$ esistono in un intorno di $(0,0)$ e sono CONTINUE in $(0,0)$, allora:","opts":[{"x":"$f$ è differenziabile in $(0,0)$ (Teorema del differenziale totale): è una condizione SUFFICIENTE","c":true},{"x":"$f$ è differenziabile: è condizione necessaria e sufficiente"},{"x":"$f$ è solo continua, ma non necessariamente differenziabile"},{"x":"nulla, serve calcolare il limite del resto in ogni caso"}],"hint":"$C^1$ è più forte della differenziabilità: la implica ma non è implicata. Esistono funzioni differenziabili con parziali discontinue.","sol":"Teorema del differenziale totale: $f_x,f_y$ continue in un intorno $\\Rightarrow f$ differenziabile lì. È SUFFICIENTE, non necessaria: $f(x,y)=(x^2+y^2)\\sin\\frac{1}{\\sqrt{x^2+y^2}}$ è differenziabile in $0$ ma con parziali discontinue. In pratica: se la formula esplicita è $C^1$ vicino (ma fuori) all'origine, resta da controllare SOLO l'origine col limite del resto."}]},{"pool":"diff","src":"tipo C · manuale · continua ⇏ derivabile","steps":[{"t":"Quali di queste implicazioni sono FALSE in generale, in un punto?","opts":[{"x":"«continua $\\Rightarrow$ derivabile» e «derivabile $\\Rightarrow$ continua»: entrambe false","c":true},{"x":"solo «continua $\\Rightarrow$ derivabile» è falsa"},{"x":"nessuna: sono tutte vere"},{"x":"«differenziabile $\\Rightarrow$ continua» è falsa"}],"hint":"L'esistenza delle parziali guarda solo lungo gli assi: non vede cosa fa $f$ nelle altre direzioni, quindi non garantisce continuità.","sol":"Continua $\\not\\Rightarrow$ derivabile (es. $|x|+|y|$ ha parziali non definite in $0$). Derivabile $\\not\\Rightarrow$ continua: $f=\\frac{xy}{x^2+y^2}$, $f(0,0)=0$, ha $f_x(0,0)=f_y(0,0)=0$ (è nulla sugli assi) ma NON è continua in $0$. Le uniche frecce sempre vere partono dalla differenziabilità."}]},{"pool":"diff","src":"tipo C · manuale · definizione","steps":[{"t":"Qual è la definizione corretta di «$f$ differenziabile in $(0,0)$»?","opts":[{"x":"$\\lim_{(x,y)\\to(0,0)}\\dfrac{f(x,y)-f(0,0)-f_x(0,0)x-f_y(0,0)y}{\\sqrt{x^2+y^2}}=0$","c":true},{"x":"esistono $f_x(0,0)$ e $f_y(0,0)$"},{"x":"$f$ è continua e ammette derivate direzionali in ogni direzione"},{"x":"$\\lim_{(x,y)\\to(0,0)}\\big(f(x,y)-f(0,0)-f_x(0,0)x-f_y(0,0)y\\big)=0$"}],"hint":"L'ultima opzione dimentica di dividere per $\\|(x,y)\\|$: senza quel denominatore chiedi solo la continuità, non la differenziabilità.","sol":"$f$ è differenziabile in $(0,0)$ sse il resto dell'approssimazione lineare è $o(\\|(x,y)\\|)$, cioè il rapporto col $\\sqrt{x^2+y^2}$ tende a $0$. Il gradiente $\\big(f_x(0,0),f_y(0,0)\\big)$ va prima calcolato dalla definizione. Togliere il denominatore riduce tutto alla sola continuità."}]},{"pool":"diff","src":"tipo C · manuale · parziali dalla definizione","steps":[{"t":"Per $f$ definita a tratti ($f(0,0)=0$ e una formula col quoziente per $(x,y)\\ne 0$), come si calcola $f_x(0,0)$?","opts":[{"x":"dal rapporto incrementale $f_x(0,0)=\\lim_{h\\to 0}\\dfrac{f(h,0)-f(0,0)}{h}$","c":true},{"x":"derivando la formula esplicita con la regola del quoziente e valutando in $(0,0)$"},{"x":"$f_x(0,0)=0$ perché $f(0,0)=0$"},{"x":"applicando la regola della catena all'espressione del numeratore"}],"hint":"La formula esplicita vale solo FUORI dall'origine: derivarla e valutarla in $(0,0)$ è un errore, quel valore non è la derivata parziale nel punto.","sol":"Nel punto di raccordo la parziale è per definizione il limite del rapporto incrementale lungo l'asse: $f_x(0,0)=\\lim_{h\\to 0}\\frac{f(h,0)-f(0,0)}{h}$. Le regole di derivazione presuppongono che valga la stessa formula in un intorno, cosa falsa in $(0,0)$ per una funzione spezzata (trappola 20230907, 14feb25)."}]},{"pool":"diff","src":"20230907 Es.1 · formula del gradiente","steps":[{"t":"La formula $\\partial_v f(0,0)=\\nabla f(0,0)\\cdot v$ (derivata direzionale = gradiente per il versore):","opts":[{"x":"vale SOLO se $f$ è differenziabile in $(0,0)$; se non lo è, va calcolata dalla definizione","c":true},{"x":"vale sempre, appena esistono $f_x(0,0)$ e $f_y(0,0)$"},{"x":"vale se $f$ è continua in $(0,0)$"},{"x":"vale se esistono tutte le derivate direzionali"}],"hint":"Usare $\\nabla f\\cdot v$ quando $f$ non è differenziabile è l'errore più insidioso: le direzionali possono esistere ma NON essere lineari in $v$.","sol":"La linearità $\\partial_v f=\\nabla f\\cdot v$ è una CONSEGUENZA della differenziabilità, non della sola derivabilità. Senza differenziabilità le direzionali si calcolano una per una come $\\lim_{t\\to 0}\\frac{f(tv)-f(0,0)}{t}$ e in genere non seguono la formula del gradiente."}]},{"pool":"diff","src":"20230504 Es.1 · soglie diverse","steps":[{"t":"Per la stessa funzione a parametro, la soglia del parametro per la DIFFERENZIABILITÀ rispetto a quella per la CONTINUITÀ è:","opts":[{"x":"più restrittiva: la differenziabilità aggiunge un fattore $\\|(x,y)\\|$ al denominatore","c":true},{"x":"identica: continuità e differenziabilità danno la stessa soglia"},{"x":"meno restrittiva: differenziabile è più facile che continuo"},{"x":"senza relazione fissa tra le due"}],"hint":"Continuità: studi $|f|$. Differenziabilità: studi $|f|/\\rho$. Il $\\rho$ in più abbassa di uno l'esponente netto, quindi alza la richiesta sul parametro.","sol":"In polari $|f|\\sim\\rho^{p-2\\beta}$: continua $\\iff p-2\\beta>0$. Per la differenziabilità (con $\\nabla f(0,0)=0$) si studia $\\frac{|f|}{\\rho}\\sim\\rho^{p-1-2\\beta}$: diff. $\\iff p-1-2\\beta>0$, soglia più stretta. Es. 20230504: continua $\\beta<5/2$, differenziabile $\\beta<2$. Non confondere le due soglie."}]},{"pool":"diff","src":"20230123 Es.1 · negare la differenziabilità","steps":[{"t":"Per DIMOSTRARE che $f$ (con $\\nabla f(0,0)=0$) non è differenziabile in $(0,0)$, cosa basta e cosa NON basta?","opts":[{"x":"Basta una direzione lungo cui $f/\\rho$ non tende a $0$; NON basta controllare solo gli assi","c":true},{"x":"Basta verificare che $f$ è discontinua sugli assi"},{"x":"Bisogna verificare il limite lungo tutte le rette per concludere che è differenziabile"},{"x":"Basta che $f_x(0,0)\\ne f_y(0,0)$"}],"hint":"Per NEGARE serve un solo controesempio di direzione. Per AFFERMARE serve invece una stima uniforme in $\\theta$: gli assi da soli non bastano mai.","sol":"Il resto è $\\frac{f(x,y)-\\nabla f\\cdot(x,y)}{\\rho}$. Se lungo UNA direzione (tipicamente $y=x$) questo tende a una costante $\\ne 0$, il limite globale non è $0$: non differenziabile. Sugli assi $f$ è spesso nulla, quindi controllare solo gli assi non vede la patologia (trappola 20230123)."}]},{"pool":"diff","src":"20220622 Es.1 · dicotomia |t|^α/t","steps":[{"t":"Studiando una derivata direzionale compare $\\lim_{t\\to 0}\\dfrac{|t|^\\alpha}{t}$ (con $\\alpha>0$). Quando esiste finito?","opts":[{"x":"vale $0$ se $\\alpha>1$; se $\\alpha=1$ i limiti destro/sinistro sono $\\pm 1$ (finiti ma diversi); se $\\alpha<1$ diverge","c":true},{"x":"esiste sempre e vale $0$"},{"x":"esiste finito solo se $\\alpha<1$"},{"x":"non esiste mai, per la presenza di $|t|$"}],"hint":"Scrivi $\\frac{|t|^\\alpha}{t}=\\operatorname{sgn}(t)\\,|t|^{\\alpha-1}$: tutto dipende dal segno di $\\alpha-1$.","sol":"$\\frac{|t|^\\alpha}{t}=\\operatorname{sgn}(t)\\,|t|^{\\alpha-1}$. Se $\\alpha>1\\Rightarrow 0$; se $\\alpha=1\\Rightarrow\\pm 1$ (esiste come limite unilaterale, non bilaterale); se $\\alpha<1\\Rightarrow\\pm\\infty$. Questa dicotomia governa l'esistenza delle derivate direzionali nei problemi a parametro (20220622)."}]},{"pool":"diff","src":"tipo C · manuale · stima uniforme in θ","steps":[{"t":"In coordinate polari si ottiene $|f|\\le C(\\theta)\\,\\rho^{\\,p}$ con $p>0$. Quando questo garantisce $f\\to 0$?","opts":[{"x":"se la costante $C(\\theta)$ è LIMITATA in $\\theta$ (stima uniforme); allora $|f|\\le C_{\\max}\\rho^p\\to 0$","c":true},{"x":"sempre, perché $\\rho^p\\to 0$"},{"x":"mai: in polari non si può concludere nulla sui limiti"},{"x":"solo se $f$ non dipende da $\\theta$"}],"hint":"Se $C(\\theta)$ potesse esplodere per certi $\\theta$, il prodotto $C(\\theta)\\rho^p$ non tenderebbe uniformemente a $0$ e il limite direzionale potrebbe cambiare.","sol":"Il limite $(x,y)\\to 0$ è $\\rho\\to 0$ per OGNI $\\theta$: serve che il maggiorante $C(\\theta)\\rho^p$ vada a $0$ indipendentemente da $\\theta$. Se $\\sup_\\theta C(\\theta)=C_{\\max}<\\infty$, allora $|f|\\le C_{\\max}\\rho^p\\to 0$. Se invece il rapporto tende a $g(\\theta)\\ne$ cost., il limite NON esiste (dipende dalla direzione)."}]},{"pool":"diff","src":"14feb25 Es.2 · il gradiente all'origine","steps":[{"t":"Prima di scrivere il quoziente della differenziabilità, il vettore $\\nabla f(0,0)=\\big(f_x(0,0),f_y(0,0)\\big)$:","opts":[{"x":"va calcolato dalla definizione (rapporti incrementali sugli assi); solo dopo entra nel resto $f-\\nabla f\\cdot(x,y)$","c":true},{"x":"è sempre $(0,0)$ per le funzioni spezzate"},{"x":"si legge dai coefficienti dei termini lineari della formula esplicita"},{"x":"non serve: la differenziabilità non usa il gradiente"}],"hint":"Molte funzioni sono nulle sugli assi $\\Rightarrow\\nabla f(0,0)=0$, ma NON tutte: es. 14feb25 ha $f_x(0,0)=1$, $f_y(0,0)=2$.","sol":"Il resto da studiare è $\\frac{f(x,y)-f(0,0)-f_x(0,0)x-f_y(0,0)y}{\\rho}$: servono i veri $f_x(0,0),f_y(0,0)$ dal limite del rapporto incrementale. Assumerli $=0$ è corretto solo se $f$ è nulla sugli assi. In 14feb25 valgono $1$ e $2$: sbagliarli falsa tutto il numeratore."}]},{"pool":"diff","src":"20230621 Es.1 · due termini","steps":[{"t":"$f=g_1+g_2$, con $g_1$ differenziabile in $(0,0)$ sse $\\beta<5/2$ e $g_2$ differenziabile sse $\\beta>1/2$. Per quali $\\beta$ è differenziabile $f$?","opts":[{"x":"$1/2<\\beta<5/2$: serve che ENTRAMBI i termini siano differenziabili (intersezione)","c":true},{"x":"$\\beta<5/2$: basta il termine con la soglia più ampia"},{"x":"$\\beta>1/2$: basta un termine differenziabile"},{"x":"ogni $\\beta>0$: la somma è sempre differenziabile"}],"hint":"La differenziabilità è stabile per somma: $f$ diff. se e solo se lo sono tutti gli addendi. Prendi l'intersezione, cioè la condizione più restrittiva.","sol":"Somma di differenziabili è differenziabile; e se $g_1$ diff. e $f=g_1+g_2$ diff., allora $g_2=f-g_1$ diff. Quindi $f$ diff. $\\iff$ $g_1$ e $g_2$ entrambi diff. $\\iff 1/2<\\beta<5/2$. Non basta che uno solo lo sia (trappola 20230621)."}]},{"pool":"diff","src":"tipo C · manuale · significato geometrico","steps":[{"t":"Che cosa aggiunge la differenziabilità in $(0,0)$ rispetto alla sola esistenza delle parziali?","opts":[{"x":"l'esistenza di un piano tangente che approssima $f$ con errore $o(\\|(x,y)\\|)$ in TUTTE le direzioni","c":true},{"x":"solo la continuità di $f$"},{"x":"l'esistenza delle derivate seconde"},{"x":"nulla di geometrico: è solo una condizione algebrica sulle parziali"}],"hint":"Le parziali danno le pendenze lungo due direzioni. La differenziabilità chiede che il piano costruito con quelle pendenze approssimi bene $f$ ovunque intorno.","sol":"Differenziabilità $=$ esistenza dell'applicazione lineare $L(h)=\\nabla f(0,0)\\cdot h$ (il piano tangente $z=f(0,0)+\\nabla f\\cdot h$) con $f(h)-f(0,0)-L(h)=o(\\|h\\|)$. Le parziali fissano i coefficienti di $L$; la differenziabilità certifica che $L$ approssima $f$ in ogni direzione, non solo lungo gli assi."}]},{"pool":"diff","src":"20250214 / 14feb25 Es.2 · $f_x$ dalla definizione","steps":[{"t":"Sia $f(x,y)=\\dfrac{\\sin(x^3y^2)+x^3+2y^3}{x^2+y^2}$ per $(x,y)\\ne(0,0)$, $f(0,0)=0$. Quanto vale $f_x(0,0)$?","opts":[{"x":"$f_x(0,0)=\\lim_{h\\to 0}\\dfrac{f(h,0)}{h}=\\lim_{h\\to 0}\\dfrac{h^3/h^2}{h}=1$","c":true},{"x":"si deriva la formula con la regola del quoziente e si valuta in $(0,0)$"},{"x":"$f_x(0,0)=0$ perché $f(0,0)=0$"},{"x":"$f_x(0,0)$ non esiste"}],"hint":"Metti $y=0$: molti termini spariscono. La parziale nell'origine è il limite del rapporto incrementale lungo l'asse $x$, non la derivata della formula.","sol":"$f(h,0)=\\frac{\\sin 0+h^3+0}{h^2}=\\frac{h^3}{h^2}=h$, quindi $\\frac{f(h,0)}{h}=1\\to 1$: $f_x(0,0)=1$. Definizione di derivata parziale come limite del rapporto incrementale; la regola del quoziente non vale in $(0,0)$ (formula spezzata). Src 14feb25 es.2."}]},{"pool":"diff","src":"14feb25 Es.2 · $f_y$ dalla definizione","steps":[{"t":"Per la stessa $f(x,y)=\\dfrac{\\sin(x^3y^2)+x^3+2y^3}{x^2+y^2}$, $f(0,0)=0$, quanto vale $f_y(0,0)$?","opts":[{"x":"$f_y(0,0)=\\lim_{k\\to 0}\\dfrac{f(0,k)}{k}=\\lim_{k\\to 0}\\dfrac{2k^3/k^2}{k}=2$","c":true},{"x":"$f_y(0,0)=1$, come $f_x(0,0)$"},{"x":"$f_y(0,0)=0$"},{"x":"$f_y(0,0)=3$, dal coefficiente di $y^3$"}],"hint":"Metti $x=0$: resta solo il termine $2y^3$ al numeratore. Poi rapporto incrementale sull'asse $y$.","sol":"$f(0,k)=\\frac{0+0+2k^3}{k^2}=2k$, quindi $\\frac{f(0,k)}{k}=2\\to 2$: $f_y(0,0)=2$. Definizione di parziale lungo l'asse $y$. Quindi $\\nabla f(0,0)=(1,2)\\ne(0,0)$: attenzione, questa funzione NON è nulla sugli assi. Src 14feb25 es.2."}]},{"pool":"diff","src":"20220622 Es.1 · continuità (soglia $\\alpha$)","steps":[{"t":"Sia $f(x,y)=\\dfrac{|y|^\\alpha\\tan(x^4)}{(x^2+y^2)^2}$, $f(0,0)=0$. Per quali $\\alpha>0$ è CONTINUA in $(0,0)$?","opts":[{"x":"ogni $\\alpha>0$: $|f|\\le\\dfrac{\\rho^\\alpha\\,\\rho^4}{\\rho^4}=\\rho^\\alpha\\to 0$","c":true},{"x":"$\\alpha>1$"},{"x":"$\\alpha>2$"},{"x":"$\\alpha>4$"}],"hint":"Usa $\\tan(x^4)\\sim x^4$, $|y|\\le\\rho$, $x^4\\le\\rho^4$, $(x^2+y^2)^2=\\rho^4$. Conta gli esponenti netti di $\\rho$.","sol":"Vicino all'origine $\\tan(x^4)\\sim x^4$, quindi $|f|\\le\\frac{|y|^\\alpha x^4}{\\rho^4}\\le\\frac{\\rho^\\alpha\\rho^4}{\\rho^4}=\\rho^\\alpha$. La stima è uniforme in $\\theta$ e $\\rho^\\alpha\\to 0$ per ogni $\\alpha>0$: continua. Criterio: $|f|\\le C\\rho^p$ con $p>0\\Rightarrow$ limite $0$. Src 20220622 es.1."}]},{"pool":"diff","src":"20220622 Es.1 · differenziabilità (soglia $\\alpha$)","steps":[{"t":"Per la stessa $f=\\dfrac{|y|^\\alpha\\tan(x^4)}{(x^2+y^2)^2}$, sapendo che $f\\equiv 0$ sugli assi (quindi $\\nabla f(0,0)=0$), per quali $\\alpha$ è DIFFERENZIABILE in $(0,0)$?","opts":[{"x":"$\\alpha>1$: si studia $\\dfrac{|f|}{\\rho}\\le\\dfrac{\\rho^\\alpha\\rho^4}{\\rho^5}=\\rho^{\\alpha-1}\\to 0\\iff\\alpha>1$","c":true},{"x":"ogni $\\alpha>0$, come la continuità"},{"x":"$\\alpha>2$"},{"x":"$\\alpha>1/2$"}],"hint":"Con $\\nabla f(0,0)=0$ il resto è $f/\\rho$: rispetto alla continuità c'è un $\\rho$ in più al denominatore, quindi la soglia sale.","sol":"Con $\\nabla f(0,0)=0$ il quoziente della differenziabilità è $\\frac{|f-0|}{\\rho}=\\frac{|f|}{\\rho}\\le\\frac{\\rho^{\\alpha+4}}{\\rho^5}=\\rho^{\\alpha-1}\\to 0\\iff\\alpha>1$. Definizione di differenziabilità (resto $o(\\rho)$). Soglia $\\alpha>1$, più restrittiva della continuità $\\alpha>0$. Src 20220622 es.1."}]},{"pool":"diff","src":"20230504 Es.1 · continuità → differenziabilità","steps":[{"t":"Sia $f(x,y)=\\dfrac{\\sin y\\,(1-\\cos(xy))}{(x^2+y^2)^\\beta}$, $f(0,0)=0$, con numeratore $\\sim\\tfrac12 x^2y^3$. Per quali $\\beta$ è CONTINUA in $(0,0)$?","opts":[{"x":"$\\beta<5/2$: in polari $|f|\\sim\\rho^{\\,5-2\\beta}\\to 0\\iff 5-2\\beta>0$","c":true},{"x":"$\\beta<2$"},{"x":"$\\beta<5$"},{"x":"ogni $\\beta>0$"}],"hint":"Il numeratore è $O(\\rho^5)$, il denominatore $\\rho^{2\\beta}$: la continuità chiede esponente netto positivo.","sol":"$\\sin y\\sim y$, $1-\\cos(xy)\\sim\\frac{(xy)^2}{2}$: numeratore $\\sim\\frac12 x^2y^3=O(\\rho^5)$. Quindi $|f|\\sim\\rho^{5-2\\beta}\\to 0\\iff\\beta<5/2$. Soglia di CONTINUITÀ $\\beta<5/2$. Src 20230504 es.1.","cont":"Continua &rarr; ora la differenziabilità"},{"t":"Per la stessa $f$ (con $\\nabla f(0,0)=(0,0)$), la soglia di DIFFERENZIABILITÀ coincide con $\\beta<5/2$?","opts":[{"x":"No: si studia $\\dfrac{|f|}{\\rho}\\sim\\rho^{\\,4-2\\beta}\\to 0\\iff\\beta<2$, soglia più restrittiva","c":true},{"x":"Sì, coincidono: $\\beta<5/2$"},{"x":"Sì, $\\beta<5$"},{"x":"La differenziabilità vale ovunque c'è continuità"}],"hint":"La differenziabilità aggiunge il $\\|(x,y)\\|=\\rho$ del resto al denominatore: l'esponente netto cala di $1$.","sol":"Con $\\nabla f(0,0)=0$: $\\frac{|f|}{\\rho}\\sim\\rho^{4-2\\beta}\\to 0\\iff\\beta<2$. Soglia di DIFFERENZIABILITÀ $\\beta<2<5/2$: strettamente più piccola della continuità. Definizione del resto $o(\\rho)$. Src 20230504 es.1."}]},{"pool":"diff","src":"20230123 Es.1 · non differenziabile via $y=x$","steps":[{"t":"Per mostrare che $f(x,y)=\\dfrac{(x^2+2xy)\\sin(xy)}{(x^2+y^2)^{3/2}}$ (con $\\nabla f(0,0)=0$) NON è differenziabile in $(0,0)$, la via più rapida è:","opts":[{"x":"calcolare $\\lim\\frac{f}{\\rho}$ lungo $y=x$: dà una costante $\\ne 0$, quindi il resto non è $o(\\rho)$","c":true},{"x":"verificare che $f$ è continua in $(0,0)$"},{"x":"controllare il limite solo lungo gli assi $x$ e $y$"},{"x":"calcolare $f_x(0,0)$ e $f_y(0,0)$"}],"hint":"Per NEGARE la differenziabilità basta UNA direzione lungo cui $f/\\rho\\not\\to 0$: la diagonale $y=x$ è la scelta standard.","sol":"Il quoziente $\\frac{f}{\\rho}$ lungo $y=x$: numeratore $\\sim (x^2+2x^2)(x^2)=3x^4$, denominatore $(2x^2)^{3/2}\\cdot(\\sqrt2|x|)=$ ordine $x^4$; il rapporto tende a una costante $\\ne 0$. Quindi il resto non è $o(\\rho)$: non differenziabile. Gli assi (dove $f=0$) non lo rivelano. Src 20230123 es.1."}]},{"pool":"diff","src":"10feb22 Es.1 · continuità (soglia $a$)","steps":[{"t":"Sia $f(x,y)=\\dfrac{e^{x^4y^2}-1}{(x^2+y^2)^a}+xy$, $f(0,0)=0$. Per quali $a>0$ è CONTINUA in $(0,0)$?","opts":[{"x":"$a<3$: usando $e^t-1\\sim t$, la parte con quoziente è $\\sim\\dfrac{x^4y^2}{\\rho^{2a}}\\le\\rho^{6-2a}\\to 0\\iff a<3$","c":true},{"x":"$a<5/2$"},{"x":"$a<2$"},{"x":"ogni $a>0$"}],"hint":"Limite notevole $\\frac{e^t-1}{t}\\to 1$ con $t=x^4y^2$: il numeratore si comporta come $x^4y^2$, di grado $6$. Il termine $xy$ è continuo e non pesa.","sol":"$e^{x^4y^2}-1\\sim x^4y^2=O(\\rho^6)$, quindi la parte col quoziente è $\\le\\rho^{6-2a}\\to 0\\iff a<3$; $xy\\to 0$ è continuo. Continua $\\iff a<3$. Criterio: stima $|f|\\le C\\rho^p$, $p>0$. Src 10feb22 es.1."}]},{"pool":"diff","src":"10feb22 Es.1 · differenziabilità (soglia $a$)","steps":[{"t":"Per la stessa $f=\\dfrac{e^{x^4y^2}-1}{(x^2+y^2)^a}+xy$: sapendo che $\\nabla f(0,0)=(0,0)$, per quali $a$ è DIFFERENZIABILE in $(0,0)$?","opts":[{"x":"$a<5/2$: la parte col quoziente dà $\\dfrac{|\\cdot|}{\\rho}\\le\\rho^{5-2a}\\to 0\\iff a<5/2$ (il termine $xy$ è già differenziabile)","c":true},{"x":"$a<3$, come la continuità"},{"x":"$a<2$"},{"x":"ogni $a$ dove è continua"}],"hint":"$xy$ è liscio (differenziabile). Per la parte col quoziente aggiungi un $\\rho$ al denominatore: da $\\rho^{6-2a}$ passi a $\\rho^{5-2a}$.","sol":"$\\nabla f(0,0)=(0,0)$ ($e^{x^4y^2}-1$ è nulla sugli assi e $\\partial(xy)$ è $0$ in $0$). Il resto della parte col quoziente è $\\frac{x^4y^2/\\rho^{2a}}{\\rho}\\le\\rho^{5-2a}\\to 0\\iff a<5/2$; $xy$ è polinomio quindi differenziabile. Diff. $\\iff a<5/2$, contro continuità $a<3$. Src 10feb22 es.1."}]},{"pool":"diff","src":"20230621 Es.1 · due termini, intersezione","steps":[{"t":"Sia $f(x,y)=\\dfrac{x^2\\log(1+x^2y^2)}{(x^2+y^2)^\\beta}+|xy|^\\beta$. Il primo termine è differenziabile per $\\beta<5/2$, il secondo per $\\beta>1/2$. Per quali $\\beta$ è differenziabile $f$?","opts":[{"x":"$1/2<\\beta<5/2$: l'intersezione delle due condizioni (servono ENTRAMBI differenziabili)","c":true},{"x":"$\\beta<5/2$: domina il primo termine"},{"x":"$\\beta>1/2$: basta il secondo"},{"x":"ogni $\\beta>0$"}],"hint":"$\\log(1+x^2y^2)\\sim x^2y^2$: primo termine $\\sim\\rho^{6-2\\beta}$, secondo $|xy|^\\beta\\sim\\rho^{2\\beta}$. Ogni addendo ha la sua soglia; prendi l'intersezione.","sol":"Primo termine $\\sim\\frac{x^4y^2}{\\rho^{2\\beta}}$: diff. (con $\\nabla=0$) $\\iff\\rho^{5-2\\beta}\\to 0\\iff\\beta<5/2$. Secondo $|xy|^\\beta\\sim\\rho^{2\\beta}$: diff. $\\iff\\rho^{2\\beta-1}\\to 0\\iff\\beta>1/2$. La somma è differenziabile $\\iff$ entrambi lo sono $\\iff 1/2<\\beta<5/2$. Src 20230621 es.1."}]},{"pool":"diff","src":"21lug25 Es.3 · continuità (soglia $\\alpha$)","steps":[{"t":"Sia $f(x,y)=\\dfrac{e^{x^2(y-1)}-e^{y^2}}{(x^2+y^2)^\\alpha}$ per $(x,y)\\ne(0,0)$, $f(0,0)=0$. Per quali $\\alpha>0$ è CONTINUA in $(0,0)$?","opts":[{"x":"$\\alpha<1$: il numeratore $\\sim x^2(y-1)-y^2$ è $O(\\rho^2)$ (domina $-x^2-y^2$), quindi $|f|\\le\\rho^{2-2\\alpha}\\to 0\\iff\\alpha<1$","c":true},{"x":"$\\alpha<2$"},{"x":"$\\alpha<5/2$"},{"x":"ogni $\\alpha>0$"}],"hint":"Sviluppa $e^u\\sim 1+u$ separatamente sui due esponenti: la differenza $1+x^2(y-1)-(1+y^2)=x^2y-x^2-y^2$ ha parte dominante di grado $2$.","sol":"$e^{x^2(y-1)}-e^{y^2}\\approx x^2(y-1)-y^2=x^2y-x^2-y^2$; i termini dominanti $-x^2-y^2$ danno numeratore $O(\\rho^2)$. Quindi $|f|\\le C\\frac{\\rho^2}{\\rho^{2\\alpha}}=C\\rho^{2-2\\alpha}\\to 0\\iff\\alpha<1$. Continua $\\iff\\alpha<1$. Src 21lug25 es.3."}]},{"pool":"diff","src":"20230907 Es.1 · derivabile ma non differenziabile","steps":[{"t":"Sia $f(x,y)=\\dfrac{x^4+y^4-\\sin(xy^2)}{x^2+y^2}$, $f(0,0)=0$. Quanto valgono $f_x(0,0)$ e $f_y(0,0)$?","opts":[{"x":"entrambe $0$: $f(x,0)=\\frac{x^4}{x^2}=x^2\\Rightarrow f_x(0,0)=\\lim\\frac{x^2}{x}=0$; analogamente $f_y(0,0)=0$","c":true},{"x":"$f_x(0,0)=1$, $f_y(0,0)=1$"},{"x":"non esistono, perché il denominatore si annulla"},{"x":"$f_x(0,0)=4$, $f_y(0,0)=4$ dai coefficienti di $x^4,y^4$"}],"hint":"Metti $y=0$ (poi $x=0$): $\\sin$ e potenze incrociate spariscono. Rapporto incrementale.","sol":"$f(x,0)=\\frac{x^4}{x^2}=x^2$, quindi $\\frac{f(x,0)}{x}=x\\to 0$: $f_x(0,0)=0$. Simmetricamente $f(0,y)=\\frac{y^4}{y^2}=y^2\\Rightarrow f_y(0,0)=0$. Quindi $\\nabla f(0,0)=(0,0)$. Definizione di derivata parziale. Src 20230907 es.1.","cont":"Continua &rarr; è differenziabile?"},{"t":"Con $\\nabla f(0,0)=0$, $f$ è differenziabile in $(0,0)$?","opts":[{"x":"No: $\\dfrac{f}{\\rho}$ contiene $-\\dfrac{\\sin(xy^2)}{\\rho^3}\\sim-\\dfrac{xy^2}{\\rho^3}=-\\cos\\theta\\sin^2\\theta$, che dipende da $\\theta$","c":true},{"x":"Sì: le parziali esistono, quindi è differenziabile"},{"x":"Sì, perché $f$ è continua in $(0,0)$"},{"x":"Non si può stabilire senza le derivate seconde"}],"hint":"Il termine $x^4+y^4$ dà $\\rho^2\\to 0$, innocuo; è $\\sin(xy^2)\\sim xy^2$ (grado $3$) diviso $\\rho^3$ a lasciare una funzione di $\\theta$.","sol":"$\\frac{f}{\\rho}=\\frac{x^4+y^4-\\sin(xy^2)}{\\rho^3}$. La parte $\\frac{x^4+y^4}{\\rho^3}\\sim\\rho\\to 0$; ma $\\frac{-\\sin(xy^2)}{\\rho^3}\\sim\\frac{-xy^2}{\\rho^3}=-\\cos\\theta\\sin^2\\theta$ dipende dalla direzione. Il limite del resto NON è $0$: non differenziabile, pur essendo continua e derivabile. Src 20230907 es.1."}]},{"pool":"diff","src":"20220622 Es.1 · derivate direzionali","steps":[{"t":"Per $f=\\dfrac{|y|^\\alpha\\tan(x^4)}{(x^2+y^2)^2}$ ($f(0,0)=0$), la derivata direzionale $\\partial_v f(0,0)$ lungo $v=(v_1,v_2)$ con $v_1v_2\\ne 0$ esiste:","opts":[{"x":"sse $\\alpha>1$: $\\dfrac{f(tv)}{t}=\\dfrac{|t|^\\alpha}{t}\\cdot\\dfrac{|v_2|^\\alpha v_1^4}{(v_1^2+v_2^2)^2}$, e $\\frac{|t|^\\alpha}{t}\\to 0\\iff\\alpha>1$","c":true},{"x":"per ogni $\\alpha>0$"},{"x":"sse $\\alpha<1$"},{"x":"mai, perché compare $|t|$"}],"hint":"Sostituisci $x=tv_1$, $y=tv_2$ e semplifica $t$: resta $\\frac{|t|^\\alpha}{t}$ per una costante direzionale. Applica la dicotomia di $\\frac{|t|^\\alpha}{t}$.","sol":"$f(tv)=\\frac{|t|^\\alpha|v_2|^\\alpha\\,t^4v_1^4}{t^4(v_1^2+v_2^2)^2}$, quindi $\\frac{f(tv)}{t}=\\frac{|t|^\\alpha}{t}\\cdot\\frac{|v_2|^\\alpha v_1^4}{(v_1^2+v_2^2)^2}$. Poiché $\\frac{|t|^\\alpha}{t}\\to 0\\iff\\alpha>1$, la direzionale esiste (e vale $0$) sse $\\alpha>1$; sugli assi ($v_1v_2=0$) esiste sempre ed è $0$. Definizione $\\partial_v f=\\lim_{t\\to0}\\frac{f(tv)-f(0,0)}{t}$. Src 20220622 es.1."}]},{"pool":"diff","src":"tipo C · manuale · rette vs parabola","steps":[{"t":"Per $f(x,y)=\\dfrac{x^2y}{x^4+y^2}$, $f(0,0)=0$, esiste $\\lim_{(x,y)\\to(0,0)}f$ (quindi $f$ continua in $0$)?","opts":[{"x":"No: lungo ogni retta $y=mx$ il limite è $0$, ma lungo la parabola $y=x^2$ vale $\\tfrac12\\ne 0$","c":true},{"x":"Sì, vale $0$: lungo tutte le rette $y=mx$ tende a $0$"},{"x":"Sì, vale $\\tfrac12$"},{"x":"No, perché $f$ non è definita in $(0,0)$"}],"hint":"Il limite lungo tutte le RETTE non basta: prova un cammino di ordine diverso, come $y=x^2$, adattato al denominatore $x^4+y^2$.","sol":"Lungo $y=mx$: $\\frac{x^2\\cdot mx}{x^4+m^2x^2}=\\frac{mx}{x^2+m^2}\\to 0$. Lungo $y=x^2$: $\\frac{x^2\\cdot x^2}{x^4+x^4}=\\frac12$. Due cammini danno limiti diversi $\\Rightarrow$ il limite non esiste, $f$ non è continua in $0$. Morale: controllare solo le rette è insufficiente."}]},{"pool":"diff","src":"tipo C · manuale · derivabile ma discontinua","steps":[{"t":"Sia $f(x,y)=\\dfrac{xy}{x^2+y^2}$, $f(0,0)=0$. Cosa è vero in $(0,0)$?","opts":[{"x":"$f_x(0,0)=f_y(0,0)=0$ ma $f$ NON è continua (lungo $y=x$ vale $\\tfrac12$): derivabile $\\not\\Rightarrow$ continua","c":true},{"x":"$f$ è continua e differenziabile"},{"x":"$f_x(0,0)$ e $f_y(0,0)$ non esistono"},{"x":"$f$ è continua ma non derivabile"}],"hint":"Sugli assi $f\\equiv 0$, quindi le parziali sono $0$. Ma lungo la diagonale $y=x$ la funzione è costante $\\ne 0$: guarda cosa fa fuori dagli assi.","sol":"$f(x,0)=0$ e $f(0,y)=0\\Rightarrow f_x(0,0)=f_y(0,0)=0$: derivabile. Lungo $y=x$: $\\frac{x^2}{2x^2}=\\frac12$, mentre sugli assi $f=0$: limite inesistente, $f$ discontinua in $0$. Controesempio canonico: l'esistenza delle parziali (sguardo solo sugli assi) non vede la discontinuità."}]},{"pool":"diff","src":"22gen24 Es.1 · gradiente e derivata direzionale","steps":[{"t":"Sia $f(x,y,z)=\\sqrt{x^2+y^2+z^2+1}+x-z$ (liscia: argomento sempre $\\ge 1$). Quanto vale $\\nabla f(0,0,0)$?","opts":[{"x":"$(1,0,-1)$: $\\nabla f=\\Big(\\tfrac{x}{\\sqrt{\\cdots}}+1,\\ \\tfrac{y}{\\sqrt{\\cdots}},\\ \\tfrac{z}{\\sqrt{\\cdots}}-1\\Big)$ valutato in $0$, con $\\sqrt{\\cdots}=1$","c":true},{"x":"$(0,0,0)$"},{"x":"$(1,1,-1)$"},{"x":"non definito, la radice non è derivabile in $0$"}],"hint":"L'argomento della radice vale $1$ nell'origine, quindi $\\sqrt{\\cdots}=1$ e $f$ è $C^\\infty$ lì: usa le normali regole di derivazione.","sol":"$\\partial_x=\\frac{x}{\\sqrt{x^2+y^2+z^2+1}}+1$, $\\partial_y=\\frac{y}{\\sqrt{\\cdots}}$, $\\partial_z=\\frac{z}{\\sqrt{\\cdots}}-1$. In $(0,0,0)$ la radice è $1$: $\\nabla f=(1,0,-1)$. Qui la formula esplicita è liscia in un intorno (non è spezzata), quindi le regole di derivazione valgono. Src 22gen24 es.1.","cont":"Continua &rarr; la derivata direzionale"},{"t":"Poiché $f$ è differenziabile in $(0,0,0)$, quanto vale $\\partial_v f(0,0,0)$ lungo un versore $v=(v_1,v_2,v_3)$?","opts":[{"x":"$\\partial_v f=\\nabla f\\cdot v=v_1-v_3$: la formula del gradiente vale perché $f$ è differenziabile","c":true},{"x":"$\\partial_v f=v_1+v_3$"},{"x":"va calcolata dalla definizione, la formula del gradiente non si applica"},{"x":"$\\partial_v f=|v_1-v_3|$"}],"hint":"$f$ è liscia $\\Rightarrow$ differenziabile $\\Rightarrow$ $\\partial_v f=\\nabla f\\cdot v$. Fai il prodotto scalare con $\\nabla f=(1,0,-1)$.","sol":"Essendo $f$ differenziabile, $\\partial_v f(0,0,0)=\\nabla f(0,0,0)\\cdot v=(1,0,-1)\\cdot(v_1,v_2,v_3)=v_1-v_3$. Teorema: diff. $\\Rightarrow$ direzionali esistono e valgono $\\nabla f\\cdot v$. Qui è lecito proprio perché la differenziabilità è garantita dalla liscezza. Src 22gen24 es.1."}]}],"dini":[{"pool":"dini","src":"tipo G · manuale · ipotesi","steps":[{"t":"Il teorema del Dini applicato a $F(x,y)=0$ per esplicitare $y=g(x)$ vicino a $(x_0,y_0)$ richiede:","opts":[{"x":"$F\\in C^1$ in un intorno, $F(x_0,y_0)=0$ e $F_y(x_0,y_0)\\ne 0$","c":true},{"x":"$F\\in C^1$ e $F_x(x_0,y_0)\\ne 0$"},{"x":"soltanto $F(x_0,y_0)=0$"},{"x":"$\\nabla F(x_0,y_0)=0$"}],"hint":"La derivata che deve essere non nulla è quella rispetto alla variabile che vuoi ESPLICITARE ($y$), non l'altra.","sol":"Teorema del Dini: se $F\\in C^1$, $F(x_0,y_0)=0$ (il punto sta sull'insieme di livello) e $F_y(x_0,y_0)\\ne 0$, allora esiste un'unica $y=g(x)$ di classe $C^1$ in un intorno di $x_0$ con $g(x_0)=y_0$ e $F(x,g(x))=0$. Se invece è $F_x\\ne 0$ si esplicita $x=h(y)$."}]},{"pool":"dini","src":"tipo G · manuale · scelta variabile","steps":[{"t":"In un punto $P$ di $\\{F(x,y)=0\\}$ risulta $F_x(P)\\ne 0$ e $F_y(P)=0$. Cosa garantisce il Dini?","opts":[{"x":"esplicitabilità di $x=h(y)$ (curva localmente grafico su $y$), NON di $y=g(x)$","c":true},{"x":"esplicitabilità di $y=g(x)$"},{"x":"nulla: serve che entrambe le parziali siano non nulle"},{"x":"$P$ è un punto singolare, la curva non è regolare in $P$"}],"hint":"Si esplicita sempre la variabile la cui derivata parziale è non nulla.","sol":"Dini: la derivata parziale non nulla decide la variabile esplicitabile. $F_x(P)\\ne 0$ dà $x=h(y)$ con $h'=-F_y/F_x=0$: qui la curva ha tangente verticale (nel piano $xy$), quindi non è grafico di $y$ su $x$ ma lo è di $x$ su $y$. Il punto è regolare perché $\\nabla F(P)\\ne 0$."}]},{"pool":"dini","src":"tipo G · manuale · derivazione di $g'$","steps":[{"t":"Derivando l'identità $F(x,g(x))\\equiv 0$ rispetto a $x$ si ottiene la formula della derivata implicita. Qual è?","opts":[{"x":"$F_x+F_y\\,g'(x)=0\\ \\Rightarrow\\ g'(x)=-\\dfrac{F_x}{F_y}$","c":true},{"x":"$F_x\\,g'(x)+F_y=0\\ \\Rightarrow\\ g'(x)=-\\dfrac{F_y}{F_x}$"},{"x":"$g'(x)=\\dfrac{F_x}{F_y}$"},{"x":"$g'(x)=F_x-F_y$"}],"hint":"È la regola della catena su $x\\mapsto(x,g(x))$: la variabile $y=g(x)$ dipende da $x$, la $x$ da sé stessa.","sol":"Teorema del Dini + regola della catena: $\\frac{d}{dx}F(x,g(x))=F_x\\cdot 1+F_y\\cdot g'(x)=0$. Isolando: $g'(x)=-F_x/F_y$, ben definita perché il Dini garantisce $F_y\\ne 0$. La $F_x$ sta al numeratore, non al denominatore."}]},{"pool":"dini","src":"tipo G · manuale · segno","steps":[{"t":"Sia $F_x(x_0,y_
