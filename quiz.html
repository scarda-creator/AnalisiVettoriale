c{1}{2}$"},{"x":"$\\dfrac{\\pi}{2}$"},{"x":"$1$"}],"hint":"Numeratore $\\int_\\gamma y\\,ds=\\int_0^\\pi \\sin t\\,dt=2$; denominatore = lunghezza della semicirconferenza $=\\pi$.","sol":"Passi: con $\\|\\gamma'\\|=1$, il momento $\\int_\\gamma y\\,ds=\\int_0^\\pi\\sin t\\,dt=2$ e la lunghezza $\\int_\\gamma ds=\\pi$. Quindi $\\bar y=2/\\pi\\approx 0{,}64$, che cade all'interno della semicirconferenza (coerente). Definizione di baricentro $\\bar y=M_x/m$ con integrali di I specie. Per simmetria $\\bar x=0$."}]},{"pool":"curve","src":"tipo curve · lavoro a tratti (II specie)","steps":[{"t":"Calcola il lavoro $\\int_\\gamma F\\cdot d\\ell$ del campo $F=(y,\\ 2x)$ lungo la spezzata da $(0,0)$ a $(1,0)$ a $(1,2)$.","opts":[{"x":"$4$","c":true},{"x":"$2$"},{"x":"$0$"},{"x":"$6$"}],"hint":"Spezza in due tratti. Sul primo (orizzontale, $y=0$) è $dy=0$; sul secondo (verticale, $x=1$) è $dx=0$. Somma i due contributi.","sol":"Curva regolare a tratti: $\\int_\\gamma=\\int_{\\gamma_1}+\\int_{\\gamma_2}$. Tratto 1 $(0,0)\\to(1,0)$: $y=0$, $dy=0$, contributo $\\int F_1\\,dx=\\int y\\,dx=0$. Tratto 2 $(1,0)\\to(1,2)$: $x=1$, $dx=0$, contributo $\\int F_2\\,dy=\\int_0^2 2x\\,dy=\\int_0^2 2\\,dy=4$. Totale $0+4=4$. Il campo non è conservativo ($\\partial_y F_1=1\\ne 2=\\partial_x F_2$), quindi il cammino conta. Dimenticare un tratto porta a $0$."}]},{"pool":"curve","src":"analvett.tex cap.Curve · cardioide","steps":[{"t":"Calcola la lunghezza della cardioide $r=1+\\cos\\theta$, $\\theta\\in[0,2\\pi]$, con $L=\\int_0^{2\\pi}\\sqrt{r^2+r'^2}\\,d\\theta$.","opts":[{"x":"$8$","c":true},{"x":"$2\\pi$"},{"x":"$4$"},{"x":"$4\\pi$"}],"hint":"$r^2+r'^2=2+2\\cos\\theta=4\\cos^2(\\theta/2)$, quindi $\\sqrt{\\cdot}=2\\,|\\cos(\\theta/2)|$: NON dimenticare il modulo.","sol":"Passi: $r'=-\\sin\\theta$; $r^2+r'^2=(1+\\cos\\theta)^2+\\sin^2\\theta=2+2\\cos\\theta=4\\cos^2(\\theta/2)$, dunque $\\sqrt{r^2+r'^2}=2\\,|\\cos(\\theta/2)|$. Poiché $\\cos(\\theta/2)\\ge 0$ su $[0,\\pi]$ e $\\le 0$ su $[\\pi,2\\pi]$, $L=\\int_0^{2\\pi}2\\,|\\cos(\\theta/2)|\\,d\\theta=2\\cdot 4=8$. Formula della lunghezza in polari $ds=\\sqrt{r^2+r'^2}\\,d\\theta$. Togliere il modulo fa cancellare i due semiarchi e dà $0$."}]},{"pool":"curve","src":"tipo curve · spirale (I specie)","steps":[{"t":"Calcola la lunghezza della spirale logaritmica $\\gamma(t)=(e^{-t}\\cos t,\\ e^{-t}\\sin t)$, $t\\in[0,+\\infty)$.","opts":[{"x":"$\\sqrt{2}$","c":true},{"x":"$+\\infty$"},{"x":"$2$"},{"x":"$1$"}],"hint":"$\\|\\gamma'\\|=\\sqrt{2}\\,e^{-t}$; l'integrale improprio $\\int_0^{+\\infty}e^{-t}\\,dt$ converge a $1$.","sol":"Passi: $x'=-e^{-t}(\\cos t+\\sin t)$, $y'=e^{-t}(\\cos t-\\sin t)$, quindi $\\|\\gamma'\\|^2=e^{-2t}[(\\cos t+\\sin t)^2+(\\cos t-\\sin t)^2]=2e^{-2t}$ e $\\|\\gamma'\\|=\\sqrt{2}\\,e^{-t}$. Allora $L=\\int_0^{+\\infty}\\sqrt{2}\\,e^{-t}\\,dt=\\sqrt{2}\\,[-e^{-t}]_0^{+\\infty}=\\sqrt{2}$. La spirale compie infiniti giri attorno all'origine ma ha lunghezza FINITA. Credere che l'esponenziale non pesi porta a $+\\infty$."}]},{"pool":"curve","src":"20230907 Es.2 · scorciatoia con dominio problematico","steps":[{"t":"Calcola $\\oint_\\gamma F\\cdot d\\ell$ con $F=\\left(\\dfrac{-y}{x^2+y^2},\\ \\dfrac{x}{x^2+y^2}\\right)$ lungo il cerchio unitario $\\gamma(t)=(\\cos t,\\sin t)$, $t\\in[0,2\\pi]$ (antiorario).","opts":[{"x":"$2\\pi$","c":true},{"x":"$0$"},{"x":"$-2\\pi$"},{"x":"$\\pi$"}],"hint":"$F$ è irrotazionale, ma il dominio $\\mathbb{R}^2\\setminus\\{0\\}$ ha un buco: NON puoi concludere $\\oint=0$ con la scorciatoia del potenziale. Calcola direttamente sul cerchio.","sol":"Passi: su $\\gamma$ vale $x^2+y^2=1$, quindi $F(\\gamma)=(-\\sin t,\\cos t)$ e $\\gamma'=(-\\sin t,\\cos t)$; $F\\cdot\\gamma'=\\sin^2 t+\\cos^2 t=1$. $\\oint=\\int_0^{2\\pi}1\\,dt=2\\pi$. Sebbene $\\partial_x F_2=\\partial_y F_1$ (irrotazionale), il dominio non è semplicemente connesso: la scorciatoia $U(B)-U(A)$ NON si applica e il risultato è $2\\pi\\ne 0$. Rispondere $0$ 'perché irrotazionale' è la trappola (esame 20230907)."}]},{"pool":"curve","src":"tipo curve · Green come scorciatoia (II specie)","steps":[{"t":"Calcola $\\oint_\\gamma (-y\\,dx+x\\,dy)$ lungo l'ellisse $\\gamma(t)=(a\\cos t,\\ b\\sin t)$, $t\\in[0,2\\pi]$ (antiorario).","opts":[{"x":"$2\\pi ab$","c":true},{"x":"$\\pi ab$"},{"x":"$0$"},{"x":"$2\\pi$"}],"hint":"Calcolo diretto: $-y\\,dx+x\\,dy=(ab\\sin^2 t+ab\\cos^2 t)\\,dt$. Oppure Green: $Q_x-P_y=2$ dà $2\\cdot\\text{Area}$.","sol":"Passi (diretto): $dx=-a\\sin t\\,dt$, $dy=b\\cos t\\,dt$; $-y\\,dx=ab\\sin^2 t\\,dt$, $x\\,dy=ab\\cos^2 t\\,dt$, somma $ab\\,dt$; $\\oint=\\int_0^{2\\pi}ab\\,dt=2\\pi ab$. Verifica con Green: con $P=-y$, $Q=x$, $Q_x-P_y=1-(-1)=2$, quindi $\\oint=\\iint_D 2\\,dx\\,dy=2\\,\\text{Area}(D)=2\\cdot\\pi ab=2\\pi ab$. È la formula dell'area via integrale di linea $\\text{Area}=\\tfrac12\\oint(x\\,dy-y\\,dx)$. Rispondere $\\pi ab$ è l'area, non l'integrale (manca il fattore $2$)."}]}],"gauss":[{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Il teorema della divergenza $\\iint_{\\partial V} F\\cdot n\\,dS=\\iiint_V \\nabla\\cdot F\\,dV$ si applica. Quale ipotesi NON puoi omettere?","opts":[{"x":"$F\\in C^1$ su un aperto che contiene $\\overline V$, e $\\partial V$ regolare a tratti con normale uscente","c":true},{"x":"$F$ soltanto continua su $V$"},{"x":"$V$ semplicemente connesso"},{"x":"$\\nabla\\cdot F$ costante"}],"hint":"La regolarita\\u0300 richiesta e\\u0300 $C^1$; la semplice connessione riguarda i campi conservativi, non Gauss.","sol":"Il Teorema della divergenza richiede $F\\in C^1$ su un intorno del compatto $\\overline V$ e $\\partial V$ regolare a tratti con normale $n$ USCENTE. La semplice connessione e\\u0300 irrilevante qui; $\\nabla\\cdot F$ puo\\u0300 essere una qualsiasi funzione continua."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Nel teorema della divergenza la normale $n$ su $\\partial V$ deve essere:","opts":[{"x":"uscente da $V$","c":true},{"x":"entrante in $V$"},{"x":"tangente a $\\partial V$"},{"x":"quella con terza componente sempre positiva"}],"hint":"Il segno del flusso dipende dal verso della normale; il teorema fissa un verso preciso.","sol":"$n$ e\\u0300 la normale USCENTE. Se usi quella entrante il flusso cambia segno: $\\iint_{\\partial V}F\\cdot n_{\\text{ent}}\\,dS=-\\iiint_V\\nabla\\cdot F\\,dV$. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Se $\\nabla\\cdot F\\equiv 0$ su tutto $V$, quanto vale il flusso uscente attraverso $\\partial V$?","opts":[{"x":"$0$","c":true},{"x":"il volume di $V$"},{"x":"non determinabile senza calcolo diretto"},{"x":"dipende dalla forma di $V$"}],"hint":"Integra la divergenza sul volume.","sol":"$\\iint_{\\partial V}F\\cdot n\\,dS=\\iiint_V 0\\,dV=0$. Un campo solenoidale ($\\nabla\\cdot F=0$) ha flusso nullo attraverso ogni superficie chiusa che borda un volume in cui $F\\in C^1$. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Se $\\nabla\\cdot F=c$ costante, il flusso uscente da $V$ vale:","opts":[{"x":"$c\\cdot\\operatorname{vol}(V)$","c":true},{"x":"$c$"},{"x":"$c\\cdot\\operatorname{area}(\\partial V)$"},{"x":"$\\operatorname{vol}(V)$"}],"hint":"L'integrale di una costante sul volume e\\u0300 la costante per il volume.","sol":"$\\iiint_V c\\,dV=c\\,\\operatorname{vol}(V)$. Quando la divergenza e\\u0300 costante il flusso si riduce a un volume: e\\u0300 il motivo per cui Gauss conviene. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"La frontiera $\\partial V$ e\\u0300 fatta di tre superfici e $\\nabla\\cdot F=2$. Conviene di piu\\u0300:","opts":[{"x":"calcolare $\\iiint_V 2\\,dV=2\\operatorname{vol}(V)$ con Gauss","c":true},{"x":"parametrizzare le tre superfici e sommare i tre flussi"},{"x":"applicare Stokes al bordo"},{"x":"costruire il potenziale scalare"}],"hint":"Con divergenza semplice, un integrale di volume batte tre integrali di superficie.","sol":"Con $\\nabla\\cdot F$ costante o semplice, Gauss trasforma tre flussi di superficie in un unico integrale di volume $\\iiint_V\\nabla\\cdot F$. E\\u0300 il criterio di convenienza. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo H · manuale","steps":[{"t":"$\\Sigma$ e\\u0300 una superficie APERTA (una calotta senza coperchio). Per calcolarne il flusso con Gauss devi:","opts":[{"x":"aggiungere un tappo $T$ che chiuda $\\Sigma$, applicare Gauss al solido, poi sottrarre il flusso su $T$","c":true},{"x":"applicare Gauss direttamente a $\\Sigma$"},{"x":"usare Stokes"},{"x":"il flusso e\\u0300 nullo perche\\u0301 $\\Sigma$ e\\u0300 aperta"}],"hint":"Gauss vale solo per superfici CHIUSE; una superficie aperta va prima chiusa.","sol":"Gauss richiede una superficie chiusa. Chiudi $\\Sigma$ con un tappo $T$: $\\iint_\\Sigma+\\iint_T=\\iiint_V\\nabla\\cdot F$, quindi $\\iint_\\Sigma F\\cdot n\\,dS=\\iiint_V\\nabla\\cdot F\\,dV-\\iint_T F\\cdot n\\,dS$. E\\u0300 il trucco 'tappare e Gauss'. Teorema della divergenza (tipo A/H, manuale)."}]},{"pool":"gauss","src":"tipo H · manuale","steps":[{"t":"Chiudi $\\Sigma$ con un tappo $T$ e applichi Gauss al solido $V$. Con quale orientazione entra $T$ in $\\iint_\\Sigma=\\iiint_V\\nabla\\cdot F-\\iint_T$?","opts":[{"x":"con la normale USCENTE da $V$","c":true},{"x":"con la normale entrante in $V$"},{"x":"con orientazione arbitraria"},{"x":"con la normale di $\\Sigma$ cambiata di segno"}],"hint":"Nel bilancio di Gauss ogni pezzo di $\\partial V$ e\\u0300 orientato verso l'esterno.","sol":"Applicando Gauss al solido chiuso, sia $\\Sigma$ sia $T$ vanno con normale uscente da $V$. Isolando $\\Sigma$: $\\iint_\\Sigma=\\iiint_V\\nabla\\cdot F-\\iint_T$ con $T$ uscente. Sbagliarne il verso e\\u0300 l'errore classico del metodo. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo H · manuale","steps":[{"t":"Su una superficie cartesiana $z=f(x,y)$ si ha $r_x\\wedge r_y=(-f_x,-f_y,1)$ (terza componente positiva, punta in alto). Se questa e\\u0300 il tappo INFERIORE di un solido, la normale uscente da $V$ e\\u0300:","opts":[{"x":"$(f_x,f_y,-1)$, cioe\\u0300 verso il basso","c":true},{"x":"$(-f_x,-f_y,1)$, invariata"},{"x":"$(0,0,1)$"},{"x":"$(0,0,-1)$"}],"hint":"Sul fondo del solido, 'uscente' significa verso il basso.","sol":"$(-f_x,-f_y,1)$ punta in alto; sul tappo inferiore l'uscente da $V$ punta in basso, quindi si prende $(f_x,f_y,-1)$. Confondere i due segni e\\u0300 la trappola piu\\u0300 frequente. Teorema della divergenza."}]},{"pool":"gauss","src":"20230210 Es.4","steps":[{"t":"$\\partial V=\\Sigma_1\\cup\\Sigma_2\\cup\\Sigma_3$. Conosci il flusso totale (via Gauss) e i flussi su $\\Sigma_1,\\Sigma_2$. Il flusso su $\\Sigma_3$ e\\u0300:","opts":[{"x":"$\\iiint_V\\nabla\\cdot F\\,dV-\\Phi_{\\Sigma_1}-\\Phi_{\\Sigma_2}$","c":true},{"x":"$\\iiint_V\\nabla\\cdot F\\,dV+\\Phi_{\\Sigma_1}+\\Phi_{\\Sigma_2}$"},{"x":"$\\Phi_{\\Sigma_1}+\\Phi_{\\Sigma_2}$"},{"x":"$0$"}],"hint":"Il flusso totale e\\u0300 la somma dei flussi sui pezzi, tutti uscenti.","sol":"Poiche\\u0301 $\\Phi_{\\partial V}=\\Phi_{\\Sigma_1}+\\Phi_{\\Sigma_2}+\\Phi_{\\Sigma_3}=\\iiint_V\\nabla\\cdot F$, si isola $\\Phi_{\\Sigma_3}=\\iiint_V\\nabla\\cdot F-\\Phi_{\\Sigma_1}-\\Phi_{\\Sigma_2}$. Tecnica del flusso 'per differenza', 20230210 Es.4. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"$F=\\dfrac{(x,y,z)}{(x^2+y^2+z^2)^{3/2}}$ ha $\\nabla\\cdot F=0$ dove definito. Il flusso uscente dalla sfera unitaria centrata nell'origine e\\u0300 $0$?","opts":[{"x":"No: $F$ non e\\u0300 $C^1$ nell'origine, che sta dentro $V$; Gauss non si applica e il flusso vale $4\\pi$","c":true},{"x":"Si\\u0300, perche\\u0301 $\\nabla\\cdot F=0$"},{"x":"Si\\u0300, per ogni superficie chiusa"},{"x":"No, ma il flusso e\\u0300 comunque $0$"}],"hint":"Gauss richiede $F\\in C^1$ in TUTTO $V$, origine inclusa.","sol":"La divergenza e\\u0300 nulla solo fuori dall'origine, dove $F$ ha una singolarita\\u0300. Con l'origine dentro $V$ l'ipotesi $F\\in C^1(\\overline V)$ cade e Gauss non vale: il flusso e\\u0300 $4\\pi$ (campo di Coulomb). Teorema della divergenza, ipotesi di regolarita\\u0300."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"$\\nabla\\cdot F(P)>0$ in un punto $P$ significa che, localmente, $P$ si comporta come:","opts":[{"x":"una sorgente (flusso netto uscente da un intorno di $P$ positivo)","c":true},{"x":"un pozzo"},{"x":"un punto di sella del potenziale"},{"x":"un punto dove $F=0$"}],"hint":"Il flusso su un piccolo volume attorno a $P$ e\\u0300 $\\approx\\nabla\\cdot F(P)\\cdot\\operatorname{vol}$.","sol":"$\\nabla\\cdot F(P)=\\lim_{V\\to P}\\frac{1}{\\operatorname{vol}(V)}\\iint_{\\partial V}F\\cdot n\\,dS$: e\\u0300 la densita\\u0300 di flusso uscente. Positiva = sorgente, negativa = pozzo. E\\u0300 la lettura fisica del Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Vuoi calcolare $\\operatorname{vol}(V)$ come integrale di flusso. Quale campo scegli?","opts":[{"x":"un $F$ con $\\nabla\\cdot F=1$, per esempio $F=(0,0,z)$ o $F=\\tfrac13(x,y,z)$","c":true},{"x":"un $F$ con $\\nabla\\cdot F=0$"},{"x":"$F=(x,y,z)$ senza fattori"},{"x":"un campo qualsiasi"}],"hint":"Serve $\\iiint_V\\nabla\\cdot F=\\operatorname{vol}(V)$, cioe\\u0300 divergenza unitaria.","sol":"Se $\\nabla\\cdot F=1$ allora $\\iint_{\\partial V}F\\cdot n\\,dS=\\iiint_V 1\\,dV=\\operatorname{vol}(V)$. Con $F=(x,y,z)$ la divergenza e\\u0300 $3$, quindi $\\operatorname{vol}(V)=\\tfrac13\\iint_{\\partial V}(x,y,z)\\cdot n\\,dS$. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo H · manuale","steps":[{"t":"Scrivi $\\iint_\\Sigma F\\cdot n=\\iiint_V\\nabla\\cdot F$ per una calotta APERTA $\\Sigma$. Cosa c'e\\u0300 di sbagliato?","opts":[{"x":"$\\Sigma$ non e\\u0300 chiusa: non borda alcun volume, quindi Gauss non e\\u0300 applicabile senza prima tapparla","c":true},{"x":"niente, e\\u0300 corretto"},{"x":"$V$ va preso bidimensionale"},{"x":"manca solo un fattore $2\\pi$"}],"hint":"Gauss lega un volume alla sua frontiera CHIUSA.","sol":"Una superficie aperta non e\\u0300 la frontiera di un solido: $\\iiint_V\\nabla\\cdot F$ non ha nemmeno un $V$ ben definito. Bisogna chiudere $\\Sigma$ con un tappo e poi sottrarne il flusso. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Per $F=(x,y,z)$ il flusso uscente da un qualunque solido $V$ (con $\\partial V$ regolare) vale:","opts":[{"x":"$3\\operatorname{vol}(V)$","c":true},{"x":"$\\operatorname{vol}(V)$"},{"x":"$4\\pi$ sempre"},{"x":"$0$"}],"hint":"Calcola la divergenza di $(x,y,z)$.","sol":"$\\nabla\\cdot(x,y,z)=1+1+1=3$, quindi $\\iint_{\\partial V}(x,y,z)\\cdot n\\,dS=3\\operatorname{vol}(V)$ per ogni solido. Teorema della divergenza."}]},{"pool":"gauss","src":"20240619 Es.1","steps":[{"t":"$F=(e^x+2z,\\,2y,\\,5-z\\,e^x)$. Prima di parametrizzare, calcola $\\nabla\\cdot F$:","opts":[{"x":"$2$ (i termini $e^x$ si cancellano)","c":true},{"x":"$e^x+2-z\\,e^x$"},{"x":"$2e^x+2$"},{"x":"$0$"}],"hint":"$\\partial_x(e^x+2z)=e^x$ e $\\partial_z(5-z\\,e^x)=-e^x$: si elidono.","sol":"$\\partial_x F_1=e^x$, $\\partial_y F_2=2$, $\\partial_z F_3=-e^x$; somma $=2$. Un campo dall'aspetto complicato ha spesso divergenza semplice: calcolarla subito rivela la convenienza di Gauss. 20240619 Es.1. Teorema della divergenza."}]},{"pool":"gauss","src":"20240122 Es.4","steps":[{"t":"$F=(0,0,z)$ e il flusso uscente da un solido $E$ vale $\\tfrac{32}{3}\\pi$. Quanto vale $\\operatorname{vol}(E)$?","opts":[{"x":"$\\tfrac{32}{3}\\pi$","c":true},{"x":"$32\\pi$"},{"x":"$\\tfrac{32}{9}\\pi$"},{"x":"$\\tfrac{16}{3}\\pi$"}],"hint":"$\\nabla\\cdot(0,0,z)=1$.","sol":"$\\nabla\\cdot F=1$, quindi per Gauss $\\Phi=\\iiint_E 1\\,dV=\\operatorname{vol}(E)$. Dal flusso $\\tfrac{32}{3}\\pi$ segue $\\operatorname{vol}(E)=\\tfrac{32}{3}\\pi$. 20240122 Es.4. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Flusso uscente di $F=(x,y,z)$ dalla sfera $x^2+y^2+z^2\\le 4$:","opts":[{"x":"$32\\pi$","c":true},{"x":"$16\\pi$"},{"x":"$\\tfrac{32}{3}\\pi$"},{"x":"$4\\pi$"}],"hint":"$\\nabla\\cdot F=3$ e $\\operatorname{vol}=\\tfrac43\\pi R^3$ con $R=2$.","sol":"$\\nabla\\cdot F=3$; $\\operatorname{vol}=\\tfrac43\\pi\\cdot 8=\\tfrac{32}{3}\\pi$; flusso $=3\\cdot\\tfrac{32}{3}\\pi=32\\pi$. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Flusso uscente di $F=(x,y,z)$ dal cubo $[0,1]^3$:","opts":[{"x":"$3$","c":true},{"x":"$1$"},{"x":"$6$"},{"x":"$0$"}],"hint":"$\\nabla\\cdot F=3$, $\\operatorname{vol}=1$.","sol":"$\\nabla\\cdot F=3$, $\\operatorname{vol}([0,1]^3)=1$, flusso $=3\\cdot 1=3$. Verificabile anche faccia per faccia: le tre coppie di facce danno $1$ ciascuna. Teorema della divergenza."}]},{"pool":"gauss","src":"20220706 Es.2","steps":[{"t":"$F=(z+x^2\\sin y,\\,2x\\cos y,\\,x^2+y^2+8z)$ sul solido $E$. Il flusso uscente vale:","opts":[{"x":"$8\\operatorname{vol}(E)$","c":true},{"x":"$\\operatorname{vol}(E)$"},{"x":"$10\\operatorname{vol}(E)$"},{"x":"$0$"}],"hint":"$\\partial_x(x^2\\sin y)=2x\\sin y$ e $\\partial_y(2x\\cos y)=-2x\\sin y$ si elidono.","sol":"$\\nabla\\cdot F=2x\\sin y-2x\\sin y+8=8$; flusso $=\\iiint_E 8\\,dV=8\\operatorname{vol}(E)$. 20220706 Es.2. Teorema della divergenza."}]},{"pool":"gauss","src":"20250627 Es.3","steps":[{"t":"$F=(x^2z+4,\\,-2xyz-y\\,e^z,\\,e^z+2z+1)$ sul cilindro $\\{0\\le z\\le4,\\;(x-z)^2+y^2\\le4\\}$. Calcola $\\nabla\\cdot F$:","opts":[{"x":"$2$","c":true},{"x":"$2e^z+2$"},{"x":"$2xz+e^z+2$"},{"x":"$0$"}],"hint":"$\\partial_y(-2xyz-y\\,e^z)=-2xz-e^z$: attento al segno di $e^z$.","sol":"$\\partial_x F_1=2xz$; $\\partial_y F_2=-2xz-e^z$; $\\partial_z F_3=e^z+2$. Somma $=2$: il termine $e^z$ si cancella. Sbagliarne il segno produce il falso $2e^z+2$. 20250627 Es.3. Teorema della divergenza.","cont":"Ora il flusso &rarr;"},{"t":"Con $\\nabla\\cdot F=2$ e il cilindro traslato (per ogni $z$ un disco di raggio $2$, area $4\\pi$, con $z\\in[0,4]$), il flusso uscente vale:","opts":[{"x":"$32\\pi$","c":true},{"x":"$16\\pi$"},{"x":"$8\\pi e^4+24\\pi$"},{"x":"$64\\pi$"}],"hint":"$\\operatorname{vol}=\\int_0^4 4\\pi\\,dz$; la traslazione $(x-z)$ non cambia l'area della sezione.","sol":"$\\operatorname{vol}(E)=\\int_0^4 4\\pi\\,dz=16\\pi$ (il disco ha sempre raggio $2$: la traslazione dipendente da $z$ non altera l'area). Flusso $=2\\cdot16\\pi=32\\pi$. Con il falso $\\nabla\\cdot F=2e^z+2$ otterresti $8\\pi e^4+24\\pi$. Teorema della divergenza."}]},{"pool":"gauss","src":"20220124 Es.3","steps":[{"t":"$T=\\{x^2+y^2\\le z\\le 3+2y\\}$ (proiezione: disco $x^2+(y-1)^2\\le4$), con $\\nabla\\cdot F=y-1$. Il flusso uscente vale:","opts":[{"x":"$0$","c":true},{"x":"$4\\pi$"},{"x":"$-\\pi$"},{"x":"$16\\pi$"}],"hint":"Centra le polari nel disco: $y-1=\\rho\\sin\\theta$, e $\\int_0^{2\\pi}\\sin\\theta\\,d\\theta=0$.","sol":"$\\Phi=\\iint_D(3+2y-x^2-y^2)(y-1)\\,dx\\,dy$. Con $y=1+\\rho\\sin\\theta$ il fattore $(y-1)=\\rho\\sin\\theta$ e\\u0300 dispari in $\\theta$ mentre l'altro fattore dipende da $\\rho$: l'integrale angolare $\\int_0^{2\\pi}\\sin\\theta\\,d\\theta=0$, quindi il flusso e\\u0300 $0$. 20220124 Es.3. Teorema della divergenza."}]},{"pool":"gauss","src":"20230210 Es.4","steps":[{"t":"$E=\\{x^2+y^2+z^2\\le25,\\;x^2+y^2\\le9\\}$ (sfera $\\cap$ cilindro), $F=(x,y,z)$. Per il flusso sul mantello cilindrico $\\Sigma_3$ la via piu\\u0300 rapida e\\u0300:","opts":[{"x":"$\\Phi_{\\Sigma_3}=3\\operatorname{vol}(E)-\\Phi_{\\Sigma_1}-\\Phi_{\\Sigma_2}$ (Gauss per il totale, calotte dirette, mantello per differenza)","c":true},{"x":"parametrizzare solo $\\Sigma_3$ e integrare $F\\cdot n$"},{"x":"applicare Stokes al bordo di $\\Sigma_3$"},{"x":"il flusso e\\u0300 $0$ per simmetria"}],"hint":"Gauss da\\u0300 il totale; le calotte sono cartesiane e semplici, il mantello si ottiene per differenza.","sol":"Gauss fornisce $\\Phi_{\\partial E}=3\\operatorname{vol}(E)$. Le calotte $\\Sigma_1,\\Sigma_2$ sono cartesiane e si integrano direttamente; sottraendole si isola $\\Phi_{\\Sigma_3}=3\\operatorname{vol}(E)-\\Phi_{\\Sigma_1}-\\Phi_{\\Sigma_2}=144\\pi$. 20230210 Es.4. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Volume del solido $E=\\{x^2+y^2\\le z\\le 2-x^2-y^2\\}$ (fra i due paraboloidi):","opts":[{"x":"$\\pi$","c":true},{"x":"$2\\pi$"},{"x":"$\\tfrac{\\pi}{2}$"},{"x":"$\\tfrac{2\\pi}{3}$"}],"hint":"Intersezione $x^2+y^2=1$; integra $(2-2\\rho^2)$ in polari con Jacobiano $\\rho$.","sol":"I paraboloidi si incontrano dove $\\rho^2=2-\\rho^2\\Rightarrow\\rho=1$. $\\operatorname{vol}=\\int_0^{2\\pi}\\!\\!\\int_0^1(2-2\\rho^2)\\rho\\,d\\rho\\,d\\theta=2\\pi[\\rho^2-\\tfrac{\\rho^4}{2}]_0^1=2\\pi\\cdot\\tfrac12=\\pi$. Volume come integrale triplo, $\\operatorname{vol}=\\iint_D(z_{sup}-z_{inf})$."}]},{"pool":"gauss","src":"tipo H · manuale","steps":[{"t":"$\\Sigma$ e\\u0300 il paraboloide $z=x^2+y^2$ con $0\\le z\\le1$ (coppa APERTA), normale uscente dal solido sottostante. Chiudi con il disco $T=\\{x^2+y^2\\le1,\\,z=1\\}$. Con $F=(x,y,z)$, quanto vale $\\iiint_V\\nabla\\cdot F\\,dV$ sul solido $V$ fra paraboloide e disco?","opts":[{"x":"$\\tfrac{3\\pi}{2}$","c":true},{"x":"$3\\pi$"},{"x":"$\\tfrac{\\pi}{2}$"},{"x":"$\\pi$"}],"hint":"$\\nabla\\cdot F=3$; $\\operatorname{vol}(V)=\\int_0^{2\\pi}\\int_0^1(1-\\rho^2)\\rho\\,d\\rho\\,d\\theta$.","sol":"$\\operatorname{vol}(V)=\\int_0^{2\\pi}\\int_0^1(1-\\rho^2)\\rho\\,d\\rho\\,d\\theta=2\\pi(\\tfrac12-\\tfrac14)=\\tfrac{\\pi}{2}$. Con $\\nabla\\cdot F=3$: $\\iiint_V 3\\,dV=\\tfrac{3\\pi}{2}$. Teorema della divergenza.","cont":"Ora sottrai il tappo &rarr;"},{"t":"Il flusso uscente attraverso il tappo $T$ (normale $(0,0,1)$, $F\\cdot n=z=1$) e\\u0300 l'area $\\pi$. Il flusso uscente attraverso la coppa $\\Sigma$ vale allora:","opts":[{"x":"$\\tfrac{3\\pi}{2}-\\pi=\\tfrac{\\pi}{2}$","c":true},{"x":"$\\tfrac{3\\pi}{2}$"},{"x":"$\\tfrac{3\\pi}{2}+\\pi=\\tfrac{5\\pi}{2}$"},{"x":"$\\pi$"}],"hint":"$\\iint_\\Sigma=\\iiint_V\\nabla\\cdot F-\\iint_T$: sottrai il tappo, non sommarlo.","sol":"$\\iint_\\Sigma F\\cdot n\\,dS=\\iiint_V\\nabla\\cdot F\\,dV-\\iint_T F\\cdot n\\,dS=\\tfrac{3\\pi}{2}-\\pi=\\tfrac{\\pi}{2}$. Dimenticare il tappo (rispondere $\\tfrac{3\\pi}{2}$) e\\u0300 l'errore da evitare. Trucco 'tappare e Gauss' (tipo A/H). Teorema della divergenza."}]},{"pool":"gauss","src":"20230907 Es.3","steps":[{"t":"$T=\\{(x-(1-z))^2+y^2\\le(1-z)^2,\\;0\\le z\\le1\\}$ (cono decentrato che si restringe), $\\nabla\\cdot F=4x$. Il flusso uscente vale:","opts":[{"x":"$\\pi$","c":true},{"x":"$\\tfrac{\\pi}{3}$"},{"x":"$4\\pi$"},{"x":"$0$"}],"hint":"Per strati: $\\iint_{E_z}x\\,dA=(1-z)\\cdot\\pi(1-z)^2$ (baricentro del disco in $x=1-z$).","sol":"$\\iiint_T 4x\\,dV=\\int_0^1 4\\big(\\iint_{E_z}x\\,dA\\big)dz$. La sezione a quota $z$ e\\u0300 un disco di raggio $1-z$ centrato in $x=1-z$: $\\iint_{E_z}x\\,dA=(1-z)\\,\\pi(1-z)^2=\\pi(1-z)^3$. Flusso $=\\int_0^1 4\\pi(1-z)^3\\,dz=4\\pi\\cdot\\tfrac14=\\pi$. 20230907 Es.3. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Flusso uscente di $F=(x,y,0)$ dal cilindro chiuso $\\{x^2+y^2\\le R^2,\\,0\\le z\\le h\\}$ (mantello piu\\u0300 due basi):","opts":[{"x":"$2\\pi R^2 h$","c":true},{"x":"$\\pi R^2 h$"},{"x":"$0$ (perche\\u0301 $F_z=0$)"},{"x":"$2\\pi R h$"}],"hint":"$\\nabla\\cdot F=2$; sulle basi $F\\cdot(0,0,\\pm1)=0$, ma Gauss da\\u0300 comunque $2\\operatorname{vol}$.","sol":"$\\nabla\\cdot F=1+1+0=2$; $\\operatorname{vol}=\\pi R^2h$; flusso $=2\\pi R^2h$. Tutto passa dal mantello: sulle basi $F\\cdot n=0$. Rispondere $0$ confonde 'flusso nullo sulle basi' con 'flusso totale nullo'. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Volume di $E=\\{x^2+y^2\\le4,\\;0\\le z\\le x^2+y^2\\}$ (sotto il paraboloide, entro il cilindro di raggio $2$):","opts":[{"x":"$8\\pi$","c":true},{"x":"$4\\pi$"},{"x":"$16\\pi$"},{"x":"$\\tfrac{8\\pi}{3}$"}],"hint":"In cilindriche $z$ va da $0$ a $\\rho^2$; non dimenticare il Jacobiano $\\rho$.","sol":"$\\operatorname{vol}=\\int_0^{2\\pi}\\!\\!\\int_0^2\\!\\!\\int_0^{\\rho^2}\\rho\\,dz\\,d\\rho\\,d\\theta=\\int_0^{2\\pi}\\!\\!\\int_0^2\\rho^3\\,d\\rho\\,d\\theta=2\\pi\\cdot\\tfrac{16}{4}=8\\pi$. Il fattore $\\rho$ e\\u0300 il Jacobiano cilindrico: ometterlo darebbe $\\tfrac{8\\pi}{3}$ o simili. Volume come integrale triplo."}]},{"pool":"gauss","src":"tipo H · manuale","steps":[{"t":"Il tappo inferiore di un solido e\\u0300 il paraboloide $z=x^2+y^2$ (sotto), su $D=\\{x^2+y^2\\le1\\}$, con $F=(0,0,z)$. Per il flusso USCENTE da $V$: quale normale e quanto vale il flusso sul tappo?","opts":[{"x":"$n\\,dS=(2x,2y,-1)\\,dx\\,dy$ (verso il basso); flusso $=-\\tfrac{\\pi}{2}$","c":true},{"x":"$n\\,dS=(-2x,-2y,1)\\,dx\\,dy$; flusso $=+\\tfrac{\\pi}{2}$"},{"x":"$n=(0,0,1)$; flusso $=\\tfrac{\\pi}{2}$"},{"x":"flusso $=0$"}],"hint":"Sul fondo del solido l'uscente punta in basso: terza componente negativa.","sol":"Uscente dal fondo = verso il basso: $n\\,dS=(f_x,f_y,-1)\\,dx\\,dy=(2x,2y,-1)\\,dx\\,dy$. $F\\cdot(2x,2y,-1)=-z=-\\rho^2$; $\\iint_D(-\\rho^2)\\,dA=-\\int_0^{2\\pi}\\!\\int_0^1\\rho^3\\,d\\rho\\,d\\theta=-\\tfrac{\\pi}{2}$. Usare $(-2x,-2y,1)$ (entrante) inverte il segno. Teorema della divergenza, orientazione uscente."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Il flusso uscente di $F=(x,y,z)$ da un solido $V$ vale $12$. Allora $\\operatorname{vol}(V)$ e\\u0300:","opts":[{"x":"$4$","c":true},{"x":"$12$"},{"x":"$36$"},{"x":"$3$"}],"hint":"$\\nabla\\cdot(x,y,z)=3$, quindi flusso $=3\\operatorname{vol}$.","sol":"$\\nabla\\cdot F=3\\Rightarrow 12=3\\operatorname{vol}(V)\\Rightarrow\\operatorname{vol}(V)=4$. Volume ricavato dal flusso via Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Flusso uscente di $F=(x^3,y^3,z^3)$ dalla sfera unitaria $x^2+y^2+z^2\\le1$:","opts":[{"x":"$\\tfrac{12\\pi}{5}$","c":true},{"x":"$4\\pi$"},{"x":"$4\\pi$ perche\\u0301 $\\nabla\\cdot F=3$"},{"x":"$\\tfrac{3\\pi}{5}$"}],"hint":"$\\nabla\\cdot F=3(x^2+y^2+z^2)=3r^2$, NON costante; in sferiche $dV=r^2\\sin\\phi\\,dr\\,d\\phi\\,d\\theta$.","sol":"$\\nabla\\cdot F=3x^2+3y^2+3z^2=3r^2$. $\\Phi=\\iiint 3r^2\\,dV=3\\int_0^1 r^2\\cdot 4\\pi r^2\\,dr=12\\pi\\int_0^1 r^4\\,dr=\\tfrac{12\\pi}{5}$. Con divergenza non costante si integra davvero il volume, non basta $3\\operatorname{vol}$. Teorema della divergenza."}]}],"stokes":[{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Il teorema di Stokes afferma che, sotto le sue ipotesi, la circuitazione di $F$ lungo $\\partial S$ uguaglia:","opts":[{"x":"$\\iint_S (\\nabla\\times F)\\cdot n\\,dS$","c":true},{"x":"$\\iint_S (\\nabla\\cdot F)\\,dS$"},{"x":"$\\iiint_V (\\nabla\\cdot F)\\,dV$"},{"x":"$\\iint_S F\\cdot n\\,dS$"}],"hint":"Il secondo membro è il flusso del ROTORE, non della divergenza né di $F$ stesso.","sol":"Teorema di Stokes: $\\oint_{\\partial S} F\\cdot d\\ell=\\iint_S (\\nabla\\times F)\\cdot n\\,dS$. A sinistra la circuitazione, a destra il flusso del rotore attraverso una qualunque superficie $S$ che abbia $\\partial S$ come bordo."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Quali ipotesi servono per applicare il teorema di Stokes a $\\oint_{\\partial S} F\\cdot d\\ell$?","opts":[{"x":"$F$ di classe $C^1$ su un aperto contenente $S$, e $S$ superficie regolare orientabile con bordo","c":true},{"x":"$F$ solo continuo e $S$ chiusa"},{"x":"$F$ irrotazionale e $S$ piana"},{"x":"$F$ di classe $C^1$ e $S$ superficie chiusa senza bordo"}],"hint":"Una superficie CHIUSA non ha bordo: la circuitazione non è definita. E serve $C^1$, non la sola continuità.","sol":"Il teorema di Stokes richiede $F\\in C^1$ su un aperto che contiene $S$, e $S$ superficie regolare, orientabile, con bordo $\\partial S$. La superficie deve avere bordo (non essere chiusa) e l'orientazione della normale deve essere coerente col verso di $\\partial S$."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Come si sceglie il verso di percorrenza di $\\partial S$ una volta fissata la normale $n$ di $S$?","opts":[{"x":"Regola della mano destra: pollice lungo $n$, le dita indicano il verso di $\\partial S$","c":true},{"x":"Sempre antiorario, indipendentemente da $n$"},{"x":"Sempre orario visto dall'alto"},{"x":"Il verso è arbitrario e non influenza il segno"}],"hint":"Verso del bordo e verso della normale NON sono indipendenti: uno determina l'altro.","sol":"L'orientazione coerente è data dalla regola della mano destra: se il pollice punta come $n$, le dita danno il verso positivo di $\\partial S$. Scambiare uno dei due senza l'altro introduce un errore di segno nel teorema di Stokes."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"La prima componente di $\\nabla\\times F$ è:","opts":[{"x":"$\\partial_y F_3 - \\partial_z F_2$","c":true},{"x":"$\\partial_z F_2 - \\partial_y F_3$"},{"x":"$\\partial_x F_2 - \\partial_y F_1$"},{"x":"$\\partial_y F_2 - \\partial_z F_3$"}],"hint":"È la componente $x$: si ottiene ciclicamente da $y,z$ sulle componenti $F_3,F_2$.","sol":"Dal determinante formale del rotore: $(\\nabla\\times F)_1=\\partial_y F_3-\\partial_z F_2$, poi ciclicamente $x\\to y\\to z$. Invertire l'ordine della differenza cambia il segno dell'intera componente."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"La seconda componente del rotore è $\\partial_z F_1-\\partial_x F_3$. Perché è facile sbagliarla?","opts":[{"x":"Perché l'ordine ciclico dà $z,x$ su $F_1,F_3$: scriverla come $\\partial_x F_3-\\partial_z F_1$ inverte il segno","c":true},{"x":"Perché la componente $y$ del rotore è sempre nulla"},{"x":"Perché va calcolata con la divergenza"},{"x":"Perché richiede le derivate seconde"}],"hint":"L'errore tipico è invertire i due termini della differenza sulla componente centrale.","sol":"$(\\nabla\\times F)_2=\\partial_z F_1-\\partial_x F_3$. La regola ciclica $x\\to y\\to z\\to x$ fissa l'ordine; scriverla al contrario ($\\partial_x F_3-\\partial_z F_1$) è l'errore più frequente e falsa il segno della circuitazione via Stokes."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Se $F$ è irrotazionale ($\\nabla\\times F=0$) su un aperto, quanto vale $\\oint_{\\partial S} F\\cdot d\\ell$ per una superficie $S$ tutta contenuta in quell'aperto?","opts":[{"x":"Zero, perché il flusso di un rotore nullo è nullo","c":true},{"x":"Sempre $2\\pi$"},{"x":"Dipende solo dalla lunghezza di $\\partial S$"},{"x":"Non è calcolabile senza il potenziale"}],"hint":"Se $\\nabla\\times F=0$ ovunque su $S$, l'integrando del secondo membro di Stokes è identicamente nullo.","sol":"Per Stokes $\\oint_{\\partial S} F\\cdot d\\ell=\\iint_S (\\nabla\\times F)\\cdot n\\,dS=\\iint_S 0=0$. Serve che TUTTA $S$ stia nell'aperto dove $\\nabla\\times F=0$: nessun buco del dominio deve essere attraversato."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Perché per calcolare $\\oint_{\\partial S} F\\cdot d\\ell$ posso sostituire $S$ con un'altra superficie $S'$ avente lo stesso bordo?","opts":[{"x":"Perché Stokes lega la circuitazione al bordo: ogni $S'$ con $\\partial S'=\\partial S$ dà lo stesso flusso del rotore","c":true},{"x":"Perché due superfici hanno sempre lo stesso flusso del rotore"},{"x":"Perché il rotore non dipende da $F$"},{"x":"Non è lecito: la superficie è unica"}],"hint":"Il primo membro di Stokes dipende SOLO dal bordo, purché $F\\in C^1$ nella regione tra le due superfici.","sol":"Stokes: $\\oint_{\\partial S}F\\cdot d\\ell=\\iint_{S}(\\nabla\\times F)\\cdot n\\,dS$ dipende solo da $\\partial S$. Se $\\partial S'=\\partial S$ con la stessa orientazione e $F\\in C^1$ nella regione racchiusa, il flusso del rotore è identico. Si sceglie allora la $S'$ più comoda, tipicamente un disco piano."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Il teorema di Green nel piano, $\\oint_{\\partial D} F\\cdot d\\ell=\\iint_D(\\partial_x F_2-\\partial_y F_1)\\,dx\\,dy$, è:","opts":[{"x":"Il caso particolare di Stokes per $S$ piana nel piano $xy$ con $n=(0,0,1)$","c":true},{"x":"Un teorema indipendente da Stokes"},{"x":"Il teorema della divergenza in 2D"},{"x":"Valido solo per campi conservativi"}],"hint":"$\\partial_x F_2-\\partial_y F_1$ è proprio la terza componente del rotore.","sol":"Green è Stokes con $S$ regione piana e $n=(0,0,1)$: allora $(\\nabla\\times F)\\cdot n=(\\nabla\\times F)_3=\\partial_x F_2-\\partial_y F_1$. Non è la divergenza (quello è il teorema di Gauss)."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Se la normale $n$ di una superficie cartesiana ha terza componente NEGATIVA, il bordo $\\partial S$ orientato coerentemente è:","opts":[{"x":"Percorso in senso orario visto dall'alto","c":true},{"x":"Percorso in senso antiorario visto dall'alto"},{"x":"Percorso due volte"},{"x":"Indeterminato"}],"hint":"Mano destra: pollice verso il basso ribalta il verso rispetto al caso 'normale verso l'alto'.","sol":"Con $n_3>0$ (normale verso l'alto) il bordo è antiorario visto dall'alto; con $n_3<0$ è orario. Invertire la normale senza invertire il verso del bordo introduce un segno sbagliato in Stokes (cfr. esame 20250127, es.1)."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Per una superficie cartesiana $z=f(x,y)$ si integra $\\iint_D (\\nabla\\times F)\\cdot(-f_x,-f_y,1)\\,dx\\,dy$ SENZA normalizzare $(-f_x,-f_y,1)$. Perché?","opts":[{"x":"Perché $n\\,dS=(-f_x,-f_y,1)\\,dx\\,dy$: la norma nel $dS$ e quella nel versore si semplificano","c":true},{"x":"Perché la normale è già un versore"},{"x":"Perché il rotore è costante"},{"x":"Perché l'area di $D$ vale $1$"}],"hint":"$dS=|X_x\\times X_y|\\,dx\\,dy$ e $n=(X_x\\times X_y)/|X_x\\times X_y|$: nel prodotto $n\\,dS$ la norma sparisce.","sol":"$n\\,dS=\\frac{X_x\\times X_y}{|X_x\\times X_y|}\\,|X_x\\times X_y|\\,dx\\,dy=(X_x\\times X_y)\\,dx\\,dy=(-f_x,-f_y,1)\\,dx\\,dy$. Si usa il vettore NON normalizzato: normalizzare e poi rimoltiplicare per $\\sqrt{1+f_x^2+f_y^2}$ è un doppio conteggio."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Quanto vale $\\nabla\\times(\\nabla U)$ per un campo scalare $U\\in C^2$?","opts":[{"x":"$0$: il rotore di un gradiente è sempre nullo","c":true},{"x":"$\\nabla U$"},{"x":"$\\nabla^2 U$"},{"x":"Dipende da $U$"}],"hint":"Segue dall'uguaglianza delle derivate miste (teorema di Schwarz).","sol":"$\\nabla\\times(\\nabla U)=0$ perché ogni componente è una differenza di derivate miste uguali (Schwarz): $\\partial_y\\partial_z U-\\partial_z\\partial_y U=0$, ecc. Un campo conservativo è quindi irrotazionale, e per Stokes la sua circuitazione su ogni bordo di superficie contenuta nel dominio è nulla."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Due superfici $S_1,S_2$ con lo stesso bordo danno lo stesso flusso del rotore. Qual è la ragione profonda?","opts":[{"x":"$\\nabla\\cdot(\\nabla\\times F)=0$: chiudendo $S_1\\cup S_2$ e applicando Gauss, il flusso totale del rotore è nullo","c":true},{"x":"Perché i rotori sono sempre uguali"},{"x":"Perché le aree sono uguali"},{"x":"È una coincidenza numerica"}],"hint":"Unisci le due superfici in una chiusa e usa che la divergenza del rotore è identicamente zero.","sol":"$\\nabla\\cdot(\\nabla\\times F)=0$ identicamente. Se $S_1$ e $S_2$ hanno lo stesso bordo, $S_1\\cup(-S_2)$ è chiusa e racchiude un volume $V$: per Gauss $\\iint_{\\partial V}(\\nabla\\times F)\\cdot n=\\iiint_V \\nabla\\cdot(\\nabla\\times F)=0$, cioè i due flussi coincidono. È la base per cambiare superficie in Stokes."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Sul campo $F=\\frac{(-y,\\,x)}{x^2+y^2}$ (su $\\mathbb{R}^2\\setminus\\{0\\}$) si ha $\\nabla\\times F=0$, eppure la circuitazione su un cerchio attorno all'origine vale $2\\pi$. Contraddice Stokes?","opts":[{"x":"No: nessuna superficie con quel bordo sta tutta nel dominio (l'origine è esclusa), quindi Stokes non si applica","c":true},{"x":"Sì, Stokes è violato"},{"x":"No, perché in realtà il rotore non è nullo"},{"x":"Sì, perché il campo non è $C^1$"}],"hint":"Per applicare Stokes servirebbe una superficie CONTENUTA nel dominio: ma ogni disco con quel bordo contiene l'origine.","sol":"Nessuna contraddizione: Stokes richiede una superficie tutta nel dominio di $C^1$ di $F$. Ogni superficie col bordo attorno all'origine contiene il buco, dove $F$ non è definito. Irrotazionale su dominio NON semplicemente connesso non implica circuitazione nulla (cfr. esame 20230907)."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Se inverto il verso di percorrenza di $\\partial S$, la circuitazione $\\oint_{\\partial S} F\\cdot d\\ell$:","opts":[{"x":"Cambia segno","c":true},{"x":"Resta invariata"},{"x":"Si annulla"},{"x":"Raddoppia"}],"hint":"$d\\ell$ cambia verso: l'integrale di linea di seconda specie è orientato.","sol":"L'integrale di linea di seconda specie è orientato: invertendo $\\partial S$ si ha $d\\ell\\to-d\\ell$ e la circuitazione cambia segno. Coerentemente, in Stokes cambia anche il verso di $n$ e quindi il segno del flusso del rotore."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Perché spesso conviene passare da $\\oint_{\\partial S} F\\cdot d\\ell$ al flusso $\\iint_S(\\nabla\\times F)\\cdot n\\,dS$?","opts":[{"x":"Perché $\\nabla\\times F$ è spesso più semplice di $F$ (componenti costanti o nulle) e $S$ si sceglie piana","c":true},{"x":"Perché l'integrale di linea non è mai calcolabile"},{"x":"Perché il flusso è sempre nullo"},{"x":"Perché così si evita di calcolare il rotore"}],"hint":"Il vantaggio è doppio: rotore semplice + libertà di scegliere la superficie col medesimo bordo.","sol":"Il rotore dei campi da esame ha spesso componenti costanti o nulle (es. $(0,1+z,0)$, $(-1,2(x-z),0)$), e per Stokes si sceglie la superficie più comoda con lo stesso bordo (un disco su un piano). L'integrale doppio diventa elementare. A volte conviene il verso opposto: flusso difficile ridotto a circuitazione facile."}]},{"pool":"stokes","src":"20220124 · es.4","steps":[{"t":"Curva $\\gamma$: $z=x+3y+4$ su $x^2+y^2=4$; per il campo $F$ si trova $\\nabla\\times F=(-1,\\,2(x-z),\\,0)$. Con $S$ il pezzo di piano ($X_x\\times X_y=(-1,-3,1)$), quanto vale $\\oint_\\gamma F\\cdot d\\ell$?","opts":[{"x":"$100\\pi$","c":true},{"x":"$0$"},{"x":"$25\\pi$"},{"x":"$-100\\pi$"}],"hint":"Sostituisci $z=x+3y+4$ nel rotore PRIMA di integrare; poi usa $\\iint_D y\\,dx\\,dy=0$ sul disco centrato.","sol":"Per Stokes $\\oint_\\gamma F\\cdot d\\ell=\\iint_D(\\nabla\\times F)\\cdot(-1,-3,1)\\,dx\\,dy$. Il prodotto scalare dà $1-6(x-z)$; con $z=x+3y+4$ si ha $x-z=-3y-4$, quindi l'integrando è $25+18y$. Su $D=\\{x^2+y^2\\le4\\}$: $\\iint 18y=0$ e $\\iint 25=25\\cdot4\\pi=100\\pi$."}]},{"pool":"stokes","src":"20220706 · es.4","steps":[{"t":"Per $F=(y^2+y+z^2,\\,2xy+x,\\,2axz)$, il rotore $\\nabla\\times F$ vale:","opts":[{"x":"$(0,\\,2z-2az,\\,0)$","c":true},{"x":"$(0,\\,2az-2z,\\,0)$"},{"x":"$(2z,\\,0,\\,1)$"},{"x":"$(0,\\,0,\\,2az)$"}],"hint":"Componente 2: $\\partial_z F_1-\\partial_x F_3=2z-2az$. Attento all'ordine della differenza.","sol":"Dal determinante formale: comp1 $=\\partial_y(2axz)-\\partial_z(2xy+x)=0$; comp2 $=\\partial_z(y^2+y+z^2)-\\partial_x(2axz)=2z-2az$; comp3 $=\\partial_x(2xy+x)-\\partial_y(y^2+y+z^2)=(2y+1)-(2y+1)=0$. Quindi $\\nabla\\times F=(0,2z-2az,0)$."}]},{"pool":"stokes","src":"20220706 · es.4","steps":[{"t":"Con $\\nabla\\times F=(0,\\,2z-2az,\\,0)$, per quale valore di $a$ la circuitazione $\\oint_\\gamma F\\cdot d\\ell$ è nulla su OGNI curva chiusa?","opts":[{"x":"$a=1$: allora $\\nabla\\times F=0$ e il campo è irrotazionale (conservativo su dominio semplice)","c":true},{"x":"$a=0$"},{"x":"$a=-1$"},{"x":"Nessun valore: dipende sempre dalla curva"}],"hint":"Circuitazione nulla su ogni bordo di superficie semplice richiede rotore identicamente nullo.","sol":"Per $a=1$: $\\nabla\\times F=(0,2z-2z,0)=0$. Per Stokes $\\oint_\\gamma F\\cdot d\\ell=\\iint_S 0=0$ su ogni bordo di superficie contenuta nel dominio; su $\\mathbb{R}^3$ (semplicemente connesso) $F$ è anche conservativo."}]},{"pool":"stokes","src":"20230705 · es.2","steps":[{"t":"Curva $\\Gamma$: $x^2+y^2=8$, $x+y+z=1$; $F=(x^2y,\\,y^2z,\\,xz)$. Usando il piano $z=1-x-y$ (con $X_x\\times X_y=(1,1,1)$), quanto vale $\\oint_\\Gamma F\\cdot d\\ell$?","opts":[{"x":"$-40\\pi$","c":true},{"x":"$40\\pi$"},{"x":"$-8\\pi$"},{"x":"$0$"}],"hint":"$\\nabla\\times F=(-y^2,-z,-x^2)$; sostituisci $z=1-x-y$ e integra su $D=\\{x^2+y^2\\le8\\}$ in coordinate polari.","sol":"Stokes: $\\oint_\\Gamma F\\cdot d\\ell=\\iint_D(-y^2,-z,-x^2)\\cdot(1,1,1)\\,dx\\,dy=\\iint_D(-x^2-y^2-z)$ con $z=1-x-y$, cioè $-x^2-y^2+x+y-1$. Su $D$ (raggio $\\sqrt8$): $\\iint(-x^2-y^2)=-32\\pi$, $\\iint(x+y)=0$, $\\iint(-1)=-8\\pi$. Totale $-40\\pi$."}]},{"pool":"stokes","src":"20230123 · es.3","steps":[{"t":"Per $F=(y^2-x,\\,2xy,\\,-xz-x)$ (bordo di uno spicchio di sfera), il rotore $\\nabla\\times F$ è:","opts":[{"x":"$(0,\\,1+z,\\,0)$","c":true},{"x":"$(0,\\,-1-z,\\,0)$"},{"x":"$(2y,\\,0,\\,2y)$"},{"x":"$(1+z,\\,0,\\,0)$"}],"hint":"Comp2 $=\\partial_z F_1-\\partial_x F_3=0-(-z-1)=z+1$.","sol":"comp1 $=\\partial_y(-xz-x)-\\partial_z(2xy)=0$; comp2 $=\\partial_z(y^2-x)-\\partial_x(-xz-x)=0-(-z-1)=1+z$; comp3 $=\\partial_x(2xy)-\\partial_y(y^2-x)=2y-2y=0$. Quindi $\\nabla\\times F=(0,1+z,0)$; via Stokes il lavoro sul bordo dello spicchio vale $9\\pi/2$."}]},{"pool":"stokes","src":"20250127 · es.1","steps":[{"t":"$\\nabla\\times F=(3z-1,\\,0,\\,-y)$ su $S$: piano $z=-2x-y+2$, $D=\\{x^2+y^2\\le9\\}$, normale con TERZA componente negativa. Quanto vale $\\oint_{\\partial S} F\\cdot d\\ell$?","opts":[{"x":"$-90\\pi$","c":true},{"x":"$90\\pi$"},{"x":"$-10\\pi$"},{"x":"$0$"}],"hint":"Normale con 3ª componente negativa: usa $(-2,-1,-1)$, opposto di $(2,1,1)$. Poi sostituisci $z=-2x-y+2$.","sol":"Con $n_3<0$ si ha $n\\,dS=(-2,-1,-1)\\,dx\\,dy$. $(\\nabla\\times F)\\cdot(-2,-1,-1)=-6z+2+y$; con $z=-2x-y+2$ diventa $12x+7y-10$. Su $D$ (raggio 3, centrato): $\\iint(12x+7y)=0$, $\\iint(-10)=-90\\pi$. Il segno della normale determina il verso del bordo (Stokes)."}]},{"pool":"stokes","src":"20240704 · es.3","steps":[{"t":"Per $F=(y+xz,\\,z+e^y,\\,x+e^z)$, il rotore $\\nabla\\times F$ è:","opts":[{"x":"$(-1,\\,x-1,\\,-1)$","c":true},{"x":"$(0,\\,0,\\,-1)$"},{"x":"$(1,\\,1-x,\\,1)$"},{"x":"$(-1,\\,1-x,\\,-1)$"}],"hint":"Comp1 $=\\partial_y F_3-\\partial_z F_2=0-1$; comp2 $=\\partial_z F_1-\\partial_x F_3=x-1$.","sol":"comp1 $=\\partial_y(x+e^z)-\\partial_z(z+e^y)=0-1=-1$; comp2 $=\\partial_z(y+xz)-\\partial_x(x+e^z)=x-1$; comp3 $=\\partial_x(z+e^y)-\\partial_y(y+xz)=0-1=-1$. Quindi $\\nabla\\times F=(-1,x-1,-1)$, da inserire nel flusso di Stokes."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Calcola $\\oint_{\\partial D} F\\cdot d\\ell$ con $F=(-y,\\,x)$ e $D$ disco unitario, percorso antiorario, via Green.","opts":[{"x":"$2\\pi$","c":true},{"x":"$0$"},{"x":"$\\pi$"},{"x":"$-2\\pi$"}],"hint":"$\\partial_x F_2-\\partial_y F_1=1-(-1)=2$; l'integrale doppio è $2$ volte l'area.","sol":"Green (Stokes 2D): $\\oint_{\\partial D}F\\cdot d\\ell=\\iint_D(\\partial_x F_2-\\partial_y F_1)\\,dx\\,dy=\\iint_D 2\\,dx\\,dy=2\\cdot\\text{area}(D)=2\\pi$."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Usando Green, $\\oint_{\\partial D} x\\,dy$ (cioè $F=(0,\\,x)$) lungo il cerchio di raggio $R$ antiorario vale:","opts":[{"x":"$\\pi R^2$","c":true},{"x":"$2\\pi R$"},{"x":"$0$"},{"x":"$2\\pi R^2$"}],"hint":"$\\partial_x F_2-\\partial_y F_1=1$: l'integrale doppio diventa l'area di $D$.","sol":"Green: $\\oint_{\\partial D} x\\,dy=\\iint_D(\\partial_x(x)-\\partial_y(0))\\,dx\\,dy=\\iint_D 1\\,dx\\,dy=\\text{area}(D)=\\pi R^2$. È la formula dell'area via circuitazione, caso 2D di Stokes."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Calcola $\\nabla\\times F$ per $F=(xy,\\,yz,\\,zx)$.","opts":[{"x":"$(-y,\\,-z,\\,-x)$","c":true},{"x":"$(y,\\,z,\\,x)$"},{"x":"$(z,\\,x,\\,y)$"},{"x":"$(0,\\,0,\\,0)$"}],"hint":"comp1 $=\\partial_y(zx)-\\partial_z(yz)=0-y$.","sol":"comp1 $=\\partial_y(zx)-\\partial_z(yz)=0-y=-y$; comp2 $=\\partial_z(xy)-\\partial_x(zx)=0-z=-z$; comp3 $=\\partial_x(yz)-\\partial_y(xy)=0-x=-x$. Quindi $\\nabla\\times F=(-y,-z,-x)$."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Per $F=(-y,\\,x,\\,0)$ si ha $\\nabla\\times F=(0,0,2)$. La circuitazione lungo il cerchio unitario nel piano $xy$ (antiorario, $n=(0,0,1)$) vale:","opts":[{"x":"$2\\pi$","c":true},{"x":"$0$"},{"x":"$\\pi$"},{"x":"$4\\pi$"}],"hint":"Flusso di $(0,0,2)$ attraverso il disco unitario $=2\\cdot$ area.","sol":"Stokes: $\\oint F\\cdot d\\ell=\\iint_S(0,0,2)\\cdot(0,0,1)\\,dS=2\\cdot\\text{area}(\\text{disco})=2\\pi$. Il rotore costante $2\\hat z$ misura la vorticità del campo rotante."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Per $F=(0,\\,0,\\,z)$, la circuitazione $\\oint_{\\partial S} F\\cdot d\\ell$ su un qualunque bordo vale:","opts":[{"x":"$0$, perché $\\nabla\\times F=0$","c":true},{"x":"$z\\cdot$ lunghezza del bordo"},{"x":"L'area di $S$"},{"x":"Dipende dalla superficie scelta"}],"hint":"Calcola prima il rotore: tutte le derivate incrociate di $F=(0,0,z)$ si annullano.","sol":"comp1 $=\\partial_y z-\\partial_z 0=0$; comp2 $=\\partial_z 0-\\partial_x z=0$; comp3 $=\\partial_x 0-\\partial_y 0=0$. Quindi $\\nabla\\times F=0$ e per Stokes $\\oint_{\\partial S} F\\cdot d\\ell=0$ su ogni bordo (il campo $z\\hat z$ è un gradiente: $F=\\nabla(z^2/2)$)."}]},{"pool":"stokes","src":"20220706 · es.4","steps":[{"t":"Con $\\nabla\\times F=(0,\\,2z-2az,\\,0)$ e superficie $S$: $z=4x+y+1$ su $x^2+y^2\\le1$, la circuitazione risulta $2(a-1)\\pi$. Per $a=2$ quanto vale?","opts":[{"x":"$2\\pi$","c":true},{"x":"$0$"},{"x":"$-2\\pi$"},{"x":"$4\\pi$"}],"hint":"Sostituisci $a=2$ nella formula $2(a-1)\\pi$.","sol":"Per Stokes il flusso di $(0,2z-2az,0)$ attraverso $S$ si riduce, dopo l'integrazione sul disco, a $2(a-1)\\pi$; con $a=2$ vale $2\\pi$. Per $a=1$ tornerebbe $0$, coerente col campo irrotazionale."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Devi calcolare $\\oint_\\gamma F\\cdot d\\ell$ dove $\\gamma$ è il cerchio $x^2+y^2=1$ che giace sul piano $z=x+2$. Quale superficie conviene per Stokes?","opts":[{"x":"Il disco piano $\\{x^2+y^2\\le1,\\ z=x+2\\}$, di cui $\\gamma$ è il bordo","c":true},{"x":"Una semisfera qualsiasi"},{"x":"Il cilindro $x^2+y^2=1$"},{"x":"Nessuna: si deve calcolare l'integrale di linea direttamente"}],"hint":"Il bordo determina la superficie: scegli la più semplice con quel bordo, cioè un pezzo di piano.","sol":"Per Stokes ogni superficie con $\\partial S=\\gamma$ va bene; si sceglie la più semplice, il disco piano $z=x+2$ sopra $D=\\{x^2+y^2\\le1\\}$, con $X_x\\times X_y=(-f_x,-f_y,1)=(-1,0,1)$. Cilindro e semisfera complicano l'integrale senza motivo."}]},{"pool":"stokes","src":"20220124 · es.4","steps":[{"t":"Superficie cartesiana con $X_x\\times X_y=(-1,-3,1)$ (terza componente $+1$). Per Stokes il bordo va percorso:","opts":[{"x":"In senso antiorario visto dall'alto: coerente con $n_3>0$, nessun segno da aggiungere","c":true},{"x":"In senso orario visto dall'alto"},{"x":"In un verso qualunque"},{"x":"Va sempre aggiunto un segno meno"}],"hint":"$n_3>0$ (normale verso l'alto) corrisponde a bordo antiorario, per la regola della mano destra.","sol":"$X_x\\times X_y=(-f_x,-f_y,1)$ ha terza componente positiva: la normale punta verso l'alto e il bordo coerente è antiorario visto dall'alto, senza correzioni di segno. Se il testo imponesse $n_3<0$, si userebbe $-(X_x\\times X_y)$ e bordo orario."}]}],"ottim":[{"pool":"ottim","src":"20250116 Es.2 · Weierstrass","steps":[{"t":"Per cercare max e min ASSOLUTI di $f$ continua su $D=\\{3x^2+4y^2\\le 9\\}$, cosa garantisce la loro ESISTENZA prima ancora di calcolarli?","opts":[{"x":"Il teorema di Weierstrass: $D$ è chiuso e limitato (compatto) e $f$ è continua, quindi max e min esistono","c":true},{"x":"Il teorema di Fermat, perché il gradiente si annulla in un punto interno"},{"x":"Nulla: l'esistenza va verificata caso per caso risolvendo il sistema $\\nabla f=0$"},{"x":"Il teorema di Lagrange, perché il dominio ha un bordo"}],"hint":"L'esistenza di max/min assoluti dipende da due proprietà topologiche del dominio più la continuità di $f$, non dal calcolo dei punti critici.","sol":"Teorema di Weierstrass: $f$ continua su un compatto (chiuso e limitato) ammette massimo e minimo assoluti. Verificare la compattezza è il PRIMO passo, prima di cercare candidati interni e di bordo."}]},{"pool":"ottim","src":"tipo D · manuale · Fermat","steps":[{"t":"Sia $f$ differenziabile e $P_0$ un punto INTERNO al dominio. Quale relazione lega \"$P_0$ è di estremo locale\" e \"$\\nabla f(P_0)=0$\"?","opts":[{"x":"$\\nabla f(P_0)=0$ è NECESSARIA (Fermat) ma non sufficiente: un punto critico può essere una sella","c":true},{"x":"$\\nabla f(P_0)=0$ è sufficiente: ogni punto critico è un estremo"},{"x":"Le due condizioni sono equivalenti"},{"x":"$\\nabla f(P_0)=0$ non ha nulla a che vedere con gli estremi interni"}],"hint":"Il gradiente nullo è la porta d'ingresso ai candidati, non la classificazione. Pensa a $f=x^2-y^2$ nell'origine.","sol":"Teorema di Fermat: in un estremo locale interno il gradiente si annulla, quindi $\\nabla f=0$ è NECESSARIA. Non è sufficiente: la sella (es. $x^2-y^2$) ha $\\nabla f=0$ senza essere estremo. Serve un test del secondo ordine (Hessiana)."}]},{"pool":"ottim","src":"20250127 Es.2 · Hessiana","steps":[{"t":"In un punto critico di $f(x,y)$ hai $\\det H>0$ e $f_{xx}>0$. Come lo classifichi?","opts":[{"x":"Minimo locale: $\\det H>0$ dà autovalori concordi, $f_{xx}>0$ dice che sono positivi","c":true},{"x":"Massimo locale"},{"x":"Sella, perché $\\det H\\ne 0$"},{"x":"Non classificabile senza calcolare gli autovalori"}],"hint":"$\\det H=\\lambda_1\\lambda_2$: se è positivo gli autovalori hanno lo stesso segno; $f_{xx}$ (traccia parziale) dice quale.","sol":"Test dell'Hessiana in 2D: $\\det H>0$ e $f_{xx}>0\\Rightarrow$ minimo; $\\det H>0$ e $f_{xx}<0\\Rightarrow$ massimo. Il segno di $f_{xx}$ discrimina solo quando $\\det H>0$."}]},{"pool":"ottim","src":"20250127 Es.2 · sella","steps":[{"t":"In un punto critico si ha $\\det H<0$. Che punto è, e conta il segno di $f_{xx}$?","opts":[{"x":"Sella: $\\det H<0$ dà autovalori di segno opposto; il segno di $f_{xx}$ è irrilevante","c":true},{"x":"Minimo se $f_{xx}>0$, massimo se $f_{xx}<0$"},{"x":"Massimo, sempre"},{"x":"Degenere: il test non decide"}],"hint":"$\\det H<0$ significa $\\lambda_1\\lambda_2<0$: una direzione sale, una scende. Nessun controllo aggiuntivo serve.","sol":"Test dell'Hessiana: $\\det H<0\\Rightarrow$ sella, indipendentemente da $f_{xx}$. Il controllo di $f_{xx}$ serve solo a distinguere min da max nel caso $\\det H>0$."}]},{"pool":"ottim","src":"tipo D · manuale · TRAPPOLA","steps":[{"t":"In un punto critico sai solo che $\\det H>0$. Puoi concludere che è un minimo?","opts":[{"x":"No: $\\det H>0$ dice solo che è un estremo (autovalori concordi); serve il segno di $f_{xx}$ per sapere se min o max","c":true},{"x":"Sì, $\\det H>0$ è sempre un minimo"},{"x":"No, con $\\det H>0$ è sempre una sella"},{"x":"Sì, se il punto è interno al dominio"}],"hint":"Due autovalori NEGATIVI danno lo stesso $\\det H>0$ di due positivi: è un massimo, non un minimo.","sol":"$\\det H>0\\Rightarrow$ autovalori dello stesso segno: minimo se $f_{xx}>0$, massimo se $f_{xx}<0$. Concludere \"minimo\" dal solo $\\det H>0$ è l'errore classico del test dell'Hessiana."}]},{"pool":"ottim","src":"tipo D · manuale · degenere","steps":[{"t":"In un punto critico risulta $\\det H=0$. Cosa dice il test dell'Hessiana?","opts":[{"x":"Nulla: il caso $\\det H=0$ è degenere, il test è inconcludente e serve un'analisi diretta di ordine superiore","c":true},{"x":"È certamente una sella"},{"x":"È certamente un minimo se $f_{xx}\\ge 0$"},{"x":"È un punto di flesso, mai un estremo"}],"hint":"$\\det H=0$ significa almeno un autovalore nullo: la forma quadratica è semidefinita e non decide. Guarda $f$ direttamente lungo le direzioni.","sol":"Con $\\det H=0$ (Hessiana semidefinita) il test fallisce: $f=x^4+y^4$ e $f=x^2-y^4$ hanno entrambe $\\det H=0$ nell'origine ma sono rispettivamente un minimo e una sella. Si studia $f$ direttamente (segno lungo le direzioni, sviluppo di ordine superiore)."}]},{"pool":"ottim","src":"20230504 Es.5 · Lagrange","steps":[{"t":"Sul vincolo $g(x,y)=c$, cosa impone geometricamente la condizione dei moltiplicatori $\\nabla f=\\lambda\\nabla g$?","opts":[{"x":"Che $\\nabla f$ e $\\nabla g$ siano PARALLELI: nel candidato $f$ non ha componente lungo il vincolo","c":true},{"x":"Che $\\nabla f$ e $\\nabla g$ siano ortogonali"},{"x":"Che $\\nabla f=0$ nel candidato"},{"x":"Che $\\nabla g=0$ nel candidato"}],"hint":"Se $\\nabla f$ avesse una componente tangente al vincolo, potresti muoverti sul vincolo e far crescere $f$: non saresti in un estremo.","sol":"Teorema di Lagrange: in un estremo vincolato $\\nabla f=\\lambda\\nabla g$, cioè i gradienti sono paralleli. Equivale a chiedere che la derivata di $f$ lungo il vincolo sia nulla: $\\nabla f$ è tutto normale al vincolo."}]},{"pool":"ottim","src":"20230504 Es.5 · Lagrange 2D","steps":[{"t":"In 2D, la condizione $\\nabla f=\\lambda\\nabla g$ si riscrive senza il moltiplicatore come:","opts":[{"x":"$f_x\\,g_y-f_y\\,g_x=0$: annullamento del minore $2\\times 2$ (gradienti paralleli)","c":true},{"x":"$\\nabla f\\cdot\\nabla g=0$: prodotto scalare nullo"},{"x":"$f_x+f_y=g_x+g_y$"},{"x":"$f_x g_x+f_y g_y=\\lambda$"}],"hint":"Paralleli $\\iff$ determinante dei due vettori nullo. Il prodotto scalare nullo è ortogonalità, l'opposto.","sol":"$\\nabla f\\parallel\\nabla g\\iff\\det\\begin{pmatrix}f_x&f_y\\\\g_x&g_y\\end{pmatrix}=f_xg_y-f_yg_x=0$. Insieme a $g=c$ dà il sistema per i candidati di bordo, eliminando $\\lambda$."}]},{"pool":"ottim","src":"tipo D · manuale · necessaria vs sufficiente","steps":[{"t":"Risolvendo il sistema di Lagrange trovi 4 candidati. Cosa sono, di per sé?","opts":[{"x":"Candidati: la condizione è NECESSARIA. Per trovare max e min si confrontano i valori $f$ in tutti","c":true},{"x":"Sono già i punti di massimo e minimo, uno per tipo"},{"x":"Sono selle del vincolo"},{"x":"Vanno scartati se $\\lambda<0$"}],"hint":"Lagrange è come Fermat: dà i CANDIDATI. Il max è il candidato di valore più alto, il min quello più basso.","sol":"$\\nabla f=\\lambda\\nabla g$ è condizione necessaria per gli estremi vincolati. Trovati i candidati, si calcola $f$ in ciascuno e si confrontano i valori; Weierstrass garantisce che max e min siano fra loro (su compatto). Il segno di $\\lambda$ non è un criterio di scarto."}]},{"pool":"ottim","src":"20230621 · punto critico fuori dominio","steps":[{"t":"Il sistema $\\nabla f=0$ dà il candidato interno $P=(3,0)$, ma il dominio è $D=\\{2x^2+y^2\\le 1\\}$. $P$ va inserito fra i candidati?","opts":[{"x":"No: $2\\cdot 3^2=18>1$, quindi $P\\notin D$; un punto critico interno conta solo se appartiene al dominio","c":true},{"x":"Sì, i punti critici vanno sempre confrontati"},{"x":"Sì, ma solo il valore $f(P)$, non la posizione"},{"x":"Solo se $P$ giace sul bordo $\\partial D$"}],"hint":"Prima di classificare, controlla l'appartenenza: un candidato interno fuori dal dominio non è ammissibile.","sol":"$P=(3,0)$ non soddisfa $2x^2+y^2\\le 1$ (dà $18>1$): fuori da $D$, si scarta. I candidati interni sono i punti critici che CADONO nel dominio; poi si aggiunge il bordo via Lagrange."}]},{"pool":"ottim","src":"20230504 Es.5 · confronto interno/bordo","steps":[{"t":"Devi trovare max e min ASSOLUTI di $f$ continua sul compatto $D$. Quali insiemi di candidati devi mettere in gara?","opts":[{"x":"Punti critici interni ($\\nabla f=0$ in $\\mathrm{int}\\,D$) UNITI ai punti di Lagrange sul bordo $\\partial D$","c":true},{"x":"Solo i punti critici interni: il bordo non conta"},{"x":"Solo i punti di Lagrange sul bordo"},{"x":"Tutti i punti dove $f$ è definita"}],"hint":"Un estremo assoluto su un compatto sta o all'interno (allora $\\nabla f=0$) o sul bordo (allora Lagrange). Devi coprire entrambi.","sol":"Su un compatto: candidati = {punti critici interni} $\\cup$ {punti di Lagrange su $\\partial D$}. Si valuta $f$ in tutti e si prende il massimo e il minimo. Dimenticare il bordo è la trappola più comune."}]},{"pool":"ottim","src":"tipo D · manuale · TRAPPOLA bordo","steps":[{"t":"Su $D=\\{x^2+y^2\\le 1\\}$ trovi che $f=x+y$ non ha punti critici interni ($\\nabla f=(1,1)\\ne 0$). Che concludi?","opts":[{"x":"Che max e min stanno sul BORDO: vanno cercati con Lagrange su $x^2+y^2=1$, non dichiarati inesistenti","c":true},{"x":"Che $f$ non ha massimo né minimo su $D$"},{"x":"Che $f$ è costante su $D$"},{"x":"Che il minimo è $f(0,0)=0$"}],"hint":"Nessun critico interno è un'informazione utile, non un vicolo cieco: gli estremi devono allora vivere sul bordo.","sol":"$f$ è continua su un compatto: Weierstrass garantisce max e min. Se $\\nabla f\\ne 0$ ovunque all'interno, gli estremi sono sul bordo. Su $x^2+y^2=1$, Lagrange dà $(\\pm 1/\\sqrt2,\\pm 1/\\sqrt2)$: $\\max f=\\sqrt2$, $\\min f=-\\sqrt2$."}]},{"pool":"ottim","src":"tipo D · manuale · coercività","steps":[{"t":"$f$ è continua su tutto $\\mathbb{R}^2$ (nessun bordo) e $f(x,y)\\to+\\infty$ quando $\\|(x,y)\\|\\to\\infty$. Cosa puoi affermare?","opts":[{"x":"$f$ ammette minimo assoluto (coercività), ma non necessariamente massimo","c":true},{"x":"$f$ ammette sia massimo sia minimo assoluti"},{"x":"$f$ non ammette estremi perché $\\mathbb{R}^2$ non è compatto"},{"x":"Il minimo è nel punto critico solo se $\\det H>0$"}],"hint":"Coerciva verso $+\\infty$: fuori da una palla grande $f$ è alta, quindi il minimo (se c'è) è dentro, su un compatto. Il massimo scappa all'infinito.","sol":"Coercività: $f$ continua e $f\\to+\\infty$ all'infinito ammette minimo assoluto. Su una palla $\\overline{B_R}$ abbastanza grande, Weierstrass dà il minimo interno; fuori $f$ è più grande. Il massimo tipicamente non esiste ($f\\to+\\infty$)."}]},{"pool":"ottim","src":"tipo D · manuale · Hessiana 3D","steps":[{"t":"In un punto critico di $f(x,y,z)$ hai $\\det H>0$. Basta per concludere \"minimo\"?","opts":[{"x":"No: in 3D $\\det H>0$ è il prodotto dei tre autovalori; serve il criterio di Sylvester (tutti i minori principali di testa $>0$)","c":true},{"x":"Sì, come in 2D $\\det H>0$ e $f_{xx}>0$ bastano"},{"x":"Sì, $\\det H>0$ in 3D è sempre un minimo"},{"x":"No, in 3D è sempre una sella"}],"hint":"In 3D $\\det H=\\lambda_1\\lambda_2\\lambda_3>0$ vale anche con DUE autovalori negativi (una sella): il solo determinante non basta.","sol":"Criterio di Sylvester per un minimo in $n$ dimensioni: tutti i minori principali di testa positivi ($H_1=f_{xx}>0$, $H_2>0$, $H_3=\\det H>0$). Per un massimo i segni alternano ($-,+,-$). Il solo $\\det H>0$ in 3D è compatibile con una sella."}]},{"pool":"ottim","src":"20230210 Es.2 · regolarità vincolo","steps":[{"t":"Il teorema di Lagrange scrive $\\nabla f=\\lambda\\nabla g$ nei punti del vincolo $g=c$. Quale ipotesi sul vincolo serve perché il moltiplicatore esista?","opts":[{"x":"$\\nabla g\\ne 0$ sul vincolo (regolarità): dove $\\nabla g=0$ la formula può fallire e il punto va esaminato a parte","c":true},{"x":"$g$ deve essere lineare"},{"x":"$f$ deve essere convessa"},{"x":"Il vincolo deve essere limitato"}],"hint":"Se $\\nabla g=0$ il vincolo non ha una normale ben definita e $\\nabla f=\\lambda\\nabla g$ perde senso: sono punti singolari.","sol":"Lagrange richiede la regolarità del vincolo, $\\nabla g\\ne 0$ (rango massimo della matrice dei gradienti). I punti con $\\nabla g=0$ non sono coperti dalla condizione e vanno aggiunti a mano ai candidati."}]},{"pool":"ottim","src":"tipo D · manuale · classificazione","steps":[{"t":"Trova i punti critici di $f(x,y)=x^3-3x+y^2$.","opts":[{"x":"$(1,0)$ e $(-1,0)$","c":true},{"x":"Solo $(0,0)$"},{"x":"$(1,0)$, $(-1,0)$ e $(0,0)$"},{"x":"$(\\pm 1,\\pm 1)$"}],"hint":"Imponi $\\nabla f=0$: $3x^2-3=0$ e $2y=0$. La seconda forza $y=0$.","sol":"$\\nabla f=(3x^2-3,\\;2y)=0\\Rightarrow x=\\pm 1,\\;y=0$. Punti critici $(1,0)$ e $(-1,0)$ (Fermat, condizione necessaria).","cont":"Continua &rarr; classifica"},{"t":"Con $H=\\begin{pmatrix}6x&0\\\\0&2\\end{pmatrix}$, classifica $(1,0)$ e $(-1,0)$.","opts":[{"x":"$(1,0)$ minimo ($\\det H=12>0$, $f_{xx}=6>0$); $(-1,0)$ sella ($\\det H=-12<0$)","c":true},{"x":"Entrambi minimi, perché $f_{yy}=2>0$"},{"x":"$(1,0)$ sella, $(-1,0)$ minimo"},{"x":"Entrambi selle, perché $f_{xy}=0$"}],"hint":"$\\det H=12x$: cambia segno tra i due punti. In $(-1,0)$ vale $-12<0$.","sol":"Test dell'Hessiana: in $(1,0)$ $\\det H=12>0$ e $f_{xx}=6>0\\Rightarrow$ minimo; in $(-1,0)$ $\\det H=-12<0\\Rightarrow$ sella. $f_{xy}=0$ non implica sella."}]},{"pool":"ottim","src":"tipo D · manuale · classificazione","steps":[{"t":"I punti critici di $f(x,y)=x^3+y^3-3xy$ sono:","opts":[{"x":"$(0,0)$ e $(1,1)$","c":true},{"x":"$(0,0)$ e $(-1,-1)$"},{"x":"Solo $(1,1)$"},{"x":"$(0,0)$, $(1,1)$ e $(-1,-1)$"}],"hint":"Da $\\nabla f=0$: $x^2=y$ e $y^2=x$. Sostituendo, $x^4=x\\Rightarrow x(x^3-1)=0$.","sol":"$\\nabla f=(3x^2-3y,\\,3y^2-3x)=0\\Rightarrow y=x^2,\\;x=y^2$. Allora $x^4=x$, cioè $x=0$ o $x=1$: candidati $(0,0)$ e $(1,1)$ (Fermat).","cont":"Continua &rarr; natura di $(0,0)$"},{"t":"Con $H=\\begin{pmatrix}6x&-3\\\\-3&6y\\end{pmatrix}$, che punto è $(0,0)$?","opts":[{"x":"Sella: $\\det H=0-9=-9<0$","c":true},{"x":"Minimo, perché $f=x^3+y^3-3xy$ vale $0$ nell'origine"},{"x":"Massimo"},{"x":"Degenere, perché $f_{xx}=0$"}],"hint":"In $(0,0)$: $f_{xx}=f_{yy}=0$, $f_{xy}=-3$, quindi $\\det H=-9$, non nullo.","sol":"In $(0,0)$: $\\det H=(0)(0)-(-3)^2=-9<0\\Rightarrow$ sella (test dell'Hessiana). $f_{xx}=0$ non rende il test degenere: conta $\\det H$, qui $\\ne 0$."},{"t":"E $(1,1)$?","opts":[{"x":"Minimo locale: $\\det H=36-9=27>0$ e $f_{xx}=6>0$","c":true},{"x":"Massimo locale"},{"x":"Sella"},{"x":"Minimo assoluto su $\\mathbb{R}^2$"}],"hint":"$\\det H=36x y-9$; in $(1,1)$ vale $27>0$. Il segno di $f_{xx}$ dice min o max.","sol":"In $(1,1)$: $\\det H=27>0$ e $f_{xx}=6>0\\Rightarrow$ minimo LOCALE. Non è assoluto: $f(x,0)=x^3\\to-\\infty$, quindi $f$ è illimitata inferiormente su $\\mathbb{R}^2$."}]},{"pool":"ottim","src":"20250127 Es.2","steps":[{"t":"Sia $f(x,y)=x^2-2xy+y^3+1$. Nel punto critico $(0,0)$ l'Hessiana ha $\\det H=-4<0$. Che punto è?","opts":[{"x":"Sella: $\\det H<0$ classifica come sella, indipendentemente dal segno di $f_{xx}$","c":true},{"x":"Minimo, perché $f_{xx}=2>0$"},{"x":"Massimo"},{"x":"Non classificabile col test dell'Hessiana"}],"hint":"Con $\\det H<0$ gli autovalori hanno segni opposti: il segno di $f_{xx}$ è irrilevante.","sol":"Test dell'Hessiana in 2D: $\\det H<0\\Rightarrow$ sella. Il controllo di $f_{xx}$ serve solo a distinguere min da max quando $\\det H>0$.","cont":"Continua &rarr; l'altro punto critico"},{"t":"Stessa $f$, nel punto critico $(2/3,2/3)$ si ha $\\det H=4>0$ e $f_{xx}=2>0$. Che punto è?","opts":[{"x":"Minimo locale: $\\det H>0$ e $f_{xx}>0$","c":true},{"x":"Massimo locale"},{"x":"Sella"},{"x":"Serve calcolare esplicitamente gli autovalori"}],"hint":"Con $\\det H>0$ gli autovalori sono concordi; il segno di $f_{xx}$ dice quale.","sol":"$\\det H>0$ e $f_{xx}>0\\Rightarrow$ minimo locale ($f_{xx}<0\\Rightarrow$ massimo). Test dell'Hessiana in 2D."}]},{"pool":"ottim","src":"20230504 Es.5","steps":[{"t":"Estremi assoluti di $F(x,y)=x^2+y^2-5y$ su $D=\\{1\\le x^2+y^2\\le 16\\}$. Primo passo: il punto critico interno.","opts":[{"x":"$\\nabla F=(2x,2y-5)=0\\Rightarrow P=(0,5/2)$; sta in $D$ ($1\\le 25/4\\le 16$), $F(P)=-25/4$","c":true},{"x":"$\\nabla F=0$ non ha soluzioni: nessun candidato interno"},{"x":"$P=(0,5/2)$ ma va scartato perché il gradiente non è nullo lì"},{"x":"$P=(0,0)$, con $F(P)=0$"}],"hint":"Risolvi $\\nabla F=0$ e verifica che il punto cada DENTRO l'anello $1\\le x^2+y^2\\le 16$.","sol":"$\\nabla F=0\\Rightarrow(0,5/2)$, con $|P|^2=25/4=6{,}25\\in[1,16]$: interno ammissibile. $F(0,5/2)=25/4-25/2=-25/4$. Va confrontato col bordo.","cont":"Continua &rarr; i due bordi"},{"t":"Sui bordi $x^2+y^2=1$ e $x^2+y^2=16$ si sostituisce $x^2=R^2-y^2$: $F=R^2-5y$. Qual è il verdetto assoluto?","opts":[{"x":"$\\min F=F(0,5/2)=-25/4$ (interno); $\\max F=F(0,-4)=36$ (bordo esterno)","c":true},{"x":"$\\min$ e $\\max$ stanno entrambi sul bordo esterno"},{"x":"$\\max F=F(0,4)=-4$"},{"x":"$\\min F=-4$ sul bordo interno"}],"hint":"Su ciascun cerchio $F=R^2-5y$ è massimo per $y$ minimo: $y=-4$ sull'esterno dà $16+20=36$. Confronta con l'interno.","sol":"Bordo interno ($R=1$): $F=1-5y$, $y\\in[-1,1]$, valori in $[-4,6]$. Esterno ($R=4$): $F=16-5y$, $y\\in[-4,4]$, valori in $[-4,36]$. Con l'interno $-25/4$: $\\min=-25/4$, $\\max=36$. Weierstrass su compatto garantisce l'esistenza; il confronto dei candidati dà i valori."}]},{"pool":"ottim","src":"tipo D · manuale · Lagrange","steps":[{"t":"Estremi di $f(x,y)=xy$ sul vincolo $g=x^2+y^2=1$. Lagrange $\\nabla f=\\lambda\\nabla g$ dà:","opts":[{"x":"$y=x$ oppure $y=-x$; sul cerchio: $\\max f=1/2$ in $(\\tfrac1{\\sqrt2},\\tfrac1{\\sqrt2})$, $\\min f=-1/2$","c":true},{"x":"Solo $(1,0)$ e $(0,1)$, con $f=0$"},{"x":"$\\max f=1$, $\\min f=-1$"},{"x":"Nessun candidato: $\\nabla f$ e $\\nabla g$ non sono mai paralleli"}],"hint":"Da $(y,x)=\\lambda(2x,2y)$ ricavi $\\lambda^2=1/4$, cioè $y=\\pm x$. Poi imponi $x^2+y^2=1$.","sol":"Lagrange: $y=2\\lambda x$, $x=2\\lambda y\\Rightarrow\\lambda=\\pm1/2$, quindi $y=x$ o $y=-x$. Sul cerchio $x=\\pm1/\\sqrt2$: $f=xy=\\pm1/2$. $\\max=1/2$, $\\min=-1/2$ (candidati confrontati, Weierstrass su compatto)."}]},{"pool":"ottim","src":"20230705 Es.2 · Lagrange 3D","steps":[{"t":"Estremi di $f(x,y,z)=4-z$ sulla curva $\\Gamma=\\{x^2+y^2=8,\\;x+y+z=1\\}$. Come riduci il problema?","opts":[{"x":"Da $z=1-x-y$: $f=3+x+y$; resta da estremizzare $x+y$ su $x^2+y^2=8$","c":true},{"x":"$f$ è costante perché non dipende da $x,y$"},{"x":"Si annulla $\\nabla f=(0,0,-1)$: nessun candidato"},{"x":"Serve l'Hessiana $3\\times 3$ di $f$"}],"hint":"Usa il vincolo lineare per eliminare $z$: $f=4-z=4-(1-x-y)=3+x+y$.","sol":"Sostituendo $z=1-x-y$ dal piano, $f=3+x+y$. Il problema diventa: estremizzare $x+y$ sul cerchio $x^2+y^2=8$. Un vincolo lineare si elimina per sostituzione; resta un solo vincolo quadratico.","cont":"Continua &rarr; risolvi"},{"t":"Estremizza $x+y$ su $x^2+y^2=8$ (Lagrange o Cauchy-Schwarz):","opts":[{"x":"$x=y=2\\Rightarrow x+y=4$ (max) e $x=y=-2\\Rightarrow x+y=-4$ (min); quindi $\\max f=7$, $\\min f=-1$","c":true},{"x":"$\\max f=4$, $\\min f=-4$"},{"x":"$\\max(x+y)=8$"},{"x":"$\\max f=3$, $\\min f=3$"}],"hint":"$\\nabla(x+y)=(1,1)\\parallel(2x,2y)\\Rightarrow x=y$; poi $2x^2=8$. Ricorda $f=3+(x+y)$.","sol":"Lagrange: $(1,1)=\\lambda(2x,2y)\\Rightarrow x=y$, e $2x^2=8\\Rightarrow x=\\pm2$. $x+y=\\pm4$, quindi $f=3\\pm4$: $\\max f=7$ in $(2,2,-3)$, $\\min f=-1$ in $(-2,-2,5)$. La curva è compatta: Weierstrass garantisce che questi siano gli estremi assoluti."}]},{"pool":"ottim","src":"20250721 Es.1","steps":[{"t":"Per $F(x,y,z)=x^2 e^{yz}$: dal sistema $\\nabla F=0$ risulta che TUTTI i punti $(0,y,z)$ sono critici. Qual è il minimo assoluto su $\\mathbb{R}^3$?","opts":[{"x":"$0$: $F\\ge 0$ ovunque e $F=0$ su tutto il piano $x=0$, un continuo di punti di minimo","c":true},{"x":"Non esiste minimo perché i punti critici sono infiniti"},{"x":"$-\\infty$"},{"x":"$1$"}],"hint":"Guarda il segno: $F$ è un quadrato per un esponenziale, quindi $F\\ge 0$. Infiniti punti critici non impediscono il minimo.","sol":"$F=x^2e^{yz}\\ge 0$ e $F=0\\iff x=0$: l'insieme dei minimi è il piano $x=0$, il minimo assoluto è $0$. La classificazione via Hessiana è degenere qui (autovalori nulli lungo il piano critico), ma il segno di $F$ risolve direttamente."}]},{"pool":"ottim","src":"tipo D · manuale · degenere min","steps":[{"t":"Classifica l'origine per $f(x,y)=x^4+y^4$. L'Hessiana in $(0,0)$ è nulla ($\\det H=0$).","opts":[{"x":"Minimo assoluto: il test dell'Hessiana è muto, ma $f\\ge 0=f(0,0)$ direttamente","c":true},{"x":"Sella, perché $\\det H=0$"},{"x":"Il test dell'Hessiana dice che è degenere, quindi non è un estremo"},{"x":"Massimo, perché $H=0$"}],"hint":"$\\det H=0$ non classifica: torna alla definizione. Quanto vale $f$ fuori dall'origine rispetto a $f(0,0)=0$?","sol":"$\\nabla f=(4x^3,4y^3)=0$ solo in $(0,0)$; l'Hessiana è la matrice nulla, test inconcludente ($\\det H=0$). Ma $f=x^4+y^4>0$ per $(x,y)\\ne(0,0)$ e $f(0,0)=0$: minimo assoluto. Il caso degenere si risolve con la definizione, non con l'Hessiana."}]},{"pool":"ottim","src":"tipo D · manuale · TRAPPOLA degenere","steps":[{"t":"Per $f(x,y)=x^2-y^4$ l'Hessiana in $(0,0)$ è $\\mathrm{diag}(2,0)$, semidefinita positiva ($\\det H=0$). Che punto è davvero?","opts":[{"x":"Sella: lungo l'asse $x$ $f=x^2>0$, lungo l'asse $y$ $f=-y^4<0$; l'Hessiana semidefinita non decideva","c":true},{"x":"Minimo, perché l'Hessiana è semidefinita POSITIVA"},{"x":"Minimo, perché $f_{xx}=2>0$"},{"x":"Massimo"},{"x":"Non è un punto critico"}],"hint":"Hessiana semidefinita con un autovalore nullo: NON garantisce estremo. Guarda $f$ lungo le direzioni deboli (asse $y$).","sol":"$\\det H=0$: caso degenere, l'Hessiana semidefinita positiva NON implica minimo. Direttamente: $f(x,0)=x^2>0$ ma $f(0,y)=-y^4<0$ vicino all'origine: valori di entrambi i segni $\\Rightarrow$ sella. Trattare la semidefinita come definita è l'errore da evitare."}]},{"pool":"ottim","src":"tipo D · manuale · Lagrange ellisse","steps":[{"t":"Estremi di $f(x,y)=x$ sul vincolo $g=x^2+4y^2=4$. Lagrange dà:","opts":[{"x":"$y=0$, quindi $x=\\pm2$: $\\max f=2$ in $(2,0)$, $\\min f=-2$ in $(-2,0)$","c":true},{"x":"$x=0$, quindi $\\max f=0$"},{"x":"$\\max f=4$, $\\min f=-4$"},{"x":"Nessun candidato: $\\nabla f=(1,0)$ non è mai parallelo a $\\nabla g$"}],"hint":"$(1,0)=\\lambda(2x,8y)$: la seconda componente dà $8\\lambda y=0$. Con $\\lambda\\ne0$ resta $y=0$.","sol":"Lagrange: $1=2\\lambda x$, $0=8\\lambda y$. La seconda forza $y=0$ (se $\\lambda=0$ la prima è impossibile). Sul vincolo $x^2=4\\Rightarrow x=\\pm2$: $\\max f=2$, $\\min f=-2$. Sono i vertici dell'ellisse sull'asse $x$."}]},{"pool":"ottim","src":"tipo D · manuale · sella","steps":[{"t":"Classifica l'unico punto critico di $f(x,y)=x^2-y^2$.","opts":[{"x":"$(0,0)$ è una sella: $H=\\mathrm{diag}(2,-2)$, $\\det H=-4<0$","c":true},{"x":"$(0,0)$ è un minimo, perché $f_{xx}=2>0$"},{"x":"$(0,0)$ è un massimo, perché $f_{yy}=-2<0$"},{"x":"Non ci sono punti critici"}],"hint":"Autovalori $2$ e $-2$: segni opposti. Una direzione sale, l'altra scende: prototipo di sella.","sol":"$\\nabla f=(2x,-2y)=0\\Rightarrow(0,0)$. $H=\\mathrm{diag}(2,-2)$, $\\det H=-4<0\\Rightarrow$ sella (test dell'Hessiana). È il controesempio standard a \"$\\nabla f=0\\Rightarrow$ estremo\"."}]},{"pool":"ottim","src":"tipo D · manuale · assoluti su disco","steps":[{"t":"Max e min ASSOLUTI di $f(x,y)=xy$ su $D=\\{x^2+y^2\\le 1\\}$. Interno: $\\nabla f=0$ dà $(0,0)$, una sella con $f=0$. Che fai di questo candidato?","opts":[{"x":"Lo tengo comunque in gara col suo valore $f(0,0)=0$: sul compatto conto i VALORI, non la natura locale","c":true},{"x":"Lo scarto perché è una sella, non un estremo locale"},{"x":"È già il minimo assoluto perché $f(0,0)=0$"},{"x":"Lo scarto perché $\\det H<0$"}],"hint":"Per gli estremi ASSOLUTI su un compatto conta il valore di $f$ nei candidati, non se localmente sono min/max/sella.","sol":"Sul bordo, Lagrange (come per $xy$ su $x^2+y^2=1$) dà $f=\\pm1/2$. Confronto: candidato interno $0$, candidati di bordo $\\pm1/2$. $\\max f=1/2$, $\\min f=-1/2$: entrambi sul bordo. Il punto interno, pur sella, entra col valore $0$ e semplicemente non vince."}]},{"pool":"ottim","src":"tipo D · manuale · min quadratica","steps":[{"t":"Classifica l'unico punto critico di $f(x,y)=x^2+xy+y^2$.","opts":[{"x":"$(0,0)$ minimo: $H=\\begin{pmatrix}2&1\\\\1&2\\end{pmatrix}$, $\\det H=3>0$ e $f_{xx}=2>0$","c":true},{"x":"$(0,0)$ sella, perché c'è il termine misto $xy$"},{"x":"$(0,0)$ massimo"},{"x":"Nessun punto critico, perché $f>0$"}],"hint":"Il termine $xy$ non implica sella: conta $\\det H=f_{xx}f_{yy}-f_{xy}^2=4-1=3>0$.","sol":"$\\nabla f=(2x+y,\\,x+2y)=0\\Rightarrow(0,0)$. $\\det H=2\\cdot2-1^2=3>0$ e $f_{xx}=2>0\\Rightarrow$ minimo (test dell'Hessiana). La forma è definita positiva; il minimo è anche assoluto ($f$ coerciva)."}]},{"pool":"ottim","src":"20220504 Es.2 · assoluti 3D vincolati","steps":[{"t":"Estremi assoluti di $f(x,y,z)=x^2+y^2-z^2$ su $D=\\{x^4+y^4+2z^4\\le 1\\}$. Il punto critico interno è $O=(0,0,0)$ con $f(O)=0$. È il minimo?","opts":[{"x":"No: $O$ è una sella (autovalori $2,2,-2$); min e max stanno sul bordo, da cercare con Lagrange","c":true},{"x":"Sì, $f(O)=0$ è il minimo assoluto"},{"x":"Sì, perché $O$ è l'unico punto critico interno"},{"x":"$O$ va scartato perché sul bordo"}],"hint":"$H(O)=\\mathrm{diag}(2,2,-2)$: due positivi e uno negativo. È una sella, non un estremo: il bordo compatto ospita gli assoluti.","sol":"$O$ ha $H=\\mathrm{diag}(2,2,-2)$: sella (autovalori discordi), non estremo. $D$ è compatto: Weierstrass dà max/min, che vanno cercati sul bordo $x^4+y^4+2z^4=1$ via Lagrange.","cont":"Continua &rarr; il bordo"},{"t":"Sul bordo, i candidati di Lagrange danno tra gli altri $(0,0,\\pm 2^{-1/4})$ con $2z^4=1$. Quanto vale lì $f$, e chi è il minimo assoluto?","opts":[{"x":"$f=-z^2=-1/\\sqrt2$: è il minimo assoluto (il massimo, $\\sqrt2$, sta dove $x^4+y^4=1$, $z=0$)","c":true},{"x":"$f=0$, uguale al centro"},{"x":"$f=-1$, il minimo"},{"x":"$f=1$, il minimo"}],"hint":"In $(0,0,2^{-1/4})$: $z^2=(2^{-1/4})^2=2^{-1/2}=1/\\sqrt2$, e $f=-z^2$. Il termine $-z^2$ tira $f$ verso il basso.","sol":"In $(0,0,\\pm2^{-1/4})$: $f=-z^2=-1/\\sqrt2$, il valore più basso $\\Rightarrow\\min f=-1/\\sqrt2$. Il massimo si ha dove $z=0$ e $x^4+y^4=1$ è \"usato\" per $x^2+y^2$: es. $x=y=2^{-1/4}$ dà $f=2\\cdot2^{-1/2}=\\sqrt2$. Weierstrass + Lagrange sul bordo."}]},{"pool":"ottim","src":"20240209 Es.2 · critici liberi 3D","steps":[{"t":"Per $f(x,y,z)=2x^3+yx^2+y^2z-9z$, quante equazioni scalari impone $\\nabla f=0$ e cosa sono?","opts":[{"x":"Tre: $f_x=6x^2+2xy=0$, $f_y=x^2+2yz=0$, $f_z=y^2-9=0$ (sistema per i candidati)","c":true},{"x":"Una sola: $f=0$"},{"x":"Due, perché $z$ compare linearmente"},{"x":"Tre, ma sono già i minimi essendo $f$ un polinomio"}],"hint":"$\\nabla f=0$ è un sistema con tante equazioni quante le variabili: qui tre derivate parziali annullate.","sol":"$\\nabla f=(6x^2+2xy,\\;x^2+2yz,\\;y^2-9)=0$: tre equazioni. Da $f_z=0$: $y=\\pm3$. Sono i CANDIDATI (Fermat, necessaria); la classificazione richiede poi l'Hessiana $3\\times3$ e il criterio di Sylvester, dove $\\det H>0$ da solo non basterebbe."}]}],"serie":[{"pool":"serie","src":"manuale","steps":[{"t":"Cosa distingue la convergenza <b>uniforme</b> di $f_n\\to f$ su $I$ dalla convergenza <b>puntuale</b>?","opts":[{"x":"Nell'uniforme la velocit&agrave; con cui $f_n(x)\\to f(x)$ non dipende da $x$: un solo $N$ funziona per tutti gli $x\\in I$","c":true},{"x":"Nell'uniforme il limite $f$ &egrave; per forza continuo, nella puntuale no"},{"x":"Sono la stessa cosa: uniforme &egrave; solo un altro nome per puntuale su un intervallo"},{"x":"Nell'uniforme si richiede $\\sum f_n<\\infty$, nella puntuale no"}],"hint":"La continuit&agrave; del limite &egrave; una CONSEGUENZA dell'uniforme, non la sua definizione. Guarda la dipendenza di $N$ da $x$.","sol":"Puntuale: $\\forall x\\ \\forall\\varepsilon\\ \\exists N(x,\\varepsilon)$ con $|f_n(x)-f(x)|<\\varepsilon$ per $n>N$. Uniforme: lo stesso $N(\\varepsilon)$ vale per <b>tutti</b> gli $x\\in I$. Equivalente: $\\sup_{x\\in I}|f_n(x)-f(x)|\\to 0$. &Egrave; questa uniformit&agrave; di $N$ a far passare limite e integrale/continuit&agrave;."}]},{"pool":"serie","src":"manuale","steps":[{"t":"Il modo operativo per stabilire se $f_n\\to f$ uniformemente su $I$ &egrave;:","opts":[{"x":"Calcolare $M_n=\\sup_{x\\in I}|f_n(x)-f(x)|$ e verificare $M_n\\to 0$","c":true},{"x":"Verificare che $f_n(x)\\to f(x)$ per ogni $x$ fissato"},{"x":"Verificare che ogni $f_n$ &egrave; continua"},{"x":"Verificare che $\\int_I f_n\\to\\int_I f$"}],"hint":"Il limite puntuale ti d&agrave; solo il candidato $f$. L'uniforme si misura sul RESTO $|f_n-f|$.","sol":"Convergenza uniforme $\\iff M_n=\\sup_{x\\in I}|f_n(x)-f(x)|\\to 0$. In pratica: si trova $f$ col limite puntuale, poi si studia il massimo di $|f_n-f|$ (derivando in $x$, oppure stimando dall'alto). Se $M_n\\to 0$ &egrave; uniforme; se $M_n\\not\\to 0$ non lo &egrave;."}]},{"pool":"serie","src":"manuale","steps":[{"t":"Criterio di Weierstrass (M-test) per $\\sum_{k} f_k(x)$ su $I$. L'ipotesi corretta &egrave;:","opts":[{"x":"Esiste $M_k\\ge 0$ con $|f_k(x)|\\le M_k$ per ogni $x\\in I$, e $\\sum_k M_k<\\infty$","c":true},{"x":"$f_k(x)\\to 0$ per ogni $x\\in I$"},{"x":"$\\sum_k f_k(x)$ converge puntualmente su $I$"},{"x":"Le $f_k$ sono derivabili e $\\sum_k f_k'$ converge"}],"hint":"Il maggiorante $M_k$ deve essere NUMERICO (indipendente da $x$) e la sua serie deve convergere.","sol":"Criterio di Weierstrass: se $\\sup_{x\\in I}|f_k(x)|\\le M_k$ con $\\sum_k M_k<\\infty$, allora $\\sum_k f_k$ converge <b>totalmente</b>, quindi <b>uniformemente</b> e assolutamente su $I$. La forza sta nel dominare le funzioni con una serie numerica convergente."}]},{"pool":"serie","src":"manuale","steps":[{"t":"Se il criterio di Weierstrass <b>fallisce</b> su $\\sum_k f_k$ (non trovo $M_k$ sommabili), posso concludere che la serie NON converge uniformemente?","opts":[{"x":"No: il M-test &egrave; sufficiente ma non necessario; la serie pu&ograve; convergere uniformemente senza convergere totalmente","c":true},{"x":"S&igrave;: senza il M-test non c'&egrave; convergenza uniforme"},{"x":"S&igrave;, ma solo se le $f_k$ cambiano segno"},{"x":"No, perch&eacute; il M-test non ha mai nulla a che fare con l'uniforme"}],"hint":"Weierstrass d&agrave; una condizione SUFFICIENTE. La sua negazione non nega l'uniforme.","sol":"Il M-test &egrave; <b>sufficiente ma non necessario</b>: implica addirittura la convergenza totale, pi&ugrave; forte dell'uniforme. Esistono serie uniformemente convergenti ma non totalmente (tipiche le alternanti $\\sum(-1)^k g_k(x)$ con $g_k\\downarrow 0$ uniformemente, dove $\\sum\\sup|f_k|$ diverge). Fallito Weierstrass, si prova con Leibniz/Abel o con la stima diretta del resto."}]},{"pool":"serie","src":"manuale","steps":[{"t":"Ordina le implicazioni corrette tra i tipi di convergenza di una serie di funzioni:","opts":[{"x":"Totale $\\Rightarrow$ uniforme $\\Rightarrow$ puntuale; nessuna delle frecce si inverte in generale","c":true},{"x":"Puntuale $\\Rightarrow$ uniforme $\\Rightarrow$ totale"},{"x":"Uniforme $\\Rightarrow$ totale $\\Rightarrow$ puntuale"},{"x":"Sono tre nomi equivalenti per la stessa nozione"}],"hint":"La convergenza totale (Weierstrass) &egrave; la pi&ugrave; forte; la puntuale la pi&ugrave; debole.","sol":"Gerarchia: <b>totale $\\Rightarrow$ uniforme $\\Rightarrow$ puntuale</b>. Le frecce non si invertono: un'alternante pu&ograve; essere uniforme senza essere totale; $x^n$ su $[0,1)$ &egrave; puntuale non uniforme. Sapere quale serve evita di dimostrare troppo (o troppo poco)."}]},{"pool":"serie","src":"manuale","steps":[{"t":"Le $f_n$ sono continue su $I$ e $f_n\\to f$ <b>uniformemente</b>. Cosa puoi affermare su $f$?","opts":[{"x":"$f$ &egrave; continua su $I$","c":true},{"x":"$f$ &egrave; derivabile su $I$"},{"x":"$f$ &egrave; limitata su $I$"},{"x":"Nulla: il limite pu&ograve; essere discontinuo anche con l'uniforme"}],"hint":"L'uniforme trasmette la continuit&agrave;, non la derivabilit&agrave; (per quella servono ipotesi sulle derivate).","sol":"Teorema: limite uniforme di funzioni continue &egrave; continuo. Idea: $|f(x)-f(x_0)|\\le|f(x)-f_n(x)|+|f_n(x)-f_n(x_0)|+|f_n(x_0)-f(x_0)|$; l'uniforme rende piccoli il primo e il terzo termine per ogni $x$ con lo stesso $n$, la continuit&agrave; di $f_n$ il centrale. La derivabil
