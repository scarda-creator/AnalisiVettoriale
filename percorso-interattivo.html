      {label:'Sostituisco $z=f$', body:R`<p>$3z-1=3(-2x-y+2)-1=-6x-3y+5$. Allora $\operatorname{rot}F|_\Sigma\cdot(2,1,1)=(-6x-3y+5)\cdot2+(-y)=-12x-7y+10$.</p>`},
      {label:'Risultato', body:R`<p>Con l&rsquo;orientazione richiesta (segno meno): $$\oint F\cdot T\,ds=-\iint_D(-12x-7y+10)\,dx\,dy.$$ Su $D$ centrato, $\iint_D x=\iint_D y=0$, resta $\iint_D 10=10\cdot9\pi=90\pi$: $$\oint F\cdot T\,ds=-90\pi.$$ $\blacksquare$</p>`}
    ],
    nota:R`Due sole cose potevano rovinare il conto — sbagliare il segno della 2ª componente del rotore (qui $0$) e ignorare la 3ª componente negativa della normale. Il resto muore per simmetria.` },
  varianti:R`<p>Tre assi: la <b>dimensione</b> (Green 2D vs Stokes 3D), la <b>superficie</b> (grafico piano, curva, o il disco piano scelto perché comodo), e l&rsquo;<b>orientazione</b> (3ª comp. $+$ o $-$). Asse trasversale: il <b>campo</b> (con parametro, o conservativo ⇒ $0$).</p>
  <p><b>Green nel piano (Stokes 2D).</b></p>
  <ul>
  <li><code>22gen24</code> Es.3: settore $D=\{0\le y\le x,\ x^2+y^2\le4\}$, campo con parametro $a$; $\oint F\cdot T=(a-2)\iint_D=(a-2)\frac{4\sqrt2}3$ (polari, $\theta\in[0,\frac\pi4]$). <i>Cosa cambia:</i> rotore ridotto a $\partial_xF_2-\partial_yF_1$; il settore fissa gli estremi.</li>
  </ul>
  <p><b>Stokes su grafico piano — 3ª componente POSITIVA.</b></p>
  <ul>
  <li><code>20220124</code> Es.4-iv: $z=x+3y+4$ su disco raggio $2$; $(-f_x,-f_y,1)=(-1,-3,1)$; circuitazione $100\pi$.</li>
  <li><code>20230705</code> Es.2-iii: $z=1-x-y$ su $x^2+y^2\le8$; $\operatorname{rot}F=(-y^2,-z,-x^2)$; lavoro $-40\pi$. <i>Cosa cambia:</i> bordo antiorario visto dall&rsquo;alto; sostituisci $z=f$ nel rotore prima di integrare.</li>
  </ul>
  <p><b>Stokes su grafico piano — 3ª componente NEGATIVA (il segno!).</b></p>
  <ul>
  <li><code>20250127</code> Es.1-vi (svolto): normale a 3ª comp. negativa ⇒ $-(-f_x,-f_y,1)$, circuitazione $-90\pi$.</li>
  <li><code>05mar24</code> Es.3-v: $z=\sqrt3\,x+1$, normale 3ª comp. negativa, bordo orario. <i>Cosa cambia:</i> un <b>segno meno</b> globale, applicato una volta sola con coerenza.</li>
  </ul>
  <p><b>Stokes su superficie CURVA (normale non costante)</b> (<code>20230123</code> Es.3): spicchio di sfera, bordo = due semicirconferenze con verso opposto; $\operatorname{rot}F=(0,1+z,0)$, lavoro $\frac{9\pi}2$. <i>Cosa cambia:</i> $\mathbf n$ varia punto per punto — parametrizzazione sferica; il bordo può essere <b>unione di archi</b> con segni da comporre.</p>
  <p><b>Scelta della superficie più semplice (Stokes «inverso»).</b> <i>Cosa cambia:</i> il bordo determina $\Sigma$ — prendi il <b>disco piano</b> bordato da quel cerchio, stessa circuitazione con calcolo minimo.</p>
  <p><b>Campo con parametro / conservativo</b> (<code>20220706</code> Es.4): $\operatorname{rot}F=(0,2z-2az,0)$; se $a=1$ è conservativo (circuitazione $0$), altrimenti $2(a-1)\pi$. <i>Cosa cambia:</i> prima del calcolo controlla se per qualche valore $\operatorname{rot}F=0$ — lì la circuitazione è gratis (ponte con 10).</p>`,
  collaudo:[
    {q:R`$F=(y^2+z^2+e^x,\ xy+z+\cos y,\ 2xz+3yz+z^2)$, $\Sigma:z=-2x-y+2$ su $x^2+y^2\le9$, normale 3ª comp. negativa: circuitazione?`, a:R`$-90\pi$; i termini in $x,y$ muoiono per simmetria, resta $\pm10\cdot9\pi$ col segno dell&rsquo;orientazione.`},
    {q:R`$\operatorname{rot}F=(0,2z-2az,0)$, curva su un piano: per quale $a$ la circuitazione è $0$ e perché?`, a:R`$a=1$, il campo diventa conservativo (rotore nullo).`},
    {q:R`Il bordo di $\Sigma$ è un cerchio in un piano: quale superficie conviene usare in Stokes?`, a:R`Il disco piano bordato da quel cerchio, non la superficie originaria.`}
  ] },

{ num:'10', title:'Campi conservativi, potenziale, forme esatte',
  meta:'Pool #8 · freq 7/11 e 3/10 · spesso il sotto-punto che precede Stokes nell&rsquo;Es.4',
  firma:R`<p>«Stabilire se $F$ è conservativo», «trovare il parametro $a$ che lo rende conservativo», «calcolare il potenziale / la primitiva», «trovare $\Psi$ affinché la forma $\omega$ sia esatta», «calcolare il lavoro lungo una curva». Parole-spia: <i>conservativo, potenziale, primitiva, forma differenziale esatta, irrotazionale, semplicemente connesso</i>.</p>
  <p><b>Cosa NON confondere:</b> $\operatorname{rot}F=0$ (irrotazionale, per la conservatività) con $\operatorname{div}F=0$ (solenoidale, riguarda il flusso, 08). E soprattutto: <b>irrotazionale $\neq$ conservativo</b> se il dominio ha buchi.</p>`,
  idea:R`<p>$F$ è <b>conservativo</b> se esiste un potenziale $U$ con $F=\nabla U$; allora il lavoro dipende solo dagli estremi:</p>$$\int_\gamma F\cdot T\,ds=U(B)-U(A),\qquad \oint F\cdot T\,ds=0\text{ su ogni curva chiusa}.$$<p>La condizione locale necessaria è $\operatorname{rot}F=0$ (in 2D: $\partial_yF_1=\partial_xF_2$). È anche <b>sufficiente</b> — ma solo se il dominio è <b>semplicemente connesso</b> (senza buchi): lì ogni curva chiusa si contrae e Stokes forza a $0$ la circuitazione. Se il dominio ha un buco (es. $\mathbb{R}^2\setminus\{0\}$), esistono campi irrotazionali <b>non</b> conservativi: la loro circuitazione attorno al buco è $\neq0$. Ragione: la curva che avvolge il buco non borda alcuna superficie contenuta nel dominio, quindi Stokes non si applica.</p>`,
  mossa:[
    {label:'Calcola $\operatorname{rot}F$', body:R`<p>(2D: $\partial_xF_2-\partial_yF_1$). Se $\neq0$: <b>non</b> conservativo, fine (per il lavoro userai Stokes/Green, 09). Se $=0$: prosegui.</p>`},
    {label:'Guarda il dominio', body:R`<p>Se è semplicemente connesso e $\operatorname{rot}F=0$: conservativo.</p><div class="note"><b>Trappola</b> (<code>20230907</code>): $\operatorname{rot}F=0$ <b>non basta</b> su un dominio bucato. Con $\mathbb{R}^2\setminus\{0\}$, un campo irrotazionale può avere circuitazione $\neq0$ attorno all&rsquo;origine. Verifica sempre la connessione semplice prima di dichiararlo conservativo.</div>`},
    {label:'Parametro', body:R`<p>Se c&rsquo;è un parametro $a$, imponi $\operatorname{rot}F=0$ per trovarne il valore, poi costruisci il potenziale.</p>`},
    {label:'Costruisci $U$', body:R`<p>Integra $U_x=F_1$ in $x$ (compare una «costante» $c(y,z)$); imponi $U_y=F_2$ per determinare $c$; infine $U_z=F_3$.</p><div class="note"><b>Trappola</b> (<code>b02</code>): la «costante» d&rsquo;integrazione dipende dalle <b>altre variabili</b> ($c(y,z)$, non un numero). Dimenticarlo perde termini misti.</div><div class="note"><b>Trappola</b> (<code>b01</code>): quando $F_1$ dipende sia da $x$ sia da $y$, deriva con cura il risultato parziale prima di confrontarlo con $F_2$.</div>`},
    {label:'Lavoro', body:R`<p>Se conservativo: $U(B)-U(A)$ (chiuso ⇒ $0$). Se irrotazionale ma su dominio bucato: calcola la circuitazione lungo una curva <b>equivalente</b> (il cerchio unitario) attorno al buco, poi moltiplica per il <b>numero di giri con segno</b>.</p><div class="note"><b>Trappola</b> (verso, <code>20230907</code>): un giro <b>orario</b> cambia il segno; una parametrizzazione può fare più giri — contali. Lì il cerchio antiorario dà $-2\pi$, ma $\gamma(t)=(\sin2t,\cos2t)$, $t\in[0,\pi]$, fa un giro <b>orario</b>, quindi il lavoro è $+2\pi$.</div>`}
  ],
  esame:{ src:'Prova 07/09/2023, Es. 2 (20230907)',
    testo:R`$F=\Bigl(\dfrac{-\alpha x+y}{x^2+y^2},\ \dfrac{\alpha y-x}{x^2+y^2}\Bigr)$ su $\mathbb{R}^2\setminus\{0\}$. (i) Per quale $\alpha$ è irrotazionale? (ii) È conservativo? (iii) Lavoro lungo il cerchio unitario antiorario, e lungo $\gamma(t)=(\sin2t,\cos2t)$, $t\in[0,\pi]$.`,
    steps:[
      {label:'(i) Irrotazionalità', body:R`<p>Serve $\partial_xF_2=\partial_yF_1$; il conto (quoziente) dà bilanciamento <b>solo per $\alpha=0$</b>. Per $\alpha=0$, $F=\bigl(\tfrac{y}{x^2+y^2},\tfrac{-x}{x^2+y^2}\bigr)$ e $\partial_yF_1=\dfrac{x^2-y^2}{(x^2+y^2)^2}=\partial_xF_2$. Irrotazionale <b>sse $\alpha=0$</b>.</p>`},
      {label:'(ii) Conservativo?', body:R`<p>No, nemmeno per $\alpha=0$. Il dominio $\mathbb{R}^2\setminus\{0\}$ <b>non è semplicemente connesso</b>: $\operatorname{rot}F=0$ non implica conservatività. Lo conferma il punto seguente, dove la circuitazione attorno all&rsquo;origine è $\neq0$.</p>`},
      {label:'(iii) Cerchio unitario antiorario', body:R`<p>$\gamma(t)=(\cos t,\sin t)$, $\gamma'=(-\sin t,\cos t)$; su $x^2+y^2=1$ il campo è $F=(\sin t,-\cos t)$. $$\oint F\cdot T\,ds=\int_0^{2\pi}(-\sin^2t-\cos^2t)\,dt=-2\pi.$$ La circuitazione attorno al buco è $-2\pi\neq0$: conferma la non-conservatività.</p>`},
      {label:'Lungo $\gamma(t)=(\sin2t,\cos2t)$', body:R`<p>È il cerchio unitario percorso <b>una volta in senso orario</b>. Un giro orario $=-1$ giri antiorari, quindi $$L=(-1)\cdot(-2\pi)=+2\pi.$$ $\blacksquare$</p>`}
    ],
    nota:R`Irrotazionale ma non conservativo è IL trabocchetto del tipo. La circuitazione non nulla attorno all&rsquo;origine è la firma del dominio bucato; nota su una curva-campione, si trasporta a qualunque curva contando i giri con segno.` },
  varianti:R`<p>L&rsquo;asse decisivo è il <b>dominio</b>: semplicemente connesso (allora $\operatorname{rot}F=0$ basta) o bucato (allora no, serve la circuitazione-campione). Secondo asse: <b>cosa si cerca</b> (verifica, parametro, funzione incognita, $\Psi$ per l&rsquo;esattezza, lavoro).</p>
  <p><b>Dominio semplicemente connesso — verifica diretta + potenziale.</b></p>
  <ul>
  <li><code>20220706</code> Es.4: $\operatorname{rot}F=(0,2z-2az,0)$; conservativo sse $a=1$; $U=xy^2+xy+xz^2$.</li>
  <li><code>20230504</code> Es.4: $U=\frac{x^2}2+xe^y+xz^2$. <i>Cosa cambia:</i> costruisci $U$ integrando $U_x=F_1$, poi $U_y=F_2$, $U_z=F_3$ (la «costante» dipende dalle altre variabili).</li>
  </ul>
  <p><b>Trovare il parametro / la funzione che rende conservativo.</b></p>
  <ul>
  <li><b>Parametro $a$</b> (<code>22gen24</code> Es.3: $F=(2x\cos(x^2+y)+axy,\ \cos(x^2+y)+x^2+1)$ ⇒ $a=2$, $U=\sin(x^2+y)+x^2y+y+k$; <code>20230705</code> Es.3 ⇒ $a=-1$, $U=-\frac{y}{1+x^2}$).</li>
  <li><b>Funzione incognita $f(y)$</b> (<code>20230504</code> Es.4: $F=(x+f(y)+z^2,\ xf(y),\ 2xz)$; $\operatorname{rot}F=(0,0,f-f')$, nullo sse $f'=f$, cioè $f(y)=e^y$). <i>Cosa cambia:</i> con un parametro è un&rsquo;equazione algebrica, con una funzione è una <b>piccola EDO</b> ($f'=f$).</li>
  </ul>
  <p><b>Forma differenziale esatta con $\Psi$</b> (<code>21lug25</code> Es.5): $\omega=(z-2y)dx+(z-2x)dy+(x+y+\Psi(y))dz$; le condizioni d&rsquo;esattezza danno $\Psi'(y)=0$ ⇒ $\Psi$ costante; $U=xz-2xy+yz$. <i>Cosa cambia:</i> imponi <b>tutte</b> le uguaglianze incrociate; una determina $\Psi$.</p>
  <p><b>Dominio BUCATO — irrotazionale $\neq$ conservativo</b> (<code>20230907</code> Es.2 svolto): su $\mathbb{R}^2\setminus\{0\}$, per $\alpha=0$ irrotazionale ma <b>non</b> conservativo; circuitazione attorno all&rsquo;origine $-2\pi$. <i>Cosa cambia:</i> $\operatorname{rot}F=0$ non conclude; calcoli la circuitazione su una <b>curva-campione</b> e la trasporti contando i giri con segno.</p>
  <p><b>Campo 3D non conservativo ⇒ passa a Stokes</b> (<code>19giu24</code> Es.3): $\operatorname{rot}F=(0,1-3x^2,x^2)\neq0$. <i>Cosa cambia:</i> niente potenziale; per il lavoro usi Stokes (09).</p>
  <p><b>Lavoro su curva APERTA via potenziale</b> (<code>20230210</code> Es.3: semiellisse da $(2,0)$ a $(-2,0)$, $L=U(-2,0)-U(2,0)=0$; <code>20220124</code> Es.4-ii non conservativo). <i>Cosa cambia:</i> nessun integrale — solo la <b>differenza di potenziale</b> agli estremi.</p>`,
  collaudo:[
    {q:R`$F=\bigl(\tfrac{y}{x^2+y^2},\tfrac{-x}{x^2+y^2}\bigr)$ su $\mathbb{R}^2\setminus\{0\}$: è irrotazionale? è conservativo?`, a:R`Irrotazionale sì; conservativo no — dominio bucato; circuitazione attorno a $0$ vale $-2\pi$ (cerchio antiorario).`},
    {q:R`Lo stesso campo lungo $\gamma(t)=(\sin2t,\cos2t)$, $t\in[0,\pi]$: quanto vale il lavoro?`, a:R`$+2\pi$ — è un giro orario, segno opposto al cerchio antiorario.`},
    {q:R`$F=(x+f(y)+z^2,\ xf(y),\ 2xz)$: quale $f$ lo rende conservativo e qual è il potenziale?`, a:R`$f(y)=e^y$ (da $f'=f$); $U=\tfrac{x^2}{2}+xe^y+xz^2$.`}
  ] }
];

/* =================================================================== */
var byId = {}; SF.forEach(function(s){ byId[s.num]=s; });

var VKEY='av-sf-visited';
function loadSeen(){ try{ return new Set(JSON.parse(localStorage.getItem(VKEY)||'[]')); }catch(e){ return new Set(); } }
function saveSeen(s){ try{ localStorage.setItem(VKEY, JSON.stringify(Array.from(s))); }catch(e){} }
var SEEN = loadSeen();

function renderNav(active){
  var nav=document.getElementById('sidebar');
  nav.innerHTML='';
  var h=document.createElement('h2'); h.textContent='Percorso'; nav.appendChild(h);
  var gate=document.createElement('button');
  gate.className='navitem'+(active==='gate'?' active':'');
  gate.innerHTML='<span class="dot"></span><span class="nx">⌂</span><span>Scegli modalità</span>';
  gate.onclick=function(){ showGate(); };
  nav.appendChild(gate);
  var home=document.createElement('button');
  home.className='navitem'+(active==='home'?' active':'');
  home.innerHTML='<span class="dot"></span><span class="nx">◆</span><span>Smistatore</span>';
  home.onclick=function(){ showHome(); };
  nav.appendChild(home);
  SF.forEach(function(s){
    var b=document.createElement('button');
    b.className='navitem'+(active===s.num?' active':'')+(SEEN.has(s.num)?' seen':'');
    b.innerHTML='<span class="dot"></span><span class="nx">'+s.num+'</span><span>'+s.title+'</span>';
    b.onclick=function(){ showSF(s.num); };
    nav.appendChild(b);
  });
}

function sectionOpen(title, tag, html){
  var wrap=document.createElement('section'); wrap.className='section';
  wrap.innerHTML='<h3>'+title+(tag?'<span class="tag">'+tag+'</span>':'')+'</h3>';
  var body=elFromHTML('<div class="open-body">'+html+'</div>');
  typeset(body); wrap.appendChild(body); return wrap;
}

function revealBlock(steps){
  var wrap=document.createElement('div');
  var box=document.createElement('div'); box.className='rsteps'; wrap.appendChild(box);
  var idx=0;
  var btn=document.createElement('button'); btn.className='reveal-btn';
  function next(){
    if(idx>=steps.length) return;
    var s=steps[idx];
    var d=document.createElement('div'); d.className='rstep';
    d.innerHTML='<div class="rlabel">Passo '+(idx+1)+' · '+s.label+'</div>'+s.body;
    box.appendChild(d); typeset(d); idx++;
    if(idx>=steps.length){ btn.textContent='Tutti i passi rivelati'; btn.disabled=true; btn.classList.add('done'); }
    else { btn.textContent='Rivela il prossimo passo  ('+idx+'/'+steps.length+')'; }
  }
  btn.onclick=next; next(); wrap.appendChild(btn);
  return wrap;
}

function collaudoBlock(items){
  var wrap=document.createElement('div');
  items.forEach(function(it,i){
    var c=document.createElement('div'); c.className='collaudo-item';
    var q=document.createElement('div'); q.className='cq'; q.innerHTML='<b>'+(i+1)+'.</b> '+it.q;
    var a=document.createElement('div'); a.className='ca'; a.style.display='none'; a.innerHTML='<b>Risposta.</b> '+it.a;
    var b=document.createElement('button'); b.className='reveal-btn small'; b.textContent='Rivela risposta';
    b.onclick=function(){ a.style.display='block'; typeset(a); b.disabled=true; b.classList.add('done'); b.textContent='Risposta rivelata'; };
    c.appendChild(q); typeset(q); c.appendChild(b); c.appendChild(a); wrap.appendChild(c);
  });
  return wrap;
}

function showGate(){
  renderNav('gate');
  var m=document.getElementById('main'); m.innerHTML='';
  m.appendChild(elFromHTML('<div class="sfhead"><h1>Percorso saper-fare — Analisi Vettoriale</h1>'+
    '<p class="sub">Secondo esonero · La Sapienza, Fisica · scritto 17 luglio 2026. Due modi di usarlo — scegli.</p></div>'));
  var grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:18px;margin-top:6px';
  function card(icon,titolo,desc,cta,fn){
    var b=document.createElement('button');
    b.style.cssText='text-align:left;padding:24px;border:1px solid var(--line,#2a3550);border-radius:14px;'+
      'background:var(--card,#141c30);color:inherit;cursor:pointer;transition:border-color .15s,transform .15s;'+
      'display:flex;flex-direction:column;gap:10px;font:inherit';
    b.onmouseover=function(){ b.style.borderColor='var(--accent,#5eead4)'; b.style.transform='translateY(-2px)'; };
    b.onmouseout=function(){ b.style.borderColor='var(--line,#2a3550)'; b.style.transform='none'; };
    b.innerHTML='<div style="font-size:1.7rem;line-height:1">'+icon+'</div>'+
      '<h3 style="margin:0;font-size:1.2rem">'+titolo+'</h3>'+
      '<p style="margin:0;font-size:.93rem;line-height:1.55;color:var(--muted,#93a1c0)">'+desc+'</p>'+
      '<span style="margin-top:4px;font-weight:600;color:var(--accent,#5eead4)">'+cta+'</span>';
    b.onclick=fn; return b;
  }
  grid.appendChild(card('◆','Smistatore',
    'Parti da un esercizio: riconosci l&rsquo;oggetto-spia e l&rsquo;app ti manda al metodo giusto. Il «quale metodo» è metà della battaglia d&rsquo;esame.',
    'Entra nello smistatore →', function(){ showHome(); }));
  grid.appendChild(card('▶','Percorso',
    'Studia in ordine i 10 saper-fare, da EDO (01) al blocco dei teoremi integrali (06–10). Impari il gesto, un tipo alla volta.',
    'Inizia da 01 →', function(){ showSF('01'); }));
  m.appendChild(grid);
  window.scrollTo(0,0);
}

function showHome(){
  renderNav('home');
  var m=document.getElementById('main'); m.innerHTML='';
  m.appendChild(elFromHTML('<div class="sfhead"><h1>Percorso saper-fare — Analisi Vettoriale</h1>'+
    '<p class="sub">Secondo esonero · La Sapienza, Fisica. Il gemello operativo: allena il <i>gesto</i>, non ri-spiega la teoria.</p></div>'));

  var intro=elFromHTML('<div class="smist-intro"><p style="margin-top:0"><b>Lo smistatore.</b> '+
    'Leggi il testo dell&rsquo;esercizio, trova l&rsquo;oggetto-spia, apri il saper-fare giusto. '+
    'Il «quale metodo» è metà della battaglia d&rsquo;esame.</p>'+
    '<p style="margin-bottom:0;font-size:.9rem;color:var(--muted)"><b>Ambiguità frequenti.</b> '+
    R`<b>Es.1 — differenziabilità o Dini?</b> Un quoziente con $(x^2+y^2)^\alpha$ al denominatore e $f(0,0)=0$ a parte è `+
    '<b>02</b>; un&rsquo;equazione $F(\\cdots)=0$ da risolvere per una variabile è <b>03</b>. '+
    '<b>Es.4 — Stokes o conservativi?</b> Prima controlla se il campo è conservativo (<b>10</b>): se lo è, su curva chiusa il '+
    'lavoro è $0$ e su curva aperta $U(B)-U(A)$; altrimenti Stokes (<b>09</b>). '+
    '<b>Curva o superficie?</b> <b>Due</b> equazioni in $\\mathbb{R}^3$ = curva (<b>06</b>); <b>una</b> = superficie (<b>07</b>); il '+
    '<b>bordo</b> di una superficie è una curva — è il ponte fra i due.</p></div>');
  typeset(intro); m.appendChild(intro);

  var grid=document.createElement('div'); grid.className='smist-grid';
  SMIST.forEach(function(row){
    var b=document.createElement('button'); b.className='smist-card';
    b.innerHTML='<div class="spia">'+row.spia+'</div><div class="cosa">'+row.cosa+'</div>'+
      '<span class="arrow">→ '+row.target+' · '+byId[row.target].title+'</span>';
    b.onclick=function(){ showSF(row.target); };
    typeset(b); grid.appendChild(b);
  });
  m.appendChild(grid);

  m.appendChild(elFromHTML('<section class="section"><h3>Ordine consigliato</h3>'+
    '<div class="open-body"><p style="margin:0"><b>01</b> (EDO) è indipendente da tutto il resto e sempre presente: prima. '+
    '<b>02 → 03</b> sono la coppia dell&rsquo;Es.1 (analisi locale / funzione implicita). <b>04 → 05</b> la coppia dell&rsquo;Es.2 '+
    '(ottimizzazione / serie). <b>06 → 07 → 08 → 09 → 10</b> sono il <b>blocco dei teoremi integrali</b> in ordine di dipendenza: '+
    'curve, superfici, flusso da un volume (Gauss), circuitazione (Stokes), infine il collasso a differenza di potenziale '+
    '(conservativi). Le tre priorità dichiarate — <b>01, 06, 07</b> — vanno sapute senza esitazione: lì un errore di '+
    'segno/orientazione/dominio invalida l&rsquo;intero esercizio.</p></div></section>'));
  window.scrollTo(0,0);
}

function showSF(num){
  var s=byId[num];
  SEEN.add(num); saveSeen(SEEN);
  renderNav(num);
  var m=document.getElementById('main'); m.innerHTML='';

  var head=elFromHTML('<div class="sfhead"><h1>'+s.num+' · '+s.title+'</h1><div class="meta">'+s.meta+'</div></div>');
  typeset(head); m.appendChild(head);
  if(s.note){ var n=elFromHTML('<div class="note warn">'+s.note+'</div>'); typeset(n); m.appendChild(n); }

  m.appendChild(sectionOpen('La firma','riconoscere', s.firma));
  m.appendChild(sectionOpen('L’idea','first principles', s.idea));

  var mossa=document.createElement('section'); mossa.className='section';
  mossa.innerHTML='<h3>La mossa<span class="tag">rivela un passo alla volta</span></h3>';
  mossa.appendChild(revealBlock(s.mossa)); m.appendChild(mossa);

  var es=document.createElement('section'); es.className='section';
  es.innerHTML='<h3>Un esame, per intero<span class="tag">reveal progressivo</span></h3>';
  var testo=elFromHTML('<div class="testo"><span class="src">'+s.esame.src+'</span>'+s.esame.testo+'</div>');
  typeset(testo); es.appendChild(testo);
  es.appendChild(revealBlock(s.esame.steps));
  if(s.esame.nota){ var en=elFromHTML('<div class="esame-nota">'+s.esame.nota+'</div>'); typeset(en); es.appendChild(en); }
  m.appendChild(es);

  m.appendChild(sectionOpen('Le varianti','la famiglia negli anni', s.varianti));

  var col=document.createElement('section'); col.className='section';
  col.innerHTML='<h3>Collaudo<span class="tag">provi, poi riveli</span></h3>';
  col.appendChild(collaudoBlock(s.collaudo)); m.appendChild(col);

  window.scrollTo(0,0);
}

window.addEventListener('DOMContentLoaded', showGate);
</script>
