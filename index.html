<style>
  :root{
    --bg:#0e1117; --panel:#161b22; --panel2:#1c232d; --border:#2b333d;
    --txt:#eef3f8; --muted:#b9c4d1; --accent:#4c8dff; --accent2:#8fb0ff;
    --ok:#2ea043; --okbg:#10331b; --bad:#d83a3a; --badbg:#3a1414;
    --warn:#d8a13a; --warnbg:#332a10;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    font-size:17px;line-height:1.5;}
  .wrap{max-width:820px;margin:0 auto;padding:24px 18px 80px;}
  h1{font-size:1.5rem;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:.92rem;margin:0 0 22px;}
  .hidden{display:none!important;}

  /* ---- MENU ---- */
  .mode-row{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
  .mode-btn{flex:1;min-width:220px;border:1px solid var(--border);background:var(--panel);
    color:var(--txt);padding:16px;border-radius:12px;cursor:pointer;text-align:left;
    transition:.15s;}
  .mode-btn:hover{border-color:var(--accent);background:var(--panel2);}
  .mode-btn b{font-size:1.05rem;}
  .mode-btn span{display:block;color:var(--muted);font-size:.85rem;margin-top:4px;}
  .mode-btn.primary{border-color:var(--accent);background:#13233f;}

  .pool-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:640px){.pool-grid{grid-template-columns:1fr;}}
  .pool-card{border:1px solid var(--border);background:var(--panel);border-radius:12px;
    padding:14px;cursor:pointer;transition:.15s;position:relative;}
  .pool-card:hover{border-color:var(--accent);background:var(--panel2);}
  .pool-card.empty{opacity:.55;cursor:not-allowed;}
  .pool-card.empty:hover{border-color:var(--border);background:var(--panel);}
  .pool-card .n{font-weight:600;font-size:.98rem;}
  .pool-card .meta{color:var(--muted);font-size:.8rem;margin-top:6px;}
  .badge{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;
    border-radius:20px;margin-top:8px;letter-spacing:.3px;}
  .badge.full{background:var(--okbg);color:#5fd980;border:1px solid #235c33;}
  .badge.todo{background:var(--warnbg);color:#e0b85a;border:1px solid #5c4a23;}

  /* ---- QUIZ ---- */
  .qhead{display:flex;justify-content:space-between;align-items:center;
    color:var(--muted);font-size:.82rem;margin-bottom:14px;gap:12px;}
  .qhead .src{font-style:italic;}
  .progress{height:5px;background:var(--panel2);border-radius:4px;overflow:hidden;margin-bottom:18px;}
  .progress > i{display:block;height:100%;background:var(--accent);width:0;transition:.3s;}

  .fig{background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:12px;margin:0 0 16px;text-align:center;overflow-x:auto;}
  .qtext{font-size:1.08rem;margin:0 0 18px;}
  .qtext .lbl{display:inline-block;background:var(--panel2);border:1px solid var(--border);
    color:var(--accent2);font-size:.72rem;font-weight:700;padding:1px 8px;border-radius:6px;
    margin-right:8px;vertical-align:middle;}

  .opts{display:flex;flex-direction:column;gap:10px;}
  .opt{border:1px solid var(--border);background:var(--panel);color:var(--txt);
    padding:13px 15px;border-radius:10px;cursor:pointer;text-align:left;
    font-size:1rem;transition:.12s;}
  .opt:hover:not(:disabled){border-color:var(--accent);background:var(--panel2);}
  .opt:disabled{cursor:default;}
  .opt.correct{border-color:var(--ok);background:var(--okbg);}
  .opt.wrong{border-color:var(--bad);background:var(--badbg);}

  .fb{margin-top:16px;border-radius:10px;padding:14px;font-size:.95rem;display:none;}
  .fb.show{display:block;}
  .fb.hint{background:var(--badbg);border:1px solid #6b2222;}
  .fb.hint b{color:#ff8585;}
  .fb.sol{background:var(--okbg);border:1px solid #235c33;}
  .fb.sol b{color:#5fd980;}

  .navrow{margin-top:20px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .cont{background:var(--accent);color:#fff;border:none;padding:12px 20px;border-radius:10px;
    font-size:1rem;font-weight:600;cursor:pointer;transition:.12s;}
  .cont:hover{background:var(--accent2);}
  .menu-btn{background:transparent;color:var(--muted);border:1px solid var(--border);
    padding:10px 16px;border-radius:10px;cursor:pointer;font-size:.9rem;}
  .menu-btn:hover{color:var(--txt);border-color:var(--accent);}

  .end{text-align:center;padding:40px 10px;}
  .end h2{font-size:1.4rem;}
  .end .score{font-size:2.2rem;font-weight:700;color:var(--accent2);margin:10px 0;}

  .katex{font-size:1.02em;color:var(--txt);}
  .mode-btn.primary span{color:#cdd8e6;}
  .katex-display{margin:.4em 0;}
</style>

<div class="wrap">

  <!-- ===================== MENU ===================== -->
  <section id="menu">
    <h1>Quiz Analisi Vettoriale — Secondo Esonero</h1>

  <!-- ===================== QUIZ ===================== -->

      <span id="qpos"></span>

    <div class="progress"><i id="qbar"></i></div>

    <p class="qtext" id="qtext"></p>
    <div class="opts" id="qopts"></div>

    <div class="fb hint" id="qhint"></div>
    <div class="fb sol" id="qsol"></div>

    <div class="navrow">
      <button class="menu-btn" onclick="toMenu()">&#8592; Menu</button>
      <button class="cont hidden" id="qcont"></button>
    </div>
  </section>

  <!-- ===================== END ===================== -->
  <section id="end" class="hidden">
    <div class="end">
      <h2>Pool completato</h2>
      <div class="score" id="endScore"></div>
      <p class="sub" id="endMsg"></p>
      <button class="cont" onclick="toMenu()">Torna al menu</button>
    </div>
  </section>

</div>

var Q = {"edo":[{"pool":"edo","src":"20240122 Es.5","steps":[{"t":"Il problema $y'=f(t,y)$, $y(t_0)=y_0$ ha soluzione locale unica se, in un intorno di $(t_0,y_0)$:","opts":[{"x":"$f(t,u)$ &egrave; continua ed &egrave; lipschitziana rispetto a $u$ (uniformemente in $t$)","c":true},{"x":"$f(t,y(t))$ &egrave; di classe $C^1$ lungo la soluzione"},{"x":"la soluzione $y(t)$ &egrave; lipschitziana"},{"x":"$f$ &egrave; limitata in un intorno del dato"}],"hint":"L'ipotesi &egrave; su $f$ come funzione delle DUE variabili indipendenti $(t,u)$, non sulla soluzione (che ancora non esiste).","sol":"<b>Teorema di Cauchy-Lipschitz.</b> La condizione si formula su $f(t,u)$ vista come funzione di due variabili indipendenti: continuit&agrave; in $(t,u)$ e lipschitzianit&agrave; in $u$. Scrivere '$f(t,y(t))\\in C^1$' &egrave; un errore concettuale segnalato nella soluzione ufficiale del compito 22/01/2024: la soluzione $y(t)$ non esiste ancora quando si verificano le ipotesi. In pratica basta $f\\in C^1$ in un intorno di $(t_0,y_0)$, che implica la lipschitzianit&agrave; locale."}]},{"pool":"edo","src":"tipo F &middot; manuale","steps":[{"t":"Per $y'=\\sqrt{|y|}$, $y(0)=0$, quante soluzioni massimali esistono?","opts":[{"x":"Infinite: l'unicit&agrave; cade perch&eacute; $\\sqrt{|y|}$ non &egrave; lipschitziana in $y=0$","c":true},{"x":"Una sola, per Cauchy-Lipschitz"},{"x":"Nessuna: il campo non &egrave; continuo in $0$"},{"x":"Esattamente due: $y\\equiv 0$ e $y=x^2/4$"}],"hint":"Il campo &egrave; continuo (Peano d&agrave; esistenza) ma la sua derivata in $y$ esplode a $y=0$: senza Lipschitz l'unicit&agrave; non &egrave; garantita.","sol":"<b>Dove cade Cauchy-Lipschitz.</b> $f(y)=\\sqrt{|y|}$ &egrave; continua (Teorema di Peano: esiste almeno una soluzione) ma $f'(y)=\\tfrac{1}{2\\sqrt{|y|}}\\to\\infty$ per $y\\to0$: non &egrave; lipschitziana attorno a $0$. Oltre a $y\\equiv0$ e $y=\\tfrac{x^2}{4}$ ($x\\ge0$), si costruiscono infinite soluzioni che restano nulle fino a un istante $a\\ge0$ e poi partono come $\\tfrac{(x-a)^2}{4}$. L'unicit&agrave; richiede la lipschitzianit&agrave;, qui assente sull'asse $y=0$."}]},{"pool":"edo","src":"tipo F &middot; manuale","steps":[{"t":"La sola continuit&agrave; di $f(t,u)$ (senza lipschitzianit&agrave;) garantisce:","opts":[{"x":"esistenza locale di almeno una soluzione, ma non l'unicit&agrave; (Teorema di Peano)","c":true},{"x":"esistenza e unicit&agrave; locale"},{"x":"n&eacute; esistenza n&eacute; unicit&agrave;"},{"x":"unicit&agrave; ma non esistenza globale"}],"hint":"Continuit&agrave; e lipschitzianit&agrave; giocano ruoli diversi: una d&agrave; l'esistenza, l'altra l'unicit&agrave;.","sol":"<b>Teorema di Peano.</b> Se $f$ &egrave; continua in un intorno di $(t_0,y_0)$ esiste almeno una soluzione locale. L'unicit&agrave; &egrave; un'informazione in pi&ugrave;, portata dalla lipschitzianit&agrave; in $u$ (Cauchy-Lipschitz). Il controesempio $y'=\\sqrt{|y|}$ mostra che senza Lipschitz l'unicit&agrave; pu&ograve; fallire pur restando l'esistenza."}]},{"pool":"edo","src":"20240704 Es.5","steps":[{"t":"$y'=f(t,y)$ ha $f$ localmente lipschitziana; $y\\equiv c$ &egrave; soluzione costante. Una soluzione con $y(t_0)>c$:","opts":[{"x":"resta $>c$ su tutto il suo intervallo massimale (non pu&ograve; attraversare $y\\equiv c$)","c":true},{"x":"pu&ograve; scendere sotto $c$ se $f$ diventa negativa"},{"x":"tende necessariamente a $c$"},{"x":"attraversa $y=c$ in un punto di tangenza"}],"hint":"Se la attraversasse, nel punto d'incontro due soluzioni distinte passerebbero per lo stesso dato: contro l'unicit&agrave;.","sol":"<b>Barriere e unicit&agrave;.</b> Se una soluzione toccasse $y\\equiv c$ in un istante $t^\\ast$, per $(t^\\ast,c)$ passerebbero due soluzioni distinte (la costante e la nostra), violando Cauchy-Lipschitz. Quindi le soluzioni costanti (gli equilibri, zeri di $f$) fanno da barriere invalicabili: il segno di $y-c$ resta costante. &Egrave; l'argomento che confina la soluzione in una striscia, usato in quasi ogni compito d'esame."}]},{"pool":"edo","src":"20240122 Es.5","steps":[{"t":"$y'=g(t)\\,y\\,h(y)$ con $g,h$ continue e $h(0)$ finito; $y(0)=y_0>0$. Il segno di $y(t)$:","opts":[{"x":"resta positivo: $y\\equiv0$ &egrave; soluzione e fa da barriera","c":true},{"x":"pu&ograve; cambiare quando $g(t)$ cambia segno"},{"x":"dipende dal segno di $h$"},{"x":"&egrave; positivo solo finch&eacute; $g(t)>0$"}],"hint":"$y=0$ annulla il campo: &egrave; una soluzione costante. Il dato positivo resta dalla stessa parte.","sol":"<b>Conservazione del segno.</b> $y\\equiv0$ annulla $y'=g\\,y\\,h(y)$: &egrave; equilibrio. Per unicit&agrave; la soluzione con $y_0>0$ non pu&ograve; raggiungere $0$, quindi $y(t)>0$ su tutto l'intervallo massimale, indipendentemente dal segno di $g$ o $h$. Il segno del dato iniziale &egrave; conservato dalla barriera $y=0$."}]},{"pool":"edo","src":"20240704 Es.5","steps":[{"t":"Per stabilire se una soluzione &egrave; crescente o decrescente SENZA risolvere $y'=f(t,y)$ si:","opts":[{"x":"determina il segno di $f(t,y(t))$ usando le barriere per localizzare $y(t)$","c":true},{"x":"risolve esplicitamente e si deriva"},{"x":"calcola $f'(y)$ e se ne guarda il segno"},{"x":"applica il teorema dell'asintoto"}],"hint":"$y'=f$: il segno di $y'$ &egrave; il segno del campo valutato dove sta la soluzione. Le barriere dicono dove sta.","sol":"<b>Monotonia qualitativa.</b> Poich&eacute; $y'(t)=f(t,y(t))$, il segno di $y'$ coincide con quello di $f$ lungo la soluzione. Le soluzioni costanti confinano $y(t)$ in una striscia; in quella striscia si studia il segno di $f$. Se ha segno costante, la soluzione &egrave; monotona. Non serve la formula esplicita di $y$."}]},{"pool":"edo","src":"20220124 Es.5","steps":[{"t":"$y'=4t^3(1-e^{y})$, $y(0)=\\log2$. In $t=0$ la soluzione ha:","opts":[{"x":"un punto di massimo: $y'>0$ per $t<0$ e $y'<0$ per $t>0$","c":true},{"x":"un punto di minimo"},{"x":"un flesso a tangente orizzontale"},{"x":"un comportamento monotono, senza estremi"}],"hint":"Il segno di $y'$ &egrave; il prodotto di $4t^3$ (che cambia segno in $0$) per $(1-e^y)$ (di segno costante). Non semplificare in fretta.","sol":"<b>Segno del campo (compito 24/01/2022).</b> Il dato $y(0)=\\log2>0$ e la barriera $y\\equiv0$ danno $y(t)>0$, quindi $1-e^{y}<0$ costante. Allora $\\operatorname{sgn}(y')=\\operatorname{sgn}(4t^3)\\cdot(-1)$: positivo per $t<0$, negativo per $t>0$. La soluzione cresce, raggiunge il massimo in $t=0$ e poi decresce. La monotonia si legge dal campo senza risolvere."}]},{"pool":"edo","src":"tipo F &middot; manuale","steps":[{"t":"Teorema dell'asintoto: se $y(t)\\to L$ finito per $t\\to+\\infty$ ED esiste $\\lim_{t\\to+\\infty}y'(t)$, allora:","opts":[{"x":"$\\lim_{t\\to+\\infty}y'(t)=0$","c":true},{"x":"$\\lim_{t\\to+\\infty}y'(t)=L$"},{"x":"$y'(t)$ pu&ograve; tendere a un valore qualsiasi"},{"x":"$L$ &egrave; necessariamente un equilibrio, per qualunque EDO"}],"hint":"Se il grafico tende a una retta orizzontale, la pendenza deve appiattirsi a zero.","sol":"<b>Teorema dell'asintoto.</b> Se $y\\to L$ finito e $y'$ ammette limite, quel limite &egrave; $0$: altrimenti $y$ crescerebbe o decrescerebbe indefinitamente, contraddicendo $y\\to L$. Per un'EDO autonoma $y'=f(y)$ ci&ograve; forza $f(L)=0$, cio&egrave; $L$ &egrave; un equilibrio; per un'EDO non autonoma la conclusione &egrave; solo $y'\\to0$."}]},{"pool":"edo","src":"20240122 Es.5","steps":[{"t":"Il teorema dell'asintoto pu&ograve; essere usato per DIMOSTRARE che $\\lim_{t\\to+\\infty}y(t)$ esiste?","opts":[{"x":"No: presuppone che il limite esista gi&agrave;; l'esistenza va provata a parte (di solito con monotonia + limitatezza)","c":true},{"x":"S&igrave;, il teorema garantisce sempre l'esistenza del limite"},{"x":"S&igrave;, se $f$ &egrave; continua"},{"x":"No, ma la garantisce se la soluzione &egrave; globale"}],"hint":"Il teorema calcola il VALORE del limite supponendolo esistente; non &egrave; un criterio di esistenza.","sol":"<b>Trappola d'esame.</b> Il teorema dell'asintoto ha come ipotesi l'esistenza del limite di $y$: ne deduce solo che $y'\\to0$. Per provare che il limite esiste serve un argomento indipendente: tipicamente la soluzione &egrave; monotona (segno costante di $y'$) e limitata (barriere), quindi converge per il teorema di monotonia. Solo dopo si usa l'asintoto per identificare il valore. Errore segnalato nelle soluzioni ufficiali."}]},{"pool":"edo","src":"luglioAV Es.2","steps":[{"t":"$y'=f(y)$ autonoma, $f$ localmente lipschitziana; $y$ monotona con $\\lim_{t\\to+\\infty}y(t)=L$ finito. Allora $L$:","opts":[{"x":"&egrave; un equilibrio: $f(L)=0$","c":true},{"x":"pu&ograve; essere qualsiasi valore del codominio"},{"x":"coincide con il dato iniziale"},{"x":"rende $f'(L)=0$"}],"hint":"Applica l'asintoto: $y'=f(y)\\to f(L)$ e deve valere $0$.","sol":"<b>Il limite &egrave; un equilibrio.</b> Per continuit&agrave; $y'=f(y)\\to f(L)$; per l'asintoto $y'\\to0$; quindi $f(L)=0$. Una soluzione monotona e limitata di un'autonoma converge sempre a un equilibrio, mai a un valore intermedio. &Egrave; il meccanismo che nel compito 21/07/2025 forza $y\\to3$."}]},{"pool":"edo","src":"20250127 Es.3","steps":[{"t":"Quale condizione su $f$ garantisce che ogni soluzione di $y'=f(t,y)$ &egrave; definita su tutto $\\mathbb{R}$?","opts":[{"x":"sublinearit&agrave;: $|f(t,u)|\\le L_1(t)|u|+L_2(t)$ con $L_1,L_2$ continue","c":true},{"x":"$f$ limitata rispetto a $t$"},{"x":"$f$ di classe $C^\\infty$"},{"x":"$f(t,u)\\to0$ per $|u|\\to\\infty$"}],"hint":"La crescita al pi&ugrave; lineare in $u$ impedisce l'esplosione in tempo finito.","sol":"<b>Teorema di esistenza globale.</b> Se $f$ &egrave; localmente lipschitziana e sublineare, $|f(t,u)|\\le L_1(t)|u|+L_2(t)$, per il lemma di Gronwall la soluzione non pu&ograve; divergere in tempo finito: l'intervallo massimale &egrave; tutto $\\mathbb{R}$. La regolarit&agrave; $C^\\infty$ da sola non basta ($y'=y^2$ &egrave; liscio ma esplode)."}]},{"pool":"edo","src":"20240122 Es.5","steps":[{"t":"Una soluzione &egrave; crescente e a priori NON limitata. Per provarne la globalit&agrave; conviene usare:","opts":[{"x":"la sublinearit&agrave; di $f$: controlla la crescita anche se $y$ &egrave; illimitata","c":true},{"x":"una stima a priori $|y|\\le M$"},{"x":"il teorema dell'asintoto"},{"x":"l'unicit&agrave; di Cauchy-Lipschitz"}],"hint":"Se la soluzione non &egrave; limitata, una stima del tipo $|y|\\le M$ &egrave; falsa: serve controllare il TASSO di crescita.","sol":"<b>Due strade per la globalit&agrave;.</b> Se la soluzione resta in un compatto (barriere) basta la limitatezza a priori. Se invece &egrave; illimitata &mdash; come nel punto ii del compito 22/01/2024 &mdash; la limitatezza fallisce e si usa la sublinearit&agrave;: $|f(t,u)|\\le L_1(t)|u|+L_2(t)$ impedisce l'esplosione controllando la velocit&agrave; di crescita, non il valore."}]},{"pool":"edo","src":"tipo F &middot; manuale","steps":[{"t":"Perch&eacute; $y'=1+y^2$, $y(0)=0$ NON &egrave; definita su tutto $\\mathbb{R}$?","opts":[{"x":"cresce pi&ugrave; che linearmente ($y^2$): esplode in tempo finito, intervallo $(-\\pi/2,\\pi/2)$","c":true},{"x":"il campo non &egrave; continuo"},{"x":"manca l'unicit&agrave;"},{"x":"il dato iniziale &egrave; un equilibrio"}],"hint":"La crescita quadratica viola la sublinearit&agrave;: la soluzione $\\tan t$ ha un asintoto verticale.","sol":"<b>Esplosione in tempo finito.</b> La soluzione &egrave; $y=\\tan t$, con asintoti in $\\pm\\pi/2$: l'intervallo massimale &egrave; $(-\\pi/2,\\pi/2)$, non $\\mathbb{R}$. Il campo $1+y^2$ cresce quadraticamente, viola la sublinearit&agrave;, e il teorema di esistenza globale non si applica. La superlinearit&agrave; &egrave; la causa tipica di un intervallo massimale limitato pur con campo liscio."}]},{"pool":"edo","src":"tipo F &middot; manuale","steps":[{"t":"Una soluzione massimale definita su $(a,b)$ con $b<+\\infty$ finito, per $t\\to b^-$:","opts":[{"x":"esce da ogni compatto (esplode o raggiunge il bordo del dominio di $f$)","c":true},{"x":"tende sempre a un limite finito in $b$"},{"x":"&egrave; sempre prolungabile oltre $b$"},{"x":"ha necessariamente $y'\\to0$ in $b$"}],"hint":"Se la soluzione restasse in un compatto fino a $b$, la si potrebbe riattaccare oltre $b$: contro la massimalit&agrave;.","sol":"<b>Criterio di fuga dai compatti.</b> Se l'estremo destro $b$ dell'intervallo massimale &egrave; finito, la soluzione non pu&ograve; restare confinata in un compatto contenuto nel dominio di $f$: altrimenti il teorema locale la prolungherebbe oltre $b$. Quindi o $|y(t)|\\to\\infty$ (blow-up) o $(t,y(t))$ raggiunge il bordo dove $f$ perde regolarit&agrave;. &Egrave; il criterio che lega intervallo massimale finito ed esplosione."}]},{"pool":"edo","src":"tipo F &middot; manuale","steps":[{"t":"Per l'autonoma $y'=f(y)$ un equilibrio $y^\\ast$ (con $f(y^\\ast)=0$) &egrave; asintoticamente stabile se:","opts":[{"x":"$f'(y^\\ast)<0$","c":true},{"x":"$f'(y^\\ast)>0$"},{"x":"$f'(y^\\ast)=0$"},{"x":"$f(y^\\ast)>0$"}],"hint":"Linearizza: vicino a $y^\\ast$, la perturbazione $\\eta$ soddisfa $\\eta'\\approx f'(y^\\ast)\\eta$.","sol":"<b>Stabilit&agrave; per linearizzazione.</b> Posto $y=y^\\ast+\\eta$, $\\eta'=f(y^\\ast+\\eta)\\approx f'(y^\\ast)\\eta$, quindi $\\eta\\sim e^{f'(y^\\ast)t}$. Se $f'(y^\\ast)<0$ le perturbazioni decadono: equilibrio stabile (pozzo); se $f'(y^\\ast)>0$ crescono: instabile (sorgente). Il caso $f'(y^\\ast)=0$ &egrave; ambiguo e va studiato col segno di $f$ ai due lati."}]},{"pool":"edo","src":"prop_andrea Es.5","steps":[{"t":"$y'=\\dfrac{(y^2+1)y}{t}$: il campo $f(t,y)=\\dfrac{(y^2+1)y}{t}$ NON &egrave; $C^1$ dove:","opts":[{"x":"sull'asse $t=0$; l&igrave; Cauchy-Lipschitz non si applica, ma vale localmente per $t\\neq0$","c":true},{"x":"sull'asse $y=0$"},{"x":"ovunque, perch&eacute; $y^2+1$ non &egrave; lineare"},{"x":"nei punti con $y=\\pm1$"}],"hint":"Il denominatore $t$ si annulla solo su $t=0$: l&igrave; il campo esplode.","sol":"<b>Dominio di regolarit&agrave; (compito 27/06/2025).</b> $f$ &egrave; $C^1$ su ogni semipiano $t>0$ o $t<0$, ma non &egrave; definita su $t=0$. Cauchy-Lipschitz garantisce esistenza e unicit&agrave; locale in un intorno di un dato con $t_0\\neq0$; con dato su $t=0$ il teorema non si applica direttamente e l'esistenza va discussa a parte. Individuare la retta di singolarit&agrave; &egrave; il primo passo."}]},{"pool":"edo","src":"tipo F &middot; manuale","steps":[{"t":"Risolvi $y'=xy^2$, $y(0)=1$ (separabile). La soluzione &egrave;:","opts":[{"x":"$y(x)=\\dfrac{1}{1-x^2/2}$","c":true},{"x":"$y(x)=\\dfrac{1}{1+x^2/2}$"},{"x":"$y(x)=e^{x^2/2}$"},{"x":"$y(x)=1+\\dfrac{x^2}{2}$"}],"hint":"Separando: $\\int y^{-2}\\,dy=\\int x\\,dx$ d&agrave; $-1/y=x^2/2+c$; imponi $y(0)=1$.","sol":"<b>Variabili separabili.</b> $\\dfrac{dy}{y^2}=x\\,dx\\Rightarrow -\\dfrac1y=\\dfrac{x^2}{2}+c$. Da $y(0)=1$: $c=-1$, quindi $-\\dfrac1y=\\dfrac{x^2}{2}-1$ e $y=\\dfrac{1}{1-x^2/2}$.","cont":"Ora il dominio &rarr;"},{"t":"Qual &egrave; l'intervallo massimale di $y=\\dfrac{1}{1-x^2/2}$?","opts":[{"x":"$(-\\sqrt2,\\sqrt2)$: la soluzione esplode a $x=\\pm\\sqrt2$","c":true},{"x":"$\\mathbb{R}$"},{"x":"$(0,\\sqrt2)$"},{"x":"$(-1,1)$"}],"hint":"Il denominatore $1-x^2/2$ si annulla dove?","sol":"<b>Intervallo massimale.</b> Il denominatore si annulla in $x=\\pm\\sqrt2$: la soluzione ha asintoti verticali e l'intervallo massimale che contiene $x=0$ &egrave; $(-\\sqrt2,\\sqrt2)$. Blow-up in tempo finito dovuto alla non linearit&agrave; ($y^2$)."}]},{"pool":"edo","src":"tipo F &middot; manuale","steps":[{"t":"Risolvi $y'+\\dfrac{1}{x}y=x^2$ su $x>0$, $y(1)=0$ (fattore integrante). La soluzione &egrave;:","opts":[{"x":"$y(x)=\\dfrac{x^3}{4}-\\dfrac{1}{4x}$","c":true},{"x":"$y(x)=\\dfrac{x^3}{4}+\\dfrac{1}{4x}$"},{"x":"$y(x)=\\dfrac{x^4}{4}-\\dfrac14$"},{"x":"$y(x)=x^3-1$"}],"hint":"$\\mu=e^{\\int dx/x}=x$; allora $(xy)'=x^3$. Non dimenticare la costante e imponila con $y(1)=0$.","sol":"<b>Lineare del primo ordine.</b> Fattore integrante $\\mu=e^{\\int \\frac1x dx}=x$. Moltiplicando: $(xy)'=x\\cdot x^2=x^3$, quindi $xy=\\dfrac{x^4}{4}+c$ e $y=\\dfrac{x^3}{4}+\\dfrac{c}{x}$. Da $y(1)=0$: $\\dfrac14+c=0\\Rightarrow c=-\\dfrac14$. Risultato $y=\\dfrac{x^3}{4}-\\dfrac{1}{4x}$."}]},{"pool":"edo","src":"tipo F &middot; manuale","steps":[{"t":"Risolvi $y'+y=y^2$ (Bernoulli, $n=2$). La soluzione generale &egrave;:","opts":[{"x":"$y=\\dfrac{1}{1+ce^{x}}$","c":true},{"x":"$y=\\dfrac{1}{1+ce^{-x}}$"},{"x":"$y=1+ce^{x}$"},{"x":"$y=ce^{x}-x$"}],"hint":"Sostituzione $z=y^{1-n}=y^{-1}$: l'equazione diventa LINEARE in $z$. Attento al segno di $z'$.","sol":"<b>Bernoulli.</b> Con $z=y^{-1}$ si ha $z'=-y^{-2}y'$; dividendo l'EDO per $y^2$: $z'-z=-1$. Lineare, $\\mu=e^{-x}$: $(e^{-x}z)'=-e^{-x}$, quindi $z=1+ce^{x}$. Tornando indietro: $y=1/z=\\dfrac{1}{1+ce^{x}}$."}]},{"pool":"edo","src":"20230705 Es.5","steps":[{"t":"$y'=\\dfrac{2}{t}y+4t^2y^3$, $y(1)=1$ (Bernoulli $n=3$). Con $z=y^{-2}$ l'equazione in $z$ &egrave;:","opts":[{"x":"$z'=-\\dfrac{4}{t}z-8t^2$","c":true},{"x":"$z'=\\dfrac{4}{t}z+8t^2$"},{"x":"$z'=-\\dfrac{2}{t}z-4t^2$"},{"x":"$z'=\\dfrac{4}{t}z-8t^2$"}],"hint":"$z=y^{-2}\\Rightarrow z'=-2y^{-3}y'$. Dividi l'EDO per $y^3$ e moltiplica per $-2$.","sol":"<b>Bernoulli, riduzione a lineare.</b> $z=y^{-2}$, $z'=-2y^{-3}y'$. Dividendo $y'=\\frac2t y+4t^2y^3$ per $y^3$: $y^{-3}y'=\\frac2t y^{-2}+4t^2$, cio&egrave; $-\\frac12 z'=\\frac2t z+4t^2$. Moltiplicando per $-2$: $z'=-\\dfrac4t z-8t^2$.","cont":"Risolvi e trova il dominio &rarr;"},{"t":"Risolta la lineare (con $z(1)=1$) si ottiene $y=\\sqrt{\\dfrac{7t^4}{15-8t^7}}$. Il dominio massimale &egrave;:","opts":[{"x":"$\\left(0,\\ \\sqrt[7]{15/8}\\right)$","c":true},{"x":"$(0,+\\infty)$"},{"x":"$\\left(-\\sqrt[7]{15/8},\\ \\sqrt[7]{15/8}\\right)$"},{"x":"$(1,+\\infty)$"}],"hint":"Servono $t>0$ (dalla lineare, $\\mu=t^4$, e dato in $t=1$) e radicando positivo: $15-8t^7>0$.","sol":"<b>Dominio massimale.</b> Il fattore integrante $\\mu=t^4$ e il dato in $t=1$ collocano l'intervallo in $t>0$. Il radicando richiede $15-8t^7>0\\Rightarrow t<\\sqrt[7]{15/8}$, dove il denominatore si annulla (blow-up). Intervallo massimale: $\\left(0,\\sqrt[7]{15/8}\\right)$."}]},{"pool":"edo","src":"tipo F &middot; manuale","steps":[{"t":"$y'=y(1-y)$, $y(0)=1/2$. Senza risolvere, individua equilibri e comportamento:","opts":[{"x":"equilibri $0$ e $1$; $y$ cresce in $(0,1)$, con $y\\to1$ per $t\\to+\\infty$ e $y\\to0$ per $t\\to-\\infty$","c":true},{"x":"equilibri $0$ e $1$; $y$ decresce verso $0$"},{"x":"nessun equilibrio; $y$ esplode in tempo finito"},{"x":"equilibrio solo in $1$; $y$ costante"}],"hint":"$f(y)=y(1-y)$: zeri in $0$ e $1$; in $(0,1)$ &egrave; positivo. Stabilit&agrave; dal segno di $f'$.","sol":"<b>Modello logistico.</b> Zeri di $f=y(1-y)$: equilibri $0$ e $1$. Il dato $1/2\\in(0,1)$ vi resta per le barriere; l&igrave; $f>0$, quindi $y$ cresce. Monotona e limitata $\\Rightarrow$ converge a un equilibrio: $y\\to1$ (stabile, $f'(1)=-1<0$) per $t\\to+\\infty$ e $y\\to0$ (instabile) per $t\\to-\\infty$. Esplicitamente $y=\\dfrac{1}{1+e^{-x}}$."}]},{"pool":"edo","src":"20240704 Es.5","steps":[{"t":"$y'=\\dfrac{y(y-2)}{1+t}$, $y(0)=1$, $t>-1$. Il comportamento della soluzione &egrave;:","opts":[{"x":"$0<y<2$ per sempre, e $y$ &egrave; strettamente decrescente","c":true},{"x":"$y$ cresce verso $2$"},{"x":"$y$ esce da $(0,2)$ quando $1+t$ diventa grande"},{"x":"$y$ &egrave; costante uguale a $1$"}],"hint":"Equilibri $y=0$ e $y=2$: il dato $1$ &egrave; in mezzo. In $(0,2)$ studia il segno di $y(y-2)$ e di $1+t$.","sol":"<b>Barriere e segno (compito 04/07/2024).</b> Zeri del campo: $y=0$ e $y=2$. Il dato $y(0)=1\\in(0,2)$ vi resta confinato per unicit&agrave;. In $(0,2)$: $y>0$, $(y-2)<0$, $(1+t)>0$, quindi $y'<0$: la soluzione &egrave; decrescente. Limitata in $(0,2)$ e monotona: definita su tutto $[0,+\\infty)$, poich&eacute; non pu&ograve; esplodere restando in $(0,2)$."}]},{"pool":"edo","src":"luglioAV Es.2","steps":[{"t":"$y'=\\ln(1+y^2)(3-y)$, $y(0)=2$. In quale intervallo resta $y$ e con quale monotonia?","opts":[{"x":"$y\\in(0,3)$, strettamente crescente","c":true},{"x":"$y\\in(0,3)$, decrescente"},{"x":"$y>3$, crescente"},{"x":"$y\\in(2,+\\infty)$, illimitata"}],"hint":"Equilibri: $\\ln(1+y^2)=0\\Rightarrow y=0$ e $3-y=0\\Rightarrow y=3$. Il dato $2$ sta tra i due; controlla il segno del prodotto.","sol":"<b>Barriere e monotonia.</b> Equilibri $y=0$ e $y=3$. Il dato $y(0)=2\\in(0,3)$ vi resta. In $(0,3)$: $\\ln(1+y^2)>0$ e $(3-y)>0$, quindi $y'>0$: strettamente crescente, limitata sopra da $3$.","cont":"Verso quale limite? &rarr;"},{"t":"Poich&eacute; $y$ &egrave; crescente e limitata da $3$, per $t\\to+\\infty$:","opts":[{"x":"$y\\to3$: il limite esiste (monotonia+limitatezza) e deve essere un equilibrio (asintoto)","c":true},{"x":"$y\\to+\\infty$"},{"x":"$y$ pu&ograve; oscillare senza limite"},{"x":"$y\\to2$, resta al dato iniziale"}],"hint":"Prima l'ESISTENZA del limite (monotona e limitata), poi il VALORE con il teorema dell'asintoto.","sol":"<b>Comportamento asintotico.</b> Crescente e limitata da $3$: il limite $L\\le3$ esiste (teorema di monotonia). Per l'asintoto $y'\\to0$, quindi $\\ln(1+L^2)(3-L)=0$; poich&eacute; $\\ln(1+L^2)>0$ per $L>0$, deve essere $L=3$. Ordine corretto: monotonia+limitatezza per l'esistenza, asintoto per il valore."}]},{"pool":"edo","src":"20250127 Es.3","steps":[{"t":"$y'=\\dfrac{t(y-1)}{1+3y^2}$, $y(0)=1/2$. La soluzione &egrave; definita su tutto $\\mathbb{R}$ perch&eacute;:","opts":[{"x":"&egrave; sublineare: $|f|\\le|t||y|+|t|$, quindi vale il teorema di esistenza globale","c":true},{"x":"&egrave; limitata a priori tra $0$ e $1$"},{"x":"il campo &egrave; costante"},{"x":"$y=1$ &egrave; l'unica soluzione"}],"hint":"Stima $\\left|\\dfrac{t(y-1)}{1+3y^2}\\right|$: il denominatore &egrave; $\\ge1$, e $|y-1|\\le|y|+1$.","sol":"<b>Esistenza globale per sublinearit&agrave; (compito 27/01/2025).</b> Poich&eacute; $1+3y^2\\ge1$, $|f(t,y)|\\le|t|\\,|y-1|\\le|t|\\,|y|+|t|$: sublineare con $L_1(t)=L_2(t)=|t|$ continue. Il teorema di esistenza globale d&agrave; soluzione su tutto $\\mathbb{R}$. L'equilibrio $y=1$ con $y(0)=1/2<1$ dice inoltre $y<1$ sempre, ma la globalit&agrave; qui viene dalla sublinearit&agrave;."}]},{"pool":"edo","src":"20240122 Es.5","steps":[{"t":"$y'=\\dfrac{y^2}{1+y^2}e^{t}$, $y(0)=2$. Perch&eacute; la soluzione &egrave; globale (definita su tutto $\\mathbb{R}$)?","opts":[{"x":"il campo &egrave; sublineare: $|f(t,u)|=\\dfrac{u^2}{1+u^2}e^t\\le e^t$, funzione continua di $t$","c":true},{"x":"$y$ &egrave; limitata perch&eacute; $y^2/(1+y^2)<1$"},{"x":"$y$ tende a un equilibrio finito"},{"x":"il campo &egrave; costante in $t$"}],"hint":"$\\dfrac{u^2}{1+u^2}<1$ per ogni $u$: il campo &egrave; maggiorato da $e^t$, indipendente da $u$. Non confondere questo con la limitatezza di $y$.","sol":"<b>Sublinearit&agrave; con maggiorante in $t$ (compito 22/01/2024).</b> $\\dfrac{u^2}{1+u^2}<1$, quindi $|f(t,u)|\\le e^t=L_2(t)$ continua (caso $L_1=0$): sublineare, dunque globale. Attenzione: la soluzione stessa NON &egrave; limitata (cresce), quindi una stima a priori $|y|\\le M$ sarebbe falsa; a controllare l'esplosione &egrave; il tasso di crescita del campo, non il valore di $y$."}]},{"pool":"edo","src":"20220124 Es.5","steps":[{"t":"$y'=4t^3(1-e^{y})$, $y(0)=\\log2$. Dove ha un estremo la soluzione e di che tipo?","opts":[{"x":"massimo in $t=0$","c":true},{"x":"minimo in $t=0$"},{"x":"nessun estremo: &egrave; monotona"},{"x":"massimo in $t=1$"}],"hint":"$y(0)=\\log2>0$ e barriera $y=0$ danno $y>0$, quindi $1-e^y<0$ costante. Il segno di $y'$ segue $4t^3$.","sol":"<b>Estremo dal segno del campo.</b> $y(t)>0$ (dato positivo, barriera $y\\equiv0$), quindi $1-e^{y}<0$. Allora $y'=4t^3\\cdot(\\text{neg})$: $y'>0$ per $t<0$, $y'<0$ per $t>0$, $y'(0)=0$. La soluzione cresce fino a $t=0$ e poi decresce: massimo in $t=0$. Nessun calcolo esplicito richiesto."}]},{"pool":"edo","src":"20230210 Es.5","steps":[{"t":"$y'=\\dfrac{y(\\log y-n)}{t^2+1}$, $y(0)=1$ (con $n\\ge1$). Monotonia della soluzione:","opts":[{"x":"decrescente: resta in $(0,e^n)$ dove $\\log y-n<0$","c":true},{"x":"crescente verso $e^n$"},{"x":"costante uguale a $1$"},{"x":"cambia monotonia in $t=0$"}],"hint":"Equilibri: $y=0$ e $\\log y=n\\Rightarrow y=e^n$. Il dato $1$ &egrave; tra $0$ e $e^n$; l&igrave; $\\log y-n<0$ e $t^2+1>0$.","sol":"<b>Segno del campo (compito 10/02/2023).</b> Equilibri $y=0$ e $y=e^n$. Il dato $y(0)=1\\in(0,e^n)$ vi resta. In $(0,e^n)$: $y>0$, $\\log y-n<0$, $t^2+1>0$, quindi $y'<0$: decrescente.","cont":"La retta tangente in $t=0$ &rarr;"},{"t":"La retta tangente al grafico in $t=0$ &egrave;:","opts":[{"x":"$y=1-nt$","c":true},{"x":"$y=1+nt$"},{"x":"$y=1$"},{"x":"$y=e^n t$"}],"hint":"$y'(0)=\\dfrac{y(0)(\\log y(0)-n)}{0+1}$ con $y(0)=1$, $\\log1=0$.","sol":"<b>Retta tangente.</b> $y'(0)=\\dfrac{1\\cdot(\\log1-n)}{1}=-n$. La tangente in $(0,1)$ &egrave; $y=1+y'(0)\\,t=1-nt$. Coerente con la decrescenza."}]},{"pool":"edo","src":"tipo F &middot; manuale","steps":[{"t":"$y'=1+y^2$, $y(0)=0$. La soluzione e il suo intervallo massimale sono:","opts":[{"x":"$y=\\tan t$, intervallo $(-\\pi/2,\\pi/2)$","c":true},{"x":"$y=\\tan t$, intervallo $\\mathbb{R}$"},{"x":"$y=\\arctan t$, intervallo $\\mathbb{R}$"},{"x":"$y=e^{t}-1$, intervallo $\\mathbb{R}$"}],"hint":"Separabile: $\\int\\dfrac{dy}{1+y^2}=\\int dt$ d&agrave; $\\arctan y=t$. Dove esplode $\\tan t$?","sol":"<b>Blow-up in tempo finito.</b> Separando, $\\arctan y=t+c$ con $y(0)=0\\Rightarrow c=0$, quindi $y=\\tan t$. La soluzione esplode agli asintoti $\\pm\\pi/2$: intervallo massimale $(-\\pi/2,\\pi/2)$. Il campo $1+y^2$ &egrave; superlineare: la sublinearit&agrave; fallisce e la soluzione non &egrave; globale, pur essendo il campo liscio ovunque."}]},{"pool":"edo","src":"tipo F &middot; manuale","steps":[{"t":"$y'=y^2-1$. Classifica gli equilibri:","opts":[{"x":"$y=-1$ stabile ($f'=-2<0$), $y=1$ instabile ($f'=2>0$)","c":true},{"x":"$y=-1$ instabile, $y=1$ stabile"},{"x":"entrambi stabili"},{"x":"entrambi instabili"}],"hint":"Equilibri: $y^2-1=0\\Rightarrow y=\\pm1$. Stabilit&agrave;: segno di $f'(y)=2y$ nell'equilibrio.","sol":"<b>Stabilit&agrave; per linearizzazione.</b> $f(y)=y^2-1$, equilibri $\\pm1$. $f'(y)=2y$: $f'(-1)=-2<0\\Rightarrow y=-1$ asintoticamente stabile (pozzo); $f'(1)=2>0\\Rightarrow y=1$ instabile (sorgente). Coerente col segno di $f$: per $-1<y<1$ &egrave; $f<0$ (si scende verso $-1$), fuori &egrave; $f>0$ (ci si allontana da $1$)."}]},{"pool":"edo","src":"20220706 Es.5","steps":[{"t":"$y'=t^2y^2-y$, $y(0)=1$ (Bernoulli $n=2$). Con $z=y^{-1}$ l'equazione lineare &egrave;:","opts":[{"x":"$z'=z-t^2$","c":true},{"x":"$z'=-z+t^2$"},{"x":"$z'=t^2 z-1$"},{"x":"$z'+z=t^2$"}],"hint":"$z=y^{-1}\\Rightarrow z'=-y^{-2}y'$. Dividi l'EDO per $y^2$: $y^{-2}y'=t^2-y^{-1}$.","sol":"<b>Bernoulli (compito 06/07/2022).</b> $z=y^{-1}$, $z'=-y^{-2}y'$. Dividendo $y'=t^2y^2-y$ per $y^2$: $y^{-2}y'=t^2-y^{-1}=t^2-z$, cio&egrave; $-z'=t^2-z\\Rightarrow z'=z-t^2$. Risolvendo con $z(0)=1$ si trova $z=t^2+2t+2-e^{t}$ e $y=1/z$; l'insieme di definizione non &egrave; tutto $\\mathbb{R}$ (dove $z=0$, $y$ esplode)."}]},{"pool":"edo","src":"tipo F &middot; manuale","steps":[{"t":"Per $y'=\\sqrt{|y|}$, $y(0)=0$, la soluzione &egrave; unica?","opts":[{"x":"No: oltre a $y\\equiv0$ c'&egrave; $y=\\dfrac{x^2}{4}$ (e infinite altre); $\\sqrt{|y|}$ non &egrave; lipschitziana in $0$","c":true},{"x":"S&igrave;, per Cauchy-Lipschitz"},{"x":"No, perch&eacute; il campo non &egrave; continuo in $0$"},{"x":"S&igrave;, ma solo per $x>0$"}],"hint":"$\\sqrt{|y|}$ &egrave; continua (esiste soluzione) ma la derivata esplode a $y=0$: manca l'ipotesi di unicit&agrave;.","sol":"<b>Non unicit&agrave; (dove cade Cauchy-Lipschitz).</b> $f(y)=\\sqrt{|y|}$ &egrave; continua, quindi Peano d&agrave; esistenza. Ma $f$ non &egrave; lipschitziana in $y=0$: l'unicit&agrave; salta. Verifica diretta: $y\\equiv0$ risolve; anche $y=\\tfrac{x^2}{4}$ ($x\\ge0$) risolve, poich&eacute; $y'=\\tfrac x2=\\sqrt{x^2/4}=\\sqrt{y}$. Ritardando la partenza si ottengono infinite soluzioni."}]},{"pool":"edo","src":"tipo F &middot; manuale","steps":[{"t":"$y'=y^2$, $y(0)=1$. Soluzione e intervallo massimale:","opts":[{"x":"$y=\\dfrac{1}{1-x}$, intervallo $(-\\infty,1)$","c":true},{"x":"$y=\\dfrac{1}{1-x}$, intervallo $\\mathbb{R}$"},{"x":"$y=e^{x}$, intervallo $\\mathbb{R}$"},{"x":"$y=1+x^2$, intervallo $\\mathbb{R}$"}],"hint":"Separabile: $-1/y=x+c$. Dove esplode la soluzione? Il dato &egrave; in $x=0$.","sol":"<b>Intervallo massimale e blow-up.</b> Separando: $\\int y^{-2}\\,dy=\\int dx\\Rightarrow -\\dfrac1y=x+c$; $y(0)=1\\Rightarrow c=-1$, quindi $y=\\dfrac{1}{1-x}$. Esplode a $x=1$; l'intervallo massimale che contiene $0$ &egrave; $(-\\infty,1)$. Campo superlineare $y^2$: nessuna globalit&agrave; a destra."}]}],"superfici":[{"pool":"superfici","src":"tipo B · manuale","steps":[{"t":"Che cosa è una superficie parametrica regolare $\\Sigma$ in $\\mathbb{R}^3$?","opts":[{"x":"L'immagine di una mappa $X:D\\subset\\mathbb{R}^2\\to\\mathbb{R}^3$ di classe $C^1$ con $X_u\\times X_v\\neq 0$ nei punti interni","c":true},{"x":"Il grafico di una funzione $z=f(x,y)$, e nient'altro"},{"x":"Una curva $\\gamma:[a,b]\\to\\mathbb{R}^3$ percorsa due volte"},{"x":"Un insieme definito da una sola equazione $g(x,y,z)=0$, sempre e comunque"}],"hint":"Servono tre ingredienti: una mappa da un dominio 2D, differenziabilità $C^1$, vettori tangenti indipendenti.","sol":"Una superficie regolare è l'immagine di $X:D\\subset\\mathbb{R}^2\\to\\mathbb{R}^3$, $C^1$, con $X_u\\times X_v\\neq 0$ nei punti interni (definizione di superficie regolare, cap. Superfici). Il grafico $z=f(x,y)$ è solo un caso particolare; una singola equazione $g=0$ dà una superficie di livello, non una parametrizzazione."}]},{"pool":"superfici","src":"tipo B · manuale","steps":[{"t":"L'elemento d'area $dS$ di una superficie parametrizzata da $X(u,v)$ vale:","opts":[{"x":"$dS=\\|X_u\\times X_v\\|\\,du\\,dv$","c":true},{"x":"$dS=(X_u\\times X_v)\\,du\\,dv$ (un vettore)"},{"x":"$dS=\\|X_u\\|\\,\\|X_v\\|\\,du\\,dv$"},{"x":"$dS=(X_u\\cdot X_v)\\,du\\,dv$"}],"hint":"L'area di un parallelogramma è il MODULO del prodotto vettoriale: uno scalare, non un vettore.","sol":"$dS=\\|X_u\\times X_v\\|\\,du\\,dv$ (formula dell'area superficiale). Il prodotto vettoriale dà un vettore, ma l'area è la sua norma. $\\|X_u\\|\\,\\|X_v\\|$ sovrastima quando i tangenti non sono ortogonali; $X_u\\cdot X_v$ è lo scalare sbagliato."}]},{"pool":"superfici","src":"tipo B · manuale","steps":[{"t":"Perché nell'area compare proprio $\\|X_u\\times X_v\\|$?","opts":[{"x":"Perché $\\|X_u\\times X_v\\|$ è l'area del parallelogramma infinitesimo generato dai vettori tangenti $X_u\\,du$ e $X_v\\,dv$","c":true},{"x":"Perché è la lunghezza della diagonale del rettangolo dei parametri"},{"x":"Perché $X_u\\times X_v$ è sempre un versore"},{"x":"Perché $\\|X_u\\times X_v\\|=\\|X_u\\|+\\|X_v\\|$"}],"hint":"La mappa $X$ trasforma il rettangolino $du\\,dv$ nel piano dei parametri in un parallelogramma tangente sulla superficie.","sol":"$X$ manda il rettangolo $du\\times dv$ nel parallelogramma di lati $X_u\\,du$ e $X_v\\,dv$; la sua area è $\\|X_u\\times X_v\\|\\,du\\,dv$. Il prodotto vettoriale non è un versore (ha norma pari all'area), e la sua norma non è la somma delle norme."}]},{"pool":"superfici","src":"tipo B · manuale","steps":[{"t":"Per la superficie cartesiana $X(x,y)=(x,\\,y,\\,f(x,y))$, quanto vale $X_x\\times X_y$?","opts":[{"x":"$(-f_x,\\,-f_y,\\,1)$","c":true},{"x":"$(f_x,\\,f_y,\\,1)$"},{"x":"$(f_x,\\,f_y,\\,-1)$ sempre"},{"x":"$(1,\\,1,\\,f_x+f_y)$"}],"hint":"$X_x=(1,0,f_x)$, $X_y=(0,1,f_y)$: fai il determinante formale $3\\times3$.","sol":"$X_x=(1,0,f_x)$, $X_y=(0,1,f_y)$, quindi $X_x\\times X_y=(-f_x,-f_y,1)$: la terza componente è $+1$, la normale non normalizzata punta sempre verso l'alto (cap. Superfici, sottotipo cartesiano)."}]},{"pool":"superfici","src":"tipo B · manuale","steps":[{"t":"L'area di $\\Sigma:\\ z=f(x,y)$, $(x,y)\\in D$, è:","opts":[{"x":"$\\iint_D\\sqrt{1+f_x^2+f_y^2}\\,dx\\,dy$","c":true},{"x":"$\\iint_D (1+f_x^2+f_y^2)\\,dx\\,dy$"},{"x":"$\\iint_D\\sqrt{f_x^2+f_y^2}\\,dx\\,dy$"},{"x":"$\\iint_D\\sqrt{1+f_x+f_y}\\,dx\\,dy$"}],"hint":"È il modulo di $(-f_x,-f_y,1)$: la radice del quadrato delle tre componenti.","sol":"$A(\\Sigma)=\\iint_D\\|X_x\\times X_y\\|\\,dx\\,dy=\\iint_D\\sqrt{1+f_x^2+f_y^2}\\,dx\\,dy$. Dimenticare l'$1$ (dalla terza componente) o la radice sono gli errori più comuni."}]},{"pool":"superfici","src":"tipo B · manuale","steps":[{"t":"Orientare una superficie $\\Sigma$ significa:","opts":[{"x":"scegliere uno dei due versori normali $\\pm n$ con continuità su tutta la superficie","c":true},{"x":"scegliere il verso di percorrenza del dominio $D$ dei parametri"},{"x":"scegliere l'ordine con cui si integrano $u$ e $v$"},{"x":"scegliere il segno del jacobiano nel cambio di coordinate"}],"hint":"In ogni punto ci sono due normali opposte; orientare vuol dire sceglierne una in modo coerente ovunque.","sol":"Un'orientazione è un campo continuo di versori normali $n$ (uno dei due possibili) su tutta $\\Sigma$. Non tutte le superfici sono orientabili (il nastro di Möbius no), ma quelle d'esame lo sono. L'ordine di integrazione non c'entra con l'orientazione geometrica."}]},{"pool":"superfici","src":"20230210 Es.4 · b01 Tipo 8","steps":[{"t":"$\\Sigma$ è la calotta INFERIORE della frontiera di un solido $E$, parametrizzata come $z=f(x,y)$. Il prodotto $X_x\\times X_y=(-f_x,-f_y,1)$ ha terza componente positiva. Per il flusso USCENTE da $E$ devi:","opts":[{"x":"cambiare segno e usare $(f_x,f_y,-1)$, perché sulla calotta inferiore la normale uscente punta verso il basso","c":true},{"x":"usare $(-f_x,-f_y,1)$ così com'è"},{"x":"usare il versore costante $(0,0,1)$"},{"x":"normalizzare e basta: il verso non conta"}],"hint":"Uscente da $E$ significa allontanarsi dal solido; sotto $E$ questo vuol dire guardare in giù, terza componente $<0$.","sol":"$(-f_x,-f_y,1)$ punta verso l'alto, ma sotto il solido la normale USCENTE guarda in basso: si prende $-(X_x\\times X_y)=(f_x,f_y,-1)$. Il verso conta eccome: sbagliarlo cambia il segno del flusso (trappola ricorrente, 20230210 Es.4)."}]},{"pool":"superfici","src":"tipo B · manuale","steps":[{"t":"Il bordo $\\partial\\Sigma$ di una superficie parametrizzata da $X:D\\to\\mathbb{R}^3$ è:","opts":[{"x":"l'immagine $X(\\partial D)$ della frontiera del dominio dei parametri","c":true},{"x":"la frontiera $\\partial D$ nel piano dei parametri"},{"x":"l'insieme dei punti dove $X_u\\times X_v=0$"},{"x":"sempre un cerchio nello spazio"}],"hint":"Il bordo vive in $\\mathbb{R}^3$, sulla superficie: è dove finisce $D$, trasportato da $X$.","sol":"$\\partial\\Sigma=X(\\partial D)$: la frontiera del dominio dei parametri, mandata sulla superficie da $X$. È una curva in $\\mathbb{R}^3$ che giace su $\\Sigma$, non la frontiera piatta $\\partial D$ né il luogo di singolarità (b02 Tipo 3, trappola 5)."}]},{"pool":"superfici","src":"b02 Tipo 3 trappola 5","steps":[{"t":"$\\Sigma:\\ z=f(x,y)$ su $D=\\{x^2+y^2\\le R^2\\}$. Il bordo $\\partial\\Sigma$ è:","opts":[{"x":"la curva $\\gamma(t)=(R\\cos t,\\,R\\sin t,\\,f(R\\cos t,R\\sin t))$, che giace su $\\Sigma$","c":true},{"x":"il cerchio $x^2+y^2=R^2$ nel piano $z=0$"},{"x":"il disco $D$ stesso"},{"x":"vuoto, perché la superficie è chiusa"}],"hint":"Devi salire sulla superficie: la $z$ del bordo è $f$ valutata sul cerchio, non zero.","sol":"$\\partial\\Sigma=X(\\partial D)=\\{(R\\cos t,R\\sin t,f(R\\cos t,R\\sin t))\\}$. È una curva nello spazio che proietta sul cerchio $\\partial D$, non il cerchio piatto in $z=0$. Confonderli è l'errore classico (b02 Tipo 3, trappola 5)."}]},{"pool":"superfici","src":"tipo B · manuale","steps":[{"t":"La condizione di regolarità di una superficie parametrica in un punto interno è:","opts":[{"x":"$X_u\\times X_v\\neq 0$ (i vettori tangenti sono linearmente indipendenti)","c":true},{"x":"$X_u\\times X_v=0$"},{"x":"$X_u\\cdot X_v=0$ (tangenti ortogonali)"},{"x":"$\\|X_u\\|=\\|X_v\\|$"}],"hint":"Se il prodotto vettoriale si annulla, il piano tangente degenera e $dS=0$.","sol":"Regolare in un punto significa $X_u\\times X_v\\neq0$: i due tangenti generano un vero piano tangente. L'ortogonalità dei tangenti o l'uguaglianza delle norme non sono richieste. Questa è la condizione più spesso dimenticata (b02 Tipo 3, trappola 4)."}]},{"pool":"superfici","src":"b02 Tipo 3 trappola 3","steps":[{"t":"Nel calcolo del flusso $\\iint_\\Sigma F\\cdot n\\,dS$ tramite parametrizzazione, quanto vale $n\\,dS$?","opts":[{"x":"$(X_u\\times X_v)\\,du\\,dv$, senza normalizzare","c":true},{"x":"$\\dfrac{X_u\\times X_v}{\\|X_u\\times X_v\\|}\\,du\\,dv$"},{"x":"$\\|X_u\\times X_v\\|\\,du\\,dv$ (uno scalare)"},{"x":"$(X_u\\cdot X_v)\\,du\\,dv$"}],"hint":"Il modulo che normalizza $n$ e quello che compare in $dS$ si cancellano fra loro.","sol":"$n=\\dfrac{X_u\\times X_v}{\\|X_u\\times X_v\\|}$ e $dS=\\|X_u\\times X_v\\|\\,du\\,dv$, quindi $n\\,dS=(X_u\\times X_v)\\,du\\,dv$: il modulo si semplifica. Nel flusso NON si normalizza; si usa direttamente il prodotto vettoriale (b02 Tipo 3, trappola 3)."}]},{"pool":"superfici","src":"b02 sottotipo 3b","steps":[{"t":"Ruotando attorno all'asse $z$ il profilo $x=\\gamma(t)$, $z=t$, la parametrizzazione della superficie di rotazione è:","opts":[{"x":"$X(\\theta,t)=(\\gamma(t)\\cos\\theta,\\,\\gamma(t)\\sin\\theta,\\,t)$, $\\theta\\in[0,2\\pi]$","c":true},{"x":"$X(\\theta,t)=(\\gamma(t)\\cos\\theta,\\,\\gamma(t)\\sin\\theta,\\,\\gamma(t))$"},{"x":"$X(\\theta,t)=(t\\cos\\theta,\\,t\\sin\\theta,\\,\\gamma(t))$"},{"x":"$X(\\theta,t)=(\\cos\\theta,\\,\\sin\\theta,\\,\\gamma(t))$"}],"hint":"A quota $z=t$ il punto dista $\\gamma(t)$ dall'asse: ruotalo di $\\theta$ nel piano orizzontale.","sol":"$X(\\theta,t)=(\\gamma(t)\\cos\\theta,\\gamma(t)\\sin\\theta,t)$: il raggio dall'asse è $\\gamma(t)$, la quota resta $t$. Mettere $\\gamma(t)$ in terza componente confonde il profilo con l'altezza (b02 sottotipo 3b)."}]},{"pool":"superfici","src":"22gen24 Es.4 · b02 sottotipo 3b","steps":[{"t":"Per $X(\\theta,t)=(\\gamma\\cos\\theta,\\,\\gamma\\sin\\theta,\\,t)$ il vettore $X_\\theta\\times X_t$ vale:","opts":[{"x":"$(\\gamma\\cos\\theta,\\,\\gamma\\sin\\theta,\\,-\\gamma\\gamma')$","c":true},{"x":"$(\\gamma\\cos\\theta,\\,\\gamma\\sin\\theta,\\,\\gamma\\gamma')$"},{"x":"$(-\\gamma\\cos\\theta,\\,-\\gamma\\sin\\theta,\\,0)$"},{"x":"$(\\cos\\theta,\\,\\sin\\theta,\\,\\gamma')$"}],"hint":"La terza componente è $-\\gamma\\gamma'$: il suo segno decide se la normale punta dentro o fuori dal solido.","sol":"$X_\\theta=(-\\gamma\\sin\\theta,\\gamma\\cos\\theta,0)$, $X_t=(\\gamma'\\cos\\theta,\\gamma'\\sin\\theta,1)$; il prodotto è $(\\gamma\\cos\\theta,\\gamma\\sin\\theta,-\\gamma\\gamma')$. Il segno di $-\\gamma\\gamma'$ non è costante: la normale può puntare dentro per certi $z$ e fuori per altri (22gen24 Es.4, b02 trappola 6)."}]},{"pool":"superfici","src":"14feb25 Es.5 · tipo B","steps":[{"t":"Per la sfera $x=R\\sin\\phi\\cos\\theta$, $y=R\\sin\\phi\\sin\\theta$, $z=R\\cos\\phi$, l'elemento d'area $\\|X_\\phi\\times X_\\theta\\|$ vale:","opts":[{"x":"$R^2\\sin\\phi$","c":true},{"x":"$R\\sin\\phi$"},{"x":"$R^2$"},{"x":"$\\sqrt{1+R^2}$"}],"hint":"Non usare la formula cartesiana $\\sqrt{1+f_x^2+f_y^2}$: la sfera non è un grafico. Calcola il prodotto vettoriale sferico.","sol":"$\\|X_\\phi\\times X_\\theta\\|=R^2\\sin\\phi$, da cui $dS=R^2\\sin\\phi\\,d\\phi\\,d\\theta$. La formula cartesiana è sbagliata per superfici non-grafico: per la sfera si calcola direttamente (b01 Tipo 8, trappola sulle superfici non cartesiane)."}]},{"pool":"superfici","src":"27giu25 Es.1 · b02 sottotipo 3a","steps":[{"t":"$\\Sigma:\\ z=f(x,y)$ è la parte di piano che sta SOPRA il paraboloide, dove $f(x,y)\\ge x^2+y^2$. Il dominio $D$ dei parametri è:","opts":[{"x":"$\\{(x,y): f(x,y)\\ge x^2+y^2\\}$, cioè la proiezione del vincolo sul piano $xy$","c":true},{"x":"tutto $\\mathbb{R}^2$"},{"x":"il cerchio $x^2+y^2=1$"},{"x":"$\\{(x,y): f(x,y)=0\\}$"}],"hint":"Il dominio è l'ombra della superficie sul piano $xy$: risolvi la disuguaglianza che delimita $\\Sigma$.","sol":"$D$ è la proiezione di $\\Sigma$: l'insieme dei $(x,y)$ per cui il punto $(x,y,f)$ appartiene a $\\Sigma$, cioè $f(x,y)\\ge x^2+y^2$. Ignorare questo vincolo (prendere tutto $\\mathbb{R}^2$) invalida area e bordo (27giu25 Es.1, b02 trappola 1)."}]},{"pool":"superfici","src":"b02 Tipo 3 trappola 3","steps":[{"t":"Che relazione lega $\\sqrt{1+f_x^2+f_y^2}$ (fattore d'area) e $(-f_x,-f_y,1)$ (normale non normalizzata) di una superficie cartesiana?","opts":[{"x":"Il primo è il MODULO del secondo: $\\|(-f_x,-f_y,1)\\|=\\sqrt{1+f_x^2+f_y^2}$","c":true},{"x":"Sono lo stesso oggetto: uno scalare e un vettore intercambiabili"},{"x":"Il primo è il quadrato del secondo"},{"x":"Non c'è alcuna relazione"}],"hint":"L'area usa il modulo; il flusso usa il vettore. Stesso $(-f_x,-f_y,1)$, due usi diversi.","sol":"$\\sqrt{1+f_x^2+f_y^2}=\\|(-f_x,-f_y,1)\\|$: il fattore d'area è la NORMA della normale non normalizzata. Nell'area si usa lo scalare $\\|\\cdot\\|$; nel flusso il vettore $(-f_x,-f_y,1)$. Sono facce dello stesso oggetto (b02 Tipo 3, trappola 3)."}]},{"pool":"superfici","src":"20220124 Es.4 iii","steps":[{"t":"Calcola l'area di $\\Sigma:\\ z=x+3y+4$ con $(x,y)\\in D=\\{x^2+y^2\\le 4\\}$.","opts":[{"x":"$4\\pi\\sqrt{11}$","c":true},{"x":"$4\\pi$"},{"x":"$4\\pi\\sqrt{10}$"},{"x":"$2\\pi\\sqrt{11}$"}],"hint":"$f_x=1$, $f_y=3$: il fattore d'area è costante e esce dall'integrale; resta l'area del disco.","sol":"$\\sqrt{1+f_x^2+f_y^2}=\\sqrt{1+1+9}=\\sqrt{11}$, costante. Quindi $A=\\sqrt{11}\\cdot\\text{Area}(D)=\\sqrt{11}\\cdot 4\\pi=4\\pi\\sqrt{11}$ (formula dell'area cartesiana; 20220124 Es.4 iii). Il distrattore $\\sqrt{10}$ dimentica l'$1$."}]},{"pool":"superfici","src":"20220622 Es.4 i","steps":[{"t":"Calcola l'area di $\\Sigma:\\ z=1+\\tfrac{x^2}{2}+\\tfrac{y^2}{2}$ su $D=\\{x^2+y^2\\le 16\\}$.","opts":[{"x":"$\\dfrac{2\\pi}{3}\\,(17\\sqrt{17}-1)$","c":true},{"x":"$\\dfrac{2\\pi}{3}\\,(17\\sqrt{17}+1)$"},{"x":"$\\dfrac{\\pi}{3}\\,(17\\sqrt{17}-1)$"},{"x":"$16\\pi\\sqrt{17}$"}],"hint":"$f_x=x$, $f_y=y$: il fattore è $\\sqrt{1+x^2+y^2}$, non costante. Polari, e non dimenticare $\\rho\\,d\\rho$.","sol":"$\\sqrt{1+f_x^2+f_y^2}=\\sqrt{1+\\rho^2}$. In polari $A=\\int_0^{2\\pi}\\!\\!\\int_0^4\\sqrt{1+\\rho^2}\\,\\rho\\,d\\rho\\,d\\theta=2\\pi\\cdot\\tfrac{1}{3}\\big[(1+\\rho^2)^{3/2}\\big]_0^4=\\tfrac{2\\pi}{3}(17\\sqrt{17}-1)$ (formula dell'area cartesiana; 20220622 Es.4 i). Il distrattore $16\\pi\\sqrt{17}$ tratta il fattore come costante."}]},{"pool":"superfici","src":"20220706 Es.4 ii","steps":[{"t":"Calcola l'area di $\\Sigma:\\ z=4x+y+1$ su $x^2+y^2\\le 1$.","opts":[{"x":"$3\\sqrt{2}\\,\\pi$","c":true},{"x":"$\\sqrt{17}\\,\\pi$"},{"x":"$3\\pi$"},{"x":"$\\sqrt{2}\\,\\pi$"}],"hint":"$|\\nabla f|^2=16+1=17$; il fattore è $\\sqrt{1+17}$, non $\\sqrt{17}$.","sol":"$\\sqrt{1+f_x^2+f_y^2}=\\sqrt{1+16+1}=\\sqrt{18}=3\\sqrt{2}$, costante. $A=3\\sqrt{2}\\cdot\\pi$ (area del disco unitario $=\\pi$; 20220706 Es.4 ii). Il distrattore $\\sqrt{17}\\pi$ dimentica di sommare l'$1$."}]},{"pool":"superfici","src":"20230907 Es.4","steps":[{"t":"Calcola l'area di $\\Sigma:\\ z=2+x^2+(y-1)^2$ su $D=\\{x^2+(y-1)^2\\le 1\\}$.","opts":[{"x":"$\\dfrac{\\pi}{6}\\,(5\\sqrt{5}-1)$","c":true},{"x":"$\\dfrac{\\pi}{6}\\,(5\\sqrt{5}+1)$"},{"x":"$\\dfrac{\\pi}{3}\\,(5\\sqrt{5}-1)$"},{"x":"$\\pi(5\\sqrt{5}-1)$"}],"hint":"$f_x=2x$, $f_y=2(y-1)$: $|\\nabla f|^2=4(x^2+(y-1)^2)=4\\rho^2$ con polari CENTRATE in $(0,1)$.","sol":"Polari centrate in $(0,1)$: $x=\\rho\\cos\\theta$, $y-1=\\rho\\sin\\theta$, jacobiano $\\rho$. $A=\\int_0^{2\\pi}\\!\\!\\int_0^1\\sqrt{1+4\\rho^2}\\,\\rho\\,d\\rho\\,d\\theta=2\\pi\\cdot\\tfrac{1}{12}\\big[(1+4\\rho^2)^{3/2}\\big]_0^1=\\tfrac{\\pi}{6}(5\\sqrt{5}-1)$ (20230907 Es.4). Il centro del disco è $(0,1)$, non l'origine."}]},{"pool":"superfici","src":"20250127 Es.1","steps":[{"t":"Calcola l'area di $\\Sigma:\\ z+2x+y-2=0$ con $(x,y)\\in\\{x^2+y^2\\le 9\\}$.","opts":[{"x":"$9\\sqrt{6}\\,\\pi$","c":true},{"x":"$9\\sqrt{5}\\,\\pi$"},{"x":"$3\\sqrt{6}\\,\\pi$"},{"x":"$9\\pi$"}],"hint":"$z=-2x-y+2$, quindi $f_x=-2$, $f_y=-1$; fattore $\\sqrt{1+4+1}$, area del disco $9\\pi$.","sol":"$\\sqrt{1+f_x^2+f_y^2}=\\sqrt{1+4+1}=\\sqrt{6}$, costante. $A=\\sqrt{6}\\cdot 9\\pi=9\\sqrt{6}\\pi$ (area del disco di raggio 3 $=9\\pi$; 20250127 Es.1). Il distrattore $\\sqrt{5}$ dimentica l'$1$."}]},{"pool":"superfici","src":"20240209 Es.4","steps":[{"t":"Per $\\Sigma:\\ z=2x+2y+5$, quanto vale l'elemento d'area $\\sqrt{1+f_x^2+f_y^2}$?","opts":[{"x":"$3$","c":true},{"x":"$\\sqrt{5}$"},{"x":"$9$"},{"x":"$\\sqrt{8}$"}],"hint":"$f_x=f_y=2$: $\\sqrt{1+4+4}$.","sol":"$\\sqrt{1+2^2+2^2}=\\sqrt{9}=3$ (09feb24 Es.4). Il distrattore $\\sqrt{8}$ dimentica l'$1$; $9$ dimentica la radice."}]},{"pool":"superfici","src":"20240704 Es.3","steps":[{"t":"$\\Sigma:\\ z=4y+5$ con $x^2+y^2\\le z$. Determina il dominio $D$ dei parametri.","opts":[{"x":"$x^2+(y-2)^2\\le 9$: disco di centro $(0,2)$ e raggio 3","c":true},{"x":"$x^2+y^2\\le 5$"},{"x":"$x^2+y^2\\le 9$, centrato nell'origine"},{"x":"tutto il piano"}],"hint":"Sostituisci $z=4y+5$ nel vincolo $x^2+y^2\\le z$ e completa il quadrato in $y$.","sol":"$x^2+y^2\\le 4y+5\\iff x^2+(y-2)^2\\le 9$: disco di centro $(0,2)$, raggio 3 (20240704 Es.3, b02 trappola 1 sulla traslazione).","cont":"Ora l'area →"},{"t":"Con $D=\\{x^2+(y-2)^2\\le 9\\}$, calcola l'area di $\\Sigma:\\ z=4y+5$.","opts":[{"x":"$9\\sqrt{17}\\,\\pi$","c":true},{"x":"$9\\pi$"},{"x":"$3\\sqrt{17}\\,\\pi$"},{"x":"$9\\sqrt{17}$"}],"hint":"$f_x=0$, $f_y=4$: fattore $\\sqrt{1+16}=\\sqrt{17}$, costante; area del disco $9\\pi$.","sol":"$\\sqrt{1+0+16}=\\sqrt{17}$; $A=\\sqrt{17}\\cdot 9\\pi=9\\sqrt{17}\\pi$ (area del disco di raggio 3; 20240704 Es.3)."}]},{"pool":"superfici","src":"20240627 Es.1","steps":[{"t":"Trova il dominio $D$ di $\\Sigma:\\ z=2x+4y-4$ con $z\\ge x^2+y^2$.","opts":[{"x":"$(x-1)^2+(y-2)^2\\le 1$","c":true},{"x":"$x^2+y^2\\le 4$"},{"x":"$(x-1)^2+(y-2)^2\\le 5$"},{"x":"$(x-2)^2+(y-4)^2\\le 1$"}],"hint":"Imponi $x^2+y^2\\le 2x+4y-4$ e completa i quadrati in $x$ e in $y$.","sol":"$x^2+y^2\\le 2x+4y-4\\iff x^2-2x+y^2-4y+4\\le 0\\iff (x-1)^2+(y-2)^2\\le 1$: disco di centro $(1,2)$, raggio 1 (27giu25 Es.1). Il distrattore col $5$ dimentica di portare il $-4$ a sinistra."}]},{"pool":"superfici","src":"20240305 Es.3","steps":[{"t":"Per $\\Sigma:\\ z=\\sqrt{3}\\,x+1$, quanto vale l'elemento d'area?","opts":[{"x":"$2$","c":true},{"x":"$\\sqrt{3}$"},{"x":"$\\sqrt{2}$"},{"x":"$4$"}],"hint":"$f_x=\\sqrt{3}$, $f_y=0$: $\\sqrt{1+3+0}$.","sol":"$\\sqrt{1+(\\sqrt{3})^2+0}=\\sqrt{4}=2$ (05mar24 Es.3). Il distrattore $\\sqrt{3}$ dimentica l'$1$."}]},{"pool":"superfici","src":"20240704 Es.3","steps":[{"t":"Scrivi il bordo $\\partial\\Sigma$ di $\\Sigma:\\ z=4y+5$ su $D=\\{x^2+(y-2)^2\\le 9\\}$.","opts":[{"x":"$\\gamma(t)=(3\\cos t,\\ 2+3\\sin t,\\ 13+12\\sin t)$, $t\\in[0,2\\pi]$","c":true},{"x":"$\\gamma(t)=(3\\cos t,\\ 2+3\\sin t,\\ 8+12\\sin t)$"},{"x":"il cerchio $x^2+(y-2)^2=9$ nel piano $z=0$"},{"x":"$\\gamma(t)=(3\\cos t,\\ 3\\sin t,\\ 5)$"}],"hint":"Su $\\partial D$: $x=3\\cos t$, $y=2+3\\sin t$; poi $z=4y+5$ INCLUDENDO il $+5$.","sol":"$\\partial D$: $x=3\\cos t$, $y=2+3\\sin t$. Sul bordo $z=4y+5=4(2+3\\sin t)+5=13+12\\sin t$, quindi $\\gamma(t)=(3\\cos t,2+3\\sin t,13+12\\sin t)$ (20240704 Es.3). Il distrattore $8+12\\sin t$ dimentica il $+5$; il bordo NON è il cerchio piatto in $z=0$."}]},{"pool":"superfici","src":"20250127 Es.1","steps":[{"t":"Scrivi il bordo di $\\Sigma:\\ z=-2x-y+2$ su $D=\\{x^2+y^2\\le 9\\}$.","opts":[{"x":"$\\gamma(t)=(3\\cos t,\\ 3\\sin t,\\ -6\\cos t-3\\sin t+2)$","c":true},{"x":"$\\gamma(t)=(3\\cos t,\\ 3\\sin t,\\ 0)$"},{"x":"il cerchio $x^2+y^2=9$"},{"x":"$\\gamma(t)=(3\\cos t,\\ 3\\sin t,\\ -2\\cos t-\\sin t+2)$"}],"hint":"Sul cerchio $x=3\\cos t$, $y=3\\sin t$; sostituisci in $z=-2x-y+2$ tenendo i fattori $3$.","sol":"$z=-2(3\\cos t)-(3\\sin t)+2=-6\\cos t-3\\sin t+2$, quindi $\\gamma(t)=(3\\cos t,3\\sin t,-6\\cos t-3\\sin t+2)$ (20250127 Es.1). Il distrattore con $-2\\cos t-\\sin t$ dimentica di moltiplicare $x,y$ per il raggio 3."}]},{"pool":"superfici","src":"tipo B · manuale","steps":[{"t":"Calcola il flusso di $F=(0,0,z)$ attraverso $\\Sigma:\\ z=x+3y+4$ su $D=\\{x^2+y^2\\le 4\\}$, con normale a terza componente positiva.","opts":[{"x":"$16\\pi$","c":true},{"x":"$0$"},{"x":"$4\\pi\\sqrt{11}$"},{"x":"$32\\pi$"}],"hint":"$F\\cdot(X_x\\times X_y)=(0,0,z)\\cdot(-f_x,-f_y,1)=z$; poi $z=x+3y+4$ e su disco centrato $\\iint x=\\iint y=0$.","sol":"$n\\,dS=(-f_x,-f_y,1)\\,dx\\,dy$, quindi $\\iint_\\Sigma F\\cdot n\\,dS=\\iint_D (x+3y+4)\\,dx\\,dy$. Per simmetria $\\iint_D x=\\iint_D y=0$, resta $4\\cdot\\text{Area}(D)=4\\cdot4\\pi=16\\pi$ (flusso via parametrizzazione, b02 Tipo 3 trappola 3). Il distrattore $4\\pi\\sqrt{11}$ confonde flusso con area."}]},{"pool":"superfici","src":"20250127 Es.5 · b02 sottotipo 3b","steps":[{"t":"Ruotando attorno all'asse $z$ il profilo $x=1+t^2$, $z=t$, $t\\in[1,2]$, la parametrizzazione della superficie è:","opts":[{"x":"$X(\\theta,t)=((1+t^2)\\cos\\theta,\\ (1+t^2)\\sin\\theta,\\ t)$","c":true},{"x":"$X(\\theta,t)=(t\\cos\\theta,\\ t\\sin\\theta,\\ 1+t^2)$"},{"x":"$X(\\theta,t)=((1+t^2)\\cos\\theta,\\ (1+t^2)\\sin\\theta,\\ 1+t^2)$"},{"x":"$X(\\theta,t)=(\\cos\\theta,\\ \\sin\\theta,\\ t)$"}],"hint":"Il raggio dall'asse è $x=1+t^2$; la quota resta $z=t$.","sol":"$X(\\theta,t)=((1+t^2)\\cos\\theta,(1+t^2)\\sin\\theta,t)$, $\\theta\\in[0,2\\pi]$, $t\\in[1,2]$ (27gen25 Es.5). Scambiare raggio e quota (mettere $1+t^2$ in terza componente) è l'errore tipico."}]},{"pool":"superfici","src":"20250214 Es.5","steps":[{"t":"Per $\\Sigma=\\{x^2+y^2+z^2=9,\\ 0\\le y\\le x\\}$ in coordinate sferiche $x=3\\sin\\phi\\cos\\theta$, $y=3\\sin\\phi\\sin\\theta$, l'intervallo di $\\theta$ è:","opts":[{"x":"$\\theta\\in[0,\\tfrac{\\pi}{4}]$","c":true},{"x":"$\\theta\\in[0,\\tfrac{\\pi}{2}]$"},{"x":"$\\theta\\in[0,2\\pi]$"},{"x":"$\\theta\\in[\\tfrac{\\pi}{4},\\tfrac{\\pi}{2}]$"}],"hint":"Con $\\sin\\phi>0$, il vincolo $0\\le y\\le x$ diventa $0\\le\\sin\\theta\\le\\cos\\theta$, cioè $\\tan\\theta\\le 1$.","sol":"$0\\le y\\le x\\iff 0\\le\\sin\\theta\\le\\cos\\theta\\iff 0\\le\\tan\\theta\\le 1\\iff\\theta\\in[0,\\tfrac{\\pi}{4}]$; $\\phi\\in[0,\\pi]$ (14feb25 Es.5). Il settore è uno spicchio, non un ottante generico."}]},{"pool":"superfici","src":"20230210 Es.4 · b01 Tipo 8","steps":[{"t":"$E=\\{x^2+y^2+z^2\\le 25,\\ x^2+y^2\\le 9\\}$. Sulla calotta INFERIORE $\\Sigma_2:\\ z=-\\sqrt{25-x^2-y^2}$, la normale USCENTE da $E$ si ottiene da $X_x\\times X_y=(-f_x,-f_y,1)$:","opts":[{"x":"prendendo $-(X_x\\times X_y)$, perché sotto $E$ la normale uscente ha terza componente negativa","c":true},{"x":"prendendo $+(X_x\\times X_y)$ così com'è"},{"x":"usando il versore costante $(0,0,-1)$"},{"x":"l'orientazione è irrilevante per il flusso"}],"hint":"Sotto il solido, 'uscente' significa allontanarsi verso il basso: terza componente $<0$.","sol":"$(-f_x,-f_y,1)$ ha terza componente $+1$ (punta in alto, verso l'interno di $E$ sulla calotta inferiore). La normale uscente guarda in basso, quindi si usa $-(X_x\\times X_y)$ (20230210 Es.4; b01 Tipo 8, segno del normale). L'orientazione decide il segno del flusso: non è mai irrilevante."}]},{"pool":"superfici","src":"tipo B · manuale","steps":[{"t":"Usando $\\|X_\\phi\\times X_\\theta\\|=R^2\\sin\\phi$, calcola l'area della sfera di raggio $R$.","opts":[{"x":"$4\\pi R^2$","c":true},{"x":"$2\\pi R^2$"},{"x":"$\\tfrac{4}{3}\\pi R^3$"},{"x":"$\\pi R^2$"}],"hint":"$A=\\int_0^{2\\pi}\\!\\!\\int_0^\\pi R^2\\sin\\phi\\,d\\phi\\,d\\theta$; ricorda $\\int_0^\\pi\\sin\\phi\\,d\\phi=2$.","sol":"$A=\\int_0^{2\\pi}\\!\\!\\int_0^\\pi R^2\\sin\\phi\\,d\\phi\\,d\\theta=R^2\\cdot 2\\pi\\cdot 2=4\\pi R^2$ (formula dell'area superficiale). Il distrattore $\\tfrac{4}{3}\\pi R^3$ è il VOLUME, non l'area; $\\phi$ va da $0$ a $\\pi$, non a $2\\pi$."}]}],"curve":[{"pool":"curve","src":"20220124 Es.4","steps":[{"t":"La curva $\\gamma=\\{x^2+y^2=4,\\ z=x+3y+4\\}$. Una parametrizzazione corretta è:","opts":[{"x":"$(2\\cos t,\\,2\\sin t,\\,2\\cos t+6\\sin t+4)$, $t\\in[0,2\\pi]$","c":true},{"x":"$(\\cos t,\\,\\sin t,\\,\\cos t+3\\sin t+4)$"},{"x":"$(2\\cos t,\\,2\\sin t,\\,4)$"},{"x":"$(t,\\,t,\\,2t+4)$"}],"hint":"Dal cilindro $x^2+y^2=4$ prendi $x=2\\cos t$, $y=2\\sin t$ (raggio $2$), poi sostituisci nel piano per $z$.","sol":"$x=2\\cos t$, $y=2\\sin t$ soddisfa $x^2+y^2=4$; nel piano $z=x+3y+4=2\\cos t+6\\sin t+4$. Il raggio è $2$, non $1$: usarne $1$ è l'errore tipico.","cont":"Continua &rarr; la regolarità"},{"t":"La stessa $\\gamma$ è regolare su $(0,2\\pi)$?","opts":[{"x":"Sì: $\\|\\gamma'\\|^2\\ge (x')^2+(y')^2=4>0$","c":true},{"x":"No, si annulla in $t=\\pi$"},{"x":"No, non è semplice"},{"x":"Serve calcolare l'intero $\\|\\gamma'\\|^2$ per concludere"}],"hint":"Basta una minorazione: $\\|\\gamma'\\|^2\\ge (x')^2+(y')^2=4\\sin^2 t+4\\cos^2 t=4$, senza toccare $z'$.","sol":"$\\gamma'=(-2\\sin t,\\,2\\cos t,\\,\\ldots)$; già le prime due componenti danno $\\|\\gamma'\\|^2\\ge 4>0$. Vettore tangente mai nullo $\\Rightarrow$ curva regolare (definizione)."}]},{"pool":"curve","src":"tipo curve · manuale","steps":[{"t":"Nell'integrale di PRIMA specie $\\int_\\gamma f\\,ds$, l'elemento d'arco è:","opts":[{"x":"$ds=\\|\\gamma'(t)\\|\\,dt$","c":true},{"x":"$ds=\\gamma'(t)\\,dt$ (vettoriale)"},{"x":"$ds=dt$"},{"x":"$ds=\\|\\gamma(t)\\|\\,dt$"}],"hint":"$ds$ è uno SCALARE positivo: la NORMA del vettore velocità per $dt$, non il vettore velocità.","sol":"L'ascissa curvilinea è $s(t)=\\int_a^t\\|\\gamma'(\\tau)\\|\\,d\\tau$, quindi $ds=\\|\\gamma'(t)\\|\\,dt$: indipendente dall'orientazione (la norma è positiva)."}]},{"pool":"curve","src":"tipo curve · lavoro","steps":[{"t":"Il lavoro $\\int_\\gamma F\\cdot d\\ell$ (integrale di SECONDA specie) come cambia se inverti il verso di percorrenza di $\\gamma$?","opts":[{"x":"cambia SEGNO","c":true},{"x":"resta invariato"},{"x":"cambia solo se $F$ non è conservativo"},{"x":"si annulla"}],"hint":"$d\\ell=\\gamma'(t)\\,dt$ è VETTORIALE: invertire l'orientazione manda $\\gamma'\\to-\\gamma'$.","sol":"L'integrale di seconda specie è ORIENTATO: $\\int_{-\\gamma}F\\cdot d\\ell=-\\int_{\\gamma}F\\cdot d\\ell$, perché il versore tangente cambia verso. (Quello di prima specie, con $ds$, resta invariato.)"}]},{"pool":"curve","src":"tipo curve · trabocchetto orientazione","steps":[{"t":"L'integrale di PRIMA specie $\\int_\\gamma f\\,ds$ dipende dal verso di percorrenza?","opts":[{"x":"No: $ds=\\|\\gamma'\\|\\,dt>0$ è indipendente dall'orientazione","c":true},{"x":"Sì, cambia segno come il lavoro"},{"x":"Sì, solo se $f<0$"},{"x":"Dipende dalla parametrizzazione scelta"}],"hint":"Distingui: l'elemento d'arco $ds$ usa la NORMA (sempre positiva); solo l'integrale di SECONDA specie è orientato.","sol":"$ds=\\|\\gamma'\\|\\,dt$ non cambia segno invertendo l'orientazione né riparametrizzando, quindi $\\int_\\gamma f\\,ds$ è invariante (misura massa/lunghezza). Confonderlo col lavoro è la trappola."}]},{"pool":"curve","src":"20220706 Es.4","steps":[{"t":"Per $\\gamma(t)=(\\cos t,\\,\\sin t,\\,4\\cos t+\\sin t+1)$, l'argomento standard di regolarità è:","opts":[{"x":"$(x',y')=(-\\sin t,\\cos t)\\ne(0,0)$ perché seno e coseno non si annullano insieme","c":true},{"x":"$z'(t)\\ne 0$ per ogni $t$"},{"x":"è un cerchio, quindi regolare per definizione"},{"x":"$\\|\\gamma(t)\\|$ è costante"}],"hint":"Basta che le prime due componenti di $\\gamma'$ non siano simultaneamente nulle: $\\sin^2 t+\\cos^2 t=1$.","sol":"$\\gamma'=(-\\sin t,\\cos t,-4\\sin t+\\cos t)$; già $(-\\sin t,\\cos t)$ ha norma $1\\ne 0$, quindi $\\gamma'\\ne 0$ e la curva è regolare. $z'$ può annullarsi senza comprometterla."}]},{"pool":"curve","src":"tipo curve · trabocchetto semplicità","steps":[{"t":"La mappa $t\\mapsto(\\cos t,\\sin t)$ è semplice (iniettiva) su quale insieme?","opts":[{"x":"$[0,2\\pi)$ ma non su $[0,2\\pi]$ (gli estremi coincidono)","c":true},{"x":"tutto $\\mathbb{R}$"},{"x":"nessun intervallo"},{"x":"solo $[0,\\pi]$"}],"hint":"Per una curva CHIUSA la semplicità si richiede sull'intervallo semiaperto: gli estremi $0$ e $2\\pi$ danno lo stesso punto.","sol":"$(\\cos 0,\\sin 0)=(\\cos 2\\pi,\\sin 2\\pi)$: su $[0,2\\pi]$ la mappa non è iniettiva; su $[0,2\\pi)$ sì. È la definizione corretta di curva chiusa semplice."}]},{"pool":"curve","src":"20230210 Es.3","steps":[{"t":"Se $F=\\nabla U$ è conservativo e $\\gamma$ va da $A$ a $B$, il lavoro $\\int_\\gamma F\\cdot d\\ell$ vale:","opts":[{"x":"$U(B)-U(A)$, indipendente dal cammino","c":true},{"x":"$U(A)-U(B)$"},{"x":"$0$ sempre"},{"x":"il flusso del rotore attraverso $\\gamma$"}],"hint":"Teorema fondamentale per campi conservativi: dipende solo dagli estremi, nell'ordine finale meno iniziale.","sol":"$\\int_\\gamma \\nabla U\\cdot d\\ell=U(\\gamma(b))-U(\\gamma(a))=U(B)-U(A)$. Su curva chiusa ($A=B$) dà $0$. L'ordine è finale meno iniziale: invertirlo cambia segno (distrattore)."}]},{"pool":"curve","src":"tipo curve · riparametrizzazione","steps":[{"t":"L'integrale di seconda specie $\\int_\\gamma F\\cdot d\\ell$ come dipende dalla parametrizzazione della curva?","opts":[{"x":"È invariante per riparametrizzazioni che PRESERVANO l'orientazione; cambia solo di segno se l'orientazione si inverte","c":true},{"x":"Dipende dalla velocità di percorrenza scelta"},{"x":"Dipende dal dominio $[a,b]$ del parametro"},{"x":"È sempre lo stesso, anche invertendo il verso"}],"hint":"Riparametrizzare significa comporre con un cambio di variabile monotono: se crescente conserva il verso, se decrescente lo inverte.","sol":"Per il teorema di invarianza dell'integrale di linea, $\\int_\\gamma F\\cdot d\\ell$ non cambia sotto riparametrizzazioni $C^1$ con derivata positiva (stesso verso); una riparametrizzazione con derivata negativa inverte l'orientazione e cambia il segno. La velocità di percorrenza è irrilevante: contano solo il sostegno e il verso."}]},{"pool":"curve","src":"tipo curve · manuale (I specie)","steps":[{"t":"Calcola la lunghezza dell'elica $\\gamma(t)=(\\cos t,\\ \\sin t,\\ t)$, $t\\in[0,2\\pi]$, cioè $\\int_\\gamma 1\\,ds$.","opts":[{"x":"$2\\sqrt{2}\\,\\pi$","c":true},{"x":"$2\\pi$"},{"x":"$\\sqrt{2}\\,\\pi$"},{"x":"$4\\pi$"}],"hint":"$ds=\\|\\gamma'(t)\\|\\,dt$: includi anche la componente $z'=1$, non solo le due del cerchio.","sol":"Imposta $\\gamma'=(-\\sin t,\\cos t,1)$, da cui $\\|\\gamma'\\|=\\sqrt{\\sin^2 t+\\cos^2 t+1}=\\sqrt{2}$ (costante). Allora $L=\\int_\\gamma ds=\\int_0^{2\\pi}\\sqrt{2}\\,dt=2\\sqrt{2}\\,\\pi$. Definizione: $ds=\\|\\gamma'\\|\\,dt$. Dimenticare $z'$ dà $\\|\\gamma'\\|=1$ e il valore errato $2\\pi$."}]},{"pool":"curve","src":"tipo curve · manuale (I specie)","steps":[{"t":"Calcola $\\int_\\gamma x\\,ds$ sul quarto di circonferenza $\\gamma(t)=(2\\cos t,\\ 2\\sin t)$, $t\\in[0,\\pi/2]$.","opts":[{"x":"$4$","c":true},{"x":"$2$"},{"x":"$8$"},{"x":"$4\\pi$"}],"hint":"$ds=\\|\\gamma'\\|\\,dt$ con $\\|\\gamma'\\|=2$ (raggio $2$), non $dt$. Sostituisci anche $x=2\\cos t$ nell'integranda.","sol":"Passi: $\\gamma'=(-2\\sin t,2\\cos t)$, $\\|\\gamma'\\|=2$; $x=2\\cos t$. Quindi $\\int_\\gamma x\\,ds=\\int_0^{\\pi/2}(2\\cos t)\\cdot 2\\,dt=4\\int_0^{\\pi/2}\\cos t\\,dt=4[\\sin t]_0^{\\pi/2}=4$. Formula dell'integrale di I specie $\\int_\\gamma f\\,ds=\\int_a^b f(\\gamma(t))\\|\\gamma'(t)\\|\\,dt$. Omettere il fattore $\\|\\gamma'\\|=2$ dà l'errore $2$."}]},{"pool":"curve","src":"tipo curve · lavoro (II specie)","steps":[{"t":"Calcola il lavoro $\\int_\\gamma F\\cdot d\\ell$ del campo $F=(-y,\\ x)$ lungo la circonferenza unitaria $\\gamma(t)=(\\cos t,\\sin t)$, $t\\in[0,2\\pi]$ (verso antiorario).","opts":[{"x":"$2\\pi$","c":true},{"x":"$0$"},{"x":"$-2\\pi$"},{"x":"$\\pi$"}],"hint":"Scrivi $d\\ell=\\gamma'(t)\\,dt$ e valuta $F$ SU $\\gamma(t)$: $F(\\gamma)=(-\\sin t,\\cos t)$.","sol":"Passi: $\\gamma'=(-\\sin t,\\cos t)$ e $F(\\gamma)=(-\\sin t,\\cos t)$, quindi $F\\cdot\\gamma'=\\sin^2 t+\\cos^2 t=1$. $\\int_\\gamma F\\cdot d\\ell=\\int_0^{2\\pi}1\\,dt=2\\pi$. Il campo $(-y,x)$ non è conservativo (il suo rotore vale $2$): il lavoro su un giro chiuso non è nullo. Invertire il verso darebbe $-2\\pi$."}]},{"pool":"curve","src":"tipo curve · lavoro (II specie)","steps":[{"t":"Calcola $\\int_\\gamma F\\cdot d\\ell$ con $F=(x^2,\\ xy)$ lungo l'arco di parabola $\\gamma(t)=(t,\\ t^2)$, $t\\in[0,1]$.","opts":[{"x":"$\\dfrac{11}{15}$","c":true},{"x":"$\\dfrac{1}{3}$"},{"x":"$\\dfrac{2}{5}$"},{"x":"$\\dfrac{13}{15}$"}],"hint":"$d\\ell=(1,\\ 2t)\\,dt$: la seconda componente porta un fattore $2t$ da non dimenticare. Sostituisci $x=t$, $y=t^2$.","sol":"Passi: $\\gamma'=(1,2t)$; $F(\\gamma)=(t^2,\\ t\\cdot t^2)=(t^2,t^3)$. Allora $F\\cdot\\gamma'=t^2+2t\\cdot t^3=t^2+2t^4$ e $\\int_0^1(t^2+2t^4)\\,dt=\\tfrac13+\\tfrac25=\\tfrac{11}{15}$. Definizione di II specie: $\\int_\\gamma F\\cdot d\\ell=\\int_a^b F(\\gamma)\\cdot\\gamma'\\,dt$. Tralasciare il secondo addendo (il contributo $2t\\,dy$) dà $\\tfrac13$."}]},{"pool":"curve","src":"tipo curve · ascissa curvilinea","steps":[{"t":"Per $\\gamma(t)=(3\\cos t,\\ 3\\sin t)$, $t\\in[0,2\\pi]$, l'ascissa curvilinea $s(t)=\\int_0^t\\|\\gamma'(\\tau)\\|\\,d\\tau$ vale:","opts":[{"x":"$s(t)=3t$","c":true},{"x":"$s(t)=t$"},{"x":"$s(t)=9t$"},{"x":"$s(t)=\\tfrac{3}{2}t^2$"}],"hint":"$\\|\\gamma'\\|$ è costante per un cerchio di raggio $3$: vale $3$, non $1$.","sol":"$\\gamma'=(-3\\sin t,3\\cos t)$, $\\|\\gamma'\\|=\\sqrt{9\\sin^2 t+9\\cos^2 t}=3$. Quindi $s(t)=\\int_0^t 3\\,d\\tau=3t$; la lunghezza totale è $s(2\\pi)=6\\pi$ (circonferenza di raggio $3$).","cont":"Continua &rarr; la riparametrizzazione"},{"t":"Riparametrizzando $\\gamma$ con l'ascissa curvilinea (velocità unitaria), quale mappa $\\tilde\\gamma(s)$ si ottiene, $s\\in[0,6\\pi]$?","opts":[{"x":"$\\tilde\\gamma(s)=(3\\cos(s/3),\\ 3\\sin(s/3))$","c":true},{"x":"$\\tilde\\gamma(s)=(3\\cos(3s),\\ 3\\sin(3s))$"},{"x":"$\\tilde\\gamma(s)=(3\\cos s,\\ 3\\sin s)$"},{"x":"$\\tilde\\gamma(s)=(\\cos(s/3),\\ \\sin(s/3))$"}],"hint":"Da $s=3t$ ricava $t=s/3$ e sostituisci. Controlla poi che $\\|\\tilde\\gamma'(s)\\|=1$.","sol":"Invertendo $s=3t$ si ottiene $t=s/3$: $\\tilde\\gamma(s)=\\gamma(s/3)=(3\\cos(s/3),3\\sin(s/3))$. Verifica: $\\tilde\\gamma'=(-\\sin(s/3),\\cos(s/3))$, $\\|\\tilde\\gamma'\\|=1$. La riparametrizzazione per ascissa curvilinea dà sempre velocità unitaria (il raggio $3$ resta: gli estremi cambiano)."}]},{"pool":"curve","src":"tipo curve · coordinate polari","steps":[{"t":"In coordinate polari, la curva $r=2\\cos\\theta$, $\\theta\\in[-\\pi/2,\\pi/2]$. La sua lunghezza, con $ds=\\sqrt{r^2+(dr/d\\theta)^2}\\,d\\theta$, vale:","opts":[{"x":"$2\\pi$","c":true},{"x":"$4\\pi$"},{"x":"$\\pi$"},{"x":"$2$"}],"hint":"Calcola $r'=-2\\sin\\theta$ e semplifica $r^2+r'^2$: la curva è in realtà una circonferenza di raggio $1$.","sol":"Passi: $r'=-2\\sin\\theta$, quindi $r^2+r'^2=4\\cos^2\\theta+4\\sin^2\\theta=4$ e $ds=\\sqrt{4}\\,d\\theta=2\\,d\\theta$. $L=\\int_{-\\pi/2}^{\\pi/2}2\\,d\\theta=2\\pi$. Coerente col fatto che $r=2\\cos\\theta$ è la circonferenza di centro $(1,0)$ e raggio $1$, lunghezza $2\\pi$. Usare $ds=r\\,d\\theta$ (formula dell'area, non della lunghezza) è l'errore."}]},{"pool":"curve","src":"tipo curve · orientazione (calcolo)","steps":[{"t":"Calcola il lavoro di $F=(-y,\\ x)$ lungo la semicirconferenza superiore di raggio $1$ percorsa da $(-1,0)$ a $(1,0)$ (verso ORARIO).","opts":[{"x":"$-\\pi$","c":true},{"x":"$\\pi$"},{"x":"$2\\pi$"},{"x":"$0$"}],"hint":"Il verso richiesto va da $(-1,0)$ a $(1,0)$ sull'arco superiore: parametrizza con $t$ da $\\pi$ a $0$, oppure calcola il verso antiorario e cambia segno.","sol":"Su $\\gamma(t)=(\\cos t,\\sin t)$ vale $F\\cdot\\gamma'=1$. Il verso antiorario ($t:0\\to\\pi$, da $(1,0)$ a $(-1,0)$) dà $\\int_0^{\\pi}1\\,dt=+\\pi$. Il verso RICHIESTO è opposto, quindi $\\int_{-\\gamma}F\\cdot d\\ell=-\\pi$: l'integrale di II specie è orientato. Ignorare il verso è l'errore che porta a $+\\pi$."}]},{"pool":"curve","src":"tipo curve · conservativo (scorciatoia)","steps":[{"t":"Calcola $\\int_\\gamma F\\cdot d\\ell$ con $F=(2xy+1,\\ x^2)$ lungo un cammino qualsiasi da $(0,0)$ a $(2,1)$ (ad es. l'arco $\\gamma(t)=(2t,\\ t^2)$, $t\\in[0,1]$).","opts":[{"x":"$6$","c":true},{"x":"$4$"},{"x":"$8$"},{"x":"$0$"}],"hint":"Verifica $\\partial_y F_1=\\partial_x F_2$: se il campo è conservativo, non serve integrare lungo l'arco, basta il potenziale valutato agli estremi.","sol":"Passi: $\\partial_y F_1=2x=\\partial_x F_2$, quindi su $\\mathbb{R}^2$ (semplicemente connesso) $F$ è conservativo. Potenziale: da $U_x=2xy+1$ segue $U=x^2y+x+c(y)$, e $U_y=x^2$ impone $c'=0$, dunque $U=x^2y+x$. Per il teorema fondamentale degli integrali di linea $\\int_\\gamma F\\cdot d\\ell=U(2,1)-U(0,0)=(4+2)-0=6$, indipendente dal cammino. Dimenticare il termine $+x$ del potenziale dà $4$."}]},{"pool":"curve","src":"tipo curve · manuale (indipendenza dal cammino)","steps":[{"t":"Per un campo $F\\in C^0$ su un aperto CONNESSO $\\Omega$, quali affermazioni sono EQUIVALENTI?","opts":[{"x":"$F$ è conservativo $\\iff$ $\\int_\\gamma F\\cdot d\\ell$ dipende solo dagli estremi $\\iff$ $\\oint_\\gamma F\\cdot d\\ell=0$ su ogni curva chiusa in $\\Omega$","c":true},{"x":"$F$ è conservativo $\\iff$ $\\operatorname{div}F=0$"},{"x":"l'indipendenza dal cammino vale per ogni campo irrotazionale, senza ipotesi sul dominio"},{"x":"$\\int_\\gamma F\\cdot d\\ell$ dipende solo dagli estremi $\\iff$ $\\|\\gamma'\\|$ è costante"}],"hint":"Esistenza del potenziale, indipendenza dal cammino e circuitazione nulla su OGNI ciclo sono la stessa proprietà. L'irrotazionalità è solo necessaria: diventa sufficiente col dominio semplicemente connesso.","sol":"Teorema di caratterizzazione dei campi conservativi: su $\\Omega$ connesso le tre condizioni sono equivalenti, perché $\\oint_\\gamma F\\cdot d\\ell$ su un cammino chiuso $=U(A)-U(A)=0$, e viceversa la circuitazione nulla permette di definire $U(P)=\\int_{P_0}^{P}F\\cdot d\\ell$ senza ambiguità. $\\operatorname{div}F=0$ (solenoidale) è tutt'altra proprietà; $\\operatorname{rot}F=0$ (irrotazionale) basta solo se $\\Omega$ è semplicemente connesso."}]},{"pool":"curve","src":"tipo curve · manuale (regolare a tratti)","steps":[{"t":"Una curva è REGOLARE A TRATTI se:","opts":[{"x":"$[a,b]$ si partiziona in un numero finito di sottointervalli su ciascuno dei quali $\\gamma$ è $C^1$ e $\\gamma'\\ne 0$; nei punti di raccordo $\\gamma'$ può saltare","c":true},{"x":"$\\gamma$ è $C^1$ su tutto $[a,b]$ e $\\gamma'\\ne 0$ ovunque"},{"x":"$\\gamma$ è continua ma mai derivabile"},{"x":"$\\gamma$ ha punti di non regolarità in cui $\\gamma$ stessa è discontinua"}],"hint":"Regolare a tratti = incollamento CONTINUO di archi regolari; nei vertici (es. di una spezzata) il versore tangente può cambiare bruscamente, ma la curva resta continua.","sol":"Definizione: $\\gamma$ continua su $[a,b]$ e $C^1$ con $\\gamma'\\ne 0$ su ciascun sottointervallo di una partizione finita. Gli integrali di linea si calcolano spezzando: $\\int_\\gamma=\\sum_i\\int_{\\gamma_i}$ sui singoli archi. La prima opzione senza salti descrive una curva regolare (più forte)."}]},{"pool":"curve","src":"tipo curve · manuale (lunghezza e ascissa)","steps":[{"t":"Per $\\gamma:[a,b]\\to\\mathbb{R}^n$ regolare, che relazione lega la lunghezza $L$ e l'ascissa curvilinea $s(t)=\\int_a^t\\|\\gamma'(\\tau)\\|\\,d\\tau$?","opts":[{"x":"$s'(t)=\\|\\gamma'(t)\\|$ e $L=s(b)=\\int_a^b\\|\\gamma'\\|\\,dt$; riparametrizzando in $s$ la velocità diventa unitaria","c":true},{"x":"$s'(t)=\\gamma'(t)$ e $L=\\gamma(b)-\\gamma(a)$"},{"x":"$L=s(b)-s(a)$ con $s(a)\\ne 0$ in generale"},{"x":"$s(t)=\\|\\gamma(t)\\|$, cioè la distanza dall'origine"}],"hint":"$s(t)$ è l'integrale della norma della velocità: per il teorema fondamentale del calcolo la sua derivata è la velocità scalare, e $s(a)=0$.","sol":"Per il teorema fondamentale del calcolo $s'(t)=\\|\\gamma'(t)\\|\\ge 0$, quindi $s$ è crescente e $L=s(b)-s(a)=s(b)$ (perché $s(a)=0$). Nella riparametrizzazione per ascissa $\\tilde\\gamma(s)=\\gamma(t(s))$ si ha $\\|\\tilde\\gamma'(s)\\|=1$: $s$ è il parametro naturale. Confondere $s(t)$ con $\\|\\gamma(t)\\|$ è l'errore."}]},{"pool":"curve","src":"tipo curve · manuale (I vs II specie)","steps":[{"t":"Come si scrive l'integrale di SECONDA specie $\\int_\\gamma F\\cdot d\\ell$ come integrale di PRIMA specie?","opts":[{"x":"$\\int_\\gamma F\\cdot d\\ell=\\int_\\gamma (F\\cdot T)\\,ds$, con $T=\\gamma'/\\|\\gamma'\\|$ versore tangente","c":true},{"x":"$\\int_\\gamma F\\cdot d\\ell=\\int_\\gamma \\|F\\|\\,ds$"},{"x":"i due integrali coincidono sempre"},{"x":"$\\int_\\gamma F\\cdot d\\ell=\\int_\\gamma (F\\cdot n)\\,ds$ con $n$ normale"}],"hint":"$d\\ell=\\gamma'\\,dt=\\dfrac{\\gamma'}{\\|\\gamma'\\|}\\,\\|\\gamma'\\|\\,dt=T\\,ds$: il lavoro è la componente TANGENZIALE di $F$ integrata rispetto all'arco.","sol":"$d\\ell=\\gamma'(t)\\,dt=T(t)\\,\\|\\gamma'(t)\\|\\,dt=T\\,ds$, quindi $\\int_\\gamma F\\cdot d\\ell=\\int_\\gamma(F\\cdot T)\\,ds$. Il lavoro misura quanto $F$ è allineato al moto. L'orientazione entra tramite $T$, che cambia verso invertendo $\\gamma$; l'elemento $ds$ da solo è invariante. La versione con la normale $n$ è il flusso 2D, oggetto diverso."}]},{"pool":"curve","src":"20230907 Es.2 · analvett.tex cap.Curve","steps":[{"t":"Il campo $F=\\left(\\dfrac{-y}{x^2+y^2},\\ \\dfrac{x}{x^2+y^2}\\right)$ su $\\mathbb{R}^2\\setminus\\{0\\}$ è irrotazionale ($\\partial_x F_2=\\partial_y F_1$). È conservativo?","opts":[{"x":"No: $\\mathbb{R}^2\\setminus\\{0\\}$ non è semplicemente connesso; infatti $\\oint$ sul cerchio unitario vale $2\\pi\\ne 0$","c":true},{"x":"Sì: irrotazionale implica sempre conservativo"},{"x":"Sì, perché $F$ è $C^1$ su tutto il suo dominio"},{"x":"No, perché in realtà non è irrotazionale"}],"hint":"Irrotazionale $\\Rightarrow$ conservativo SOLO su domini semplicemente connessi. Qui il dominio ha un buco nell'origine.","sol":"Il teorema inverso (irrotazionale $\\Rightarrow$ conservativo) richiede il dominio semplicemente connesso: $\\mathbb{R}^2\\setminus\\{0\\}$ ha un buco, quindi l'implicazione cade. La circuitazione lungo un cerchio che avvolge l'origine vale $2\\pi\\ne 0$: incompatibile con l'esistenza di un potenziale globale. È l'esempio-controesempio classico (esame 20230907, es.2)."}]},{"pool":"curve","src":"tipo curve · manuale (massa e baricentro)","steps":[{"t":"Un filo materiale ha sostegno $\\gamma$ e densità lineare $\\delta(x,y)$. Massa e ascissa $\\bar x$ del baricentro sono:","opts":[{"x":"$m=\\int_\\gamma \\delta\\,ds$ e $\\bar x=\\dfrac{1}{m}\\int_\\gamma x\\,\\delta\\,ds$","c":true},{"x":"$m=\\int_\\gamma \\delta\\,d\\ell$ (vettoriale) e $\\bar x=\\int_\\gamma x\\,ds$"},{"x":"$m=\\int_\\gamma \\delta\\,dt$ e $\\bar x=\\int_\\gamma x\\,dt$"},{"x":"$m=\\delta\\cdot L$ sempre, anche con $\\delta$ non costante"}],"hint":"Massa e momenti sono integrali di PRIMA specie: usano $ds=\\|\\gamma'\\|\\,dt$ (scalare, indipendente dal verso). Il baricentro è il momento diviso la massa.","sol":"Definizione: massa $m=\\int_\\gamma\\delta\\,ds$, momento $M_x=\\int_\\gamma x\\,\\delta\\,ds$, baricentro $\\bar x=M_x/m$ (analogamente $\\bar y$). Sono integrali di prima specie perché una proprietà fisica del filo non deve dipendere dal verso di percorrenza. Solo se $\\delta$ è costante $m=\\delta\\,L$; usare $d\\ell$ o $dt$ al posto di $ds$ è l'errore."}]},{"pool":"curve","src":"analvett.tex cap.Teoremi · tabella decisionale","steps":[{"t":"Davanti a $\\int_\\gamma F\\cdot d\\ell$, quale scorciatoia va valutata PRIMA di parametrizzare?","opts":[{"x":"Se $F$ conservativo: $U(B)-U(A)$. Se $\\gamma$ chiusa in $\\mathbb{R}^2$ con $F\\in C^1$ dentro: Green. Se $\\gamma$ chiusa in $\\mathbb{R}^3$: Stokes.","c":true},{"x":"Parametrizzare direttamente è sempre la via più rapida"},{"x":"Usare il teorema della divergenza (Gauss) per ogni integrale di linea"},{"x":"Se $F$ è conservativo l'integrale è sempre $0$, che $\\gamma$ sia chiusa o aperta"}],"hint":"Tre scorciatoie: potenziale (campo conservativo), Green (ciclo in $\\mathbb{R}^2$), Stokes (ciclo in $\\mathbb{R}^3$). Il potenziale dà $0$ solo se la curva è CHIUSA.","sol":"Tabella decisionale del manuale: campo conservativo su cammino aperto $\\to U(B)-U(A)$, su cammino chiuso $\\to 0$; ciclo in $\\mathbb{R}^2$ $\\to$ Green $\\oint=\\iint_D(Q_x-P_y)$; ciclo in $\\mathbb{R}^3$ $\\to$ Stokes $\\oint=\\iint_S\\operatorname{rot}F\\cdot n\\,d\\sigma$. Gauss riguarda i flussi da superfici chiuse, non i lavori. Dire che il conservativo dà sempre $0$ ignora che serve la chiusura."}]},{"pool":"curve","src":"tipo curve · massa I specie","steps":[{"t":"Un filo ha sostegno la semicirconferenza $\\gamma(t)=(\\cos t,\\ \\sin t)$, $t\\in[0,\\pi]$, e densità lineare $\\delta(x,y)=y$. Calcola la massa $m=\\int_\\gamma \\delta\\,ds$.","opts":[{"x":"$2$","c":true},{"x":"$\\pi$"},{"x":"$0$"},{"x":"$\\dfrac{\\pi}{2}$"}],"hint":"$ds=\\|\\gamma'\\|\\,dt$ con $\\|\\gamma'\\|=1$; sostituisci $\\delta=y=\\sin t$ e integra su $[0,\\pi]$.","sol":"Passi: $\\gamma'=(-\\sin t,\\cos t)$, $\\|\\gamma'\\|=1$, quindi $ds=dt$; $\\delta(\\gamma)=\\sin t$. Allora $m=\\int_0^\\pi \\sin t\\,dt=[-\\cos t]_0^\\pi=1-(-1)=2$. Formula della massa (integrale di I specie) $m=\\int_\\gamma\\delta\\,ds$. Rispondere $\\pi$ significa aver integrato $\\delta\\equiv 1$ (la lunghezza) invece di $\\delta=\\sin t$."}]},{"pool":"curve","src":"tipo curve · baricentro I specie","steps":[{"t":"Per un filo OMOGENEO (densità costante) sulla semicirconferenza superiore di raggio $1$, $\\gamma(t)=(\\cos t,\\sin t)$, $t\\in[0,\\pi]$, l'ordinata del baricentro $\\bar y=\\dfrac{\\int_\\gamma y\\,ds}{\\int_\\gamma ds}$ vale:","opts":[{"x":"$\\dfrac{2}{\\pi}$","c":true},{"x":"$\\dfra
