<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

<style>
  :root{
    --bg:#0e1117; --panel:#161b22; --panel2:#1c232d; --border:#2b333d;
    --txt:#e6edf3; --muted:#9aa7b4; --accent:#4c8dff; --accent2:#7aa2ff;
    --ok:#2ea043; --okbg:#10331b; --bad:#d83a3a; --badbg:#3a1414;
    --warn:#d8a13a; --warnbg:#332a10;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    font-size:17px;line-height:1.5;}
  .wrap{max-width:820px;margin:0 auto;padding:24px 18px 80px;}
  h1{font-size:1.5rem;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:.92rem;margin:0 0 22px;}
  .hidden{display:none!important;}

  /* ---- MENU ---- */
  .mode-row{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
  .mode-btn{flex:1;min-width:220px;border:1px solid var(--border);background:var(--panel);
    color:var(--txt);padding:16px;border-radius:12px;cursor:pointer;text-align:left;
    transition:.15s;}
  .mode-btn:hover{border-color:var(--accent);background:var(--panel2);}
  .mode-btn b{font-size:1.05rem;}
  .mode-btn span{display:block;color:var(--muted);font-size:.85rem;margin-top:4px;}
  .mode-btn.primary{border-color:var(--accent);background:#13233f;}

  .pool-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:640px){.pool-grid{grid-template-columns:1fr;}}
  .pool-card{border:1px solid var(--border);background:var(--panel);border-radius:12px;
    padding:14px;cursor:pointer;transition:.15s;position:relative;}
  .pool-card:hover{border-color:var(--accent);background:var(--panel2);}
  .pool-card.empty{opacity:.55;cursor:not-allowed;}
  .pool-card.empty:hover{border-color:var(--border);background:var(--panel);}
  .pool-card .n{font-weight:600;font-size:.98rem;}
  .pool-card .meta{color:var(--muted);font-size:.8rem;margin-top:6px;}
  .badge{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;
    border-radius:20px;margin-top:8px;letter-spacing:.3px;}
  .badge.full{background:var(--okbg);color:#5fd980;border:1px solid #235c33;}
  .badge.todo{background:var(--warnbg);color:#e0b85a;border:1px solid #5c4a23;}

  /* ---- QUIZ ---- */
  .qhead{display:flex;justify-content:space-between;align-items:center;
    color:var(--muted);font-size:.82rem;margin-bottom:14px;gap:12px;}
  .qhead .src{font-style:italic;}
  .progress{height:5px;background:var(--panel2);border-radius:4px;overflow:hidden;margin-bottom:18px;}
  .progress > i{display:block;height:100%;background:var(--accent);width:0;transition:.3s;}

  .fig{background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:12px;margin:0 0 16px;text-align:center;overflow-x:auto;}
  .qtext{font-size:1.08rem;margin:0 0 18px;}
  .qtext .lbl{display:inline-block;background:var(--panel2);border:1px solid var(--border);
    color:var(--accent2);font-size:.72rem;font-weight:700;padding:1px 8px;border-radius:6px;
    margin-right:8px;vertical-align:middle;}

  .opts{display:flex;flex-direction:column;gap:10px;}
  .opt{border:1px solid var(--border);background:var(--panel);color:var(--txt);
    padding:13px 15px;border-radius:10px;cursor:pointer;text-align:left;
    font-size:1rem;transition:.12s;}
  .opt:hover:not(:disabled){border-color:var(--accent);background:var(--panel2);}
  .opt:disabled{cursor:default;}
  .opt.correct{border-color:var(--ok);background:var(--okbg);}
  .opt.wrong{border-color:var(--bad);background:var(--badbg);}

  .fb{margin-top:16px;border-radius:10px;padding:14px;font-size:.95rem;display:none;}
  .fb.show{display:block;}
  .fb.hint{background:var(--badbg);border:1px solid #6b2222;}
  .fb.hint b{color:#ff8585;}
  .fb.sol{background:var(--okbg);border:1px solid #235c33;}
  .fb.sol b{color:#5fd980;}

  .navrow{margin-top:20px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .cont{background:var(--accent);color:#fff;border:none;padding:12px 20px;border-radius:10px;
    font-size:1rem;font-weight:600;cursor:pointer;transition:.12s;}
  .cont:hover{background:var(--accent2);}
  .menu-btn{background:transparent;color:var(--muted);border:1px solid var(--border);
    padding:10px 16px;border-radius:10px;cursor:pointer;font-size:.9rem;}
  .menu-btn:hover{color:var(--txt);border-color:var(--accent);}

  .end{text-align:center;padding:40px 10px;}
  .end h2{font-size:1.4rem;}
  .end .score{font-size:2.2rem;font-weight:700;color:var(--accent2);margin:10px 0;}

  .katex{font-size:1.02em;}
  .katex-display{margin:.4em 0;}
</style>
</head>
<body>
<div class="wrap">

  <!-- ===================== MENU ===================== -->
  <section id="menu">
    <h1>Quiz Analisi Vettoriale — Secondo Esonero</h1>
    <p class="sub">Sapienza · Fisica. Difficolt&agrave; calibrata sugli esami in banca-dati (2022&ndash;2025). Risposta sbagliata &rarr; suggerimento mirato sul trabocchetto reale. Formule renderizzate con KaTeX.</p>

    <div class="mode-row">
      <button class="mode-btn primary" onclick="start('ALL')">
        <b>&#127922; Mischia tutto</b>
        <span>Tutte le domande dei pool disponibili, in ordine casuale.</span>
      </button>
    </div>

    <div class="pool-grid" id="poolGrid"></div>
  </section>

  <!-- ===================== QUIZ ===================== -->
  <section id="quiz" class="hidden">
    <div class="qhead">
      <span id="qpool"></span>
      <span id="qpos"></span>
    </div>
    <div class="progress"><i id="qbar"></i></div>

    <div class="fig hidden" id="qfig"></div>
    <p class="qtext" id="qtext"></p>
    <div class="opts" id="qopts"></div>

    <div class="fb hint" id="qhint"></div>
    <div class="fb sol" id="qsol"></div>

    <div class="navrow">
      <button class="menu-btn" onclick="toMenu()">&#8592; Menu</button>
      <button class="cont hidden" id="qcont"></button>
    </div>
  </section>

  <!-- ===================== END ===================== -->
  <section id="end" class="hidden">
    <div class="end">
      <h2>Pool completato</h2>
      <div class="score" id="endScore"></div>
      <p class="sub" id="endMsg"></p>
      <button class="cont" onclick="toMenu()">Torna al menu</button>
    </div>
  </section>

</div>

<script>
"use strict";

/* =====================================================================
   RENDERING MATEMATICO — KaTeX su contenuto iniettato dinamicamente
   Ogni volta che si scrive innerHTML con LaTeX, chiamare typeset(node).
   ===================================================================== */
function typeset(el){
  if(el && window.renderMathInElement){
    try{
      renderMathInElement(el,{
        delimiters:[
          {left:'$$',right:'$$',display:true},
          {left:'$',right:'$',display:false}
        ],
        throwOnError:false
      });
    }catch(e){/* no-op */}
  }
}
function shuffle(a){
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

/* =====================================================================
   DEFINIZIONE POOL (ordine = mappa-esercizi, priorit&agrave; decrescente)
   status: 'full' = popolato | 'todo' = da estendere (secondo dispatch)
   ===================================================================== */
var POOLS = [
  {id:'edo',       name:'1 &middot; EDO / Cauchy &mdash; analisi qualitativa', diff:'3&ndash;4', status:'full'},
  {id:'superfici', name:'2 &middot; Superfici: parametrizzazione, area, bordo', diff:'3&ndash;4', status:'full'},
  {id:'curve',     name:'3 &middot; Curve &amp; integrali di linea', diff:'3', status:'full'},
  {id:'gauss',     name:'4 &middot; Volume + flusso (Divergenza / Gauss)', diff:'3', status:'full'},
  {id:'stokes',    name:'5 &middot; Stokes / circuitazione', diff:'3&ndash;4', status:'full'},
  {id:'ottim',     name:'6 &middot; Ottimizzazione (liberi &amp; Lagrange)', diff:'3&ndash;4', status:'full'},
  {id:'serie',     name:'7 &middot; Serie e successioni di funzioni', diff:'3&ndash;4', status:'full'},
  {id:'conserv',   name:'8 &middot; Campi conservativi / potenziale', diff:'3', status:'full'},
  {id:'diff',      name:'9 &middot; Differenziabilit&agrave; con parametro', diff:'4', status:'full'},
  {id:'dini',      name:'10 &middot; Funzioni implicite / Dini', diff:'3&ndash;4', status:'full'}
];

/* =====================================================================
   BANCA DATI DOMANDE
   unit = { pool, src, steps:[ {t, opts:[{x,c?}], hint, sol, cont?} ] }
   Tutto il testo matematico in LaTeX con delimitatori $...$ e $$...$$.
   ===================================================================== */
var Q = {};

/* ---------- POOL 1 : EDO / CAUCHY QUALITATIVO (FULL) ---------- */
Q.edo = [

  { pool:"edo", src:"20240122 · trappola soluzione",
    steps:[{
      t:"Per il problema $y'=f(t,y)$, $y(t_0)=y_0$, il teorema di Cauchy–Lipschitz garantisce esistenza e unicità LOCALE se:",
      opts:[
        {x:"$f(t,u)$ è $C^1$ (o localmente lipschitziana in $u$) in un intorno di $(t_0,y_0)$", c:true},
        {x:"$f(t,y(t))$ è $C^1$ lungo la soluzione"},
        {x:"la soluzione $y(t)$ è continua"},
        {x:"$f$ è limitata su tutto $\\mathbb{R}^2$"}
      ],
      hint:"La lipschitzianità va richiesta su $f$ come funzione delle due variabili INDIPENDENTI $(t,u)$, non sulla composizione $f(t,y(t))$ con una soluzione che ancora non esiste.",
      sol:"Cauchy–Lipschitz richiede $f(t,u)$ continua e localmente lipschitziana in $u$ (garantita da $f\\in C^1$) in un intorno del dato. Scrivere '$f(t,y(t))\\in C^1$' è l'errore concettuale segnalato nella soluzione del 22/01/2024: confonde il campo con la sua composizione con l'incognita."
    }]
  },

  { pool:"edo", src:"20240704 Es.5",
    steps:[
     { t:"Considera $y'=\\dfrac{y(y-2)}{1+t}$, $y(0)=1$, $t\\ge 0$. Senza risolvere, cosa si può affermare?",
       opts:[
         {x:"$0<y(t)<2$ per ogni $t$: le costanti $y\\equiv 0$ e $y\\equiv 2$ sono barriere invalicabili per unicità", c:true},
         {x:"$y(t)$ può superare $y=2$ se $t$ è grande"},
         {x:"$y(t)\\to 2$ perché $2$ è un equilibrio attrattivo"},
         {x:"$y$ esplode in tempo finito"}
       ],
       hint:"$y\\equiv 0$ e $y\\equiv 2$ annullano il campo: sono soluzioni costanti. Per unicità due soluzioni distinte non si intersecano mai.",
       sol:"$f(t,u)=\\dfrac{u(u-2)}{1+t}\\in C^1$: Cauchy–Lipschitz dà unicità, quindi i grafici non si toccano. Il dato $y(0)=1\\in(0,2)$ resta intrappolato fra le barriere $0$ e $2$ per sempre.",
       cont:"Continua &rarr; la monotonia"
     },
     { t:"Stessa equazione, con $0<y<2$ e $t\\ge 0$: la soluzione è:",
       opts:[
         {x:"strettamente decrescente: $y(y-2)<0$ e $1+t>0$ danno $y'<0$", c:true},
         {x:"strettamente crescente"},
         {x:"costante"},
         {x:"prima crescente poi decrescente"}
       ],
       hint:"Basta il segno del campo: per $0<y<2$ il fattore $y(y-2)$ è negativo e $1+t>0$.",
       sol:"Il segno di $y'$ è quello di $\\dfrac{y(y-2)}{1+t}$: numeratore $<0$ e denominatore $>0$ per $0<y<2$, quindi $y'<0$ ovunque. Soluzione monotona decrescente, limitata inferiormente da $0$."
     }
    ]
  },

  { pool:"edo", src:"20250721 Es.2",
    steps:[{
      t:"Sia $y'=\\ln(1+y^2)\\,(3-y)$, $y(0)=2$. La soluzione è crescente e limitata superiormente da $3$. Quanto vale $\\lim_{t\\to+\\infty}y(t)$?",
      opts:[
        {x:"$3$", c:true},
        {x:"$+\\infty$"},
        {x:"$2$"},
        {x:"il limite non esiste"}
      ],
      hint:"Monotonia + limitatezza garantiscono che il limite $L$ ESISTE; poi il teorema dell'asintoto forza $L$ ad annullare il campo.",
      sol:"Crescente e limitata $\\Rightarrow L=\\lim y$ esiste finito. Per il teorema dell'asintoto $\\lim y'=0$, quindi $\\ln(1+L^2)(3-L)=0$. Poiché $y>2$ esclude $L=0$, resta $L=3$."
    }]
  },

  { pool:"edo", src:"20240122 · trappola soluzione",
    steps:[{
      t:"Il teorema dell'asintoto garantisce l'ESISTENZA del limite $\\lim_{t\\to+\\infty}y(t)$?",
      opts:[
        {x:"No: dà solo il VALORE del limite (annulla il campo) SE il limite esiste; l'esistenza va provata a parte", c:true},
        {x:"Sì, è esattamente ciò che afferma"},
        {x:"Sì, ma solo per equazioni autonome"},
        {x:"No, non dà alcuna informazione sui limiti"}
      ],
      hint:"Il teorema assume che $\\lim y$ esista e allora deduce $\\lim y'=0$. L'esistenza del limite viene tipicamente da monotonia + limitatezza.",
      sol:"Il teorema dell'asintoto è condizionale: se $\\lim_{t\\to+\\infty}y=L$ finito ed esiste $\\lim y'$, allora $\\lim y'=0$. Non prova l'esistenza di $L$: usarlo per dedurla è la trappola. L'esistenza viene dalla monotonia."
    }]
  },

  { pool:"edo", src:"20250127 Es.3",
    steps:[{
      t:"Per garantire che la soluzione di $y'=f(t,y)$ sia definita su TUTTO $\\mathbb{R}$ (globalità), la stima corretta è:",
      opts:[
        {x:"sublinearità: $|f(t,u)|\\le L_1(t)\\,|u|+L_2(t)$ con $L_1,L_2$ continue", c:true},
        {x:"$f$ limitata da una costante su tutto $\\mathbb{R}^2$"},
        {x:"$f(t,u)\\to 0$ per $u\\to\\infty$"},
        {x:"$y$ è monotona"}
      ],
      hint:"Serve crescita AL PIÙ lineare in $u$ del campo. La limitatezza assoluta è troppo forte (quasi sempre falsa); la monotonia riguarda il comportamento, non il dominio massimale.",
      sol:"Il teorema di esistenza globale segue dalla sublinearità $|f(t,u)|\\le L_1(t)|u|+L_2(t)$: impedisce l'esplosione in tempo finito. Le stime a priori (soluzione limitata) valgono solo se la soluzione è effettivamente limitata, non quando cresce."
    }]
  },

  { pool:"edo", src:"20250627 Es.5",
    steps:[{
      t:"Nel problema $y'=\\dfrac{(y^2+1)\\,y}{t}$, $y(0)=1$: cosa osservi sull'ipotesi di Cauchy–Lipschitz nel dato iniziale?",
      opts:[
        {x:"$f(t,u)=\\dfrac{(u^2+1)u}{t}$ non è definita né continua in $t=0$: il teorema standard non si applica nel punto iniziale", c:true},
        {x:"$f$ è $C^1$ ovunque, nessun problema"},
        {x:"il problema non ammette alcuna soluzione"},
        {x:"la soluzione è unica per Cauchy–Lipschitz applicato in $(0,1)$"}
      ],
      hint:"Guarda il denominatore $t$ proprio nel punto iniziale $t_0=0$.",
      sol:"Il campo ha $t$ a denominatore: in $t=0$ non è continuo, l'ipotesi di Cauchy–Lipschitz cade nel dato iniziale. Esistenza/unicità vanno studiate ad hoc (separazione delle variabili e comportamento vicino a $t=0$)."
    }]
  },

  { pool:"edo", src:"20220124 Es.5",
    steps:[{
      t:"Sia $y'=4t^3\\,(1-e^{y})$, $y(0)=\\log 2$. Dove ha un massimo la soluzione?",
      opts:[
        {x:"in $t=0$: $y>0$ dà $1-e^{y}<0$, quindi $y'$ ha il segno di $-t^3$ (positivo per $t<0$, negativo per $t>0$)", c:true},
        {x:"è sempre decrescente, nessun massimo interno"},
        {x:"in $t=1$"},
        {x:"non ha massimo: diverge a $+\\infty$"}
      ],
      hint:"La costante $y\\equiv 0$ è barriera: $y(0)=\\log 2>0 \\Rightarrow y>0$ sempre $\\Rightarrow 1-e^{y}<0$. Allora il segno di $y'$ è quello di $-t^3$.",
      sol:"$y\\equiv 0$ annulla il campo (barriera per unicità) e $y(0)=\\log 2>0$ tiene $y>0$, dunque $1-e^{y}<0$. Quindi $y'=4t^3\\cdot(\\text{negativo})$: $y'>0$ per $t<0$, $y'<0$ per $t>0$. Massimo in $t=0$."
    }]
  }

];

/* ---------- POOL 2 : SUPERFICI (FULL) ---------- */
Q.superfici = [

  { pool:"superfici", src:"20240704 Es.3",
    steps:[
     { t:"La superficie $\\Sigma=\\{z=4y+5,\\ x^2+y^2\\le z\\}$. Qual è il dominio $D$ dei parametri $(x,y)$?",
       opts:[
         {x:"$x^2+(y-2)^2\\le 9$: disco di centro $(0,2)$, raggio $3$", c:true},
         {x:"$x^2+y^2\\le 9$, centrato nell'origine"},
         {x:"$x^2+y^2\\le 5$"},
         {x:"tutto il piano $(x,y)$"}
       ],
       hint:"Sostituisci $z=4y+5$ nella condizione $x^2+y^2\\le z$ e completa il quadrato in $y$.",
       sol:"$x^2+y^2\\le 4y+5 \\iff x^2+(y-2)^2\\le 9$: disco traslato di centro $(0,2)$ e raggio $3$. Ignorare la traslazione falsa tutto il calcolo di area e bordo.",
       cont:"Continua &rarr; l'elemento d'area"
     },
     { t:"Per la stessa $\\Sigma$, grafico di $f(x,y)=4y+5$, l'elemento d'area $\\|\\Phi_x\\times\\Phi_y\\|$ vale:",
       opts:[
         {x:"$\\sqrt{1+f_x^2+f_y^2}=\\sqrt{1+0+16}=\\sqrt{17}$", c:true},
         {x:"$\\sqrt{16}=4$"},
         {x:"dipende da $(x,y)$"},
         {x:"$1$"}
       ],
       hint:"Per un grafico $\\Phi=(x,y,f)$ vale $\\Phi_x\\times\\Phi_y=(-f_x,-f_y,1)$, di norma $\\sqrt{1+f_x^2+f_y^2}$.",
       sol:"$f_x=0$, $f_y=4$: $\\|\\Phi_x\\times\\Phi_y\\|=\\sqrt{1+0+16}=\\sqrt{17}$, costante. Area$(\\Sigma)=\\sqrt{17}\\cdot m_2(D)=9\\pi\\sqrt{17}$ (formula dell'area di una superficie cartesiana)."
     }
    ]
  },

  { pool:"superfici", src:"20220124 · trappola normale",
    steps:[{
      t:"Per un grafico $z=f(x,y)$ si ha $\\Phi_x\\times\\Phi_y=(-f_x,-f_y,1)$. Se questo grafico è la faccia INFERIORE di un solido $E$, per il flusso USCENTE come va usato?",
      opts:[
        {x:"va cambiato segno: $(-f_x,-f_y,1)$ punta in alto (dentro $E$), mentre la normale uscente sotto punta in basso", c:true},
        {x:"va usato così com'è, punta già all'esterno"},
        {x:"basta normalizzarlo"},
        {x:"il flusso non dipende dall'orientazione"}
      ],
      hint:"La terza componente di $(-f_x,-f_y,1)$ è $+1$: punta sempre verso l'ALTO. Sulla faccia inferiore di $E$, 'verso l'alto' significa 'entrante'.",
      sol:"Il flusso è orientato: la normale uscente da $E$ sulla faccia inferiore ha terza componente negativa. Poiché $\\Phi_x\\times\\Phi_y=(-f_x,-f_y,1)$ ha terza componente $+1$ (entrante), va preso col segno opposto. Errore di segno classico nel teorema della divergenza."
    }]
  },

  { pool:"superfici", src:"20250127 Es.1 · trappola bordo",
    steps:[{
      t:"$\\Sigma$ è il grafico di $z=f(x,y)$ su $D=\\{x^2+y^2\\le R^2\\}$. Il bordo $\\partial\\Sigma$ è:",
      opts:[
        {x:"la curva $\\gamma(t)=(R\\cos t,\\,R\\sin t,\\,f(R\\cos t,R\\sin t))$ in $\\mathbb{R}^3$", c:true},
        {x:"il cerchio $x^2+y^2=R^2$ nel piano $z=0$"},
        {x:"l'intero disco $D$"},
        {x:"vuoto: la superficie è chiusa"}
      ],
      hint:"$\\partial\\Sigma$ è l'IMMAGINE di $\\partial D$ tramite $\\Phi$: giace su $\\Sigma$, non nel piano $(x,y)$.",
      sol:"$\\partial\\Sigma=\\Phi(\\partial D)$: applicando $\\Phi(x,y)=(x,y,f(x,y))$ al cerchio $\\partial D$ si ottiene $\\gamma(t)=(R\\cos t,R\\sin t,f(R\\cos t,R\\sin t))$, curva di $\\mathbb{R}^3$ che si proietta sul cerchio ma non vi coincide."
    }]
  },

  { pool:"superfici", src:"20240122 Es.4",
    steps:[{
      t:"Superficie di rotazione $X(\\theta,z)=(\\gamma(z)\\cos\\theta,\\,\\gamma(z)\\sin\\theta,\\,z)$ con $\\gamma(z)>0$. La terza componente di $X_\\theta\\times X_z$ è:",
      opts:[
        {x:"$-\\gamma(z)\\gamma'(z)$: cambia segno col segno di $\\gamma'(z)$", c:true},
        {x:"sempre $+1$"},
        {x:"$\\gamma(z)^2$, sempre positiva"},
        {x:"identicamente nulla"}
      ],
      hint:"Calcola $X_\\theta=(-\\gamma\\sin\\theta,\\gamma\\cos\\theta,0)$ e $X_z=(\\gamma'\\cos\\theta,\\gamma'\\sin\\theta,1)$, poi il prodotto vettoriale.",
      sol:"$X_\\theta\\times X_z=(\\gamma\\cos\\theta,\\ \\gamma\\sin\\theta,\\ -\\gamma\\gamma')$. La terza componente $-\\gamma\\gamma'$ dipende dal segno di $\\gamma'$: la normale non è uniformemente uscente o entrante, va verificata caso per caso (o confrontata col flusso totale)."
    }]
  },

  { pool:"superfici", src:"20230907 Es.4",

/* =====================================================================
   ENGINE
   ===================================================================== */
var S = { units:[], ui:0, si:0, correct:0, total:0, answered:false };

function poolCount(id){ return (Q[id]||[]).reduce(function(n,u){return n+u.steps.length;},0); }

function renderMenu(){
  var g = document.getElementById('poolGrid');
  g.innerHTML = '';
  POOLS.forEach(function(p){
    var units = Q[p.id]||[];
    var n = poolCount(p.id);
    var empty = units.length===0;
    var card = document.createElement(empty?'div':'button');
    card.className = 'pool-card'+(empty?' empty':'');
    if(!empty) card.onclick = function(){ start(p.id); };
    card.innerHTML =
      '<div class="n">'+p.name+'</div>'+
      '<div class="meta">Difficolt&agrave; '+p.diff+' &middot; '+(empty?'0 domande':(n+' passi')) +'</div>'+
      '<span class="badge '+(p.status==='full'?'full':'todo')+'">'+
        (p.status==='full'?'COMPLETO':'DA ESTENDERE')+'</span>';
    g.appendChild(card);
  });
  typeset(g);
}

function start(poolId){
  var units = [];
  if(poolId==='ALL'){
    POOLS.forEach(function(p){ (Q[p.id]||[]).forEach(function(u){ units.push(u); }); });
  } else {
    units = (Q[poolId]||[]).slice();
  }
  if(units.length===0) return;
  units = shuffle(units.slice());
  S = { units:units, ui:0, si:0, correct:0, total:0, answered:false, poolId:poolId };
  show('quiz');
  renderStep();
}

function poolNameById(id){
  for(var i=0;i<POOLS.length;i++) if(POOLS[i].id===id) return POOLS[i].name;
  return id;
}

function renderStep(){
  var u = S.units[S.ui];
  var st = u.steps[S.si];
  S.answered = false;

  // header
  document.getElementById('qpool').innerHTML =
    (S.poolId==='ALL'?'Mischia':poolNameById(S.poolId));
  document.getElementById('qpos').innerHTML =
    'Domanda '+(S.ui+1)+' / '+S.units.length+
    (u.steps.length>1?(' &middot; parte '+(S.si+1)+'/'+u.steps.length):'')+
    ' &middot; <span class="src">'+u.src+'</span>';
  document.getElementById('qbar').style.width = (100*(S.ui)/S.units.length)+'%';

  // figura (nessuna figura in AV, ma il gancio resta)
  var fig = document.getElementById('qfig');
  var svg = st.svg || (S.si===0 ? u.svg : null);
  if(svg){ fig.innerHTML = svg; fig.classList.remove('hidden'); typeset(fig); }
  else { fig.innerHTML=''; fig.classList.add('hidden'); }

  var qt = document.getElementById('qtext');
  qt.innerHTML = st.t;
  typeset(qt);

  // opzioni mescolate
  var opts = shuffle(st.opts.map(function(o){return o;}));
  var box = document.getElementById('qopts');
  box.innerHTML = '';
  opts.forEach(function(o){
    var b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = o.x;
    b.onclick = function(){ answer(b, o, st); };
    box.appendChild(b);
  });
  typeset(box);

  document.getElementById('qhint').classList.remove('show');
  document.getElementById('qsol').classList.remove('show');
  document.getElementById('qcont').classList.add('hidden');
}

function answer(btn, opt, st){
  if(opt.c){
    btn.classList.add('correct');
    Array.prototype.forEach.call(document.querySelectorAll('#qopts .opt'),
      function(b){ b.disabled = true; });
    document.getElementById('qhint').classList.remove('show');
    var sol = document.getElementById('qsol');
    sol.innerHTML = '<b>Corretto.</b> '+st.sol;
    sol.classList.add('show');
    typeset(sol);
    if(!S.answered){ S.correct++; }
    S.answered = true;
    var c = document.getElementById('qcont');
    var last = (S.si === S.units[S.ui].steps.length-1);
    c.innerHTML = last ? 'Prossima domanda &rarr;' : (st.cont || 'Continua &rarr;');
    c.classList.remove('hidden');
    c.onclick = nextStep;
  } else {
    btn.classList.add('wrong');
    btn.disabled = true;
    var h = document.getElementById('qhint');
    h.innerHTML = '<b>Rivedi.</b> '+st.hint;
    h.classList.add('show');
    typeset(h);
  }
}

function nextStep(){
  var u = S.units[S.ui];
  S.total++;
  if(S.si < u.steps.length-1){
    S.si++;
    renderStep();
  } else {
    S.ui++;
    S.si = 0;
    if(S.ui >= S.units.length){ endQuiz(); }
    else renderStep();
  }
}

function endQuiz(){
  show('end');
  document.getElementById('endScore').innerHTML = S.correct+' / '+S.total;
  var pct = S.total? Math.round(100*S.correct/S.total):0;
  var msg = pct>=85 ? 'Livello d&rsquo;esame solido.' :
            pct>=60 ? 'Buona base, ma alcuni trabocchetti ti hanno preso.' :
                      'Rivedi i suggerimenti: gli errori sono concettuali, non di calcolo.';
  document.getElementById('endMsg').innerHTML = 'Risposte corrette al primo tentativo. '+msg;
}

function toMenu(){ show('menu'); }

function show(which){
  ['menu','quiz','end'].forEach(function(id){
    document.getElementById(id).classList.toggle('hidden', id!==which);
  });
  window.scrollTo(0,0);
}

/* Init dopo che i deferred KaTeX sono caricati (DOMContentLoaded li segue). */
window.addEventListener('DOMContentLoaded', renderMenu);
</script>
