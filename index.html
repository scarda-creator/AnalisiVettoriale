c{1}{2}$"},{"x":"$\\dfrac{\\pi}{2}$"},{"x":"$1$"}],"hint":"Numeratore $\\int_\\gamma y\\,ds=\\int_0^\\pi \\sin t\\,dt=2$; denominatore = lunghezza della semicirconferenza $=\\pi$.","sol":"Passi: con $\\|\\gamma'\\|=1$, il momento $\\int_\\gamma y\\,ds=\\int_0^\\pi\\sin t\\,dt=2$ e la lunghezza $\\int_\\gamma ds=\\pi$. Quindi $\\bar y=2/\\pi\\approx 0{,}64$, che cade all'interno della semicirconferenza (coerente). Definizione di baricentro $\\bar y=M_x/m$ con integrali di I specie. Per simmetria $\\bar x=0$."}]},{"pool":"curve","src":"tipo curve · lavoro a tratti (II specie)","steps":[{"t":"Calcola il lavoro $\\int_\\gamma F\\cdot d\\ell$ del campo $F=(y,\\ 2x)$ lungo la spezzata da $(0,0)$ a $(1,0)$ a $(1,2)$.","opts":[{"x":"$4$","c":true},{"x":"$2$"},{"x":"$0$"},{"x":"$6$"}],"hint":"Spezza in due tratti. Sul primo (orizzontale, $y=0$) è $dy=0$; sul secondo (verticale, $x=1$) è $dx=0$. Somma i due contributi.","sol":"Curva regolare a tratti: $\\int_\\gamma=\\int_{\\gamma_1}+\\int_{\\gamma_2}$. Tratto 1 $(0,0)\\to(1,0)$: $y=0$, $dy=0$, contributo $\\int F_1\\,dx=\\int y\\,dx=0$. Tratto 2 $(1,0)\\to(1,2)$: $x=1$, $dx=0$, contributo $\\int F_2\\,dy=\\int_0^2 2x\\,dy=\\int_0^2 2\\,dy=4$. Totale $0+4=4$. Il campo non è conservativo ($\\partial_y F_1=1\\ne 2=\\partial_x F_2$), quindi il cammino conta. Dimenticare un tratto porta a $0$."}]},{"pool":"curve","src":"analvett.tex cap.Curve · cardioide","steps":[{"t":"Calcola la lunghezza della cardioide $r=1+\\cos\\theta$, $\\theta\\in[0,2\\pi]$, con $L=\\int_0^{2\\pi}\\sqrt{r^2+r'^2}\\,d\\theta$.","opts":[{"x":"$8$","c":true},{"x":"$2\\pi$"},{"x":"$4$"},{"x":"$4\\pi$"}],"hint":"$r^2+r'^2=2+2\\cos\\theta=4\\cos^2(\\theta/2)$, quindi $\\sqrt{\\cdot}=2\\,|\\cos(\\theta/2)|$: NON dimenticare il modulo.","sol":"Passi: $r'=-\\sin\\theta$; $r^2+r'^2=(1+\\cos\\theta)^2+\\sin^2\\theta=2+2\\cos\\theta=4\\cos^2(\\theta/2)$, dunque $\\sqrt{r^2+r'^2}=2\\,|\\cos(\\theta/2)|$. Poiché $\\cos(\\theta/2)\\ge 0$ su $[0,\\pi]$ e $\\le 0$ su $[\\pi,2\\pi]$, $L=\\int_0^{2\\pi}2\\,|\\cos(\\theta/2)|\\,d\\theta=2\\cdot 4=8$. Formula della lunghezza in polari $ds=\\sqrt{r^2+r'^2}\\,d\\theta$. Togliere il modulo fa cancellare i due semiarchi e dà $0$."}]},{"pool":"curve","src":"tipo curve · spirale (I specie)","steps":[{"t":"Calcola la lunghezza della spirale logaritmica $\\gamma(t)=(e^{-t}\\cos t,\\ e^{-t}\\sin t)$, $t\\in[0,+\\infty)$.","opts":[{"x":"$\\sqrt{2}$","c":true},{"x":"$+\\infty$"},{"x":"$2$"},{"x":"$1$"}],"hint":"$\\|\\gamma'\\|=\\sqrt{2}\\,e^{-t}$; l'integrale improprio $\\int_0^{+\\infty}e^{-t}\\,dt$ converge a $1$.","sol":"Passi: $x'=-e^{-t}(\\cos t+\\sin t)$, $y'=e^{-t}(\\cos t-\\sin t)$, quindi $\\|\\gamma'\\|^2=e^{-2t}[(\\cos t+\\sin t)^2+(\\cos t-\\sin t)^2]=2e^{-2t}$ e $\\|\\gamma'\\|=\\sqrt{2}\\,e^{-t}$. Allora $L=\\int_0^{+\\infty}\\sqrt{2}\\,e^{-t}\\,dt=\\sqrt{2}\\,[-e^{-t}]_0^{+\\infty}=\\sqrt{2}$. La spirale compie infiniti giri attorno all'origine ma ha lunghezza FINITA. Credere che l'esponenziale non pesi porta a $+\\infty$."}]},{"pool":"curve","src":"20230907 Es.2 · scorciatoia con dominio problematico","steps":[{"t":"Calcola $\\oint_\\gamma F\\cdot d\\ell$ con $F=\\left(\\dfrac{-y}{x^2+y^2},\\ \\dfrac{x}{x^2+y^2}\\right)$ lungo il cerchio unitario $\\gamma(t)=(\\cos t,\\sin t)$, $t\\in[0,2\\pi]$ (antiorario).","opts":[{"x":"$2\\pi$","c":true},{"x":"$0$"},{"x":"$-2\\pi$"},{"x":"$\\pi$"}],"hint":"$F$ è irrotazionale, ma il dominio $\\mathbb{R}^2\\setminus\\{0\\}$ ha un buco: NON puoi concludere $\\oint=0$ con la scorciatoia del potenziale. Calcola direttamente sul cerchio.","sol":"Passi: su $\\gamma$ vale $x^2+y^2=1$, quindi $F(\\gamma)=(-\\sin t,\\cos t)$ e $\\gamma'=(-\\sin t,\\cos t)$; $F\\cdot\\gamma'=\\sin^2 t+\\cos^2 t=1$. $\\oint=\\int_0^{2\\pi}1\\,dt=2\\pi$. Sebbene $\\partial_x F_2=\\partial_y F_1$ (irrotazionale), il dominio non è semplicemente connesso: la scorciatoia $U(B)-U(A)$ NON si applica e il risultato è $2\\pi\\ne 0$. Rispondere $0$ 'perché irrotazionale' è la trappola (esame 20230907)."}]},{"pool":"curve","src":"tipo curve · Green come scorciatoia (II specie)","steps":[{"t":"Calcola $\\oint_\\gamma (-y\\,dx+x\\,dy)$ lungo l'ellisse $\\gamma(t)=(a\\cos t,\\ b\\sin t)$, $t\\in[0,2\\pi]$ (antiorario).","opts":[{"x":"$2\\pi ab$","c":true},{"x":"$\\pi ab$"},{"x":"$0$"},{"x":"$2\\pi$"}],"hint":"Calcolo diretto: $-y\\,dx+x\\,dy=(ab\\sin^2 t+ab\\cos^2 t)\\,dt$. Oppure Green: $Q_x-P_y=2$ dà $2\\cdot\\text{Area}$.","sol":"Passi (diretto): $dx=-a\\sin t\\,dt$, $dy=b\\cos t\\,dt$; $-y\\,dx=ab\\sin^2 t\\,dt$, $x\\,dy=ab\\cos^2 t\\,dt$, somma $ab\\,dt$; $\\oint=\\int_0^{2\\pi}ab\\,dt=2\\pi ab$. Verifica con Green: con $P=-y$, $Q=x$, $Q_x-P_y=1-(-1)=2$, quindi $\\oint=\\iint_D 2\\,dx\\,dy=2\\,\\text{Area}(D)=2\\cdot\\pi ab=2\\pi ab$. È la formula dell'area via integrale di linea $\\text{Area}=\\tfrac12\\oint(x\\,dy-y\\,dx)$. Rispondere $\\pi ab$ è l'area, non l'integrale (manca il fattore $2$)."}]}],"gauss":[{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Il teorema della divergenza $\\iint_{\\partial V} F\\cdot n\\,dS=\\iiint_V \\nabla\\cdot F\\,dV$ si applica. Quale ipotesi NON puoi omettere?","opts":[{"x":"$F\\in C^1$ su un aperto che contiene $\\overline V$, e $\\partial V$ regolare a tratti con normale uscente","c":true},{"x":"$F$ soltanto continua su $V$"},{"x":"$V$ semplicemente connesso"},{"x":"$\\nabla\\cdot F$ costante"}],"hint":"La regolarita\\u0300 richiesta e\\u0300 $C^1$; la semplice connessione riguarda i campi conservativi, non Gauss.","sol":"Il Teorema della divergenza richiede $F\\in C^1$ su un intorno del compatto $\\overline V$ e $\\partial V$ regolare a tratti con normale $n$ USCENTE. La semplice connessione e\\u0300 irrilevante qui; $\\nabla\\cdot F$ puo\\u0300 essere una qualsiasi funzione continua."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Nel teorema della divergenza la normale $n$ su $\\partial V$ deve essere:","opts":[{"x":"uscente da $V$","c":true},{"x":"entrante in $V$"},{"x":"tangente a $\\partial V$"},{"x":"quella con terza componente sempre positiva"}],"hint":"Il segno del flusso dipende dal verso della normale; il teorema fissa un verso preciso.","sol":"$n$ e\\u0300 la normale USCENTE. Se usi quella entrante il flusso cambia segno: $\\iint_{\\partial V}F\\cdot n_{\\text{ent}}\\,dS=-\\iiint_V\\nabla\\cdot F\\,dV$. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Se $\\nabla\\cdot F\\equiv 0$ su tutto $V$, quanto vale il flusso uscente attraverso $\\partial V$?","opts":[{"x":"$0$","c":true},{"x":"il volume di $V$"},{"x":"non determinabile senza calcolo diretto"},{"x":"dipende dalla forma di $V$"}],"hint":"Integra la divergenza sul volume.","sol":"$\\iint_{\\partial V}F\\cdot n\\,dS=\\iiint_V 0\\,dV=0$. Un campo solenoidale ($\\nabla\\cdot F=0$) ha flusso nullo attraverso ogni superficie chiusa che borda un volume in cui $F\\in C^1$. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Se $\\nabla\\cdot F=c$ costante, il flusso uscente da $V$ vale:","opts":[{"x":"$c\\cdot\\operatorname{vol}(V)$","c":true},{"x":"$c$"},{"x":"$c\\cdot\\operatorname{area}(\\partial V)$"},{"x":"$\\operatorname{vol}(V)$"}],"hint":"L'integrale di una costante sul volume e\\u0300 la costante per il volume.","sol":"$\\iiint_V c\\,dV=c\\,\\operatorname{vol}(V)$. Quando la divergenza e\\u0300 costante il flusso si riduce a un volume: e\\u0300 il motivo per cui Gauss conviene. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"La frontiera $\\partial V$ e\\u0300 fatta di tre superfici e $\\nabla\\cdot F=2$. Conviene di piu\\u0300:","opts":[{"x":"calcolare $\\iiint_V 2\\,dV=2\\operatorname{vol}(V)$ con Gauss","c":true},{"x":"parametrizzare le tre superfici e sommare i tre flussi"},{"x":"applicare Stokes al bordo"},{"x":"costruire il potenziale scalare"}],"hint":"Con divergenza semplice, un integrale di volume batte tre integrali di superficie.","sol":"Con $\\nabla\\cdot F$ costante o semplice, Gauss trasforma tre flussi di superficie in un unico integrale di volume $\\iiint_V\\nabla\\cdot F$. E\\u0300 il criterio di convenienza. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo H · manuale","steps":[{"t":"$\\Sigma$ e\\u0300 una superficie APERTA (una calotta senza coperchio). Per calcolarne il flusso con Gauss devi:","opts":[{"x":"aggiungere un tappo $T$ che chiuda $\\Sigma$, applicare Gauss al solido, poi sottrarre il flusso su $T$","c":true},{"x":"applicare Gauss direttamente a $\\Sigma$"},{"x":"usare Stokes"},{"x":"il flusso e\\u0300 nullo perche\\u0301 $\\Sigma$ e\\u0300 aperta"}],"hint":"Gauss vale solo per superfici CHIUSE; una superficie aperta va prima chiusa.","sol":"Gauss richiede una superficie chiusa. Chiudi $\\Sigma$ con un tappo $T$: $\\iint_\\Sigma+\\iint_T=\\iiint_V\\nabla\\cdot F$, quindi $\\iint_\\Sigma F\\cdot n\\,dS=\\iiint_V\\nabla\\cdot F\\,dV-\\iint_T F\\cdot n\\,dS$. E\\u0300 il trucco 'tappare e Gauss'. Teorema della divergenza (tipo A/H, manuale)."}]},{"pool":"gauss","src":"tipo H · manuale","steps":[{"t":"Chiudi $\\Sigma$ con un tappo $T$ e applichi Gauss al solido $V$. Con quale orientazione entra $T$ in $\\iint_\\Sigma=\\iiint_V\\nabla\\cdot F-\\iint_T$?","opts":[{"x":"con la normale USCENTE da $V$","c":true},{"x":"con la normale entrante in $V$"},{"x":"con orientazione arbitraria"},{"x":"con la normale di $\\Sigma$ cambiata di segno"}],"hint":"Nel bilancio di Gauss ogni pezzo di $\\partial V$ e\\u0300 orientato verso l'esterno.","sol":"Applicando Gauss al solido chiuso, sia $\\Sigma$ sia $T$ vanno con normale uscente da $V$. Isolando $\\Sigma$: $\\iint_\\Sigma=\\iiint_V\\nabla\\cdot F-\\iint_T$ con $T$ uscente. Sbagliarne il verso e\\u0300 l'errore classico del metodo. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo H · manuale","steps":[{"t":"Su una superficie cartesiana $z=f(x,y)$ si ha $r_x\\wedge r_y=(-f_x,-f_y,1)$ (terza componente positiva, punta in alto). Se questa e\\u0300 il tappo INFERIORE di un solido, la normale uscente da $V$ e\\u0300:","opts":[{"x":"$(f_x,f_y,-1)$, cioe\\u0300 verso il basso","c":true},{"x":"$(-f_x,-f_y,1)$, invariata"},{"x":"$(0,0,1)$"},{"x":"$(0,0,-1)$"}],"hint":"Sul fondo del solido, 'uscente' significa verso il basso.","sol":"$(-f_x,-f_y,1)$ punta in alto; sul tappo inferiore l'uscente da $V$ punta in basso, quindi si prende $(f_x,f_y,-1)$. Confondere i due segni e\\u0300 la trappola piu\\u0300 frequente. Teorema della divergenza."}]},{"pool":"gauss","src":"20230210 Es.4","steps":[{"t":"$\\partial V=\\Sigma_1\\cup\\Sigma_2\\cup\\Sigma_3$. Conosci il flusso totale (via Gauss) e i flussi su $\\Sigma_1,\\Sigma_2$. Il flusso su $\\Sigma_3$ e\\u0300:","opts":[{"x":"$\\iiint_V\\nabla\\cdot F\\,dV-\\Phi_{\\Sigma_1}-\\Phi_{\\Sigma_2}$","c":true},{"x":"$\\iiint_V\\nabla\\cdot F\\,dV+\\Phi_{\\Sigma_1}+\\Phi_{\\Sigma_2}$"},{"x":"$\\Phi_{\\Sigma_1}+\\Phi_{\\Sigma_2}$"},{"x":"$0$"}],"hint":"Il flusso totale e\\u0300 la somma dei flussi sui pezzi, tutti uscenti.","sol":"Poiche\\u0301 $\\Phi_{\\partial V}=\\Phi_{\\Sigma_1}+\\Phi_{\\Sigma_2}+\\Phi_{\\Sigma_3}=\\iiint_V\\nabla\\cdot F$, si isola $\\Phi_{\\Sigma_3}=\\iiint_V\\nabla\\cdot F-\\Phi_{\\Sigma_1}-\\Phi_{\\Sigma_2}$. Tecnica del flusso 'per differenza', 20230210 Es.4. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"$F=\\dfrac{(x,y,z)}{(x^2+y^2+z^2)^{3/2}}$ ha $\\nabla\\cdot F=0$ dove definito. Il flusso uscente dalla sfera unitaria centrata nell'origine e\\u0300 $0$?","opts":[{"x":"No: $F$ non e\\u0300 $C^1$ nell'origine, che sta dentro $V$; Gauss non si applica e il flusso vale $4\\pi$","c":true},{"x":"Si\\u0300, perche\\u0301 $\\nabla\\cdot F=0$"},{"x":"Si\\u0300, per ogni superficie chiusa"},{"x":"No, ma il flusso e\\u0300 comunque $0$"}],"hint":"Gauss richiede $F\\in C^1$ in TUTTO $V$, origine inclusa.","sol":"La divergenza e\\u0300 nulla solo fuori dall'origine, dove $F$ ha una singolarita\\u0300. Con l'origine dentro $V$ l'ipotesi $F\\in C^1(\\overline V)$ cade e Gauss non vale: il flusso e\\u0300 $4\\pi$ (campo di Coulomb). Teorema della divergenza, ipotesi di regolarita\\u0300."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"$\\nabla\\cdot F(P)>0$ in un punto $P$ significa che, localmente, $P$ si comporta come:","opts":[{"x":"una sorgente (flusso netto uscente da un intorno di $P$ positivo)","c":true},{"x":"un pozzo"},{"x":"un punto di sella del potenziale"},{"x":"un punto dove $F=0$"}],"hint":"Il flusso su un piccolo volume attorno a $P$ e\\u0300 $\\approx\\nabla\\cdot F(P)\\cdot\\operatorname{vol}$.","sol":"$\\nabla\\cdot F(P)=\\lim_{V\\to P}\\frac{1}{\\operatorname{vol}(V)}\\iint_{\\partial V}F\\cdot n\\,dS$: e\\u0300 la densita\\u0300 di flusso uscente. Positiva = sorgente, negativa = pozzo. E\\u0300 la lettura fisica del Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Vuoi calcolare $\\operatorname{vol}(V)$ come integrale di flusso. Quale campo scegli?","opts":[{"x":"un $F$ con $\\nabla\\cdot F=1$, per esempio $F=(0,0,z)$ o $F=\\tfrac13(x,y,z)$","c":true},{"x":"un $F$ con $\\nabla\\cdot F=0$"},{"x":"$F=(x,y,z)$ senza fattori"},{"x":"un campo qualsiasi"}],"hint":"Serve $\\iiint_V\\nabla\\cdot F=\\operatorname{vol}(V)$, cioe\\u0300 divergenza unitaria.","sol":"Se $\\nabla\\cdot F=1$ allora $\\iint_{\\partial V}F\\cdot n\\,dS=\\iiint_V 1\\,dV=\\operatorname{vol}(V)$. Con $F=(x,y,z)$ la divergenza e\\u0300 $3$, quindi $\\operatorname{vol}(V)=\\tfrac13\\iint_{\\partial V}(x,y,z)\\cdot n\\,dS$. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo H · manuale","steps":[{"t":"Scrivi $\\iint_\\Sigma F\\cdot n=\\iiint_V\\nabla\\cdot F$ per una calotta APERTA $\\Sigma$. Cosa c'e\\u0300 di sbagliato?","opts":[{"x":"$\\Sigma$ non e\\u0300 chiusa: non borda alcun volume, quindi Gauss non e\\u0300 applicabile senza prima tapparla","c":true},{"x":"niente, e\\u0300 corretto"},{"x":"$V$ va preso bidimensionale"},{"x":"manca solo un fattore $2\\pi$"}],"hint":"Gauss lega un volume alla sua frontiera CHIUSA.","sol":"Una superficie aperta non e\\u0300 la frontiera di un solido: $\\iiint_V\\nabla\\cdot F$ non ha nemmeno un $V$ ben definito. Bisogna chiudere $\\Sigma$ con un tappo e poi sottrarne il flusso. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Per $F=(x,y,z)$ il flusso uscente da un qualunque solido $V$ (con $\\partial V$ regolare) vale:","opts":[{"x":"$3\\operatorname{vol}(V)$","c":true},{"x":"$\\operatorname{vol}(V)$"},{"x":"$4\\pi$ sempre"},{"x":"$0$"}],"hint":"Calcola la divergenza di $(x,y,z)$.","sol":"$\\nabla\\cdot(x,y,z)=1+1+1=3$, quindi $\\iint_{\\partial V}(x,y,z)\\cdot n\\,dS=3\\operatorname{vol}(V)$ per ogni solido. Teorema della divergenza."}]},{"pool":"gauss","src":"20240619 Es.1","steps":[{"t":"$F=(e^x+2z,\\,2y,\\,5-z\\,e^x)$. Prima di parametrizzare, calcola $\\nabla\\cdot F$:","opts":[{"x":"$2$ (i termini $e^x$ si cancellano)","c":true},{"x":"$e^x+2-z\\,e^x$"},{"x":"$2e^x+2$"},{"x":"$0$"}],"hint":"$\\partial_x(e^x+2z)=e^x$ e $\\partial_z(5-z\\,e^x)=-e^x$: si elidono.","sol":"$\\partial_x F_1=e^x$, $\\partial_y F_2=2$, $\\partial_z F_3=-e^x$; somma $=2$. Un campo dall'aspetto complicato ha spesso divergenza semplice: calcolarla subito rivela la convenienza di Gauss. 20240619 Es.1. Teorema della divergenza."}]},{"pool":"gauss","src":"20240122 Es.4","steps":[{"t":"$F=(0,0,z)$ e il flusso uscente da un solido $E$ vale $\\tfrac{32}{3}\\pi$. Quanto vale $\\operatorname{vol}(E)$?","opts":[{"x":"$\\tfrac{32}{3}\\pi$","c":true},{"x":"$32\\pi$"},{"x":"$\\tfrac{32}{9}\\pi$"},{"x":"$\\tfrac{16}{3}\\pi$"}],"hint":"$\\nabla\\cdot(0,0,z)=1$.","sol":"$\\nabla\\cdot F=1$, quindi per Gauss $\\Phi=\\iiint_E 1\\,dV=\\operatorname{vol}(E)$. Dal flusso $\\tfrac{32}{3}\\pi$ segue $\\operatorname{vol}(E)=\\tfrac{32}{3}\\pi$. 20240122 Es.4. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Flusso uscente di $F=(x,y,z)$ dalla sfera $x^2+y^2+z^2\\le 4$:","opts":[{"x":"$32\\pi$","c":true},{"x":"$16\\pi$"},{"x":"$\\tfrac{32}{3}\\pi$"},{"x":"$4\\pi$"}],"hint":"$\\nabla\\cdot F=3$ e $\\operatorname{vol}=\\tfrac43\\pi R^3$ con $R=2$.","sol":"$\\nabla\\cdot F=3$; $\\operatorname{vol}=\\tfrac43\\pi\\cdot 8=\\tfrac{32}{3}\\pi$; flusso $=3\\cdot\\tfrac{32}{3}\\pi=32\\pi$. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Flusso uscente di $F=(x,y,z)$ dal cubo $[0,1]^3$:","opts":[{"x":"$3$","c":true},{"x":"$1$"},{"x":"$6$"},{"x":"$0$"}],"hint":"$\\nabla\\cdot F=3$, $\\operatorname{vol}=1$.","sol":"$\\nabla\\cdot F=3$, $\\operatorname{vol}([0,1]^3)=1$, flusso $=3\\cdot 1=3$. Verificabile anche faccia per faccia: le tre coppie di facce danno $1$ ciascuna. Teorema della divergenza."}]},{"pool":"gauss","src":"20220706 Es.2","steps":[{"t":"$F=(z+x^2\\sin y,\\,2x\\cos y,\\,x^2+y^2+8z)$ sul solido $E$. Il flusso uscente vale:","opts":[{"x":"$8\\operatorname{vol}(E)$","c":true},{"x":"$\\operatorname{vol}(E)$"},{"x":"$10\\operatorname{vol}(E)$"},{"x":"$0$"}],"hint":"$\\partial_x(x^2\\sin y)=2x\\sin y$ e $\\partial_y(2x\\cos y)=-2x\\sin y$ si elidono.","sol":"$\\nabla\\cdot F=2x\\sin y-2x\\sin y+8=8$; flusso $=\\iiint_E 8\\,dV=8\\operatorname{vol}(E)$. 20220706 Es.2. Teorema della divergenza."}]},{"pool":"gauss","src":"20250627 Es.3","steps":[{"t":"$F=(x^2z+4,\\,-2xyz-y\\,e^z,\\,e^z+2z+1)$ sul cilindro $\\{0\\le z\\le4,\\;(x-z)^2+y^2\\le4\\}$. Calcola $\\nabla\\cdot F$:","opts":[{"x":"$2$","c":true},{"x":"$2e^z+2$"},{"x":"$2xz+e^z+2$"},{"x":"$0$"}],"hint":"$\\partial_y(-2xyz-y\\,e^z)=-2xz-e^z$: attento al segno di $e^z$.","sol":"$\\partial_x F_1=2xz$; $\\partial_y F_2=-2xz-e^z$; $\\partial_z F_3=e^z+2$. Somma $=2$: il termine $e^z$ si cancella. Sbagliarne il segno produce il falso $2e^z+2$. 20250627 Es.3. Teorema della divergenza.","cont":"Ora il flusso &rarr;"},{"t":"Con $\\nabla\\cdot F=2$ e il cilindro traslato (per ogni $z$ un disco di raggio $2$, area $4\\pi$, con $z\\in[0,4]$), il flusso uscente vale:","opts":[{"x":"$32\\pi$","c":true},{"x":"$16\\pi$"},{"x":"$8\\pi e^4+24\\pi$"},{"x":"$64\\pi$"}],"hint":"$\\operatorname{vol}=\\int_0^4 4\\pi\\,dz$; la traslazione $(x-z)$ non cambia l'area della sezione.","sol":"$\\operatorname{vol}(E)=\\int_0^4 4\\pi\\,dz=16\\pi$ (il disco ha sempre raggio $2$: la traslazione dipendente da $z$ non altera l'area). Flusso $=2\\cdot16\\pi=32\\pi$. Con il falso $\\nabla\\cdot F=2e^z+2$ otterresti $8\\pi e^4+24\\pi$. Teorema della divergenza."}]},{"pool":"gauss","src":"20220124 Es.3","steps":[{"t":"$T=\\{x^2+y^2\\le z\\le 3+2y\\}$ (proiezione: disco $x^2+(y-1)^2\\le4$), con $\\nabla\\cdot F=y-1$. Il flusso uscente vale:","opts":[{"x":"$0$","c":true},{"x":"$4\\pi$"},{"x":"$-\\pi$"},{"x":"$16\\pi$"}],"hint":"Centra le polari nel disco: $y-1=\\rho\\sin\\theta$, e $\\int_0^{2\\pi}\\sin\\theta\\,d\\theta=0$.","sol":"$\\Phi=\\iint_D(3+2y-x^2-y^2)(y-1)\\,dx\\,dy$. Con $y=1+\\rho\\sin\\theta$ il fattore $(y-1)=\\rho\\sin\\theta$ e\\u0300 dispari in $\\theta$ mentre l'altro fattore dipende da $\\rho$: l'integrale angolare $\\int_0^{2\\pi}\\sin\\theta\\,d\\theta=0$, quindi il flusso e\\u0300 $0$. 20220124 Es.3. Teorema della divergenza."}]},{"pool":"gauss","src":"20230210 Es.4","steps":[{"t":"$E=\\{x^2+y^2+z^2\\le25,\\;x^2+y^2\\le9\\}$ (sfera $\\cap$ cilindro), $F=(x,y,z)$. Per il flusso sul mantello cilindrico $\\Sigma_3$ la via piu\\u0300 rapida e\\u0300:","opts":[{"x":"$\\Phi_{\\Sigma_3}=3\\operatorname{vol}(E)-\\Phi_{\\Sigma_1}-\\Phi_{\\Sigma_2}$ (Gauss per il totale, calotte dirette, mantello per differenza)","c":true},{"x":"parametrizzare solo $\\Sigma_3$ e integrare $F\\cdot n$"},{"x":"applicare Stokes al bordo di $\\Sigma_3$"},{"x":"il flusso e\\u0300 $0$ per simmetria"}],"hint":"Gauss da\\u0300 il totale; le calotte sono cartesiane e semplici, il mantello si ottiene per differenza.","sol":"Gauss fornisce $\\Phi_{\\partial E}=3\\operatorname{vol}(E)$. Le calotte $\\Sigma_1,\\Sigma_2$ sono cartesiane e si integrano direttamente; sottraendole si isola $\\Phi_{\\Sigma_3}=3\\operatorname{vol}(E)-\\Phi_{\\Sigma_1}-\\Phi_{\\Sigma_2}=144\\pi$. 20230210 Es.4. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Volume del solido $E=\\{x^2+y^2\\le z\\le 2-x^2-y^2\\}$ (fra i due paraboloidi):","opts":[{"x":"$\\pi$","c":true},{"x":"$2\\pi$"},{"x":"$\\tfrac{\\pi}{2}$"},{"x":"$\\tfrac{2\\pi}{3}$"}],"hint":"Intersezione $x^2+y^2=1$; integra $(2-2\\rho^2)$ in polari con Jacobiano $\\rho$.","sol":"I paraboloidi si incontrano dove $\\rho^2=2-\\rho^2\\Rightarrow\\rho=1$. $\\operatorname{vol}=\\int_0^{2\\pi}\\!\\!\\int_0^1(2-2\\rho^2)\\rho\\,d\\rho\\,d\\theta=2\\pi[\\rho^2-\\tfrac{\\rho^4}{2}]_0^1=2\\pi\\cdot\\tfrac12=\\pi$. Volume come integrale triplo, $\\operatorname{vol}=\\iint_D(z_{sup}-z_{inf})$."}]},{"pool":"gauss","src":"tipo H · manuale","steps":[{"t":"$\\Sigma$ e\\u0300 il paraboloide $z=x^2+y^2$ con $0\\le z\\le1$ (coppa APERTA), normale uscente dal solido sottostante. Chiudi con il disco $T=\\{x^2+y^2\\le1,\\,z=1\\}$. Con $F=(x,y,z)$, quanto vale $\\iiint_V\\nabla\\cdot F\\,dV$ sul solido $V$ fra paraboloide e disco?","opts":[{"x":"$\\tfrac{3\\pi}{2}$","c":true},{"x":"$3\\pi$"},{"x":"$\\tfrac{\\pi}{2}$"},{"x":"$\\pi$"}],"hint":"$\\nabla\\cdot F=3$; $\\operatorname{vol}(V)=\\int_0^{2\\pi}\\int_0^1(1-\\rho^2)\\rho\\,d\\rho\\,d\\theta$.","sol":"$\\operatorname{vol}(V)=\\int_0^{2\\pi}\\int_0^1(1-\\rho^2)\\rho\\,d\\rho\\,d\\theta=2\\pi(\\tfrac12-\\tfrac14)=\\tfrac{\\pi}{2}$. Con $\\nabla\\cdot F=3$: $\\iiint_V 3\\,dV=\\tfrac{3\\pi}{2}$. Teorema della divergenza.","cont":"Ora sottrai il tappo &rarr;"},{"t":"Il flusso uscente attraverso il tappo $T$ (normale $(0,0,1)$, $F\\cdot n=z=1$) e\\u0300 l'area $\\pi$. Il flusso uscente attraverso la coppa $\\Sigma$ vale allora:","opts":[{"x":"$\\tfrac{3\\pi}{2}-\\pi=\\tfrac{\\pi}{2}$","c":true},{"x":"$\\tfrac{3\\pi}{2}$"},{"x":"$\\tfrac{3\\pi}{2}+\\pi=\\tfrac{5\\pi}{2}$"},{"x":"$\\pi$"}],"hint":"$\\iint_\\Sigma=\\iiint_V\\nabla\\cdot F-\\iint_T$: sottrai il tappo, non sommarlo.","sol":"$\\iint_\\Sigma F\\cdot n\\,dS=\\iiint_V\\nabla\\cdot F\\,dV-\\iint_T F\\cdot n\\,dS=\\tfrac{3\\pi}{2}-\\pi=\\tfrac{\\pi}{2}$. Dimenticare il tappo (rispondere $\\tfrac{3\\pi}{2}$) e\\u0300 l'errore da evitare. Trucco 'tappare e Gauss' (tipo A/H). Teorema della divergenza."}]},{"pool":"gauss","src":"20230907 Es.3","steps":[{"t":"$T=\\{(x-(1-z))^2+y^2\\le(1-z)^2,\\;0\\le z\\le1\\}$ (cono decentrato che si restringe), $\\nabla\\cdot F=4x$. Il flusso uscente vale:","opts":[{"x":"$\\pi$","c":true},{"x":"$\\tfrac{\\pi}{3}$"},{"x":"$4\\pi$"},{"x":"$0$"}],"hint":"Per strati: $\\iint_{E_z}x\\,dA=(1-z)\\cdot\\pi(1-z)^2$ (baricentro del disco in $x=1-z$).","sol":"$\\iiint_T 4x\\,dV=\\int_0^1 4\\big(\\iint_{E_z}x\\,dA\\big)dz$. La sezione a quota $z$ e\\u0300 un disco di raggio $1-z$ centrato in $x=1-z$: $\\iint_{E_z}x\\,dA=(1-z)\\,\\pi(1-z)^2=\\pi(1-z)^3$. Flusso $=\\int_0^1 4\\pi(1-z)^3\\,dz=4\\pi\\cdot\\tfrac14=\\pi$. 20230907 Es.3. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Flusso uscente di $F=(x,y,0)$ dal cilindro chiuso $\\{x^2+y^2\\le R^2,\\,0\\le z\\le h\\}$ (mantello piu\\u0300 due basi):","opts":[{"x":"$2\\pi R^2 h$","c":true},{"x":"$\\pi R^2 h$"},{"x":"$0$ (perche\\u0301 $F_z=0$)"},{"x":"$2\\pi R h$"}],"hint":"$\\nabla\\cdot F=2$; sulle basi $F\\cdot(0,0,\\pm1)=0$, ma Gauss da\\u0300 comunque $2\\operatorname{vol}$.","sol":"$\\nabla\\cdot F=1+1+0=2$; $\\operatorname{vol}=\\pi R^2h$; flusso $=2\\pi R^2h$. Tutto passa dal mantello: sulle basi $F\\cdot n=0$. Rispondere $0$ confonde 'flusso nullo sulle basi' con 'flusso totale nullo'. Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Volume di $E=\\{x^2+y^2\\le4,\\;0\\le z\\le x^2+y^2\\}$ (sotto il paraboloide, entro il cilindro di raggio $2$):","opts":[{"x":"$8\\pi$","c":true},{"x":"$4\\pi$"},{"x":"$16\\pi$"},{"x":"$\\tfrac{8\\pi}{3}$"}],"hint":"In cilindriche $z$ va da $0$ a $\\rho^2$; non dimenticare il Jacobiano $\\rho$.","sol":"$\\operatorname{vol}=\\int_0^{2\\pi}\\!\\!\\int_0^2\\!\\!\\int_0^{\\rho^2}\\rho\\,dz\\,d\\rho\\,d\\theta=\\int_0^{2\\pi}\\!\\!\\int_0^2\\rho^3\\,d\\rho\\,d\\theta=2\\pi\\cdot\\tfrac{16}{4}=8\\pi$. Il fattore $\\rho$ e\\u0300 il Jacobiano cilindrico: ometterlo darebbe $\\tfrac{8\\pi}{3}$ o simili. Volume come integrale triplo."}]},{"pool":"gauss","src":"tipo H · manuale","steps":[{"t":"Il tappo inferiore di un solido e\\u0300 il paraboloide $z=x^2+y^2$ (sotto), su $D=\\{x^2+y^2\\le1\\}$, con $F=(0,0,z)$. Per il flusso USCENTE da $V$: quale normale e quanto vale il flusso sul tappo?","opts":[{"x":"$n\\,dS=(2x,2y,-1)\\,dx\\,dy$ (verso il basso); flusso $=-\\tfrac{\\pi}{2}$","c":true},{"x":"$n\\,dS=(-2x,-2y,1)\\,dx\\,dy$; flusso $=+\\tfrac{\\pi}{2}$"},{"x":"$n=(0,0,1)$; flusso $=\\tfrac{\\pi}{2}$"},{"x":"flusso $=0$"}],"hint":"Sul fondo del solido l'uscente punta in basso: terza componente negativa.","sol":"Uscente dal fondo = verso il basso: $n\\,dS=(f_x,f_y,-1)\\,dx\\,dy=(2x,2y,-1)\\,dx\\,dy$. $F\\cdot(2x,2y,-1)=-z=-\\rho^2$; $\\iint_D(-\\rho^2)\\,dA=-\\int_0^{2\\pi}\\!\\int_0^1\\rho^3\\,d\\rho\\,d\\theta=-\\tfrac{\\pi}{2}$. Usare $(-2x,-2y,1)$ (entrante) inverte il segno. Teorema della divergenza, orientazione uscente."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Il flusso uscente di $F=(x,y,z)$ da un solido $V$ vale $12$. Allora $\\operatorname{vol}(V)$ e\\u0300:","opts":[{"x":"$4$","c":true},{"x":"$12$"},{"x":"$36$"},{"x":"$3$"}],"hint":"$\\nabla\\cdot(x,y,z)=3$, quindi flusso $=3\\operatorname{vol}$.","sol":"$\\nabla\\cdot F=3\\Rightarrow 12=3\\operatorname{vol}(V)\\Rightarrow\\operatorname{vol}(V)=4$. Volume ricavato dal flusso via Teorema della divergenza."}]},{"pool":"gauss","src":"tipo A · manuale","steps":[{"t":"Flusso uscente di $F=(x^3,y^3,z^3)$ dalla sfera unitaria $x^2+y^2+z^2\\le1$:","opts":[{"x":"$\\tfrac{12\\pi}{5}$","c":true},{"x":"$4\\pi$"},{"x":"$4\\pi$ perche\\u0301 $\\nabla\\cdot F=3$"},{"x":"$\\tfrac{3\\pi}{5}$"}],"hint":"$\\nabla\\cdot F=3(x^2+y^2+z^2)=3r^2$, NON costante; in sferiche $dV=r^2\\sin\\phi\\,dr\\,d\\phi\\,d\\theta$.","sol":"$\\nabla\\cdot F=3x^2+3y^2+3z^2=3r^2$. $\\Phi=\\iiint 3r^2\\,dV=3\\int_0^1 r^2\\cdot 4\\pi r^2\\,dr=12\\pi\\int_0^1 r^4\\,dr=\\tfrac{12\\pi}{5}$. Con divergenza non costante si integra davvero il volume, non basta $3\\operatorname{vol}$. Teorema della divergenza."}]}],"stokes":[{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Il teorema di Stokes afferma che, sotto le sue ipotesi, la circuitazione di $F$ lungo $\\partial S$ uguaglia:","opts":[{"x":"$\\iint_S (\\nabla\\times F)\\cdot n\\,dS$","c":true},{"x":"$\\iint_S (\\nabla\\cdot F)\\,dS$"},{"x":"$\\iiint_V (\\nabla\\cdot F)\\,dV$"},{"x":"$\\iint_S F\\cdot n\\,dS$"}],"hint":"Il secondo membro è il flusso del ROTORE, non della divergenza né di $F$ stesso.","sol":"Teorema di Stokes: $\\oint_{\\partial S} F\\cdot d\\ell=\\iint_S (\\nabla\\times F)\\cdot n\\,dS$. A sinistra la circuitazione, a destra il flusso del rotore attraverso una qualunque superficie $S$ che abbia $\\partial S$ come bordo."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Quali ipotesi servono per applicare il teorema di Stokes a $\\oint_{\\partial S} F\\cdot d\\ell$?","opts":[{"x":"$F$ di classe $C^1$ su un aperto contenente $S$, e $S$ superficie regolare orientabile con bordo","c":true},{"x":"$F$ solo continuo e $S$ chiusa"},{"x":"$F$ irrotazionale e $S$ piana"},{"x":"$F$ di classe $C^1$ e $S$ superficie chiusa senza bordo"}],"hint":"Una superficie CHIUSA non ha bordo: la circuitazione non è definita. E serve $C^1$, non la sola continuità.","sol":"Il teorema di Stokes richiede $F\\in C^1$ su un aperto che contiene $S$, e $S$ superficie regolare, orientabile, con bordo $\\partial S$. La superficie deve avere bordo (non essere chiusa) e l'orientazione della normale deve essere coerente col verso di $\\partial S$."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Come si sceglie il verso di percorrenza di $\\partial S$ una volta fissata la normale $n$ di $S$?","opts":[{"x":"Regola della mano destra: pollice lungo $n$, le dita indicano il verso di $\\partial S$","c":true},{"x":"Sempre antiorario, indipendentemente da $n$"},{"x":"Sempre orario visto dall'alto"},{"x":"Il verso è arbitrario e non influenza il segno"}],"hint":"Verso del bordo e verso della normale NON sono indipendenti: uno determina l'altro.","sol":"L'orientazione coerente è data dalla regola della mano destra: se il pollice punta come $n$, le dita danno il verso positivo di $\\partial S$. Scambiare uno dei due senza l'altro introduce un errore di segno nel teorema di Stokes."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"La prima componente di $\\nabla\\times F$ è:","opts":[{"x":"$\\partial_y F_3 - \\partial_z F_2$","c":true},{"x":"$\\partial_z F_2 - \\partial_y F_3$"},{"x":"$\\partial_x F_2 - \\partial_y F_1$"},{"x":"$\\partial_y F_2 - \\partial_z F_3$"}],"hint":"È la componente $x$: si ottiene ciclicamente da $y,z$ sulle componenti $F_3,F_2$.","sol":"Dal determinante formale del rotore: $(\\nabla\\times F)_1=\\partial_y F_3-\\partial_z F_2$, poi ciclicamente $x\\to y\\to z$. Invertire l'ordine della differenza cambia il segno dell'intera componente."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"La seconda componente del rotore è $\\partial_z F_1-\\partial_x F_3$. Perché è facile sbagliarla?","opts":[{"x":"Perché l'ordine ciclico dà $z,x$ su $F_1,F_3$: scriverla come $\\partial_x F_3-\\partial_z F_1$ inverte il segno","c":true},{"x":"Perché la componente $y$ del rotore è sempre nulla"},{"x":"Perché va calcolata con la divergenza"},{"x":"Perché richiede le derivate seconde"}],"hint":"L'errore tipico è invertire i due termini della differenza sulla componente centrale.","sol":"$(\\nabla\\times F)_2=\\partial_z F_1-\\partial_x F_3$. La regola ciclica $x\\to y\\to z\\to x$ fissa l'ordine; scriverla al contrario ($\\partial_x F_3-\\partial_z F_1$) è l'errore più frequente e falsa il segno della circuitazione via Stokes."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Se $F$ è irrotazionale ($\\nabla\\times F=0$) su un aperto, quanto vale $\\oint_{\\partial S} F\\cdot d\\ell$ per una superficie $S$ tutta contenuta in quell'aperto?","opts":[{"x":"Zero, perché il flusso di un rotore nullo è nullo","c":true},{"x":"Sempre $2\\pi$"},{"x":"Dipende solo dalla lunghezza di $\\partial S$"},{"x":"Non è calcolabile senza il potenziale"}],"hint":"Se $\\nabla\\times F=0$ ovunque su $S$, l'integrando del secondo membro di Stokes è identicamente nullo.","sol":"Per Stokes $\\oint_{\\partial S} F\\cdot d\\ell=\\iint_S (\\nabla\\times F)\\cdot n\\,dS=\\iint_S 0=0$. Serve che TUTTA $S$ stia nell'aperto dove $\\nabla\\times F=0$: nessun buco del dominio deve essere attraversato."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Perché per calcolare $\\oint_{\\partial S} F\\cdot d\\ell$ posso sostituire $S$ con un'altra superficie $S'$ avente lo stesso bordo?","opts":[{"x":"Perché Stokes lega la circuitazione al bordo: ogni $S'$ con $\\partial S'=\\partial S$ dà lo stesso flusso del rotore","c":true},{"x":"Perché due superfici hanno sempre lo stesso flusso del rotore"},{"x":"Perché il rotore non dipende da $F$"},{"x":"Non è lecito: la superficie è unica"}],"hint":"Il primo membro di Stokes dipende SOLO dal bordo, purché $F\\in C^1$ nella regione tra le due superfici.","sol":"Stokes: $\\oint_{\\partial S}F\\cdot d\\ell=\\iint_{S}(\\nabla\\times F)\\cdot n\\,dS$ dipende solo da $\\partial S$. Se $\\partial S'=\\partial S$ con la stessa orientazione e $F\\in C^1$ nella regione racchiusa, il flusso del rotore è identico. Si sceglie allora la $S'$ più comoda, tipicamente un disco piano."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Il teorema di Green nel piano, $\\oint_{\\partial D} F\\cdot d\\ell=\\iint_D(\\partial_x F_2-\\partial_y F_1)\\,dx\\,dy$, è:","opts":[{"x":"Il caso particolare di Stokes per $S$ piana nel piano $xy$ con $n=(0,0,1)$","c":true},{"x":"Un teorema indipendente da Stokes"},{"x":"Il teorema della divergenza in 2D"},{"x":"Valido solo per campi conservativi"}],"hint":"$\\partial_x F_2-\\partial_y F_1$ è proprio la terza componente del rotore.","sol":"Green è Stokes con $S$ regione piana e $n=(0,0,1)$: allora $(\\nabla\\times F)\\cdot n=(\\nabla\\times F)_3=\\partial_x F_2-\\partial_y F_1$. Non è la divergenza (quello è il teorema di Gauss)."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Se la normale $n$ di una superficie cartesiana ha terza componente NEGATIVA, il bordo $\\partial S$ orientato coerentemente è:","opts":[{"x":"Percorso in senso orario visto dall'alto","c":true},{"x":"Percorso in senso antiorario visto dall'alto"},{"x":"Percorso due volte"},{"x":"Indeterminato"}],"hint":"Mano destra: pollice verso il basso ribalta il verso rispetto al caso 'normale verso l'alto'.","sol":"Con $n_3>0$ (normale verso l'alto) il bordo è antiorario visto dall'alto; con $n_3<0$ è orario. Invertire la normale senza invertire il verso del bordo introduce un segno sbagliato in Stokes (cfr. esame 20250127, es.1)."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Per una superficie cartesiana $z=f(x,y)$ si integra $\\iint_D (\\nabla\\times F)\\cdot(-f_x,-f_y,1)\\,dx\\,dy$ SENZA normalizzare $(-f_x,-f_y,1)$. Perché?","opts":[{"x":"Perché $n\\,dS=(-f_x,-f_y,1)\\,dx\\,dy$: la norma nel $dS$ e quella nel versore si semplificano","c":true},{"x":"Perché la normale è già un versore"},{"x":"Perché il rotore è costante"},{"x":"Perché l'area di $D$ vale $1$"}],"hint":"$dS=|X_x\\times X_y|\\,dx\\,dy$ e $n=(X_x\\times X_y)/|X_x\\times X_y|$: nel prodotto $n\\,dS$ la norma sparisce.","sol":"$n\\,dS=\\frac{X_x\\times X_y}{|X_x\\times X_y|}\\,|X_x\\times X_y|\\,dx\\,dy=(X_x\\times X_y)\\,dx\\,dy=(-f_x,-f_y,1)\\,dx\\,dy$. Si usa il vettore NON normalizzato: normalizzare e poi rimoltiplicare per $\\sqrt{1+f_x^2+f_y^2}$ è un doppio conteggio."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Quanto vale $\\nabla\\times(\\nabla U)$ per un campo scalare $U\\in C^2$?","opts":[{"x":"$0$: il rotore di un gradiente è sempre nullo","c":true},{"x":"$\\nabla U$"},{"x":"$\\nabla^2 U$"},{"x":"Dipende da $U$"}],"hint":"Segue dall'uguaglianza delle derivate miste (teorema di Schwarz).","sol":"$\\nabla\\times(\\nabla U)=0$ perché ogni componente è una differenza di derivate miste uguali (Schwarz): $\\partial_y\\partial_z U-\\partial_z\\partial_y U=0$, ecc. Un campo conservativo è quindi irrotazionale, e per Stokes la sua circuitazione su ogni bordo di superficie contenuta nel dominio è nulla."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Due superfici $S_1,S_2$ con lo stesso bordo danno lo stesso flusso del rotore. Qual è la ragione profonda?","opts":[{"x":"$\\nabla\\cdot(\\nabla\\times F)=0$: chiudendo $S_1\\cup S_2$ e applicando Gauss, il flusso totale del rotore è nullo","c":true},{"x":"Perché i rotori sono sempre uguali"},{"x":"Perché le aree sono uguali"},{"x":"È una coincidenza numerica"}],"hint":"Unisci le due superfici in una chiusa e usa che la divergenza del rotore è identicamente zero.","sol":"$\\nabla\\cdot(\\nabla\\times F)=0$ identicamente. Se $S_1$ e $S_2$ hanno lo stesso bordo, $S_1\\cup(-S_2)$ è chiusa e racchiude un volume $V$: per Gauss $\\iint_{\\partial V}(\\nabla\\times F)\\cdot n=\\iiint_V \\nabla\\cdot(\\nabla\\times F)=0$, cioè i due flussi coincidono. È la base per cambiare superficie in Stokes."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Sul campo $F=\\frac{(-y,\\,x)}{x^2+y^2}$ (su $\\mathbb{R}^2\\setminus\\{0\\}$) si ha $\\nabla\\times F=0$, eppure la circuitazione su un cerchio attorno all'origine vale $2\\pi$. Contraddice Stokes?","opts":[{"x":"No: nessuna superficie con quel bordo sta tutta nel dominio (l'origine è esclusa), quindi Stokes non si applica","c":true},{"x":"Sì, Stokes è violato"},{"x":"No, perché in realtà il rotore non è nullo"},{"x":"Sì, perché il campo non è $C^1$"}],"hint":"Per applicare Stokes servirebbe una superficie CONTENUTA nel dominio: ma ogni disco con quel bordo contiene l'origine.","sol":"Nessuna contraddizione: Stokes richiede una superficie tutta nel dominio di $C^1$ di $F$. Ogni superficie col bordo attorno all'origine contiene il buco, dove $F$ non è definito. Irrotazionale su dominio NON semplicemente connesso non implica circuitazione nulla (cfr. esame 20230907)."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Se inverto il verso di percorrenza di $\\partial S$, la circuitazione $\\oint_{\\partial S} F\\cdot d\\ell$:","opts":[{"x":"Cambia segno","c":true},{"x":"Resta invariata"},{"x":"Si annulla"},{"x":"Raddoppia"}],"hint":"$d\\ell$ cambia verso: l'integrale di linea di seconda specie è orientato.","sol":"L'integrale di linea di seconda specie è orientato: invertendo $\\partial S$ si ha $d\\ell\\to-d\\ell$ e la circuitazione cambia segno. Coerentemente, in Stokes cambia anche il verso di $n$ e quindi il segno del flusso del rotore."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Perché spesso conviene passare da $\\oint_{\\partial S} F\\cdot d\\ell$ al flusso $\\iint_S(\\nabla\\times F)\\cdot n\\,dS$?","opts":[{"x":"Perché $\\nabla\\times F$ è spesso più semplice di $F$ (componenti costanti o nulle) e $S$ si sceglie piana","c":true},{"x":"Perché l'integrale di linea non è mai calcolabile"},{"x":"Perché il flusso è sempre nullo"},{"x":"Perché così si evita di calcolare il rotore"}],"hint":"Il vantaggio è doppio: rotore semplice + libertà di scegliere la superficie col medesimo bordo.","sol":"Il rotore dei campi da esame ha spesso componenti costanti o nulle (es. $(0,1+z,0)$, $(-1,2(x-z),0)$), e per Stokes si sceglie la superficie più comoda con lo stesso bordo (un disco su un piano). L'integrale doppio diventa elementare. A volte conviene il verso opposto: flusso difficile ridotto a circuitazione facile."}]},{"pool":"stokes","src":"20220124 · es.4","steps":[{"t":"Curva $\\gamma$: $z=x+3y+4$ su $x^2+y^2=4$; per il campo $F$ si trova $\\nabla\\times F=(-1,\\,2(x-z),\\,0)$. Con $S$ il pezzo di piano ($X_x\\times X_y=(-1,-3,1)$), quanto vale $\\oint_\\gamma F\\cdot d\\ell$?","opts":[{"x":"$100\\pi$","c":true},{"x":"$0$"},{"x":"$25\\pi$"},{"x":"$-100\\pi$"}],"hint":"Sostituisci $z=x+3y+4$ nel rotore PRIMA di integrare; poi usa $\\iint_D y\\,dx\\,dy=0$ sul disco centrato.","sol":"Per Stokes $\\oint_\\gamma F\\cdot d\\ell=\\iint_D(\\nabla\\times F)\\cdot(-1,-3,1)\\,dx\\,dy$. Il prodotto scalare dà $1-6(x-z)$; con $z=x+3y+4$ si ha $x-z=-3y-4$, quindi l'integrando è $25+18y$. Su $D=\\{x^2+y^2\\le4\\}$: $\\iint 18y=0$ e $\\iint 25=25\\cdot4\\pi=100\\pi$."}]},{"pool":"stokes","src":"20220706 · es.4","steps":[{"t":"Per $F=(y^2+y+z^2,\\,2xy+x,\\,2axz)$, il rotore $\\nabla\\times F$ vale:","opts":[{"x":"$(0,\\,2z-2az,\\,0)$","c":true},{"x":"$(0,\\,2az-2z,\\,0)$"},{"x":"$(2z,\\,0,\\,1)$"},{"x":"$(0,\\,0,\\,2az)$"}],"hint":"Componente 2: $\\partial_z F_1-\\partial_x F_3=2z-2az$. Attento all'ordine della differenza.","sol":"Dal determinante formale: comp1 $=\\partial_y(2axz)-\\partial_z(2xy+x)=0$; comp2 $=\\partial_z(y^2+y+z^2)-\\partial_x(2axz)=2z-2az$; comp3 $=\\partial_x(2xy+x)-\\partial_y(y^2+y+z^2)=(2y+1)-(2y+1)=0$. Quindi $\\nabla\\times F=(0,2z-2az,0)$."}]},{"pool":"stokes","src":"20220706 · es.4","steps":[{"t":"Con $\\nabla\\times F=(0,\\,2z-2az,\\,0)$, per quale valore di $a$ la circuitazione $\\oint_\\gamma F\\cdot d\\ell$ è nulla su OGNI curva chiusa?","opts":[{"x":"$a=1$: allora $\\nabla\\times F=0$ e il campo è irrotazionale (conservativo su dominio semplice)","c":true},{"x":"$a=0$"},{"x":"$a=-1$"},{"x":"Nessun valore: dipende sempre dalla curva"}],"hint":"Circuitazione nulla su ogni bordo di superficie semplice richiede rotore identicamente nullo.","sol":"Per $a=1$: $\\nabla\\times F=(0,2z-2z,0)=0$. Per Stokes $\\oint_\\gamma F\\cdot d\\ell=\\iint_S 0=0$ su ogni bordo di superficie contenuta nel dominio; su $\\mathbb{R}^3$ (semplicemente connesso) $F$ è anche conservativo."}]},{"pool":"stokes","src":"20230705 · es.2","steps":[{"t":"Curva $\\Gamma$: $x^2+y^2=8$, $x+y+z=1$; $F=(x^2y,\\,y^2z,\\,xz)$. Usando il piano $z=1-x-y$ (con $X_x\\times X_y=(1,1,1)$), quanto vale $\\oint_\\Gamma F\\cdot d\\ell$?","opts":[{"x":"$-40\\pi$","c":true},{"x":"$40\\pi$"},{"x":"$-8\\pi$"},{"x":"$0$"}],"hint":"$\\nabla\\times F=(-y^2,-z,-x^2)$; sostituisci $z=1-x-y$ e integra su $D=\\{x^2+y^2\\le8\\}$ in coordinate polari.","sol":"Stokes: $\\oint_\\Gamma F\\cdot d\\ell=\\iint_D(-y^2,-z,-x^2)\\cdot(1,1,1)\\,dx\\,dy=\\iint_D(-x^2-y^2-z)$ con $z=1-x-y$, cioè $-x^2-y^2+x+y-1$. Su $D$ (raggio $\\sqrt8$): $\\iint(-x^2-y^2)=-32\\pi$, $\\iint(x+y)=0$, $\\iint(-1)=-8\\pi$. Totale $-40\\pi$."}]},{"pool":"stokes","src":"20230123 · es.3","steps":[{"t":"Per $F=(y^2-x,\\,2xy,\\,-xz-x)$ (bordo di uno spicchio di sfera), il rotore $\\nabla\\times F$ è:","opts":[{"x":"$(0,\\,1+z,\\,0)$","c":true},{"x":"$(0,\\,-1-z,\\,0)$"},{"x":"$(2y,\\,0,\\,2y)$"},{"x":"$(1+z,\\,0,\\,0)$"}],"hint":"Comp2 $=\\partial_z F_1-\\partial_x F_3=0-(-z-1)=z+1$.","sol":"comp1 $=\\partial_y(-xz-x)-\\partial_z(2xy)=0$; comp2 $=\\partial_z(y^2-x)-\\partial_x(-xz-x)=0-(-z-1)=1+z$; comp3 $=\\partial_x(2xy)-\\partial_y(y^2-x)=2y-2y=0$. Quindi $\\nabla\\times F=(0,1+z,0)$; via Stokes il lavoro sul bordo dello spicchio vale $9\\pi/2$."}]},{"pool":"stokes","src":"20250127 · es.1","steps":[{"t":"$\\nabla\\times F=(3z-1,\\,0,\\,-y)$ su $S$: piano $z=-2x-y+2$, $D=\\{x^2+y^2\\le9\\}$, normale con TERZA componente negativa. Quanto vale $\\oint_{\\partial S} F\\cdot d\\ell$?","opts":[{"x":"$-90\\pi$","c":true},{"x":"$90\\pi$"},{"x":"$-10\\pi$"},{"x":"$0$"}],"hint":"Normale con 3ª componente negativa: usa $(-2,-1,-1)$, opposto di $(2,1,1)$. Poi sostituisci $z=-2x-y+2$.","sol":"Con $n_3<0$ si ha $n\\,dS=(-2,-1,-1)\\,dx\\,dy$. $(\\nabla\\times F)\\cdot(-2,-1,-1)=-6z+2+y$; con $z=-2x-y+2$ diventa $12x+7y-10$. Su $D$ (raggio 3, centrato): $\\iint(12x+7y)=0$, $\\iint(-10)=-90\\pi$. Il segno della normale determina il verso del bordo (Stokes)."}]},{"pool":"stokes","src":"20240704 · es.3","steps":[{"t":"Per $F=(y+xz,\\,z+e^y,\\,x+e^z)$, il rotore $\\nabla\\times F$ è:","opts":[{"x":"$(-1,\\,x-1,\\,-1)$","c":true},{"x":"$(0,\\,0,\\,-1)$"},{"x":"$(1,\\,1-x,\\,1)$"},{"x":"$(-1,\\,1-x,\\,-1)$"}],"hint":"Comp1 $=\\partial_y F_3-\\partial_z F_2=0-1$; comp2 $=\\partial_z F_1-\\partial_x F_3=x-1$.","sol":"comp1 $=\\partial_y(x+e^z)-\\partial_z(z+e^y)=0-1=-1$; comp2 $=\\partial_z(y+xz)-\\partial_x(x+e^z)=x-1$; comp3 $=\\partial_x(z+e^y)-\\partial_y(y+xz)=0-1=-1$. Quindi $\\nabla\\times F=(-1,x-1,-1)$, da inserire nel flusso di Stokes."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Calcola $\\oint_{\\partial D} F\\cdot d\\ell$ con $F=(-y,\\,x)$ e $D$ disco unitario, percorso antiorario, via Green.","opts":[{"x":"$2\\pi$","c":true},{"x":"$0$"},{"x":"$\\pi$"},{"x":"$-2\\pi$"}],"hint":"$\\partial_x F_2-\\partial_y F_1=1-(-1)=2$; l'integrale doppio è $2$ volte l'area.","sol":"Green (Stokes 2D): $\\oint_{\\partial D}F\\cdot d\\ell=\\iint_D(\\partial_x F_2-\\partial_y F_1)\\,dx\\,dy=\\iint_D 2\\,dx\\,dy=2\\cdot\\text{area}(D)=2\\pi$."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Usando Green, $\\oint_{\\partial D} x\\,dy$ (cioè $F=(0,\\,x)$) lungo il cerchio di raggio $R$ antiorario vale:","opts":[{"x":"$\\pi R^2$","c":true},{"x":"$2\\pi R$"},{"x":"$0$"},{"x":"$2\\pi R^2$"}],"hint":"$\\partial_x F_2-\\partial_y F_1=1$: l'integrale doppio diventa l'area di $D$.","sol":"Green: $\\oint_{\\partial D} x\\,dy=\\iint_D(\\partial_x(x)-\\partial_y(0))\\,dx\\,dy=\\iint_D 1\\,dx\\,dy=\\text{area}(D)=\\pi R^2$. È la formula dell'area via circuitazione, caso 2D di Stokes."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Calcola $\\nabla\\times F$ per $F=(xy,\\,yz,\\,zx)$.","opts":[{"x":"$(-y,\\,-z,\\,-x)$","c":true},{"x":"$(y,\\,z,\\,x)$"},{"x":"$(z,\\,x,\\,y)$"},{"x":"$(0,\\,0,\\,0)$"}],"hint":"comp1 $=\\partial_y(zx)-\\partial_z(yz)=0-y$.","sol":"comp1 $=\\partial_y(zx)-\\partial_z(yz)=0-y=-y$; comp2 $=\\partial_z(xy)-\\partial_x(zx)=0-z=-z$; comp3 $=\\partial_x(yz)-\\partial_y(xy)=0-x=-x$. Quindi $\\nabla\\times F=(-y,-z,-x)$."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Per $F=(-y,\\,x,\\,0)$ si ha $\\nabla\\times F=(0,0,2)$. La circuitazione lungo il cerchio unitario nel piano $xy$ (antiorario, $n=(0,0,1)$) vale:","opts":[{"x":"$2\\pi$","c":true},{"x":"$0$"},{"x":"$\\pi$"},{"x":"$4\\pi$"}],"hint":"Flusso di $(0,0,2)$ attraverso il disco unitario $=2\\cdot$ area.","sol":"Stokes: $\\oint F\\cdot d\\ell=\\iint_S(0,0,2)\\cdot(0,0,1)\\,dS=2\\cdot\\text{area}(\\text{disco})=2\\pi$. Il rotore costante $2\\hat z$ misura la vorticità del campo rotante."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Per $F=(0,\\,0,\\,z)$, la circuitazione $\\oint_{\\partial S} F\\cdot d\\ell$ su un qualunque bordo vale:","opts":[{"x":"$0$, perché $\\nabla\\times F=0$","c":true},{"x":"$z\\cdot$ lunghezza del bordo"},{"x":"L'area di $S$"},{"x":"Dipende dalla superficie scelta"}],"hint":"Calcola prima il rotore: tutte le derivate incrociate di $F=(0,0,z)$ si annullano.","sol":"comp1 $=\\partial_y z-\\partial_z 0=0$; comp2 $=\\partial_z 0-\\partial_x z=0$; comp3 $=\\partial_x 0-\\partial_y 0=0$. Quindi $\\nabla\\times F=0$ e per Stokes $\\oint_{\\partial S} F\\cdot d\\ell=0$ su ogni bordo (il campo $z\\hat z$ è un gradiente: $F=\\nabla(z^2/2)$)."}]},{"pool":"stokes","src":"20220706 · es.4","steps":[{"t":"Con $\\nabla\\times F=(0,\\,2z-2az,\\,0)$ e superficie $S$: $z=4x+y+1$ su $x^2+y^2\\le1$, la circuitazione risulta $2(a-1)\\pi$. Per $a=2$ quanto vale?","opts":[{"x":"$2\\pi$","c":true},{"x":"$0$"},{"x":"$-2\\pi$"},{"x":"$4\\pi$"}],"hint":"Sostituisci $a=2$ nella formula $2(a-1)\\pi$.","sol":"Per Stokes il flusso di $(0,2z-2az,0)$ attraverso $S$ si riduce, dopo l'integrazione sul disco, a $2(a-1)\\pi$; con $a=2$ vale $2\\pi$. Per $a=1$ tornerebbe $0$, coerente col campo irrotazionale."}]},{"pool":"stokes","src":"tipo B · manuale","steps":[{"t":"Devi calcolare $\\oint_\\gamma F\\cdot d\\ell$ dove $\\gamma$ è il cerchio $x^2+y^2=1$ che giace sul piano $z=x+2$. Quale superficie conviene per Stokes?","opts":[{"x":"Il disco piano $\\{x^2+y^2\\le1,\\ z=x+2\\}$, di cui $\\gamma$ è il bordo","c":true},{"x":"Una semisfera qualsiasi"},{"x":"Il cilindro $x^2+y^2=1$"},{"x":"Nessuna: si deve calcolare l'integrale di linea direttamente"}],"hint":"Il bordo determina la superficie: scegli la più semplice con quel bordo, cioè un pezzo di piano.","sol":"Per Stokes ogni superficie con $\\partial S=\\gamma$ va bene; si sceglie la più semplice, il disco piano $z=x+2$ sopra $D=\\{x^2+y^2\\le1\\}$, con $X_x\\times X_y=(-f_x,-f_y,1)=(-1,0,1)$. Cilindro e semisfera complicano l'integrale senza motivo."}]},{"pool":"stokes","src":"20220124 · es.4","steps":[{"t":"Superficie cartesiana con $X_x\\times X_y=(-1,-3,1)$ (terza componente $+1$). Per Stokes il bordo va percorso:","opts":[{"x":"In senso antiorario visto dall'alto: coerente con $n_3>0$, nessun segno da aggiungere","c":true},{"x":"In senso orario visto dall'alto"},{"x":"In un verso qualunque"},{"x":"Va sempre aggiunto un segno meno"}],"hint":"$n_3>0$ (normale verso l'alto) corrisponde a bordo antiorario, per la regola della mano destra.","sol":"$X_x\\times X_y=(-f_x,-f_y,1)$ ha terza componente positiva: la normale punta verso l'alto e il bordo coerente è antiorario visto dall'alto, senza correzioni di segno. Se il testo imponesse $n_3<0$, si userebbe $-(X_x\\times X_y)$ e bordo orario."}]}],"ottim":[{"pool":"ottim","src":"20250116 Es.2 · Weierstrass","steps":[{"t":"Per cercare max e min ASSOLUTI di $f$ continua su $D=\\{3x^2+4y^2\\le 9\\}$, cosa garantisce la loro ESISTENZA prima di calcolarli?","opts":[{"x":"Il teorema di Weierstrass: $D$ è chiuso e limitato (compatto) e $f$ è continua, quindi max e min esistono","c":true},{"x":"Il teorema di Fermat, perché il gradiente si annulla in un punto interno"},{"x":"Nulla: l'esistenza va verificata caso per caso risolvendo il sistema $\\nabla f=0$"},{"x":"Il teorema di Lagrange, perché il dominio ha un bordo"}],"hint":"L'esistenza di max/min assoluti dipende da due proprietà topologiche del dominio più la continuità di $f$, non dal calcolo dei punti critici.","sol":"Teorema di Weierstrass: $f$ continua su un compatto (chiuso e limitato) ammette massimo e minimo assoluti. Verificare la compattezza di $D$ è il primo passo, prima di cercare candidati interni e di bordo."}]},{"pool":"ottim","src":"20250127 Es.2","steps":[{"t":"Sia $f(x,y)=x^2-2xy+y^3+1$. Nel punto critico $(0,0)$ l'Hessiana ha $\\det H=-4<0$. Che punto è?","opts":[{"x":"Sella: $\\det H<0$ classifica come sella, indipendentemente dal segno di $f_{xx}$","c":true},{"x":"Minimo, perché $f_{xx}=2>0$"},{"x":"Massimo"},{"x":"Non classificabile col test dell'Hessiana"}],"hint":"Con $\\det H<0$ gli autovalori hanno segni opposti: il segno di $f_{xx}$ è irrilevante.","sol":"Test dell'Hessiana in 2D: $\\det H<0\\Rightarrow$ sella. Il controllo di $f_{xx}$ serve solo a distinguere min da max quando $\\det H>0$.","cont":"Continua &rarr; l'altro punto critico"},{"t":"Stessa $f$, nel punto critico $(2/3,2/3)$ si ha $\\det H=4>0$ e $f_{xx}=2>0$. Che punto è?","opts":[{"x":"Minimo locale: $\\det H>0$ e $f_{xx}>0$","c":true},{"x":"Massimo locale"},{"x":"Sella"},{"x":"Serve calcolare esplicitamente gli autovalori"}],"hint":"Con $\\det H>0$ gli autovalori sono concordi; il segno di $f_{xx}$ dice quale.","sol":"$\\det H>0$ e $f_{xx}>0\\Rightarrow$ minimo locale ($f_{xx}<0\\Rightarrow$ massimo). Test dell'Hessiana in 2D."}]},{"pool":"ottim","src":"20230504 Es.5 · Lagrange","steps":[{"t":"Sul vincolo $g(x,y)=c$, la condizione dei moltiplicatori $\\nabla f=\\lambda\\nabla g$ è equivalente a:","opts":[{"x":"$f_x g_y-f_y g_x=0$: i gradienti sono PARALLELI (minore $2\\times 2$ nullo)","c":true},{"x":"$\\nabla f\\cdot\\nabla g=0$: i gradienti sono ortogonali"},{"x":"$\\nabla f=0$ sul bordo"},{"x":"$g_x=g_y=0$"}],"hint":"I moltiplicatori impongono $\\nabla f$ e $\\nabla g$ PARALLELI, non ortogonali: annulla il determinante $2\\times 2$, non il prodotto scalare.","sol":"$\\nabla f=\\lambda\\nabla g$ significa gradienti paralleli $\\iff$ il minore $2\\times 2$ $f_xg_y-f_yg_x=0$. Con $g=c$ dà il sistema per i candidati di bordo (teorema di Lagrange)."}]},{"pool":"ottim","src":"20230621 · punto critico fuori dominio","steps":[{"t":"Il sistema $\\nabla f=0$ dà il candidato $P=(3,0)$, ma il dominio è $D=\\{2x^2+y^2\\le 1\\}$. $P$ va inserito fra i candidati?","opts":[{"x":"No: $2\\cdot 3^2=18>1$, quindi $P\\notin D$; un punto critico interno conta solo se appartiene al dominio","c":true},{"x":"Sì, i punti critici vanno sempre confrontati"},{"x":"Sì, ma solo il valore $f(P)$, non la posizione"},{"x":"Solo se $P$ giace sul bordo $\\partial D$"}],"hint":"Un punto critico interno conta solo se cade DENTRO il dominio ammissibile: verifica sempre l'appartenenza.","sol":"$P=(3,0)$ non soddisfa $2x^2+y^2\\le 1$ (dà $18>1$): è fuori da $D$, quindi si scarta. Confrontare $f(P)$ sarebbe un errore. Src 20230621."}]},{"pool":"ottim","src":"tipo D · manuale","steps":[{"t":"In un punto critico hai $\\det H>0$. Puoi concludere che è un minimo?","opts":[{"x":"No: $\\det H>0$ dice solo che è un estremo (autovalori concordi); serve il segno di $f_{xx}$ per distinguere min da max","c":true},{"x":"Sì, $\\det H>0$ è sempre un minimo"},{"x":"Sì, se anche $f_{yy}>0$ è certamente un minimo, altrimenti una sella"},{"x":"No, con $\\det H>0$ è sempre una sella"}],"hint":"$\\det H>0$ garantisce un estremo, ma non quale: due autovalori negativi danno un massimo con lo stesso $\\det>0$.","sol":"$\\det H>0\\Rightarrow$ autovalori dello stesso segno: minimo se $f_{xx}>0$, massimo se $f_{xx}<0$. Omettere il controllo di $f_{xx}$ è la trappola classica del test dell'Hessiana."}]},{"pool":"ottim","src":"20250721 Es.1","steps":[{"t":"Per $F(x,y,z)=x^2 e^{yz}$: dal sistema $\\nabla F=0$ risulta che TUTTI i punti $(0,y,z)$ sono critici. Qual è il minimo assoluto su $\\mathbb{R}^3$?","opts":[{"x":"$0$: $F\\ge 0$ ovunque e $F=0$ su tutto il piano $x=0$, un continuo di punti di minimo","c":true},{"x":"Non esiste minimo perché i punti critici sono infiniti"},{"x":"$-\\infty$"},{"x":"$1$"}],"hint":"Guarda il segno: $F$ è un quadrato per un esponenziale, quindi $F\\ge 0$. Il minimo è il valore più basso raggiunto, anche se su infiniti punti.","sol":"$F=x^2 e^{yz}\\ge 0$ e $F=0\\iff x=0$: l'insieme dei minimi è il piano $x=0$, il minimo assoluto è $0$. Avere infiniti punti critici non impedisce l'esistenza del minimo. Src 20250721 es.1."}]}],"serie":[{"pool":"serie","src":"20250127 Es.4","steps":[{"t":"Sia $f_n(x)=\\cos\\!\\big(\\tfrac{x}{n}\\big)\\dfrac{nx+3}{n^2+2x^2}$. Qual è il limite PUNTUALE su $\\mathbb{R}$?","opts":[{"x":"$f(x)=0$ per ogni $x$: a $x$ fisso il numeratore cresce come $n$, il denominatore come $n^2$","c":true},{"x":"$f(x)=x$"},{"x":"$f(x)=\\cos x$"},{"x":"il limite puntuale non esiste"}],"hint":"Fissa $x$ e manda $n\\to\\infty$: $\\cos(x/n)\\to 1$ e la frazione $\\sim\\frac{nx}{n^2}\\to 0$.","sol":"A $x$ fissato $\\cos(x/n)\\to 1$ e $\\frac{nx+3}{n^2+2x^2}\\to 0$, quindi $f_n(x)\\to 0$. La convergenza puntuale si studia sempre a $x$ FISSO.","cont":"Continua &rarr; l'uniformità"},{"t":"La convergenza $f_n\\to 0$ è UNIFORME su tutto $\\mathbb{R}$?","opts":[{"x":"No: in $x=n$ vale $f_n(n)=\\cos(1)\\dfrac{n^2+3}{3n^2}\\to\\dfrac{\\cos 1}{3}\\ne 0$, quindi $\\sup_{\\mathbb{R}}|f_n|\\not\\to 0$","c":true},{"x":"Sì: converge a $0$ per ogni $x$, quindi anche uniformemente"},{"x":"Sì, perché $|f_n|\\le 1$"},{"x":"Non si può stabilire senza calcolare la derivata di $f_n$"}],"hint":"Per NEGARE l'uniformità basta una successione $x_n$ (qui $x_n=n$) lungo cui $f_n(x_n)$ non tende a $0$.","sol":"$\\sup_{\\mathbb{R}}|f_n-f|\\ge|f_n(n)|\\to\\frac{\\cos 1}{3}\\ne 0$: convergenza NON uniforme su $\\mathbb{R}$. Puntuale ovunque $\\ne$ uniforme. Su $[0,2]$ invece $|f_n|\\le\\frac{2n+3}{n^2}\\to 0$: uniforme. Src 20250127 es.4."}]},{"pool":"serie","src":"tipo · manuale · Weierstrass-M","steps":[{"t":"Il criterio di Weierstrass (M-test) per $\\sum_k f_k(x)$ su $I$: se $\\sum_k\\sup_I|f_k|<+\\infty$ allora la serie converge:","opts":[{"x":"totalmente su $I$, e quindi anche uniformemente e assolutamente","c":true},{"x":"solo puntualmente"},{"x":"uniformemente, ma la convergenza totale è più debole di quella uniforme"},{"x":"e la condizione è anche NECESSARIA per l'uniformità"}],"hint":"La convergenza totale (M-test) IMPLICA l'uniforme, ma non viceversa: esistono serie uniformemente convergenti senza convergenza totale.","sol":"Weierstrass-M: $\\sum\\sup_I|f_k|=\\sum M_k<\\infty\\Rightarrow$ convergenza totale $\\Rightarrow$ uniforme e assoluta. L'implicazione non si inverte: l'uniforme non richiede la totale."}]},{"pool":"serie","src":"20240122 Es.2","steps":[{"t":"Per $\\sum_{k\\ge 1}\\dfrac{(\\log x)^k}{3^k\\,k}$ poni $y=\\dfrac{\\log x}{3}$. Qual è il raggio di convergenza in $y$?","opts":[{"x":"$R=1$: la serie diventa $\\sum y^k/k$, con $\\sqrt[k]{1/k}\\to 1$","c":true},{"x":"$R=3$"},{"x":"$R=+\\infty$"},{"x":"$R=0$"}],"hint":"Riconosci $\\sum y^k/k$: il raggio si ottiene dal criterio della radice/rapporto sui coefficienti $1/k$.","sol":"$\\sum_k\\frac{y^k}{k}$ ha $R=1$ (criterio della radice: $\\sqrt[k]{1/k}\\to 1$). Dentro $|y|<1$ converge; gli estremi $y=\\pm 1$ vanno studiati a parte. Src 20240122 es.2.","cont":"Continua &rarr; gli estremi"},{"t":"Agli estremi: in $y=1$ la serie è $\\sum 1/k$, in $y=-1$ è $\\sum(-1)^k/k$. L'insieme di convergenza in $y$ è:","opts":[{"x":"$[-1,1)$: in $y=1$ diverge (armonica), in $y=-1$ converge (Leibniz)","c":true},{"x":"$(-1,1)$: entrambi gli estremi si escludono sempre"},{"x":"$[-1,1]$: converge a entrambi gli estremi"},{"x":"$(-1,1]$"}],"hint":"Il raggio non decide gli estremi: $\\sum 1/k$ diverge, $\\sum(-1)^k/k$ converge per Leibniz. Studiali separatamente.","sol":"$y=1$: serie armonica, diverge. $y=-1$: armonica a segni alterni, converge per Leibniz. Convergenza $y\\in[-1,1)$, cioè $\\log x\\in[-3,3)$, $x\\in[e^{-3},e^3)$. Src 20240122 es.2."}]},{"pool":"serie","src":"20240704 Es.4 · scambio limite-integrale","steps":[{"t":"Per scambiare $\\lim_n\\int_a^b f_n=\\int_a^b\\lim_n f_n$ su un intervallo COMPATTO $[a,b]$, l'ipotesi sufficiente più usata è:","opts":[{"x":"la convergenza uniforme di $f_n$ su $[a,b]$ (oppure la convergenza dominata)","c":true},{"x":"la sola convergenza puntuale di $f_n$"},{"x":"la convergenza uniforme su tutto $\\mathbb{R}$"},{"x":"che ogni $f_n$ sia limitata"}],"hint":"La convergenza puntuale da sola NON basta per lo scambio; serve l'uniforme sul compatto (o una dominante sommabile).","sol":"Su $[a,b]$ compatto la convergenza uniforme permette $\\lim\\int=\\int\\lim$. Anche senza uniforme su $\\mathbb{R}$ spesso vale su $[a,b]$; in alternativa la convergenza dominata (Lebesgue). Src 20240704 es.4."}]},{"pool":"serie","src":"20240619 Es.4 · derivazione termine a termine","steps":[{"t":"Per derivare termine a termine $S(x)=\\sum_n u_n(x)$ ottenendo $S'(x)=\\sum_n u_n'(x)$, cosa serve?","opts":[{"x":"che $\\sum u_n$ converga in un punto e che la serie delle DERIVATE $\\sum u_n'$ converga uniformemente","c":true},{"x":"solo che $\\sum u_n$ converga puntualmente"},{"x":"che $\\sum u_n$ converga uniformemente (basta quella)"},{"x":"che ogni $u_n$ sia derivabile, senza altre ipotesi"}],"hint":"Il teorema di derivazione per serie chiede l'uniformità sulla serie delle DERIVATE, non solo su quella di partenza.","sol":"Teorema: se $\\sum u_n(x_0)$ converge e $\\sum u_n'$ converge uniformemente in un intorno, allora $S$ è derivabile e $S'=\\sum u_n'$. L'uniformità di $\\sum u_n$ da sola non basta. Src 20240619 es.4."}]},{"pool":"serie","src":"20250214 Es.4 · Leibniz","steps":[{"t":"Per applicare il criterio di Leibniz a $\\sum(-1)^k a_k$ occorre verificare che:","opts":[{"x":"$a_k\\ge 0$, $\\{a_k\\}$ decrescente e $a_k\\to 0$: tutte e tre le condizioni","c":true},{"x":"solo $a_k\\to 0$"},{"x":"$a_k\\to 0$ e $\\sum a_k$ converge"},{"x":"$\\{a_k\\}$ decrescente, senza richiedere $a_k\\to 0$"}],"hint":"Leibniz richiede TRE condizioni: positività, monotonia decrescente e infinitesimo. La sola $a_k\\to 0$ non basta.","sol":"Criterio di Leibniz: $a_k\\ge 0$, decrescente e $a_k\\to 0$ garantiscono la convergenza di $\\sum(-1)^k a_k$. Manca la monotonia $\\Rightarrow$ il criterio non si applica."}]}],"conserv":[{"pool":"conserv","src":"20230907 Es.2 · il buco","steps":[{"t":"Il campo $F=\\dfrac{1}{x^2+y^2}(-y,\\,x)$ su $\\Omega=\\mathbb{R}^2\\setminus\\{(0,0)\\}$ ha $\\partial_xF_2-\\partial_yF_1=0$ (irrotazionale). È conservativo?","opts":[{"x":"No: $\\Omega$ non è semplicemente connesso (buco nell'origine); la circuitazione sul cerchio unitario vale $2\\pi\\ne 0$","c":true},{"x":"Sì: irrotazionale implica conservativo"},{"x":"Sì, perché $F$ è $C^1$ su $\\Omega$"},{"x":"Non si può stabilire senza costruire il potenziale"}],"hint":"Irrotazionale $\\Rightarrow$ conservativo SOLO su domini semplicemente connessi. Con un buco, calcola la circuitazione attorno al buco.","sol":"$\\operatorname{rot}F=0$ ma $\\Omega$ ha un buco: il teorema (irrotazionale + semplicemente connesso $\\Rightarrow$ conservativo) non si applica. $\\oint_{x^2+y^2=1}F\\cdot d\\ell=2\\pi\\ne 0$ prova la non conservatività. Src 20230907 es.2."}]},{"pool":"conserv","src":"20240122 Es.3 · costruzione potenziale","steps":[{"t":"Dato un campo conservativo $F=(F_1,F_2)$ su $\\mathbb{R}^2$, la costruzione corretta del potenziale $U$ è:","opts":[{"x":"integrare $U_x=F_1$ in $x$ (compare una funzione $c(y)$), poi imporre $U_y=F_2$ per determinare $c'(y)$","c":true},{"x":"porre $U=F_1+F_2$"},{"x":"integrare $U_x=F_1$ in $x$ e aggiungere una costante numerica $k$"},{"x":"calcolare $U=\\big(\\int F_1\\,dx\\big)\\cdot\\big(\\int F_2\\,dy\\big)$"}],"hint":"La 'costante' d'integrazione rispetto a $x$ è una funzione arbitraria $c(y)$, da fissare imponendo la seconda equazione.","sol":"Da $U_x=F_1$: $U=\\int F_1\\,dx+c(y)$. Derivando in $y$ e imponendo $U_y=F_2$ si ricava $c'(y)$, quindi $c(y)$. Mettere una costante numerica al posto di $c(y)$ è l'errore. Src 20240122 es.3."}]},{"pool":"conserv","src":"tipo E · manuale · chiusa vs esatta","steps":[{"t":"Per una $1$-forma $\\omega=P\\,dx+Q\\,dy$, la condizione $\\partial_yP=\\partial_xQ$ (forma CHIUSA) implica che $\\omega$ è ESATTA:","opts":[{"x":"solo se il dominio è semplicemente connesso; in generale chiusa non implica esatta","c":true},{"x":"sempre: chiusa ed esatta coincidono"},{"x":"mai: sono proprietà indipendenti"},{"x":"solo se $P$ e $Q$ sono polinomi"}],"hint":"Chiusa $\\ne$ esatta in generale: l'implicazione richiede un'ipotesi TOPOLOGICA sul dominio (lemma di Poincaré).","sol":"$\\partial_yP=\\partial_xQ$ è la chiusura (necessaria per l'esattezza). Il lemma di Poincaré dà 'chiusa $\\Rightarrow$ esatta' solo su domini semplicemente connessi. Controesempio: $\\frac{-y\\,dx+x\\,dy}{x^2+y^2}$ su $\\mathbb{R}^2\\setminus\\{0\\}$."}]},{"pool":"conserv","src":"20230705 Es.3 · parametro","steps":[{"t":"Per quale $a$ il campo $F=\\Big(\\dfrac{2xy}{(1+x^2)^2},\\ \\dfrac{a}{1+x^2}\\Big)$ è conservativo su $\\mathbb{R}^2$?","opts":[{"x":"$a=-1$: si impone $\\partial_yF_1=\\partial_xF_2$, cioè $\\dfrac{2x}{(1+x^2)^2}=\\dfrac{-2ax}{(1+x^2)^2}$","c":true},{"x":"$a=1$"},{"x":"$a=0$"},{"x":"ogni valore di $a$"}],"hint":"$\\mathbb{R}^2$ è semplicemente connesso: basta imporre $\\partial_yF_1=\\partial_xF_2$ e risolvere in $a$.","sol":"$\\partial_yF_1=\\frac{2x}{(1+x^2)^2}$, $\\partial_xF_2=\\frac{-2ax}{(1+x^2)^2}$: uguaglianza $\\iff -a=1\\iff a=-1$. Su $\\mathbb{R}^2$ ciò basta per la conservatività; potenziale $U=-\\frac{y}{1+x^2}$. Src 20230705 es.3."}]},{"pool":"conserv","src":"20240619 Es.3 · rot vs div","steps":[{"t":"Quale condizione caratterizza un campo CONSERVATIVO su un dominio semplicemente connesso?","opts":[{"x":"$\\operatorname{rot}F=0$ (irrotazionalità)","c":true},{"x":"$\\operatorname{div}F=0$ (solenoidalità)"},{"x":"$\\nabla F=0$ (campo costante)"},{"x":"$\\|F\\|$ costante"}],"hint":"Non confondere: $\\operatorname{rot}F=0$ riguarda la conservatività (potenziale scalare); $\\operatorname{div}F=0$ riguarda la conservazione del flusso (solenoidalità).","sol":"Conservativo $\\iff$ esiste $U$ con $F=\\nabla U$; su dominio semplicemente connesso equivale a $\\operatorname{rot}F=0$. $\\operatorname{div}F=0$ è tutt'altra proprietà (campo solenoidale, potenziale vettore). Src 20240619 es.3."}]}],"diff":[{"pool":"diff","src":"20250214 Es.2 · derivate dalla definizione","steps":[{"t":"Sia $f(x,y)=\\dfrac{\\sin(x^3y^2)+x^3+2y^3}{x^2+y^2}$ per $(x,y)\\ne(0,0)$, $f(0,0)=0$. Come si calcola $f_x(0,0)$?","opts":[{"x":"dalla definizione: $f_x(0,0)=\\lim_{h\\to 0}\\dfrac{f(h,0)}{h}=\\lim_{h\\to 0}\\dfrac{h^3/h^2}{h}=1$","c":true},{"x":"derivando la formula con la regola del quoziente e valutando in $(0,0)$"},{"x":"$f_x(0,0)=0$ perché $f(0,0)=0$"},{"x":"$f_x(0,0)$ non esiste"}],"hint":"Nell'origine la funzione è definita a tratti: le parziali si calcolano SOLO dal rapporto incrementale, mai derivando la formula esplicita.","sol":"$f(h,0)=\\frac{h^3}{h^2}=h$, quindi $\\frac{f(h,0)}{h}=1\\to 1$: $f_x(0,0)=1$ (analogamente $f_y(0,0)=2$). La regola del quoziente non vale in $(0,0)$, dove la formula esplicita non è quella usata. Src 20250214 es.2."}]},{"pool":"diff","src":"20230123 Es.1 · gerarchia","steps":[{"t":"Nell'origine una funzione può essere continua e avere entrambe le derivate parziali, ma NON essere differenziabile?","opts":[{"x":"Sì: la derivabilità (esistenza delle parziali) non implica la differenziabilità","c":true},{"x":"No: se le parziali esistono, $f$ è differenziabile"},{"x":"No: se $f$ è continua e derivabile è automaticamente differenziabile"},{"x":"Sì, ma solo se $f$ non è continua"}],"hint":"La gerarchia corretta è: $C^1\\Rightarrow$ differenziabile $\\Rightarrow$ /* ===== ENGINE ===== */
var S = { units:[], ui:0, si:0, correct:0, total:0, answered:false };

function poolCount(id){ return (Q[id]||[]).reduce(function(n,u){return n+u.steps.length;},0); }

function renderMenu(){
  var g = document.getElementById('poolGrid');
  g.innerHTML = '';
  POOLS.forEach(function(p){
    var units = Q[p.id]||[];
    var n = poolCount(p.id);
    var empty = units.length===0;
    var card = document.createElement(empty?'div':'button');
    card.className = 'pool-card'+(empty?' empty':'');
    if(!empty) card.onclick = function(){ start(p.id); };
    card.innerHTML =
      '<div class="n">'+p.name+'</div>'+
      '<div class="meta">Difficolt&agrave; '+p.diff+' &middot; '+(empty?'0 domande':(n+' passi')) +'</div>'+
      '<span class="badge '+(p.status==='full'?'full':'todo')+'">'+
        (p.status==='full'?'COMPLETO':'DA ESTENDERE')+'</span>';
    g.appendChild(card);
  });
  typeset(g);
}

function start(poolId){
  var units = [];
  if(poolId==='ALL'){
    POOLS.forEach(function(p){ (Q[p.id]||[]).forEach(function(u){ units.push(u); }); });
  } else {
    units = (Q[poolId]||[]).slice();
  }
  if(units.length===0) return;
  units = shuffle(units.slice());
  S = { units:units, ui:0, si:0, correct:0, total:0, answered:false, poolId:poolId };
  show('quiz');
  renderStep();
}

function poolNameById(id){
  for(var i=0;i<POOLS.length;i++) if(POOLS[i].id===id) return POOLS[i].name;
  return id;
}

function renderStep(){
  var u = S.units[S.ui];
  var st = u.steps[S.si];
  S.answered = false;

  // header
  document.getElementById('qpool').innerHTML =
    (S.poolId==='ALL'?'Mischia':poolNameById(S.poolId));
  document.getElementById('qpos').innerHTML =
    'Domanda '+(S.ui+1)+' / '+S.units.length+
    (u.steps.length>1?(' &middot; parte '+(S.si+1)+'/'+u.steps.length):'')+
    ' &middot; <span class="src">'+u.src+'</span>';
  document.getElementById('qbar').style.width = (100*(S.ui)/S.units.length)+'%';

  // figura (nessuna figura in AV, ma il gancio resta)
  var fig = document.getElementById('qfig');
  var svg = st.svg || (S.si===0 ? u.svg : null);
  if(svg){ fig.innerHTML = svg; fig.classList.remove('hidden'); typeset(fig); }
  else { fig.innerHTML=''; fig.classList.add('hidden'); }

  var qt = document.getElementById('qtext');
  qt.innerHTML = st.t;
  typeset(qt);

  // opzioni mescolate
  var opts = shuffle(st.opts.map(function(o){return o;}));
  var box = document.getElementById('qopts');
  box.innerHTML = '';
  opts.forEach(function(o){
    var b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = o.x;
    b.onclick = function(){ answer(b, o, st); };
    box.appendChild(b);
  });
  typeset(box);

  document.getElementById('qhint').classList.remove('show');
  document.getElementById('qsol').classList.remove('show');
  document.getElementById('qcont').classList.add('hidden');
}

function answer(btn, opt, st){
  if(opt.c){
    btn.classList.add('correct');
    Array.prototype.forEach.call(document.querySelectorAll('#qopts .opt'),
      function(b){ b.disabled = true; });
    document.getElementById('qhint').classList.remove('show');
    var sol = document.getElementById('qsol');
    sol.innerHTML = '<b>Corretto.</b> '+st.sol;
    sol.classList.add('show');
    typeset(sol);
    if(!S.answered){ S.correct++; }
    S.answered = true;
    var c = document.getElementById('qcont');
    var last = (S.si === S.units[S.ui].steps.length-1);
    c.innerHTML = last ? 'Prossima domanda &rarr;' : (st.cont || 'Continua &rarr;');
    c.classList.remove('hidden');
    c.onclick = nextStep;
  } else {
    btn.classList.add('wrong');
    btn.disabled = true;
    var h = document.getElementById('qhint');
    h.innerHTML = '<b>Rivedi.</b> '+st.hint;
    h.classList.add('show');
    typeset(h);
  }
}

function nextStep(){
  var u = S.units[S.ui];
  S.total++;
  if(S.si < u.steps.length-1){
    S.si++;
    renderStep();
  } else {
    S.ui++;
    S.si = 0;
    if(S.ui >= S.units.length){ endQuiz(); }
    else renderStep();
  }
}

function endQuiz(){
  show('end');
  document.getElementById('endScore').innerHTML = S.correct+' / '+S.total;
  var pct = S.total? Math.round(100*S.correct/S.total):0;
  var msg = pct>=85 ? 'Livello d&rsquo;esame solido.' :
            pct>=60 ? 'Buona base, ma alcuni trabocchetti ti hanno preso.' :
                      'Rivedi i suggerimenti: gli errori sono concettuali, non di calcolo.';
  document.getElementById('endMsg').innerHTML = 'Risposte corrette al primo tentativo. '+msg;
}

function toMenu(){ show('menu'); }

function show(which){
  ['menu','quiz','end'].forEach(function(id){
    document.getElementById(id).classList.toggle('hidden', id!==which);
  });
  window.scrollTo(0,0);
}

/* Init dopo che i deferred KaTeX sono caricati (DOMContentLoaded li segue). */
window.addEventListener('DOMContentLoaded', renderMenu);
</script>
